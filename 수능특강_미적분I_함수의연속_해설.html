/* ───────── 예제 1 ───────── */
  {
    id:'c2-e1', level:'example', levelLabel:'예제', num:1, type:'choice',
    subLabel:'함수의 연속 정의 · 좌·우극한 = 함숫값',
    title:'조각함수가 \\(x=2\\)에서 연속 — \\(a+b\\)',
    question:`<p>함수 \\(f(x)=\\begin{cases}\\dfrac{x^2+ax}{x-2} & (x\\lt 2) \\\\ -x+b & (x\\geq 2)\\end{cases}\\) 가 \\(x=2\\)에서 연속일 때, \\(a+b\\)의 값은? (단, \\(a,b\\)는 상수)</p>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:1,
    keypoint:'분모 \\(\\to 0\\)인 점에서 좌극한이 유한값으로 존재하려면 <b>분자도 \\(\\to 0\\)</b>이어야 한다 (0/0 인수분해 패턴).',

<div class="calc">\\(\\displaystyle \\lim_{x\\to 2-}f(x)=\\lim_{x\\to 2-}\\dfrac{x^2+ax}{x-2}\\)</div>
<p>이때 분모 \\(\\to 0\\)이고 극한값이 존재 ⇒ 분자도 \\(\\to 0\\)이어야 한다.</p>`},
      {tag:'STEP 2', title:'분자 \\(=0\\)에서 \\(a\\) 결정', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 2-}(x^2+ax)=4+2a=0\\)</div>
<div class="calc purple">\\(a=-2\\)</div>`},
      {tag:'STEP 3', title:'좌극한 값 계산 (인수분해 후 약분)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 2-}\\dfrac{x^2-2x}{x-2}=\\lim_{x\\to 2-}\\dfrac{x(x-2)}{x-2}=\\lim_{x\\to 2-}x=2\\)</div>`},
      {tag:'STEP 4', title:'우극한·함숫값과 비교 → \\(b\\) 결정', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 2+}f(x)=-2+b,\\ f(2)=-2+b\\)</div>

<div class="calc purple">\\(a+b=-2+4=2\\)</div>`}

    keypoint:'두 경계 모두에서 연속 → 두 방정식. 중·하급 함정은 "\\(b=1\\)" 같은 비물리해 거르기.',
    steps:[
      {tag:'STEP 1', title:'\\(x=1\\)에서 연속', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 1-}f(x)=1+a,\\ \\lim_{x\\to 1+}f(x)=3+4a,\\ f(1)=1+a\\)</div>
<div class="calc">\\(1+a=3+4a\\Rightarrow 3a=-2\\Rightarrow a=-\\dfrac{2}{3}\\)</div>`},
      {tag:'STEP 2', title:'\\(x=b\\)에서 연속', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to b-}f(x)=3b+4a=3b-\\dfrac{8}{3},\\ \\lim_{x\\to b+}f(x)=b^2+a=b^2-\\dfrac{2}{3},\\ f(b)=b^2-\\dfrac{2}{3}\\)</div>
<div class="calc">\\(3b-\\dfrac{8}{3}=b^2-\\dfrac{2}{3}\\Rightarrow b^2-3b+2=0\\Rightarrow (b-1)(b-2)=0\\)</div>
<p>\\(b\\gt 1\\) ⇒ \\(b=2\\).</p>`},
      {tag:'STEP 3', title:'최종', body:`<div class="calc purple">\\(a+b=-\\dfrac{2}{3}+2=\\dfrac{4}{3}\\)</div>
<div class="hint">📌 다른 풀이: 두 점 \\(x=1, b\\)에서 직선·곡선이 만나므로 \\(x^2-3x-3a=0\\)의 근이 \\(1, b\\). 근과 계수의 관계 \\(1\\cdot b=-3a\\) 활용 가능.</div>`}
    ]
  },

  /* ───────── 예제 2 ───────── */
  {
    id:'c2-e2', level:'example', levelLabel:'예제', num:2, type:'choice',
    subLabel:'연속함수의 성질 · 분수의 분모 \\(\\neq 0\\)',
    title:'\\(\\dfrac{1}{f(x)-5x}\\) 가 실수 전체에서 연속 — \\(a\\)',
    question:`<p>함수 \\(f(x)=\\begin{cases}3x+a & (x\\lt 1) \\\\ a^2 x-a & (x\\geq 1)\\end{cases}\\) 에 대하여 함수 \\(\\dfrac{1}{f(x)-5x}\\) 이 실수 전체의 집합에서 연속일 때, 상수 \\(a\\)의 값은?</p>`,
    choices:['\\(-1\\)','\\(0\\)','\\(1\\)','\\(2\\)','\\(3\\)'], answer:4,
    keypoint:'분수가 연속이려면 ① 분모도 연속 ② 분모 \\(\\neq 0\\). 모든 실수에서!',
    steps:[
      {tag:'STEP 1', title:'전체 연속 ⇒ \\(f(x)-5x\\)도 연속 ⇒ \\(f\\)도 연속', body:`<p>\\(\\dfrac{1}{f(x)-5x}\\)이 모든 실수에서 연속이려면 분모 \\(f(x)-5x\\)도 연속이고 \\(0\\)이 안 되어야 한다. 또한 \\(5x\\)는 연속이므로 \\(f(x)=(f(x)-5x)+5x\\) 도 연속.</p>`},
      {tag:'STEP 2', title:'\\(x=1\\)에서 \\(f\\) 연속 — \\(a\\) 방정식', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 1-}f(x)=3+a,\\ \\lim_{x\\to 1+}f(x)=a^2-a,\\ f(1)=a^2-a\\)</div>
<div class="calc">\\(3+a=a^2-a\\Rightarrow a^2-2a-3=0\\Rightarrow (a+1)(a-3)=0\\)</div>
<p>\\(a=-1\\) 또는 \\(a=3\\).</p>`},
      {tag:'STEP 3', title:'분모 \\(\\neq 0\\) 조건으로 가려내기', body:`<p>① \\(a=-1\\): \\(f(x)-5x=\\begin{cases}-2x-1 & (x\\lt 1) \\\\ -4x+1 & (x\\geq 1)\\end{cases}\\). \\(x=-\\dfrac{1}{2}\\)에서 \\(0\\) ⇒ 부적합.</p>
<p>② \\(a=3\\): \\(f(x)-5x=\\begin{cases}-2x+3 & (x\\lt 1) \\\\ 4x-3 & (x\\geq 1)\\end{cases}\\). \\(x\\lt 1\\)에서 \\(-2x+3\\gt 1\\), \\(x\\geq 1\\)에서 \\(4x-3\\geq 1\\) ⇒ 모두 양수 ⇒ \\(0\\) 안 됨.</p>
<div class="calc purple">\\(a=3\\)</div>`}
    ]
  },

  /* ───────── 유제 3 ───────── */
  {
    id:'c2-ex3', level:'exercise', levelLabel:'유제', num:3, type:'choice',
    subLabel:'[26009-0029] · \\((f(x)+1)^2\\) 연속 → \\(a\\)의 합',
    title:'\\((f(x)+1)^2\\) 가 실수 전체에서 연속 — \\(a\\)의 합',
    question:`<p>함수 \\(f(x)=\\begin{cases}2x-2 & (x\\lt a) \\\\ -x+3 & (x\\geq a)\\end{cases}\\) 에 대하여 함수 \\((f(x)+1)^2\\) 이 실수 전체의 집합에서 연속이 되도록 하는 모든 실수 \\(a\\)의 값의 합은?</p>`,
    choices:['\\(-2\\)','\\(-\\dfrac{5}{3}\\)','\\(-\\dfrac{4}{3}\\)','\\(-1\\)','\\(-\\dfrac{2}{3}\\)'], answer:2,
    keypoint:'합성·거듭제곱이 연속이라고 해도 <b>원함수가 불연속</b>일 수 있음 — 양쪽 극한의 절댓값이 같으면 OK.',
    steps:[
      {tag:'STEP 1', title:'\\((f(x)+1)^2\\) 가 \\(x=a\\)에서 연속', body:`<p>\\(f(x)\\)는 \\(x\\neq a\\)에서 연속이므로 \\(x=a\\)만 검토.</p>
<div class="calc">\\(\\displaystyle \\lim_{x\\to a-}(f(x)+1)^2=(2a-1)^2,\\ \\lim_{x\\to a+}(f(x)+1)^2=(-a+4)^2\\)</div>`},
      {tag:'STEP 2', title:'\\((2a-1)^2=(-a+4)^2\\) 방정식 풀이', body:`<div class="calc">\\(4a^2-4a+1=a^2-8a+16\\)</div>

<p>\\(a=-3\\) 또는 \\(a=\\dfrac{5}{3}\\).</p>`},
      {tag:'STEP 3', title:'합', body:`<div class="calc purple">\\(-3+\\dfrac{5}{3}=-\\dfrac{4}{3}\\)</div>`}

  /* ───────── 예제 3 ───────── */
  {
    id:'c2-e3', level:'example', levelLabel:'예제', num:3, type:'choice',
    subLabel:'최대·최소 정리 · 조각함수 보기형',
    title:'닫힌구간 \\([-2,2]\\)에서 연속·최대·최소 — 보기 판별',
    question:`<p>실수 \\(a\\)와 함수 \\(f(x)=\\begin{cases}x^2+a^2 x & (x\\lt 1) \\\\ 3x+a & (x\\geq 1)\\end{cases}\\) 에 대하여 보기에서 옳은 것만을 있는 대로 고른 것은?</p>
<div class="calc"><p>ㄱ. 함수 \\(f(x)\\)가 닫힌구간 \\([-2,2]\\)에서 연속이 되도록 하는 모든 실수 \\(a\\)의 값의 합은 \\(1\\)이다.</p>
<p>ㄴ. \\(a=2\\)일 때 닫힌구간 \\([-2,2]\\)에서 함수 \\(f(x)\\)는 최댓값과 최솟값을 모두 갖는다.</p>
<p>ㄷ. \\(a=0\\)일 때 닫힌구간 \\([-2,2]\\)에서 함수 \\(f(x)\\)는 최댓값 또는 최솟값을 갖지 않는다.</p></div>`,
    choices:['ㄱ','ㄱ, ㄴ','ㄱ, ㄷ','ㄴ, ㄷ','ㄱ, ㄴ, ㄷ'], answer:1,
    keypoint:'최대·최소 정리: <b>닫힌구간 + 연속</b>이면 반드시 최댓값·최솟값 존재. 불연속이어도 가질 수는 있음.',
    steps:[
      {tag:'STEP 1', title:'ㄱ. \\(x=1\\) 연속 조건', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 1-}f(x)=1+a^2,\\ \\lim_{x\\to 1+}f(x)=3+a,\\ f(1)=3+a\\)</div>
<div class="calc">\\(1+a^2=3+a\\Rightarrow a^2-a-2=0\\Rightarrow (a+1)(a-2)=0\\)</div>
<p>\\(a=-1\\) 또는 \\(a=2\\) ⇒ 합 \\(=1\\). <b>(참)</b></p>`},
      {tag:'STEP 2', title:'ㄴ. \\(a=2\\)일 때 — 최대·최소 정리 적용', body:`<p>ㄱ에서 \\(a=2\\)는 연속 조건을 만족 ⇒ 닫힌구간 \\([-2,2]\\)에서 연속 ⇒ 최대·최소 정리에 의해 반드시 최댓값·최솟값 존재. <b>(참)</b></p>`},
      {tag:'STEP 3', title:'ㄷ. \\(a=0\\)일 때 — 불연속이지만 최대·최소 존재 확인', body:`<p>\\(a=0\\)이면 \\(f(x)=\\begin{cases}x^2 & (x\\lt 1) \\\\ 3x & (x\\geq 1)\\end{cases}\\). \\(x=1\\)에서 불연속이지만, 닫힌구간 \\([-2,2]\\)에서 그래프를 보면</p>
<div class="calc">최댓값 \\(f(2)=6\\), 최솟값 \\(f(0)=0\\)을 모두 가짐.</div>
<p>"최댓값 또는 최솟값을 갖지 않는다"는 <b>거짓</b>.</p>`},
      {tag:'STEP 4', title:'결론', body:`<div class="calc purple">옳은 것: ㄱ, ㄴ</div>`}
    ]
  },

  /* ───────── 유제 4 ───────── */
  {
    id:'c2-ex4', level:'exercise', levelLabel:'유제', num:4, type:'short',
    subLabel:'[26009-0030] · 주기함수 + 닫힌구간 최대·최소',
    title:'주기 \\(4\\) 연속함수 — 닫힌구간 \\([0,10]\\)에서 최대+최소',
    question:`<p>실수 전체의 집합에서 연속인 함수 \\(f(x)\\)가 모든 실수 \\(x\\)에 대하여 \\(f(x+4)=f(x)\\)를 만족시키고, \\(0\\leq x\\lt 1\\)일 때 \\(f(x)=ax\\), \\(1\\leq x\\lt 4\\)일 때 \\(f(x)=x^2-2ax+b\\)이다. 닫힌구간 \\([0,10]\\)에서 함수 \\(f(x)\\)의 최댓값과 최솟값의 합을 구하시오. (단, \\(a,b\\)는 상수)</p>`,
    answerText:'\\(2\\)',
    keypoint:'주기함수 + 연속 — <b>한 주기 \\([0,4]\\)의 그래프</b>만 그려도 모든 구간 최대·최소를 알 수 있다.',
    steps:[
      {tag:'STEP 1', title:'\\(x=1\\)에서 연속 → \\(b=3a-1\\)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 1-}f(x)=a,\\ \\lim_{x\\to 1+}f(x)=1-2a+b,\\ f(1)=1-2a+b\\)</div>
<div class="calc">\\(a=1-2a+b\\Rightarrow b=3a-1\\quad \\cdots ㉠\\)</div>`},
      {tag:'STEP 2', title:'\\(x=4\\)에서 연속 — 주기성 활용', body:`<p>\\(f(4)=f(0)=0\\) (주기성). 좌극한:</p>
<div class="calc">\\(\\displaystyle \\lim_{x\\to 4-}f(x)=16-8a+b\\)</div>
<div class="calc">\\(16-8a+b=0\\Rightarrow b=8a-16\\quad \\cdots ㉡\\)</div>`},
      {tag:'STEP 3', title:'\\(a,b\\) 연립', body:`<div class="calc">\\(3a-1=8a-16\\Rightarrow a=3,\\ b=8\\)</div>`},
      {tag:'STEP 4', title:'한 주기 \\([0,4]\\)에서 \\(f(x)\\) 그래프', body:`<div class="calc">\\(f(x)=\\begin{cases}3x & (0\\leq x\\lt 1) \\\\ (x-3)^2-1 & (1\\leq x\\leq 4)\\end{cases}\\)</div>
<p>이차함수는 \\(x=3\\)에서 꼭짓점 \\(-1\\), \\(x=1\\)에서 값 \\(3\\), \\(x=4\\)에서 값 \\(0\\). 0≤x&lt;1 구간 직선의 최대는 \\(x\\to 1-\\)에서 \\(\\to 3\\) (열린).</p>
<div class="calc">최댓값 \\(f(1)=3\\), 최솟값 \\(f(3)=-1\\)</div>`},
      {tag:'STEP 5', title:'\\([0,10]\\)에서도 같음 + 합', body:`<p>\\([0,10]\\)은 두 주기 반이지만 한 주기의 최대·최소와 같음.</p>
<div class="calc purple">\\(3+(-1)=2\\)</div>`}
    ]
  },

  /* ───────── 예제 4 ───────── */
  {
    id:'c2-e4', level:'example', levelLabel:'예제', num:4, type:'short',
    subLabel:'사잇값 정리 · 삼차함수 영점 위치',
    title:'\\(f(3)f(6)\\lt 0,\\ f(3)f(20)\\gt 0\\) → \\(p^2+q^2\\)',
    question:`<p>함수 \\(f(x)=x(x-a)(x-a^2)\\)이 \\(f(3)f(6)\\lt 0,\\ f(3)f(20)\\gt 0\\)을 만족시키도록 하는 모든 실수 \\(a\\)의 값의 범위는 \\(p\\lt a\\lt q\\)이다. \\(p^2+q^2\\)의 값을 구하시오. (단, \\(p,q\\)는 상수)</p>`,
    answerText:'\\(29\\)',
    keypoint:'사잇값 정리 \\(\\Leftrightarrow\\) "연속 + 함숫값 부호반전" ⇒ 그 구간에 영점 존재. 부호의 곱 부호로 끄집어내기.',
    steps:[
      {tag:'STEP 1', title:'부호 관계 정리', body:`<p>\\(f(3)f(6)\\lt 0\\): \\(f(3),f(6)\\)은 부호 다름. \\(f(3)f(20)\\gt 0\\): \\(f(3),f(20)\\)은 부호 같음.</p>
<div class="calc">\\(\\therefore f(6),f(20)\\)은 부호 다름 ⇒ \\(f(6)f(20)\\lt 0\\)</div>`},
      {tag:'STEP 2', title:'사잇값 정리 — 영점 위치 두 곳', body:`<p>\\([3,6]\\)에서 \\(f(c)=0\\)인 \\(c\\) 존재. \\([6,20]\\)에서 \\(f(d)=0\\)인 \\(d\\) 존재.</p>
<p>\\(f(x)=x(x-a)(x-a^2)\\)의 실근은 \\(0,a,a^2\\). \\(a\\gt 3\\)인 경우만 가능 (3보다 큰 영점 필요).</p>`},
      {tag:'STEP 3', title:'\\(a, a^2\\) 의 위치 — 작은 값과 큰 값', body:`<p>\\(a\\gt 3\\)이면 \\(a^2\\gt a\\). 그러므로 \\(a\\)는 \\((3,6)\\)에, \\(a^2\\)은 \\((6,20)\\)에 들어가야 한다.</p>
<div class="calc">\\(3\\lt a\\lt 6,\\ 6\\lt a^2\\lt 20\\)</div>`},
      {tag:'STEP 4', title:'두 부등식 교집합', body:`<p>\\(a\\gt 0\\) 이므로 \\(6\\lt a^2\\lt 20\\Rightarrow \\sqrt{6}\\lt a\\lt 2\\sqrt{5}\\).</p>
<div class="calc">교집합: \\(3\\lt a\\lt 2\\sqrt{5}\\)  (\\(2\\sqrt{5}\\approx 4.47\\lt 6\\), \\(\\sqrt{6}\\approx 2.45\\lt 3\\))</div>
<div class="calc">\\(p=3,\\ q=2\\sqrt{5}\\)</div>`},
      {tag:'STEP 5', title:'최종', body:`<div class="calc purple">\\(p^2+q^2=9+20=29\\)</div>`}
    ]
  },

    steps:[

    steps:[
      {tag:'STEP 1', title:'두 곡선 교점 방정식', body:`<div class="calc">\\(x^3+2x^2+nx=x^2+8\\Rightarrow x^3+x^2+nx-8=0\\)</div>
<p>\\(f(x)=x^3+x^2+nx-8\\)이라 하면 다항함수 ⇒ 연속, 그리고 모든 자연수 \\(n\\)에 대해 실근 유일.</p>`},

  {
    id:'c2-b2', level:'basic', levelLabel:'기초', num:2, type:'choice',
    subLabel:'[26009-0034] · 연속함수의 성질 (합·차)',
    title:'\\(\\lim(f+g)=5\\), \\(\\lim(2f-g)=7\\) → \\(f(2)-g(2)\\)',
    question:`<p>실수 전체의 집합에서 연속인 두 함수 \\(f(x), g(x)\\)가 \\(\\displaystyle \\lim_{x\\to 2}(f(x)+g(x))=5,\\ \\lim_{x\\to 2}(2f(x)-g(x))=7\\) 을 만족시킬 때, \\(f(2)-g(2)\\)의 값은?</p>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:2,
    keypoint:'연속함수 합·차도 연속 ⇒ \\(\\lim\\)을 \\(f(2),g(2)\\)로 환원. 그 뒤 연립.',
    steps:[
      {tag:'STEP 1', title:'연속 → \\(\\lim = f(2)+g(2)\\)', body:`<div class="calc">\\(f(2)+g(2)=5\\quad \\cdots ㉠\\)</div>
<div class="calc">\\(2f(2)-g(2)=7\\quad \\cdots ㉡\\)</div>`},
      {tag:'STEP 2', title:'연립으로 \\(f(2), g(2)\\)', body:`<p>㉠+㉡: \\(3f(2)=12\\Rightarrow f(2)=4,\\ g(2)=1\\).</p>
<div class="calc purple">\\(f(2)-g(2)=4-1=3\\)</div>`}
    ]
  },

  /* ───────── 기초 3 ───────── */
  {
    id:'c2-b3', level:'basic', levelLabel:'기초', num:3, type:'choice',
    subLabel:'[26009-0035] · 무리식 0/0 + 연속',
    title:'\\(\\dfrac{\\sqrt{x+1}-a}{x}\\) 가 \\(x=0\\)에서 연속 — \\(a+b\\)',
    question:`<p>함수 \\(f(x)=\\begin{cases}\\dfrac{\\sqrt{x+1}-a}{x} & (-1\\leq x\\lt 0) \\\\ 2x+b & (x\\geq 0)\\end{cases}\\) 이 \\(x=0\\)에서 연속일 때, \\(a+b\\)의 값은? (단, \\(a,b\\)는 상수)</p>`,
    choices:['\\(1\\)','\\(\\dfrac{3}{2}\\)','\\(2\\)','\\(\\dfrac{5}{2}\\)','\\(3\\)'], answer:1,
    keypoint:'분모 \\(\\to 0\\), 좌극한 유한 ⇒ 분자도 \\(\\to 0\\). 무리식은 켤레 유리화.',
    steps:[
      {tag:'STEP 1', title:'좌극한 유한 → 분자 \\(\\to 0\\) → \\(a\\)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 0-}(\\sqrt{x+1}-a)=1-a=0\\Rightarrow a=1\\)</div>`},
      {tag:'STEP 2', title:'좌극한 \\(b\\) 계산', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 0-}\\dfrac{\\sqrt{x+1}-1}{x}\\cdot\\dfrac{\\sqrt{x+1}+1}{\\sqrt{x+1}+1}=\\lim_{x\\to 0-}\\dfrac{x}{x(\\sqrt{x+1}+1)}=\\dfrac{1}{2}\\)</div>
<div class="calc">우극한 \\(=b\\), \\(f(0)=b\\) ⇒ \\(b=\\dfrac{1}{2}\\)</div>`},
      {tag:'STEP 3', title:'최종', body:`<div class="calc purple">\\(a+b=1+\\dfrac{1}{2}=\\dfrac{3}{2}\\)</div>`}
    ]
  },

  {

    subLabel:'[26009-0036] · 유리함수 분모 \\(\\neq 0\\)',
    title:'\\(\\dfrac{x-1}{2x^2+nx+3}\\) 가 실수 전체에서 연속 — \\(n\\) 최댓값',
    question:`<p>함수 \\(f(x)=\\dfrac{x-1}{2x^2+nx+3}\\) 이 실수 전체의 집합에서 연속이 되도록 하는 자연수 \\(n\\)의 최댓값은?</p>`,
    choices:['\\(4\\)','\\(5\\)','\\(6\\)','\\(7\\)','\\(8\\)'], answer:0,
    keypoint:'유리함수가 실수 전체에서 연속 \\(\\Leftrightarrow\\) 분모가 모든 실수에서 \\(\\neq 0\\) \\(\\Leftrightarrow\\) 판별식 \\(\\lt 0\\).',
    steps:[
      {tag:'STEP 1', title:'분모 \\(\\neq 0\\) — 판별식 조건', body:`<p>\\(2x^2+nx+3=0\\)이 실근을 갖지 않아야 함.</p>
<div class="calc">\\(D=n^2-24\\lt 0\\Rightarrow n^2\\lt 24\\)</div>`},
      {tag:'STEP 2', title:'자연수 최댓값', body:`<p>\\(n^2\\lt 24\\Rightarrow |n|\\lt \\sqrt{24}\\approx 4.9\\). 자연수 ⇒ \\(n\\leq 4\\).</p>

  /* ───────── 기초 5 ───────── */
  {
    id:'c2-b5', level:'basic', levelLabel:'기초', num:5, type:'choice',
    subLabel:'[26009-0037] · 절댓값 함수 연속',
    title:'\\(|f(x)|\\) 가 실수 전체에서 연속 — \\(a\\)의 합',
    question:`<p>함수 \\(f(x)=\\begin{cases}2x+1 & (x\\lt 2) \\\\ 3x+a & (x\\geq 2)\\end{cases}\\) 에 대하여 함수 \\(|f(x)|\\)가 실수 전체의 집합에서 연속이 되도록 하는 모든 실수 \\(a\\)의 값의 합은?</p>`,
    choices:['\\(-12\\)','\\(-10\\)','\\(-8\\)','\\(-6\\)','\\(-4\\)'], answer:0,
    keypoint:'\\(|f|\\) 연속 조건은 \\(|좌극한|=|우극한|=|f(c)|\\) — \\(f\\) 자체 연속이 아니라도 가능.',
    steps:[
      {tag:'STEP 1', title:'\\(x=2\\)에서 \\(|f|\\) 좌·우극한·함숫값', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 2-}|f(x)|=|2\\cdot 2+1|=5\\)</div>
<div class="calc">\\(\\displaystyle \\lim_{x\\to 2+}|f(x)|=|6+a|,\\ |f(2)|=|6+a|\\)</div>`},
      {tag:'STEP 2', title:'\\(5=|6+a|\\) 해', body:`<div class="calc">\\(6+a=5\\Rightarrow a=-1\\) 또는 \\(6+a=-5\\Rightarrow a=-11\\)</div>
<div class="calc purple">합 \\(=-1+(-11)=-12\\)</div>`}
    ]
  },

  /* ───────── 기초 6 ───────── */
  {
    id:'c2-b6', level:'basic', levelLabel:'기초', num:6, type:'choice',
    subLabel:'[26009-0038] · 다항식 분해 + 연속',
    title:'\\((x+1)f(x)=x^3+3x^2+a\\) → \\(b+f(b)\\)',
    question:`<p>함수 \\(f(x)\\)가 모든 실수 \\(x\\)에 대하여 \\((x+1)f(x)=x^3+3x^2+a\\) 를 만족시킨다. 상수 \\(b\\)에 대하여 \\(f(b)=2+\\displaystyle \\lim_{x\\to b}f(x)\\)일 때, \\(b+f(b)\\)의 값은? (단, \\(a\\)는 상수)</p>`,
    choices:['\\(-2\\)','\\(-1\\)','\\(0\\)','\\(1\\)','\\(2\\)'], answer:0,
    keypoint:'식 \\((x+1)f(x)=\\cdots\\)에 \\(x=-1\\) 대입 → 좌변 \\(0\\) ⇒ 우변도 \\(0\\) ⇒ \\(a\\) 결정.',
    steps:[
      {tag:'STEP 1', title:'\\(x=-1\\) 대입 → \\(a\\) 결정', body:`<div class="calc">\\(0\\cdot f(-1)=-1+3+a\\Rightarrow a=-2\\)</div>`},
      {tag:'STEP 2', title:'식 인수분해 → \\(f(x)\\) 형태', body:`<div class="calc">\\((x+1)f(x)=x^3+3x^2-2=(x+1)(x^2+2x-2)\\)</div>
<p>\\(x\\neq -1\\)일 때 \\(f(x)=x^2+2x-2\\). \\(x=-1\\)에서는 정의 미정 ⇒ 이 점에서만 잠재적 불연속.</p>`},
      {tag:'STEP 3', title:'\\(f(b)=2+\\lim f(x)\\) — \\(b=-1\\) 필연', body:`<p>\\(b\\neq -1\\)이면 \\(f(b)=\\displaystyle \\lim_{x\\to b}f(x)\\)이라 \\(f(b)=2+f(b)\\) ⇒ 모순. 그러므로 \\(b=-1\\).</p>
<div class="calc">\\(\\displaystyle \\lim_{x\\to -1}f(x)=\\lim_{x\\to -1}(x^2+2x-2)=-3\\)</div>
<div class="calc">\\(f(-1)=2+(-3)=-1\\)</div>`},
      {tag:'STEP 4', title:'최종', body:`<div class="calc purple">\\(b+f(b)=-1+(-1)=-2\\)</div>`}
    ]
  },

  /* ───────── 기초 7 ───────── */
  {
    id:'c2-b7', level:'basic', levelLabel:'기초', num:7, type:'choice',
    subLabel:'[26009-0039] · \\(f(x)g(x)\\) 가 전체 연속',
    title:'\\(f(x)g(x)\\) 실수 전체에서 연속 — \\(a\\)',
    question:`<p>두 함수 \\(f(x)=\\begin{cases}x^2+1 & (x\\lt -1) \\\\ 3x-1 & (x\\geq -1)\\end{cases},\\ g(x)=2x^2+ax\\) 에 대하여 함수 \\(f(x)g(x)\\)가 실수 전체의 집합에서 연속이 되도록 하는 상수 \\(a\\)의 값은?</p>`,
    choices:['\\(-2\\)','\\(-1\\)','\\(0\\)','\\(1\\)','\\(2\\)'], answer:4,
    keypoint:'\\(f\\)가 \\(x=c\\)에서 불연속이어도 \\(g(c)=0\\)이면 \\(fg\\)는 \\(x=c\\)에서 연속이 될 수 있다.',
    steps:[
      {tag:'STEP 1', title:'\\(f(x)\\) 의 불연속점 — \\(x=-1\\)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to -1-}f(x)=2,\\ \\lim_{x\\to -1+}f(x)=-4\\)</div>
<p>\\(f\\)는 \\(x=-1\\)에서 불연속. \\(g\\)는 다항함수 ⇒ 어디서나 연속.</p>`},
      {tag:'STEP 2', title:'\\(fg\\) 가 \\(x=-1\\)에서 연속 조건', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to -1-}f(x)g(x)=2g(-1),\\ \\lim_{x\\to -1+}f(x)g(x)=-4g(-1)\\)</div>
<div class="calc">\\(f(-1)g(-1)=-4g(-1)\\)</div>
<p>\\(2g(-1)=-4g(-1)\\Rightarrow 6g(-1)=0\\Rightarrow g(-1)=0\\).</p>`},
      {tag:'STEP 3', title:'\\(g(-1)=0\\) → \\(a\\)', body:`<div class="calc">\\(g(-1)=2-a=0\\Rightarrow a=2\\)</div>`}
    ]
  },

  /* ───────── 기본 1 ───────── */
  {
    id:'c2-s1', level:'standard', levelLabel:'기본', num:1, type:'choice',
    subLabel:'[26009-0041] · 두 조각함수의 합 전체 연속',
    title:'\\(f(x)+g(x)\\) 가 실수 전체 연속 — \\(a+b\\)',
    question:`<p>두 함수 \\(f(x)=\\begin{cases}-x+1 & (x\\leq 2) \\\\ 2x+a & (x\\gt 2)\\end{cases},\\ g(x)=\\begin{cases}x+2 & (x\\leq a) \\\\ -x+b & (x\\gt a)\\end{cases}\\) 라 하자. \\(\\displaystyle \\lim_{x\\to 2+}f(x)\\lt 6\\)이고 함수 \\(f(x)+g(x)\\)가 실수 전체의 집합에서 연속일 때, \\(a+b\\)의 값은? (단, \\(a,b\\)는 상수)</p>`,
    choices:['\\(-13\\)','\\(-12\\)','\\(-11\\)','\\(-10\\)','\\(-9\\)'], answer:0,
    keypoint:'\\(f\\)와 \\(g\\)의 불연속점이 다르면 — 합이 모든 점에서 연속이 되려면 두 점 모두에서 합이 연속 ⇒ \\(f, g\\) 각각 연속이어야 한다.',
    steps:[
      {tag:'STEP 1', title:'\\(a\\neq 2\\) 가정 — \\(f, g\\) 각각 연속이어야 함', body:`<p>\\(\\displaystyle \\lim_{x\\to 2+}f(x)=4+a\\lt 6\\Rightarrow a\\lt 2\\) ⇒ \\(a\\neq 2\\).</p>
<p>그러므로 \\(f\\)는 \\(x=a\\)에서 연속, \\(g\\)는 \\(x=2\\)에서 연속. 합이 모든 점에서 연속이 되려면 \\(f+g\\)가 \\(x=2\\)와 \\(x=a\\)에서 연속 ⇒ \\(g\\)가 \\(x=2\\)에서 연속이므로 \\(f\\)도 \\(x=2\\)에서 연속. 마찬가지로 \\(g\\)도 \\(x=a\\)에서 연속.</p>`},
      {tag:'STEP 2', title:'\\(f\\)가 \\(x=2\\)에서 연속 → \\(a\\)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 2-}f(x)=-1,\\ \\lim_{x\\to 2+}f(x)=4+a,\\ f(2)=-1\\)</div>
<div class="calc">\\(-1=4+a\\Rightarrow a=-5\\) (\\(a\\lt 2\\) 만족)</div>`},
      {tag:'STEP 3', title:'\\(g\\)가 \\(x=-5\\)에서 연속 → \\(b\\)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to -5-}g(x)=-3,\\ \\lim_{x\\to -5+}g(x)=5+b,\\ g(-5)=-3\\)</div>
<div class="calc">\\(-3=5+b\\Rightarrow b=-8\\)</div>`},
      {tag:'STEP 4', title:'최종', body:`<div class="calc purple">\\(a+b=-5+(-8)=-13\\)</div>`}
    ]
  },

  /* ───────── 기본 2 ───────── */
  {
    id:'c2-s2', level:'standard', levelLabel:'기본', num:2, type:'choice',
    subLabel:'[26009-0042] · 함수방정식 + 연속',
    title:'\\((2x-1)f(x)=f(x)^2+2x-2\\) → \\(f(2)-f(0)\\)',
    question:`<p>실수 전체의 집합에서 연속인 함수 \\(f(x)\\)가 모든 실수 \\(x\\)에 대하여 \\((2x-1)f(x)=(f(x))^2+2x-2\\) 를 만족시킨다. \\(f(3)-f(1)=1\\)일 때, \\(f(2)-f(0)\\)의 값은?</p>`,
    choices:['\\(0\\)','\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)'], answer:3,
    keypoint:'함수방정식을 \\(f(x)\\)에 대한 이차방정식으로 인수분해 → 가능한 \\(f(x)\\) 두 값 ⇒ 연속 조건으로 분기 결정.',
    steps:[
      {tag:'STEP 1', title:'\\(f(x)\\)에 대한 이차식 인수분해', body:`<div class="calc">\\(f^2-(2x-1)f+(2x-2)=0\\)</div>
<div class="calc">\\((f-1)(f-(2x-2))=0\\)</div>
<p>\\(f(x)=1\\) 또는 \\(f(x)=2x-2\\).</p>`},
      {tag:'STEP 2', title:'두 직선 \\(y=1, y=2x-2\\) 교점 — \\(x=\\dfrac{3}{2}\\)', body:`<div class="calc">\\(1=2x-2\\Rightarrow x=\\dfrac{3}{2}\\)</div>
<p>연속이므로 다른 \\(x\\)에서는 두 식 중 하나만 선택, 교점에서만 분기 가능.</p>`},
      {tag:'STEP 3', title:'\\(f(3)-f(1)=1\\) 조건', body:`<p>\\(f(1)\\): \\(1\\) 또는 \\(0\\). \\(f(3)\\): \\(1\\) 또는 \\(4\\). 차가 \\(1\\)인 경우는 \\(f(1)=0, f(3)=1\\).</p>
<p>\\(x=1\\)에서 \\(f=2\\cdot 1-2=0\\) ⇒ \\(x\\leq \\dfrac{3}{2}\\)에서 \\(f(x)=2x-2\\). \\(x=3\\)에서 \\(f=1\\) ⇒ \\(x\\gt \\dfrac{3}{2}\\)에서 \\(f(x)=1\\).</p>`},
      {tag:'STEP 4', title:'\\(f(2), f(0)\\)', body:`<div class="calc">\\(f(2)=1,\\ f(0)=2\\cdot 0-2=-2\\)</div>
<div class="calc purple">\\(f(2)-f(0)=1-(-2)=3\\)</div>`}
    ]
  },

  /* ───────── 기본 3 ───────── */
  {
    id:'c2-s3', level:'standard', levelLabel:'기본', num:3, type:'short',
    subLabel:'[26009-0043] · 합성·곱 불연속 단 한 점',
    title:'\\(f(x)f(x-1)\\) 이 \\(x=b\\) 한 점에서만 불연속 — \\(|ab|\\)',
    question:`<p>함수 \\(f(x)=\\begin{cases}ax^2+4x & (x\\leq 2) \\\\ 3x+2 & (x\\gt 2)\\end{cases}\\) 에 대하여 함수 \\(f(x)f(x-1)\\)이 \\(x=b\\)에서만 불연속일 때, \\(|ab|\\)의 값을 구하시오. (단, \\(a,b\\)는 상수)</p>`,
    answerText:'\\(12\\)',
    keypoint:'\\(f\\)가 \\(x=2\\) 불연속이면 \\(f(x-1)\\)은 \\(x=3\\) 불연속 — 두 곳 중 하나만 연속이 되도록 \\(a\\) 결정.',
    steps:[
      {tag:'STEP 1', title:'\\(f\\)의 불연속점 분석 (\\(a\\neq 0\\))', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 2-}f(x)=4a+8,\\ \\lim_{x\\to 2+}f(x)=8,\\ f(2)=4a+8\\)</div>
<p>\\(a=0\\)이면 \\(f\\) 전체 연속 → \\(f(x)f(x-1)\\)도 전체 연속 ⇒ 조건 불만족. 그러므로 \\(a\\neq 0\\), \\(f\\)는 \\(x=2\\)에서 불연속, \\(f(x-1)\\)은 \\(x=3\\)에서 불연속.</p>`},
      {tag:'STEP 2', title:'\\(fg\\)가 \\(x=2\\)에서 연속 조건', body:`<p>\\(g(x)=f(x-1)\\)이라 하자. \\(g\\)는 \\(x=2\\)에서 연속 (\\(g(2)=f(1)=a+4\\)). 그러므로 \\(fg\\)가 \\(x=2\\)에서 연속이려면 \\(\\displaystyle \\lim_{x\\to 2-}f(x)=\\lim_{x\\to 2+}f(x)\\) 또는 \\(g(2)=0\\). 첫째는 \\(a=0\\)이라 배제. 그러므로 \\(g(2)=f(1)=a+4=0\\Rightarrow a=-4\\).</p>`},
      {tag:'STEP 3', title:'\\(a=-4\\)일 때 \\(x=3\\)에서 \\(fg\\) 연속 확인', body:`<p>\\(f\\)는 \\(x=3\\)에서 연속 (\\(\\geq 2\\) 분기). 그러나 \\(g=f(x-1)\\)은 \\(x=3\\)에서 불연속. \\(fg\\)가 \\(x=3\\)에서 연속이려면 \\(f(3)=0\\). \\(f(3)=11\\neq 0\\) ⇒ \\(x=3\\)에서 \\(fg\\) 불연속.</p>
<p>따라서 \\(a=-4\\)일 때 \\(fg\\)는 \\(x=3\\)에서만 불연속. ⇒ \\(b=3\\).</p>`},
      {tag:'STEP 4', title:'최종', body:`<div class="calc purple">\\(|ab|=|-4\\cdot 3|=12\\)</div>`}
    ]
  },

  /* ───────── 기본 4 ───────── */
  {
    id:'c2-s4', level:'standard', levelLabel:'기본', num:4, type:'choice',
    subLabel:'[26009-0044] · 함수방정식 — \\(f(1)\\) 값',
    title:'조건 (가)(나) — \\(f(1)\\)',
    question:`<p>양수 \\(a\\)에 대하여 실수 전체의 집합에서 연속인 함수 \\(f(x)\\)가 다음 조건을 만족시킬 때, \\(f(1)\\)의 값은?</p>
<div class="calc"><p>(가) \\(x\\leq 1\\)인 모든 실수 \\(x\\)에 대하여 \\(f(x)=x^2+ax-f(1)\\) 이다.</p>
<p>(나) \\(x\\gt 1\\)인 모든 실수 \\(x\\)에 대하여 \\(f(x)=f(-x^2-a^2)\\) 이다.</p></div>`,
    choices:['\\(\\dfrac{1}{2}\\)','\\(1\\)','\\(\\dfrac{3}{2}\\)','\\(2\\)','\\(\\dfrac{5}{2}\\)'], answer:1,
    keypoint:'조건 (가)에 \\(x=1\\) 대입 → \\(f(1)\\) 식 1개. (나)에서 \\(-x^2-a^2\\lt -1\\leq 1\\) → (가) 식으로 되돌아옴. \\(x=1\\)에서 연속.',
    steps:[
      {tag:'STEP 1', title:'\\(x=1\\) 대입 → \\(f(1)\\) 1차식', body:`<div class="calc">\\(f(1)=1+a-f(1)\\Rightarrow f(1)=\\dfrac{1+a}{2}\\quad\\cdots ㉠\\)</div>`},
      {tag:'STEP 2', title:'\\(x\\gt 1\\)에서 \\(f(x)=f(-x^2-a^2)\\) — 사차식 형태', body:`<p>\\(x\\gt 1\\) ⇒ \\(-x^2-a^2\\lt -1\\leq 1\\) ⇒ 조건 (가) 적용:</p>
<div class="calc">\\(f(-x^2-a^2)=(-x^2-a^2)^2+a(-x^2-a^2)-f(1)\\)</div>
<div class="calc">\\(=x^4+(2a^2-a)x^2+a^4-a^3-\\dfrac{1+a}{2}\\)</div>`},
      {tag:'STEP 3', title:'\\(x=1\\)에서 연속 — 양쪽 극한 같음', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 1-}f(x)=1+a-\\dfrac{1+a}{2}=\\dfrac{1+a}{2}\\)</div>
<div class="calc">\\(\\displaystyle \\lim_{x\\to 1+}f(x)=1+(2a^2-a)+a^4-a^3-\\dfrac{1+a}{2}=a^4-a^3+2a^2-\\dfrac{3a}{2}+\\dfrac{1}{2}\\)</div>
<div class="calc">두 값이 같음 ⇒ \\(a^4-a^3+2a^2-2a=0\\)</div>
<div class="calc">\\(a(a-1)(a^2+2)=0,\\ a\\gt 0\\Rightarrow a=1\\)</div>`},
      {tag:'STEP 4', title:'최종', body:`<div class="calc purple">\\(f(1)=\\dfrac{1+1}{2}=1\\)</div>`}
    ]
  },

  /* ───────── 기본 5 ───────── */
  {
    id:'c2-s5', level:'standard', levelLabel:'기본', num:5, type:'choice',
    subLabel:'[26009-0045] · \\(\\dfrac{1}{f(x)}\\) 전체 연속 + 집합 순서쌍',
    title:'\\(\\dfrac{1}{f(x)}\\) 가 전체에서 연속 — 서로 다른 \\((a,b,c)\\) 개수',
    question:`<p>집합 \\(A=\\{-3,-2,-1,1,2,3\\}\\)의 서로 다른 세 원소 \\(a,b,c\\)에 대하여 함수 \\(f(x)=\\begin{cases}ax+1 & (x\\leq 0) \\\\ bx^2+ax+c & (x\\gt 0)\\end{cases}\\) 이라 하자. 함수 \\(\\dfrac{1}{f(x)}\\) 이 실수 전체의 집합에서 연속이 되도록 하는 \\(a,b,c\\)의 모든 순서쌍 \\((a,b,c)\\)의 개수는?</p>`,
    choices:['\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)','\\(6\\)'], answer:3,
    keypoint:'분수 연속 = \\(f\\) 연속 + 모든 실수에서 \\(f\\neq 0\\). 영역별로 조건 따로 정리.',
    steps:[
      {tag:'STEP 1', title:'\\(x=0\\) 연속 → \\(c=1\\)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 0-}f(x)=1,\\ \\lim_{x\\to 0+}f(x)=c,\\ f(0)=1\\Rightarrow c=1\\)</div>`},
      {tag:'STEP 2', title:'\\(x\\leq 0\\)에서 \\(f\\neq 0\\) → \\(a\\lt 0\\)', body:`<p>\\(f(x)=ax+1\\), \\(f(0)=1\\gt 0\\). \\(a\\geq 0\\)이면 \\(x\\leq 0\\)에서 \\(f\\leq 1\\)이지만 \\(a\\gt 0\\)일 때 \\(x=-1/a\\)에서 \\(0\\) 가능 (\\(a\\in\\{1,2,3\\}\\)이면 \\(-1/a\\in\\{-1,-1/2,-1/3\\}\\) — 모두 \\(\\leq 0\\)이라 영점). \\(a\\lt 0\\)이면 \\(x\\leq 0\\)에서 \\(f\\geq 1\\gt 0\\). ⇒ \\(a\\lt 0\\), 즉 \\(a\\in\\{-3,-2,-1\\}\\).</p>`},
      {tag:'STEP 3', title:'\\(x\\gt 0\\)에서 \\(f\\neq 0\\) → \\(b\\gt 0\\) and \\(a^2\\lt 4b\\)', body:`<p>\\(f(x)=bx^2+ax+1\\), \\(\\displaystyle \\lim_{x\\to \\infty}f=\\pm\\infty\\). 양수 \\(x\\)에서 \\(f\\neq 0\\)이려면 ① \\(b\\gt 0\\) ② 축 \\(x=-a/(2b)\\gt 0\\) (\\(a\\lt 0, b\\gt 0\\) ⇒ \\(-a/(2b)\\gt 0\\) 자동), 그리고 ③ 꼭짓점값 \\(\\gt 0\\): \\(1-\\dfrac{a^2}{4b}\\gt 0\\Rightarrow a^2\\lt 4b\\). \\(b\\in\\{1,2,3\\}\\) (양수).</p>`},
      {tag:'STEP 4', title:'\\(a^2\\lt 4b\\) 만족 순서쌍 나열', body:`<div class="calc">\\(a=-1\\): \\(1\\lt 4b\\Rightarrow b\\in\\{1,2,3\\}\\) — 3개<br>
\\(a=-2\\): \\(4\\lt 4b\\Rightarrow b\\in\\{2,3\\}\\) — 2개<br>
\\(a=-3\\): \\(9\\lt 4b\\Rightarrow b=3\\) — 1개</div>
<p>총 6개. 그런데 \\(a,b,c\\)가 서로 달라야 하고 \\(c=1\\). 그러므로 \\(b\\neq 1\\)이어야 (\\(a\\) 음수라 \\(a\\neq 1\\) 자동, \\(b\\neq c=1\\)).</p>
<div class="calc">\\(a=-1\\): \\(b\\in\\{2,3\\}\\) — 2개<br>
\\(a=-2\\): \\(b\\in\\{2,3\\}\\) — 2개<br>
\\(a=-3\\): \\(b=3\\) — 1개</div>
<div class="calc purple">총 \\(2+2+1=5\\)개</div>`}
    ]
  },

  /* ───────── 기본 6 ───────── */
  {
    id:'c2-s6', level:'standard', levelLabel:'기본', num:6, type:'choice',
    subLabel:'[26009-0046] · 조건부 정의 합성 — 이차함수 결정',
    title:'\\(g\\) 가 \\(x=a\\) 1개에서 불연속 — \\(f(1)+g(2)\\)',
    question:`<p>최고차항의 계수의 절댓값이 \\(1\\)인 이차함수 \\(f(x)\\)에 대하여 함수 \\(g(x)=\\begin{cases}f(x) & (f(x)\\geq 1) \\\\ x-2 & (f(x)\\lt 1)\\end{cases}\\) 이라 하자. 함수 \\(g(x)\\)가 \\(x=a\\)에서 불연속인 실수 \\(a\\)의 개수가 \\(1\\)이고 \\(\\displaystyle \\lim_{x\\to 1-}g(x)\\lt \\lim_{x\\to 1+}g(x)\\)일 때, \\(f(1)+g(2)\\)의 값은?</p>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:2,
    keypoint:'경계는 \\(f(x)=1\\). 불연속은 두 분기 값이 다른 곳. \\(g\\) 정의에서 \\(f(c)=1\\)인 점에서 \\(c-2=1 \\Leftrightarrow c=3\\)인 경우만 연속.',
    steps:[
      {tag:'STEP 1', title:'\\(g\\)는 \\(f(x)=1\\)인 \\(x\\)에서 잠재적 불연속', body:`<p>\\(f(x)\\gt 1\\) 또는 \\(f(x)\\lt 1\\)이면 \\(g\\)는 그 부근에서 \\(f\\) 또는 \\(x-2\\) 한쪽으로 연속. \\(f(x)=1\\)인 점에서 두 가지 정의가 만남.</p>`},
      {tag:'STEP 2', title:'좌·우극한 비교 조건', body:`<p>\\(\\displaystyle \\lim_{x\\to 1-}g(x)\\lt \\lim_{x\\to 1+}g(x)\\) ⇒ \\(x=1\\)에서 불연속. ⇒ \\(f(1)=1\\) 이고 좌·우에서 한 분기는 \\(f\\), 한 분기는 \\(x-2\\). \\(x-2\\)의 \\(x=1\\) 값은 \\(-1\\), \\(f(1)=1\\) ⇒ 좌가 \\(-1\\), 우가 \\(1\\) ⇒ 좌극한이 \\(x-2\\)분기.</p>`},
      {tag:'STEP 3', title:'불연속점 1개 → \\(f(x)=1\\) 의 다른 근 \\(b\\)에서 연속', body:`<p>\\(f\\)가 이차 + 최고차항 절댓값 1. \\(f(x)=1\\)의 근이 \\(1\\)과 \\(b\\). \\(x=b\\)에서 \\(g\\) 연속 ⇒ \\(b-2=1\\Rightarrow b=3\\). \\(f(1)=f(3)=1\\)이고 최고차항 \\(\\pm 1\\) ⇒ 이차함수 \\(f(x)=\\pm(x-1)(x-3)+1\\).</p>`},
      {tag:'STEP 4', title:'최고차항 음수 선택', body:`<p>\\(f(x)=-(x-1)(x-3)+1\\)이면 \\(x\\lt 1\\)에서 \\(f(x)\\lt 1\\), \\(1\\lt x\\lt 3\\)에서 \\(f(x)\\gt 1\\). \\(x\\to 1-\\)에서 \\(g=x-2\\to -1\\), \\(x\\to 1+\\)에서 \\(g=f\\to 1\\) ⇒ \\(-1\\lt 1\\) 만족.</p>
<p>최고차항 양수면 \\(x\\lt 1\\)에서 \\(f\\gt 1\\) ⇒ 좌극한 \\(g=f\\to 1\\), 우는 \\(f\\lt 1\\) ⇒ \\(g=x-2\\to -1\\). \\(1\\gt -1\\) — 조건 위배.</p>
<div class="calc">\\(f(x)=-(x-1)(x-3)+1\\)</div>`},
      {tag:'STEP 5', title:'\\(f(1)+g(2)\\)', body:`<div class="calc">\\(f(2)=-(1)(-1)+1=2,\\ f(2)\\geq 1\\Rightarrow g(2)=f(2)=2\\)</div>
<div class="calc purple">\\(f(1)+g(2)=1+2=3\\)</div>`}
    ]
  },

  {
    id:'c2-s7', level:'standard', levelLabel:'기본', num:7, type:'choice',
    subLabel:'[26009-0047] · \\(f(ax)=-1\\) 두 근 — \\(k\\) 합',
    title:'\\(g\\) 가 전체 연속이 되는 \\(a\\) 2개 — \\(k\\)의 합',
    question:`<p>자연수 \\(k\\), 실수 \\(a\\)와 함수 \\(f(x)=\\dfrac{k}{60}(x^2-4x)\\) 에 대하여 함수 \\(g(x)=\\begin{cases}-x & (x\\leq 1) \\\\ f(ax) & (x\\gt 1)\\end{cases}\\) 이라 하자. 함수 \\(g(x)\\)가 다음 조건을 만족시키도록 하는 모든 \\(k\\)의 값의 합은?</p>
<div class="calc">함수 \\(g(x)\\)가 실수 전체의 집합에서 연속이 되도록 하는 \\(1\\)보다 큰 \\(a\\)의 개수는 \\(2\\)이다.</div>`,
    choices:['\\(62\\)','\\(66\\)','\\(70\\)','\\(74\\)','\\(78\\)'], answer:2,
    keypoint:'연속 조건 \\(\\Leftrightarrow\\) \\(g\\)가 \\(x=1\\)에서 연속 \\(\\Leftrightarrow\\) \\(f(a)=-1\\). 이 방정식의 \\(a\\gt 1\\) 해가 2개일 \\(k\\) 범위.',
    steps:[
      {tag:'STEP 1', title:'\\(x=1\\) 에서 연속 조건', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 1-}g(x)=-1,\\ \\lim_{x\\to 1+}g(x)=f(a),\\ g(1)=-1\\)</div>
<div class="calc">\\(f(a)=-1\\)</div>`},
      {tag:'STEP 2', title:'\\(f(x)=-1\\)의 \\(a\\gt 1\\) 해 2개 조건', body:`<p>\\(f(x)=\\dfrac{k}{60}x(x-4)\\) — 축 \\(x=2\\), \\(x=0,4\\)에서 \\(0\\). \\(k\\gt 0\\)이라 아래로 볼록 (\\(x=2\\)에서 최솟값 \\(-\\dfrac{4k}{60}=-\\dfrac{k}{15}\\)).</p>
<p>\\(y=-1\\)과 두 점에서 만나고 두 점 모두 \\(x\\gt 1\\) ⇒ ① \\(f(1)\\gt -1\\) (\\(x=1\\)에서 \\(y=-1\\)보다 위) ② \\(f(2)\\lt -1\\) (꼭짓점 \\(y=-1\\)보다 아래).</p>`},
      {tag:'STEP 3', title:'\\(k\\) 범위', body:`<div class="calc">\\(f(1)=\\dfrac{k}{60}\\cdot(-3)=-\\dfrac{k}{20}\\gt -1\\Rightarrow k\\lt 20\\)</div>
<div class="calc">\\(f(2)=-\\dfrac{4k}{60}=-\\dfrac{k}{15}\\lt -1\\Rightarrow k\\gt 15\\)</div>
<div class="calc">\\(15\\lt k\\lt 20\\Rightarrow k\\in\\{16,17,18,19\\}\\)</div>`},
      {tag:'STEP 4', title:'합', body:`<div class="calc purple">\\(16+17+18+19=70\\)</div>`}
    ]
  },

  /* ───────── 실력 1 ───────── */
  {
    id:'c2-l1', level:'advanced', levelLabel:'실력', num:1, type:'short',
    subLabel:'[26009-0048] · 이차함수 \\(f\\) 연속 — \\(f(11)\\)',
    title:'\\(g\\)가 전체 연속 — \\(f(11)\\)',
    question:`<p>이차함수 \\(f(x)\\)에 대하여 함수 \\(g(x)=\\begin{cases}\\dfrac{(x+1)f(2x)}{f(x)} & (-1\\lt x\\lt 0) \\\\ 2f(x) & (x\\leq -1\\ \\text{또는}\\ x\\geq 0)\\end{cases}\\) 이 실수 전체의 집합에서 연속일 때, \\(f(11)\\)의 값을 구하시오.</p>`,
    answerText:'\\(39\\)',
    keypoint:'분모 \\(f(x)\\)가 \\(x=-1\\)에서 \\(0\\)이라야 (분자도 \\(\\to 0\\)으로 인수 \\((x+1)\\) 보유) 연속 매칭 가능 — \\(f(-1)=0\\).',
    steps:[
      {tag:'STEP 1', title:'\\(x=-1\\) 에서 연속 → \\(f(-1)=0\\)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to -1-}g(x)=\\lim_{x\\to -1-}2f(x)=2f(-1)\\)</div>
<div class="calc">\\(\\displaystyle \\lim_{x\\to -1+}g(x)=\\lim_{x\\to -1+}\\dfrac{(x+1)f(2x)}{f(x)}\\)</div>
<p>\\(f(-1)\\neq 0\\)이면 우극한 \\(=\\dfrac{0\\cdot f(-2)}{f(-1)}=0\\), 좌극한 \\(=2f(-1)\\neq 0\\) ⇒ 모순. 그러므로 \\(f(-1)=0\\).</p>`},
      {tag:'STEP 2', title:'\\(f(x)=(x+1)(\\alpha x+\\beta)\\) 형태', body:`<p>이차이고 \\(x=-1\\)이 근이므로 \\(f(x)=(x+1)(\\alpha x+\\beta)\\) (\\(\\alpha\\neq 0\\)).</p>
<div class="calc">우극한 = \\(\\displaystyle \\lim_{x\\to -1+}\\dfrac{(x+1)\\cdot(2x+1)(2\\alpha x+\\beta)}{(x+1)(\\alpha x+\\beta)}=\\lim_{x\\to -1+}\\dfrac{(2x+1)(2\\alpha x+\\beta)}{\\alpha x+\\beta}\\)</div>
<p>좌극한 = \\(2f(-1)=0\\) ⇒ 우극한도 \\(0\\). \\(x\\to -1+\\)에서 분모 \\(\\to -\\alpha+\\beta\\). 분자 \\(\\to -1\\cdot(-2\\alpha+\\beta)\\). 우극한 \\(0\\) ⇒ 분자 \\(=0\\) (단 분모 \\(\\neq 0\\)).</p>
<div class="calc">\\(\\beta=2\\alpha\\) (분모 \\(\\alpha\\neq 0\\) 가정)</div>`},
      {tag:'STEP 3', title:'\\(f(x)=\\alpha(x+1)(x+2)\\) — \\(x=0\\)에서 연속', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 0-}g(x)=\\lim_{x\\to 0-}\\dfrac{(x+1)f(2x)}{f(x)}=\\lim_{x\\to 0-}\\dfrac{\\alpha(x+1)(2x+1)(2x+2)}{\\alpha(x+1)(x+2)}=\\lim_{x\\to 0-}\\dfrac{(2x+1)(2x+2)}{x+2}=\\dfrac{1\\cdot 2}{2}=1\\)</div>
<div class="calc">\\(\\displaystyle \\lim_{x\\to 0+}g(x)=2f(0)=2\\alpha\\cdot 1\\cdot 2=4\\alpha,\\ g(0)=4\\alpha\\)</div>
<div class="calc">\\(1=4\\alpha\\Rightarrow \\alpha=\\dfrac{1}{4}\\)</div>`},
      {tag:'STEP 4', title:'\\(f(11)\\)', body:`<div class="calc">\\(f(x)=\\dfrac{1}{4}(x+1)(x+2)\\)</div>
<div class="calc purple">\\(f(11)=\\dfrac{1}{4}\\cdot 12\\cdot 13=39\\)</div>`}
    ]
  },

  /* ───────── 실력 2 ───────── */
  {
    id:'c2-l2', level:'advanced', levelLabel:'실력', num:2, type:'choice',
    subLabel:'[26009-0049] · 계단함수 \\(g\\) + 사잇값 위치',
    title:'\\(g(t)\\) 정수 개수 + 불연속 조건 — \\(g(f(-1))\\)',
    question:`<p>실수 \\(t\\)와 최고차항의 계수가 \\(1\\)인 이차함수 \\(f(x)\\)에 대하여 \\(x\\leq t\\)에서 \\(f(x)\\leq f(1)\\)을 만족시키는 정수 \\(x\\)의 개수를 \\(g(t)\\)라 하자. 두 함수 \\(f(x), g(x)\\)가 다음 조건을 만족시킬 때, \\(g(f(-1))\\)의 값은?</p>
<div class="calc"><p>(가) \\(\\displaystyle \\lim_{x\\to 1-}g(x)=3\\)</p>
<p>(나) \\(0\\)이 아닌 두 실수 \\(\\alpha_1, \\alpha_2\\,(\\alpha_1\\neq \\alpha_2)\\)에 대하여 함수 \\(f(x)g(x)\\)는 \\(x=\\alpha_1, x=\\alpha_2\\)에서만 불연속이다.</p></div>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:2,
    keypoint:'\\(g\\)는 계단함수(정수 개수). \\(fg\\)가 \\(x=c\\)에서 연속이려면 \\(f(c)=0\\) (g의 불연속을 \\(f\\)가 죽임).',
    steps:[
      {tag:'STEP 1', title:'\\(g(t)\\) 구조 — \\(f\\)가 \\(x\\leq 1\\)에서 증가해야 (가) 성립', body:`<p>\\(x\\leq t\\)에서 \\(f(x)\\leq f(1)\\). 만일 \\(f\\)의 축이 \\(x=1\\) 오른쪽이면 \\(x\\leq 1\\)에서 \\(f\\)는 단조감소, \\(t\\lt 1\\)에서 \\(f(t)\\gt f(1)\\) ⇒ 만족 정수 없음 ⇒ \\(g(t)=0\\). \\(\\lim_{t\\to 1-}g(t)=0\\neq 3\\) — 위배. 그러므로 축이 \\(x=1\\) 왼쪽 → \\(f\\)는 \\(x\\leq 1\\)에서 증가(처음 감소 후 증가의 일부).</p>
<p>좀 더 정확히 — \\(f(x)=f(1)\\) 인 \\(x\\)는 \\(1\\)과 (축 대칭점) \\(p\\). \\(f(x)\\leq f(1)\\) 영역은 \\(\\min(p,1)\\leq x\\leq \\max(p,1)\\). 그 안에 정수 \\(t\\)도 포함. (가) 조건은 \\(t\\to 1-\\)에서 \\(\\{x \\text{정수} : x\\leq t,\\ f(x)\\leq f(1)\\}\\)의 개수가 \\(3\\).</p>`},
      {tag:'STEP 2', title:'(가): \\(p\\leq t\\lt 1\\)에서 정수 3개', body:`<p>\\(p\\lt 1\\)이면 정수 영역 \\([p,1]\\cap (-\\infty,t]\\cap \\mathbb{Z}\\). \\(t\\to 1-\\)이면 \\(p,p+1,...,0\\)까지 — \\(3\\)개. 즉 정수 \\(\\{-2,-1,0\\}\\)이 \\([p,1)\\)에 ⇒ \\(-3\\lt p\\leq -2\\) 또는 \\(p=-2\\)일 때 정수 \\(\\{-2,-1,0\\}\\).</p>
<p>그러므로 \\(f(-2)\\leq f(1)\\)이고 \\(f(-3)\\gt f(1)\\). 축 \\(x_0=(1+p)/2\\in[-1,-1/2)\\).</p>`},
      {tag:'STEP 3', title:'(나): \\(g\\) 불연속점 — 정수 \\(-2,-1,0,1\\)', body:`<p>\\(g\\)는 정수마다 점프하는 계단함수 — 불연속점은 \\(\\{-2,-1,0,1\\}\\). \\(fg\\)가 \\(\\alpha_1,\\alpha_2\\) 두 곳에서만 불연속 ⇒ 다른 두 곳에선 \\(f=0\\)이 되어 g 점프를 죽임.</p>
<p>또한 \\(\\alpha_i\\neq 0\\)이므로 \\(f(0)=0\\). 그리고 또 한 곳에서도 \\(f=0\\) — \\(\\{-2,-1,1\\}\\) 중 하나.</p>`},
      {tag:'STEP 4', title:'\\(f\\)의 영점 두 개 결정 — \\(f(x)=x(x+1)\\)', body:`<p>\\(f\\) 이차, 최고차항 \\(1\\), \\(f(0)=0\\) ⇒ \\(f(x)=x(x-r)\\). 축 \\(x_0=r/2\\). 조건 \\(x_0\\in[-1,-1/2)\\) ⇒ \\(r\\in[-2,-1)\\). \\(f\\)의 다른 영점은 \\(r\\). 정수 \\(\\{-2,-1,1\\}\\) 중 하나여야 ⇒ \\(r=-1\\) (반열린에 포함 위해 \\(r=-1\\) 즉 \\(x_0=-1/2\\)).</p>
<div class="calc">\\(f(x)=x(x+1)\\)</div>
<p>이때 \\(f(-2)=2,\\ f(-1)=0,\\ f(0)=0,\\ f(1)=2\\) ⇒ \\(f(-2)=f(1)=2\\) 확인. \\(g(t)\\)는 정수 \\(\\{-1,0\\}\\cup ?\\). 그런데 \\(f(-2)=2=f(1)\\) ⇒ \\(-2\\)도 정수 만족 \\(f(-2)\\leq f(1)\\). 그러므로 정수 \\(\\{-2,-1,0\\}\\) — 3개 OK.</p>`},
      {tag:'STEP 5', title:'\\(g(f(-1))=g(0)\\)', body:`<p>\\(f(-1)=0\\). \\(g(0)\\)은 \\(x\\leq 0\\)에서 \\(f(x)\\leq f(1)=2\\)인 정수 \\(x\\)의 개수 ⇒ 정수 \\(\\{-2,-1,0\\}\\) — 3개.</p>
<div class="calc purple">\\(g(f(-1))=g(0)=3\\)</div>`}
    ]
  },

  /* ───────── 실력 3 ───────── */
  {
    id:'c2-l3', level:'advanced', levelLabel:'실력', num:3, type:'short',
    subLabel:'[26009-0050] · \\(f(x)=f(t)\\) 실근수 \\(g(t)\\) — \\(12|a+b|\\)',
    title:'\\(g(t)\\) 연속·불연속 조건 — \\(12|a+b|\\)',
    question:`<p>상수 \\(a\\,(a\\neq 0)\\)에 대하여 함수 \\(f(x)=\\begin{cases}x^2+2x+1 & (x\\leq 0) \\\\ ax^2-\\dfrac{8}{3}ax+1 & (x\\gt 0)\\end{cases}\\) 이라 하고, 실수 \\(t\\)에 대하여 \\(x\\)에 대한 방정식 \\(f(x)=f(t)\\)를 만족시키는 서로 다른 실근의 개수를 \\(g(t)\\)라 하자. 함수 \\(g(t)\\)가 다음 조건을 만족시킬 때, \\(12\\cdot |a+b|\\)의 값을 구하시오.</p>
<div class="calc"><p>(가) 함수 \\(g(t)\\)는 \\(t=0\\)에서 연속이다.</p>
<p>(나) \\(\\displaystyle \\lim_{t\\to k-}g(t)\\neq \\lim_{t\\to k+}g(t)\\)를 만족시키는 실수 \\(k\\)의 값은 \\(3\\)과 상수 \\(b\\)뿐이다.</p></div>`,
    answerText:'\\(44\\)',
    keypoint:'\\(g(t)\\)는 직선 \\(y=f(t)\\)와 곡선 \\(y=f(x)\\) 교점수. (가) 조건은 \\(f\\)의 \\(x\\gt 0\\) 부분 모양 결정 (위로 볼록).',
    steps:[
      {tag:'STEP 1', title:'\\(f\\)가 \\(x=0\\)에서 연속 + 좌·우 분석', body:`<p>\\(\\displaystyle \\lim_{x\\to 0-}f(x)=1=\\lim_{x\\to 0+}f(x)=f(0)\\) ⇒ \\(f\\) 연속. \\(x\\leq 0\\)에서 \\(f(x)=(x+1)^2\\) — \\(x=-1\\) 꼭짓점 \\(0\\), \\(x=0\\)에서 \\(1\\), 단조증가가 \\(-1\\)부터.</p>
<p>\\(x\\gt 0\\)에서 \\(f(x)=ax^2-\\dfrac{8}{3}ax+1\\), 축 \\(x=\\dfrac{4}{3}\\).</p>`},
      {tag:'STEP 2', title:'(가) \\(g(t)\\) 가 \\(t=0\\) 연속 → \\(a\\lt 0\\)', body:`<p>\\(a\\gt 0\\): \\(x\\gt 0\\)에서 아래로 볼록 ⇒ \\(f(4/3)\\lt 1\\). \\(t=0\\) 부근 \\(f(t)=1\\). \\(y=1\\)과 \\(y=f(x)\\) 교점: \\(x=0\\) (좌측), 그리고 \\(x\\gt 0\\)에서 \\(f(x)=1\\Rightarrow ax(x-8/3)=0\\Rightarrow x=8/3\\). 그러므로 \\(g(0)\\)는 교점 수 3 (\\(x=-2\\)는 \\(f(-2)=1\\)). 한편 \\(\\lim_{t\\to 0+}g(t)\\)는 \\(y=f(t)\\)가 \\(1\\)에서 살짝 작아질 때 — \\(x\\gt 0\\)에서 \\(y=1\\)보다 살짝 작은 직선은 \\(2\\)점에서 교차, \\(x\\leq 0\\)에서도 \\(2\\)점 ⇒ 4 ⇒ 불연속. ⇒ 위배.</p>
<p>\\(a\\lt 0\\): \\(x\\gt 0\\)에서 위로 볼록, 꼭짓점 \\(f(4/3)\\gt 1\\). \\(y=1\\) 교점: \\(x=0, x=8/3\\). \\(t=0\\) 부근에서 \\(g(0)=3, \\lim_{t\\to 0\\pm}g(t)=3\\) ⇒ 연속. ⇒ 적합.</p>`},
      {tag:'STEP 3', title:'(나) 불연속점은 \\(3\\)과 \\(b\\) 두 곳', body:`<p>\\(a\\lt 0\\)일 때 \\(f\\)의 그래프: \\(x\\leq 0\\)에서 \\((x+1)^2\\) (감소 후 증가), \\(x\\gt 0\\)에서 위로 볼록 (꼭짓점 \\(x=4/3\\) 최댓값, \\(x\\) 커지면 \\(-\\infty\\)). \\(f(x)=0\\)의 양수해 \\(x=x_2\\): \\(ax^2-\\dfrac{8}{3}ax+1=0\\) ⇒ \\(x_2=\\dfrac{(8/3)a\\pm \\sqrt{(8a/3)^2-4a}}{2a}\\).</p>
<p>\\(g(t)\\) 점프는 직선 \\(y=f(t)\\)가 곡선의 특이값(꼭짓점값, \\(0\\)값, \\(1\\)값 등)을 지날 때. \\(f(t)\\)가 꼭짓점값과 같아지는 \\(t\\)는 \\(t=4/3\\)과 (좌측에서 같은 값 갖는 \\(t=x_1\\)). \\(f(t)=0\\)이 되는 \\(t\\)는 \\(t=-1\\)과 \\(t=x_2\\) (양수). \\(f(t)\\)가 \\(1\\)인 \\(t\\): \\(0, -2, 8/3\\).</p>
<p>실제로 점프 발생하는 \\(t\\)는 \\(t=x_1\\) (왼쪽 곡선상 꼭짓점값과 같은 점)과 \\(t=x_2\\) (큰 양수 영점) 두 곳뿐임을 PDF 해설에서 확인. 그리고 \\(x_2=3\\), \\(x_1=b\\).</p>`},
      {tag:'STEP 4', title:'\\(x_2=3\\) ⇒ \\(a=-1\\)', body:`<p>\\(f(3)=0\\Rightarrow 9a-8a+1=0\\Rightarrow a=-1\\).</p>
<p>그리고 꼭짓점값 \\(f(4/3)=a\\cdot \\dfrac{16}{9}-\\dfrac{8}{3}a\\cdot \\dfrac{4}{3}+1=\\dfrac{16a}{9}-\\dfrac{32a}{9}+1=-\\dfrac{16a}{9}+1\\). \\(a=-1\\) ⇒ \\(=\\dfrac{16}{9}+1=\\dfrac{25}{9}\\).</p>`},
      {tag:'STEP 5', title:'\\(b\\)에서 \\(f(b)=f(4/3)=25/9\\) (\\(b\\lt 0\\) 측)', body:`<div class="calc">\\((b+1)^2=\\dfrac{25}{9}\\Rightarrow b+1=\\pm \\dfrac{5}{3}\\)</div>
<p>\\(b\\lt -1\\) 측 (왼쪽 가지) ⇒ \\(b+1=-\\dfrac{5}{3}\\Rightarrow b=-\\dfrac{8}{3}\\).</p>`},
      {tag:'STEP 6', title:'최종', body:`<div class="calc">\\(a+b=-1+(-\\dfrac{8}{3})=-\\dfrac{11}{3}\\)</div>
<div class="calc purple">\\(12\\cdot |a+b|=12\\cdot \\dfrac{11}{3}=44\\)</div>`}
    ]
  },

  /* ───────── 대표기출 ───────── */
  {
    id:'c2-k1', level:'kihul', levelLabel:'대표기출', num:1, type:'choice',
    subLabel:'2025학년도 수능 6월 모의평가 · 4점',
    title:'\\((f(x)+a)^2\\) 가 전체 연속 — \\(a\\)',
    question:`<p>함수 \\(f(x)=\\begin{cases}x-\\dfrac{1}{2} & (x\\lt 0) \\\\ -x^2+3 & (x\\geq 0)\\end{cases}\\) 에 대하여 함수 \\((f(x)+a)^2\\) 이 실수 전체의 집합에서 연속일 때, 상수 \\(a\\)의 값은? <span style="opacity:0.7">[4점]</span></p>`,
    choices:['\\(-\\dfrac{9}{4}\\)','\\(-\\dfrac{7}{4}\\)','\\(-\\dfrac{5}{4}\\)','\\(-\\dfrac{3}{4}\\)','\\(-\\dfrac{1}{4}\\)'], answer:2,
    keypoint:'함수의 거듭제곱이 연속이라고 해도 원함수의 좌·우극한이 부호만 반대(절댓값은 동일)이어도 가능 — 1차방정식.',
    steps:[
      {tag:'STEP 1', title:'\\(x=0\\) 에서 \\((f+a)^2\\) 연속', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 0-}(f(x)+a)^2=\\left(-\\dfrac{1}{2}+a\\right)^2\\)</div>
<div class="calc">\\(\\displaystyle \\lim_{x\\to 0+}(f(x)+a)^2=(3+a)^2\\)</div>
<div class="calc">\\((f(0)+a)^2=(3+a)^2\\)</div>`},
      {tag:'STEP 2', title:'양쪽 같음 — 이차방정식', body:`<div class="calc">\\(\\left(-\\dfrac{1}{2}+a\\right)^2=(3+a)^2\\)</div>
<div class="calc">\\(a^2-a+\\dfrac{1}{4}=a^2+6a+9\\)</div>
<div class="calc">\\(-7a=\\dfrac{35}{4}\\Rightarrow a=-\\dfrac{5}{4}\\)</div>`},
      {tag:'STEP 3', title:'정답 확정', body:`<div class="calc purple">\\(a=-\\dfrac{5}{4}\\) (③)</div>`}
    ]
  }
];
</script>

<script>
(function () {
  let currentFilter = 'all';
  let filteredList  = [];
  let currentIdx    = 0;
  const stepState   = {};
  PROBLEMS.forEach(p => { stepState[p.id] = new Set(); });

  const viewport    = document.getElementById('card-viewport');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const currentNum  = document.getElementById('current-num');
  const totalNum    = document.getElementById('total-num');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const mainArea    = document.getElementById('main-area');

  function renderCard(problem) {
    const levelColors = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = levelColors[problem.level] || levelColors.basic;
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      const nums = ['①','②','③','④','⑤'];
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }
    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;
    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `<div class="step" data-step-num="${i+1}" style="display:none"><div class="step-header"><span class="step-tag">${step.tag}</span><span class="step-title">${step.title}</span></div><div class="step-body">${step.body}</div></div>`;
    });
    const subLabel = problem.subLabel ? `<span class="problem-sub-label">${problem.subLabel}</span>` : '';
    const probTitle = '';
    const keypointHTML = problem.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span><span>${problem.keypoint}</span></div>` : '';
    return `<article class="problem-card" data-pid="${problem.id}" data-level="${problem.level}"><div class="card-inner"><div class="problem-section"><div><div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>${subLabel}</div>${probTitle}<div class="problem-text"><div class="problem-statement">${problem.question}</div>${choicesHTML}</div>${keypointHTML}</div><div class="scratch-area" aria-label="풀이 공간" role="button" tabindex="0" onclick="openScratchOverlay(event)" onkeydown="if(event.key==='Enter'||event.key===' ')openScratchOverlay(event)"><span class="scratch-label">풀이 공간</span></div><div class="solution-section"><div class="solution-toggle-bar"><span class="solution-title">단계별 해설</span><div class="step-buttons">${stepBtns}</div></div><div class="steps-container" id="steps-${problem.id}">${stepsHTML}</div></div></div></article>`;
  }

  function applyFilter(filter) {
    currentFilter = filter;
    filteredList = filter === 'all' ? [...PROBLEMS] : PROBLEMS.filter(p => p.level === filter);
    currentIdx = 0;
    showCard(0);
    updateNav();
    updateProgress();
    updateFilterUI(filter);
  }
  function showCard(idx) {
    currentIdx = Math.max(0, Math.min(idx, filteredList.length - 1));
    const problem = filteredList[currentIdx];
    viewport.innerHTML = renderCard(problem);
    renderMath(viewport);
    restoreStepState(problem.id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function goTo(idx) {
    if (idx < 0 || idx >= filteredList.length) return;
    showCard(idx); updateNav(); updateProgress();
    if (document.getElementById('scratch-overlay')) renderScratchOverlay(false);
  }
  function updateNav() {
    prevBtn.disabled = currentIdx === 0;
    nextBtn.disabled = currentIdx === filteredList.length - 1;
    currentNum.textContent = currentIdx + 1;
    totalNum.textContent   = filteredList.length;
  }
  function updateProgress() {
    const pct = Math.round(((currentIdx + 1) / filteredList.length) * 100);
    progressBar.style.width = pct + '%';
    progressLbl.textContent = (currentIdx + 1) + ' / ' + filteredList.length;
  }
  function updateFilterUI(active) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === active);
    });
  }
  function showSteps(pid, targetStep) {
    const container = document.getElementById('steps-' + pid);
    if (!container) return;
    if (targetStep === 0) {
      stepState[pid] = new Set();
      container.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      [document.querySelector(`.problem-card[data-pid="${pid}"] .correct-choice`),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => {
          el.classList.remove('revealed');
          ['background','border','color','font-weight'].forEach(p => el.style.removeProperty(p));
        });
      document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`)?.classList.remove('active');
      const overlayContainer = document.getElementById('overlay-steps-' + pid);
      overlayContainer?.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      updateStepBtns(pid);
      return;
    }
    const stepEl = container.querySelector(`.step[data-step-num="${targetStep}"]`);
    if (!stepEl) return;
    if (!stepState[pid]) stepState[pid] = new Set();
    const isOpen = stepEl.style.display !== 'none';
    if (isOpen) {
      stepEl.style.display = 'none';
      stepState[pid].delete(targetStep);
    } else {
      stepEl.style.display = 'block';
      stepEl.style.animation = 'none'; void stepEl.offsetWidth; stepEl.style.animation = '';
      stepState[pid].add(targetStep);
    }
    updateStepBtns(pid);
    renderMath(container);
    if (!isOpen) setTimeout(() => stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
  }
  function restoreStepState(pid) {
    const saved = stepState[pid];
    if (!saved || saved.size === 0) return;
    const toOpen = [...saved].sort((a,b) => a-b);
    stepState[pid] = new Set();
    toOpen.forEach(n => showSteps(pid, n));
  }
  function updateStepBtns(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    card?.querySelectorAll('.step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn') || btn.classList.contains('answer-btn')) return;
      btn.classList.toggle('active', opened.has(parseInt(btn.dataset.step)));
    });
  }
  function highlightAnswer(pid, problem) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const overlay = document.getElementById('scratch-overlay');
    const targets = [];
    if (card) targets.push(card.querySelector('.correct-choice'));
    if (overlay) targets.push(overlay.querySelector('.correct-choice'));
    targets.filter(Boolean).forEach(correct => { correct.classList.add('revealed'); });
  }
  function revealAnswerOnly(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const btn = card?.querySelector('.answer-btn');
    if (!card || !btn) return;
    if (btn.classList.contains('active')) {
      [card.querySelector('.correct-choice'),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => { el.classList.remove('revealed'); });
      btn.classList.remove('active');
      const ansBoxes = card.querySelectorAll('.answer-reveal-inline');
      ansBoxes.forEach(b => b.remove());
      document.querySelectorAll('#scratch-overlay .answer-reveal-inline').forEach(b => b.remove());
    } else {
      const problem = PROBLEMS.find(p => p.id === pid);
      if (!problem) return;
      if (problem.type === 'choice') {
        highlightAnswer(pid, problem);
      } else {
        const ansHTML = `<div class="answer-reveal answer-reveal-inline"><span class="answer-label">정답</span><span class="answer-number">${problem.answerText || ''}</span></div>`;
        const sec = card.querySelector('.problem-section');
        if (sec && !sec.querySelector('.answer-reveal-inline')) { sec.insertAdjacentHTML('beforeend', ansHTML); renderMath(sec); }
        const overlayProb = document.querySelector('#scratch-overlay .scratch-overlay-problem');
        if (overlayProb && !overlayProb.querySelector('.answer-reveal-inline')) { overlayProb.insertAdjacentHTML('beforeend', ansHTML); renderMath(overlayProb); }
      }
      btn.classList.add('active');
    }
  }
  function renderMath(el) {
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]).catch(() => {});
  }
  const printModal    = document.getElementById('print-modal');
  const modalBackdrop = document.getElementById('modal-backdrop');
  const printArea     = document.getElementById('print-area');
  document.getElementById('btn-print').addEventListener('click', () => {
    printModal.setAttribute('aria-hidden', 'false');
    printModal.classList.add('open'); modalBackdrop.classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click', closePrintModal);
  modalBackdrop.addEventListener('click', closePrintModal);
  function closePrintModal() {
    printModal.classList.remove('open'); modalBackdrop.classList.remove('open');
    printModal.setAttribute('aria-hidden', 'true');
  }
  document.getElementById('modal-confirm').addEventListener('click', () => {
    const rangeVal = document.querySelector('input[name="print-range"]:checked').value;
    const printMode = document.querySelector('input[name="print-mode"]:checked').value;
    let targetProblems;
    if (rangeVal === 'current') targetProblems = [filteredList[currentIdx]];
    else if (rangeVal === 'filter') targetProblems = [...filteredList];
    else targetProblems = [...PROBLEMS];
    buildPrintArea(targetProblems, printMode);
    closePrintModal();
    setTimeout(() => { window.print(); }, 600);
  });
  function buildPrintArea(problems, mode) {
    printArea.innerHTML = problems.map(p => {
      const nums = ['①','②','③','④','⑤'];
      let choicesHTML = '';
      if (p.type === 'choice' && p.choices) {
        choicesHTML = `<ol class="print-choices">` +
          p.choices.map((c, i) => `<li class="${(mode === 'solution' && i === p.answer) ? 'print-correct' : ''}">${nums[i]} ${c}</li>`).join('') + `</ol>`;
      } else {
        choicesHTML = `<div class="print-short-label">단답형${mode === 'solution' && p.answerText ? ' — 정답: ' + p.answerText : ''}</div>`;
      }
      let extraHTML = '';
      if (mode === 'solution') {
        extraHTML = `<div class="print-solution"><div class="print-solution-title">해설</div>` +
          p.steps.map(s => `<div class="print-step"><span class="print-step-tag">${s.tag}</span><span class="print-step-title">${s.title}</span><div class="print-step-body">${s.body}</div></div>`).join('') +
          (p.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span>${p.keypoint}</div>` : '') + `</div>`;
      }
      if (mode === 'blank') {
        return `<div class="print-card print-mode-blank"><div class="print-content-area"><div class="print-badge">${p.levelLabel} ${p.num}</div><div class="print-question">${p.question}</div>${choicesHTML}</div><div class="print-blank-space" aria-hidden="true"></div></div>`;
      }
      return `<div class="print-card print-mode-${mode}"><div class="print-badge">${p.levelLabel} ${p.num}</div><div class="print-question">${p.question}</div>${choicesHTML}${extraHTML}</div>`;
    }).join('');
    renderMath(printArea);
  }
  prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
  nextBtn.addEventListener('click', () => goTo(currentIdx + 1));
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });
  document.addEventListener('click', e => {
    const stepBtn = e.target.closest('.step-btn');
    if (stepBtn) {
      const pid = stepBtn.dataset.pid;
      if (stepBtn.classList.contains('answer-btn')) revealAnswerOnly(pid);
      else showSteps(pid, parseInt(stepBtn.dataset.step));
      if (typeof window.syncOverlayStepUI === 'function') window.syncOverlayStepUI(pid);
    }
  });
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentIdx + 1); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(currentIdx - 1); }
    if (['1','2','3','4','5','6'].includes(e.key)) {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, parseInt(e.key)); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === '0') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, 0); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'a' || e.key === 'A') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { revealAnswerOnly(pid); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'Escape' && document.getElementById('scratch-overlay')) {
      e.preventDefault(); closeScratchOverlay();
    }
  });
  let tx = 0, ty = 0, tt = 0, swipeActive = false;
  mainArea.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) { swipeActive = false; return; }
    swipeActive = true; tx = e.touches[0].clientX; ty = e.touches[0].clientY; tt = Date.now();
  }, { passive: true });
  mainArea.addEventListener('touchmove', e => { if (e.touches.length > 1) swipeActive = false; }, { passive: true });
  mainArea.addEventListener('touchend', e => {
    if (!swipeActive) return;
    swipeActive = false;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const dt = Date.now() - tt;
    if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy) * 2 && dt < 600) {
      goTo(dx < 0 ? currentIdx + 1 : currentIdx - 1);
    }
  }, { passive: true });
  (function () {
    const toggle = document.querySelector('[data-theme-toggle]');
    const html = document.documentElement;
    let dark = matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    setIcon(toggle, dark);
    toggle?.addEventListener('click', () => {
      dark = !dark;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      setIcon(toggle, dark);
    });
    function setIcon(btn, isDark) {
      if (!btn) return;
      btn.innerHTML = isDark
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
  })();
  window.openScratchOverlay = function(e) {
    if (e) e.stopPropagation();
    renderScratchOverlay(true);
  };
  function renderScratchOverlay(animateIn) {
    const existing = document.getElementById('scratch-overlay');
    if (existing) existing.remove();
    const problem = filteredList[currentIdx];
    if (!problem) return;
    const nums = ['①','②','③','④','⑤'];
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }
    const titleSuffix = `${problem.levelLabel} ${problem.num} · `;
    const _lvc = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = _lvc[problem.level] || _lvc.basic;
    const badgeHTML = `<div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>`;
    const problemHTML = `${badgeHTML}<div class="problem-statement">${problem.question}</div>${choicesHTML}`;
    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;
    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `<div class="step" data-step-num="${i+1}" style="display:none"><div class="step-header"><span class="step-tag">${step.tag}</span><span class="step-title">${step.title}</span></div><div class="step-body">${step.body}</div></div>`;
    });
    const total = filteredList.length;
    const prevDisabled = currentIdx === 0 ? 'disabled' : '';
    const nextDisabled = currentIdx === total - 1 ? 'disabled' : '';
    const overlay = document.createElement('div');
    overlay.className = 'scratch-overlay';
    overlay.id = 'scratch-overlay';
    if (!animateIn) overlay.style.animation = 'none';
    overlay.innerHTML = `<div class="scratch-overlay-header"><span class="scratch-overlay-title">${titleSuffix}풀이 공간</span><div class="overlay-nav"><button class="overlay-nav-btn" id="overlay-prev" ${prevDisabled} aria-label="이전 문제">← 이전</button><span class="overlay-nav-label">${currentIdx+1} / ${total}</span><button class="overlay-nav-btn" id="overlay-next" ${nextDisabled} aria-label="다음 문제">다음 →</button></div><button class="scratch-overlay-close" id="scratch-overlay-close" aria-label="닫기">&times;</button></div><div class="scratch-overlay-body"><div class="scratch-overlay-problem">${problemHTML}</div><div class="scratch-overlay-canvas"><div class="overlay-step-bar">${stepBtns}</div><div class="overlay-steps-container" id="overlay-steps-${problem.id}">${stepsHTML}</div></div></div>`;
    document.body.appendChild(overlay);
    renderMath(overlay);
    document.getElementById('scratch-overlay-close').addEventListener('click', closeScratchOverlay);
    document.getElementById('overlay-prev').addEventListener('click', () => { if (currentIdx > 0) goTo(currentIdx - 1); });
    document.getElementById('overlay-next').addEventListener('click', () => { if (currentIdx < filteredList.length - 1) goTo(currentIdx + 1); });
    syncOverlayStepUI(problem.id);
  }
  function closeScratchOverlay() {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    overlay.style.animation = 'overlayOut 180ms cubic-bezier(0.4,0,1,1) both';
    overlay.addEventListener('animationend', () => overlay.remove(), { once: true });
  }
  function syncOverlayStepUI(pid) {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    const container = document.getElementById('overlay-steps-' + pid);
    if (!container) return;
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    container.querySelectorAll('.step').forEach(stepEl => {
      const n = parseInt(stepEl.dataset.stepNum, 10);
      stepEl.style.display = opened.has(n) ? 'block' : 'none';
    });
    overlay.querySelectorAll('.overlay-step-bar .step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn')) return;
      const s = btn.dataset.step;
      if (s === 'answer') {
        const mainAnswerBtn = document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`);
        btn.classList.toggle('active', !!mainAnswerBtn?.classList.contains('active'));
      } else {
        btn.classList.toggle('active', opened.has(parseInt(s, 10)));
      }
    });
  }
  window.syncOverlayStepUI = syncOverlayStepUI;
  (function(){
    if(!document.getElementById('overlay-out-style')){
      const s=document.createElement('style');
      s.id='overlay-out-style';
      s.textContent='@keyframes overlayOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.97)}}';
      document.head.appendChild(s);
    }
  })();
  (function setupDownload() {
    const dlBtn = document.getElementById('btn-download');
    if (!dlBtn) return;
    dlBtn.addEventListener('click', function () {
      const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '수능특강_미적분I_함수의연속_해설.html';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    });
  })();
  function jumpToAnchor() {
    const hash = (location.hash || '').replace(/^#/, '');
    if (!hash) return false;
    const idx = PROBLEMS.findIndex(p => p.id === hash);
    if (idx < 0) return false;
    applyFilter('all');
    currentIdx = idx;
    showCard(idx); updateNav(); updateProgress();
    return true;
  }
  window.addEventListener('hashchange', jumpToAnchor);
  function init() {
    applyFilter('all');
    if (location.hash) setTimeout(jumpToAnchor, 50);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
<script>
document.addEventListener('keydown', (e) => {
  if (e.isComposing) return;
  const t = e.target;
  if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
  if (e.key === 'h' || e.key === 'H') {
    e.preventDefault();
    const w = window.open('index-calc.html', 'aftermath_main_calc'); if (w) w.focus();
  }
});
</script>

<script>
/* named window 일관 처리 — 이미 열린 창 있으면 새 창 없이 focus */
document.addEventListener('click', function(e) {
  const a = e.target.closest('a[target^="aftermath_"]');
  if (!a) return;
  e.preventDefault();
  const w = window.open(a.href, a.target);
  if (w) w.focus();
});
</script>
</body></html>
