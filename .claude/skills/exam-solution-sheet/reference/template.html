<!DOCTYPE html>
<!-- 2026 2학기 미적분 I · 수능특강 수학Ⅱ 함수의 극한 31문항 인터랙티브 해설 · 1학기 양식 (problem-card + prev/next + 풀이공간 오버레이 + anchor 점프) · Agent B2 재작성 (2035줄) -->
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{과목} · {단원} — 단계별 해설</title>
<meta name="robots" content="noindex,nofollow">

<style id="site-css">/* ============================================================
   수능특강 미적분 I — 인터랙티브 해설 v2 (1학기 양식)
   태블릿 최적화 + 난이도 필터 + 인쇄 지원 + 풀이 공간 오버레이
   색상 톤: 보라 (purple/fuchsia)
   ============================================================ */

:root {
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);

  --space-1:0.25rem; --space-2:0.5rem;  --space-3:0.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem;  --space-8:2rem;    --space-10:2.5rem;

  --radius-sm:0.375rem; --radius-md:0.5rem; --radius-lg:0.75rem;
  --radius-xl:1rem;     --radius-full:9999px;

  --transition-fast: 150ms cubic-bezier(0.16,1,0.3,1);
  --transition-base: 220ms cubic-bezier(0.16,1,0.3,1);

  --font-display:'Noto Sans KR',sans-serif;
  --font-body:'Noto Sans KR',sans-serif;
  --font-math:Georgia,serif;

  --header-h: 116px;
  --footer-h: 64px;

  /* 난이도 색상 */
  --level-basic-bg:#fefce8;     --level-basic-text:#a16207;    --level-basic-border:#fde047;
  --level-example-bg:#faf5ff;   --level-example-text:#7e22ce;  --level-example-border:#e9d5ff;
  --level-exercise-bg:#f0fdf4;  --level-exercise-text:#15803d; --level-exercise-border:#bbf7d0;
  --level-standard-bg:#fff7ed;  --level-standard-text:#9a3412; --level-standard-border:#fed7aa;
  --level-advanced-bg:#fff1f2;  --level-advanced-text:#be123c; --level-advanced-border:#fecdd3;
  --level-kihul-bg:#fdf4ff;     --level-kihul-text:#86198f;    --level-kihul-border:#f5d0fe;
}

/* ── 라이트 ── */
:root,[data-theme="light"] {
  --color-bg:#faf5ff;         --color-surface:#ffffff;
  --color-surface-2:#fdf4ff;  --color-surface-offset:#f5edff;
  --color-border:#e9d5ff;     --color-divider:#f3e8ff;
  --color-text:#1a1a2e;       --color-text-muted:#6b21a8;
  --color-text-faint:#a78bfa; --color-text-inverse:#faf5ff;
  --color-primary:#a855f7;    --color-primary-hover:#9333ea;
  --color-primary-light:#e9d5ff; --color-primary-subtle:#f5edff;
  --color-blue-bg:#eff6ff;    --color-blue-border:#bfdbfe;  --color-blue-text:#1d4ed8;
  --color-green-bg:#f0fdf4;   --color-green-border:#bbf7d0; --color-green-text:#15803d;
  --color-yellow-bg:#fefce8;  --color-yellow-border:#fde047;--color-yellow-text:#a16207;
  --color-red-bg:#fef2f2;     --color-red-border:#fecaca;   --color-red-text:#b91c1c;
  --color-success:#7e22ce;    --color-success-bg:#faf5ff;
  --color-answer-bg:#faf5ff;  --color-answer-border:#d8b4fe;--color-answer-text:#581c87;
  --shadow-sm:0 1px 3px rgba(80,40,130,.06);
  --shadow-md:0 4px 16px rgba(80,40,130,.09);
  --shadow-lg:0 12px 40px rgba(80,40,130,.13);
}

/* ── 다크 ── */
[data-theme="dark"] {
  --color-bg:#1a1326;         --color-surface:#241834;
  --color-surface-2:#2b1d3f;  --color-surface-offset:#291a3c;
  --color-border:#412a5e;     --color-divider:#3a2552;
  --color-text:#f3e8ff;       --color-text-muted:#b794d8;
  --color-text-faint:#6b4587; --color-text-inverse:#1a1326;
  --color-primary:#c084fc;    --color-primary-hover:#d8b4fe;
  --color-primary-light:#5b2188; --color-primary-subtle:#2d1846;
  --color-blue-bg:#172040;    --color-blue-border:#1d4ed8;  --color-blue-text:#93c5fd;
  --color-green-bg:#052e16;   --color-green-border:#166534; --color-green-text:#86efac;
  --color-yellow-bg:#1c1505;  --color-yellow-border:#854d0e;--color-yellow-text:#fde047;
  --color-red-bg:#1c0505;     --color-red-border:#991b1b;   --color-red-text:#fca5a5;
  --color-success:#d8b4fe;    --color-success-bg:#2d1846;
  --color-answer-bg:#2d1846;  --color-answer-border:#7e22ce;--color-answer-text:#d8b4fe;
  --shadow-sm:0 1px 3px rgba(0,0,0,.25);
  --shadow-md:0 4px 16px rgba(0,0,0,.35);
  --shadow-lg:0 12px 40px rgba(0,0,0,.45);
  /* 다크 난이도 */
  --level-basic-bg:#1c1505;     --level-basic-text:#fde047;    --level-basic-border:#854d0e;
  --level-example-bg:#2e1065;   --level-example-text:#d8b4fe;  --level-example-border:#7e22ce;
  --level-exercise-bg:#052e16;  --level-exercise-text:#86efac; --level-exercise-border:#166534;
  --level-standard-bg:#1c1005;  --level-standard-text:#fed7aa; --level-standard-border:#9a3412;
  --level-advanced-bg:#1c0505;  --level-advanced-text:#fda4af; --level-advanced-border:#be123c;
  --level-kihul-bg:#2e0a3f;     --level-kihul-text:#f0abfc;    --level-kihul-border:#86198f;
}

/* ── 리셋 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:none;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);
  background:var(--color-bg);overflow-x:hidden;
  padding-top:var(--header-h);padding-bottom:var(--footer-h);
  opacity:0;transition:opacity 0.3s;line-height:1.7}
body.mathjax-ready{opacity:1}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
a{color:var(--color-primary);text-decoration:none}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}

/* ══════════════════════════════════
   HEADER
══════════════════════════════════ */
.site-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--color-surface);border-bottom:1px solid var(--color-border);
  box-shadow:var(--shadow-sm);
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-3) var(--space-6);gap:var(--space-4);
}
.header-title{display:flex;align-items:center;gap:var(--space-3)}
.logo-icon{width:34px;height:34px;flex-shrink:0}
.school-name{font-size:var(--text-xs);font-weight:500;color:var(--color-text-muted);
  letter-spacing:.04em;display:block;line-height:1.2}
.site-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;
  color:var(--color-text);line-height:1.2;white-space:nowrap}
.unit-name{color:var(--color-primary)}
.header-controls{display:flex;align-items:center;gap:var(--space-3);flex-shrink:0}
.progress-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:var(--space-1)}
.progress-label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);font-variant-numeric:tabular-nums}
.progress-bar-track{width:80px;height:5px;background:var(--color-surface-offset);border-radius:var(--radius-full);overflow:hidden}
.progress-bar-fill{height:100%;background:var(--color-primary);border-radius:var(--radius-full);transition:width 350ms ease}
.btn-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-full);color:var(--color-text-muted);
  background:var(--color-surface-offset);border:1px solid var(--color-border);
  transition:all var(--transition-fast)}
.btn-icon:hover{background:var(--color-primary-subtle);color:var(--color-primary);border-color:var(--color-primary-light)}

/* ── 난이도 필터 바 ── */
.filter-bar{
  display:flex;gap:var(--space-2);padding:var(--space-2) var(--space-6) var(--space-3);
  overflow-x:auto;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{
  display:inline-flex;align-items:center;gap:var(--space-1);
  padding:var(--space-1) var(--space-4);border-radius:var(--radius-full);
  font-size:var(--text-sm);font-weight:600;font-family:var(--font-display);
  color:var(--color-text-muted);background:var(--color-surface-offset);
  border:1.5px solid var(--color-border);white-space:nowrap;min-height:34px;
  transition:all var(--transition-fast);
}
.filter-btn:hover{background:var(--color-primary-subtle);color:var(--color-primary);border-color:var(--color-primary-light)}
.filter-btn.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
.filter-count{
  font-size:var(--text-xs);font-weight:700;
  background:rgba(255,255,255,0.25);border-radius:var(--radius-full);
  padding:0 6px;min-width:20px;text-align:center;
}
.filter-btn:not(.active) .filter-count{background:var(--color-surface-2);color:var(--color-text-muted)}

/* 필터별 액티브 색 */
.filter-btn[data-filter="basic"].active    {background:var(--level-basic-text);border-color:var(--level-basic-text)}
.filter-btn[data-filter="example"].active  {background:var(--level-example-text);border-color:var(--level-example-text)}
.filter-btn[data-filter="exercise"].active {background:var(--level-exercise-text);border-color:var(--level-exercise-text)}
.filter-btn[data-filter="standard"].active {background:var(--level-standard-text);border-color:var(--level-standard-text)}
.filter-btn[data-filter="advanced"].active {background:var(--level-advanced-text);border-color:var(--level-advanced-text)}
.filter-btn[data-filter="kihul"].active    {background:var(--level-kihul-text);border-color:var(--level-kihul-text)}

/* ══════════════════════════════════
   MAIN AREA
══════════════════════════════════ */
.main-area{
  padding:var(--space-5) var(--space-5) var(--space-8);
}
.card-viewport{max-width:900px;margin:0 auto}

/* ── 문항 카드 ── */
.problem-card{animation:cardIn 280ms cubic-bezier(0.16,1,0.3,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-inner{display:flex;flex-direction:column;gap:var(--space-5)}

/* ── 문제 섹션 ── */
.problem-section{
  background:var(--color-surface);border:1.5px solid var(--color-border);
  border-radius:var(--radius-xl);padding:var(--space-6);box-shadow:var(--shadow-sm);
}
.problem-badge{
  display:inline-flex;align-items:center;
  font-family:var(--font-display);font-size:var(--text-sm);font-weight:700;
  border:1.5px solid;border-radius:var(--radius-full);
  padding:var(--space-1) var(--space-4);margin-bottom:var(--space-4);letter-spacing:.03em;
}
.problem-sub-label{
  display:inline-block;margin-left:var(--space-2);
  font-size:var(--text-xs);color:var(--color-text-faint);font-weight:500;
}
.problem-title{
  font-size:var(--text-lg);font-weight:800;color:var(--color-text);
  margin-bottom:var(--space-3);line-height:1.4;
}
.problem-statement{
  font-size:clamp(1.05rem,1rem + 0.6vw,1.35rem);font-weight:500;
  line-height:1.8;color:var(--color-text);margin-bottom:var(--space-3);max-width:none;
}
.problem-statement p{margin:0.4rem 0}
.choices{
  list-style:none;display:grid;grid-template-columns:repeat(5,1fr);gap:var(--space-2);
  margin-top:var(--space-3);
}
.choices li{
  padding:var(--space-3) var(--space-2);border:1.5px solid var(--color-border);
  border-radius:var(--radius-md);font-size:var(--text-sm);text-align:center;
  background:var(--color-surface-2);color:var(--color-text-muted);
  line-height:1.6;max-width:none;transition:all var(--transition-fast);
}
.short-answer-label{
  display:inline-flex;font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);
  background:var(--color-surface-offset);border:1px solid var(--color-border);
  border-radius:var(--radius-full);padding:var(--space-1) var(--space-3);margin-top:var(--space-3);
}
.graph-box{display:flex;justify-content:center;padding:var(--space-3) 0}
.graph-box svg{max-width:100%;height:auto}

/* ── 풀이 공간 ── */
.scratch-area{
  position:relative;min-height:120px;
  background-image:linear-gradient(var(--color-divider) 1px,transparent 1px),
                   linear-gradient(90deg,var(--color-divider) 1px,transparent 1px);
  background-size:28px 28px;background-color:var(--color-surface);
  border:1.5px dashed var(--color-border);border-radius:var(--radius-xl);overflow:hidden;
  cursor:pointer;transition:border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.scratch-area:hover{
  border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-subtle);
}
.scratch-label{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:var(--text-sm);font-weight:600;color:var(--color-text-faint);
  letter-spacing:.06em;pointer-events:none;display:flex;flex-direction:column;
  align-items:center;gap:var(--space-2);text-align:center;
}
.scratch-label::after{
  content:'터치하여 넓히기';
  font-size:var(--text-xs);color:var(--color-text-faint);opacity:.7;
}

/* ── 풀이 공간 오버레이 ── */
.scratch-overlay{
  position:fixed;inset:0;z-index:500;
  background:var(--color-bg);
  display:flex;flex-direction:column;
  animation:overlayIn 220ms cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes overlayIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
.scratch-overlay-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-4) var(--space-6);
  background:var(--color-surface);border-bottom:1px solid var(--color-border);
  flex-shrink:0;
}
.scratch-overlay-title{
  font-family:var(--font-display);font-size:var(--text-base);font-weight:700;
  color:var(--color-text-muted);letter-spacing:.05em;text-transform:uppercase;
}
.scratch-overlay-close{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-full);background:var(--color-surface-offset);
  border:1.5px solid var(--color-border);color:var(--color-text-muted);
  font-size:1.4rem;line-height:1;cursor:pointer;
  transition:all var(--transition-fast);
}
.scratch-overlay-close:hover{
  background:var(--color-red-bg);color:var(--color-red-text);border-color:var(--color-red-border);
}
.scratch-overlay-body{display:flex;flex:1;min-height:0}
.scratch-overlay-problem{
  width:38%;max-width:520px;min-width:300px;
  overflow-y:auto;padding:var(--space-5) var(--space-6);
  border-right:1px solid var(--color-border);
  background:var(--color-surface);
}
.scratch-overlay-problem .problem-badge{margin-bottom:var(--space-3)}
.scratch-overlay-problem .problem-statement{
  font-size:var(--text-base);line-height:1.65;color:var(--color-text);
  margin:0 0 var(--space-4)
}
.scratch-overlay-problem .choices{margin-top:var(--space-3)}
@media (max-width:768px){
  .scratch-overlay-body{flex-direction:column}
  .scratch-overlay-problem{
    width:100%;max-width:none;min-width:0;max-height:38vh;
    border-right:none;border-bottom:1px solid var(--color-border)
  }
}
.scratch-overlay-canvas{
  flex:1;min-width:0;display:flex;flex-direction:column;
  background-color:var(--color-surface);
}
.overlay-step-bar{
  display:flex;flex-wrap:wrap;gap:var(--space-2);
  padding:var(--space-3) var(--space-4);
  border-bottom:1px solid var(--color-border);
  background:var(--color-surface-offset);flex-shrink:0;
}
.overlay-step-bar .step-btn{flex:0 0 auto}
.overlay-steps-container{
  flex:1;min-height:0;overflow-y:auto;
  padding:var(--space-4) var(--space-5);
  background-image:linear-gradient(var(--color-divider) 1px,transparent 1px),
                   linear-gradient(90deg,var(--color-divider) 1px,transparent 1px);
  background-size:32px 32px;
}
.overlay-steps-container .step{margin-bottom:var(--space-4)}
.overlay-steps-container .step:last-child{margin-bottom:0}
.overlay-nav{
  display:flex;align-items:center;gap:var(--space-2);
  margin-left:auto;margin-right:var(--space-3);
}
.overlay-nav-btn{
  padding:var(--space-2) var(--space-3);
  background:var(--color-surface-offset);
  border:1.5px solid var(--color-border);
  border-radius:var(--radius-md);
  font-size:var(--text-sm);font-weight:600;
  color:var(--color-text-muted);cursor:pointer;
  transition:all var(--transition-fast);
}
.overlay-nav-btn:hover:not(:disabled){
  background:var(--color-primary-subtle);color:var(--color-primary);
  border-color:var(--color-primary-light);
}
.overlay-nav-btn:disabled{opacity:.35;cursor:not-allowed}
.overlay-nav-label{
  font-size:var(--text-sm);color:var(--color-text-muted);
  font-weight:600;min-width:54px;text-align:center;
}

/* ── 해설 섹션 ── */
.solution-section{
  background:var(--color-surface);border:1.5px solid var(--color-border);
  border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-sm);
}
.solution-toggle-bar{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);
  padding:var(--space-4) var(--space-6);background:var(--color-surface-offset);
  border-bottom:1px solid var(--color-border);
}
.solution-title{
  font-family:var(--font-display);font-size:var(--text-sm);font-weight:700;
  color:var(--color-text-muted);letter-spacing:.05em;text-transform:uppercase;
}
.step-buttons{display:flex;gap:var(--space-2);flex-wrap:wrap}
.step-btn{
  padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);
  font-size:var(--text-sm);font-weight:600;font-family:var(--font-display);
  color:var(--color-text-muted);background:var(--color-surface);
  border:1.5px solid var(--color-border);transition:all var(--transition-fast);
  min-height:40px;min-width:78px;
}
.step-btn:hover{background:var(--color-primary-subtle);color:var(--color-primary);border-color:var(--color-primary-light)}
.step-btn.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
.reset-btn{color:var(--color-text-faint);border-style:dashed}
.reset-btn:hover{background:var(--color-red-bg);color:var(--color-red-text);border-color:var(--color-red-border);border-style:solid}
.answer-btn{color:var(--color-success);border-color:var(--color-answer-border)}
.answer-btn:hover{background:var(--color-answer-bg);color:var(--color-answer-text);border-color:var(--color-success)}
.answer-btn.active{background:var(--color-success);color:#fff;border-color:var(--color-success)}
.steps-container{padding:var(--space-5) var(--space-6);display:flex;flex-direction:column;gap:var(--space-5);min-height:60px}

/* ── STEP 카드 ── */
.step{animation:stepReveal 280ms cubic-bezier(0.16,1,0.3,1) both}
@keyframes stepReveal{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.step-header{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4)}
.step-tag{
  display:inline-flex;align-items:center;justify-content:center;
  padding:.15em var(--space-3);border-radius:var(--radius-full);
  font-family:var(--font-display);font-size:var(--text-xs);font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;background:var(--color-primary);color:#fff;flex-shrink:0;
}
.step-title{font-size:var(--text-base);font-weight:600;color:var(--color-text)}
.step-body{padding-left:calc(var(--space-3) + 2px);border-left:3px solid var(--color-primary-light)}
.step-body p{margin:0.5rem 0;line-height:1.7;color:var(--color-text-muted);font-size:var(--text-base)}
.step-body b{color:var(--color-text);font-weight:700}

/* ── 계산 박스 ── */
.calc{
  background:var(--color-surface-2);border:1px dashed var(--color-border);
  border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);
  margin:var(--space-2) 0;font-size:var(--text-base);line-height:1.8;
  color:var(--color-text);overflow-x:auto;
}
.calc.purple{
  background:var(--color-primary-subtle);border:1px solid var(--color-primary-light);
  color:var(--color-text);font-weight:500;
}

/* ── 힌트/경고 박스 ── */
.hint{
  background:var(--color-yellow-bg);border-left:4px solid var(--color-yellow-border);
  padding:var(--space-3) var(--space-4);border-radius:0 var(--radius-md) var(--radius-md) 0;
  margin:var(--space-3) 0;font-size:var(--text-sm);color:var(--color-yellow-text);line-height:1.7;
}
.warn{
  background:var(--color-red-bg);border-left:4px solid var(--color-red-border);
  padding:var(--space-3) var(--space-4);border-radius:0 var(--radius-md) var(--radius-md) 0;
  margin:var(--space-3) 0;font-size:var(--text-sm);color:var(--color-red-text);line-height:1.7;
}

/* ── 정답 표시 ── */
.answer-reveal{
  display:flex;align-items:center;gap:var(--space-3);margin-top:var(--space-5);
  padding:var(--space-4) var(--space-5);
  background:var(--color-answer-bg);border:2px solid var(--color-answer-border);border-radius:var(--radius-lg);
}
.answer-label{
  font-size:var(--text-xs);font-weight:800;letter-spacing:.08em;
  text-transform:uppercase;color:var(--color-success);font-family:var(--font-display);flex-shrink:0;
}
.answer-number{font-size:var(--text-xl);font-weight:700;color:var(--color-answer-text);font-family:var(--font-math)}

/* ── 정답 선지 강조 (revealed) — 정답 클릭 시 active ── */
.correct-choice.revealed{
  position:relative;
  background:linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%) !important;
  border:3px solid #10b981 !important;
  color:#064e3b !important;
  font-weight:800 !important;
  padding-left:2.75rem !important;
  box-shadow:0 0 0 4px rgba(16,185,129,0.18), 0 6px 14px rgba(16,185,129,0.22);
  animation:correctPulse 0.55s ease-out;
}
.correct-choice.revealed::before{
  content:'✓';position:absolute;left:0.6rem;top:50%;transform:translateY(-50%);
  width:1.6rem;height:1.6rem;background:#10b981;color:#fff;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:900;box-shadow:0 2px 4px rgba(16,185,129,0.4);
}
@keyframes correctPulse{
  0%{transform:scale(1);box-shadow:0 0 0 0 rgba(16,185,129,0.55)}
  50%{transform:scale(1.015);box-shadow:0 0 0 14px rgba(16,185,129,0)}
  100%{transform:scale(1);box-shadow:0 0 0 4px rgba(16,185,129,0.18), 0 6px 14px rgba(16,185,129,0.22)}
}
[data-theme="dark"] .correct-choice.revealed{
  background:linear-gradient(135deg, #064e3b 0%, #065f46 100%) !important;
  border-color:#34d399 !important;color:#d1fae5 !important;
}
[data-theme="dark"] .correct-choice.revealed::before{background:#34d399;color:#064e3b}

/* ── 핵심 개념 (key-concept) ── */
.key-concept{
  display:flex;align-items:flex-start;flex-wrap:wrap;gap:var(--space-3);
  margin-top:var(--space-4);padding:var(--space-3) var(--space-4);
  background:linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 100%);
  border:1px solid #99f6e4;border-left:4px solid #14b8a6;
  border-radius:var(--radius-md);font-size:var(--text-base);color:#134e4a;
  line-height:1.7;max-width:none;
}
[data-theme="dark"] .key-concept{
  background:#042f2e;color:#5eead4;border-color:#0f766e;border-left-color:#14b8a6;
}
.concept-label{
  font-size:var(--text-xs);font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  background:#0f766e;color:#fff;padding:.1em var(--space-2);
  border-radius:var(--radius-sm);flex-shrink:0;
}

/* ══════════════════════════════════
   BOTTOM NAV
══════════════════════════════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;gap:var(--space-3);
  padding:var(--space-3) var(--space-6);
  background:var(--color-surface);border-top:1px solid var(--color-border);
  box-shadow:0 -4px 16px rgba(80,40,130,.07);
}
.nav-btn{
  display:flex;align-items:center;gap:var(--space-2);
  padding:var(--space-3) var(--space-6);border-radius:var(--radius-full);
  font-size:var(--text-base);font-weight:600;font-family:var(--font-display);
  background:var(--color-primary);color:#fff;min-height:48px;min-width:96px;
  transition:all var(--transition-fast);
  box-shadow:0 2px 8px color-mix(in srgb,var(--color-primary) 25%,transparent);
}
.nav-btn:hover{background:var(--color-primary-hover);transform:translateY(-1px)}
.nav-btn:active{transform:translateY(0)}
.nav-btn:disabled{background:var(--color-surface-offset);color:var(--color-text-faint);box-shadow:none;cursor:not-allowed;transform:none}
.problem-counter{flex:1;text-align:center;font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;color:var(--color-text);font-variant-numeric:tabular-nums}
.counter-sep{color:var(--color-text-faint);margin:0 2px}

/* ══════════════════════════════════
   인쇄 모달
══════════════════════════════════ */
.modal-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  opacity:0;transition:opacity var(--transition-base);
}
.modal-backdrop.open{display:block;opacity:1}
.print-modal{
  display:none;position:fixed;inset:0;z-index:201;
  align-items:center;justify-content:center;pointer-events:none;
}
.print-modal.open{display:flex;pointer-events:auto}
.print-modal-inner{
  background:var(--color-surface);border:1.5px solid var(--color-border);
  border-radius:var(--radius-xl);padding:var(--space-8);
  box-shadow:var(--shadow-lg);width:min(420px,90vw);
  animation:modalIn 250ms cubic-bezier(0.16,1,0.3,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-2)}
.modal-desc{font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-5)}
.modal-options{display:flex;flex-direction:column;gap:var(--space-3);margin-bottom:var(--space-5)}
.modal-check{display:flex;flex-direction:column;gap:var(--space-3);margin-bottom:var(--space-6)}
.modal-sub-label{font-size:var(--text-sm);font-weight:600;color:var(--color-text-muted);margin:0 0 var(--space-1)}
.radio-option,.check-option{
  display:flex;align-items:center;gap:var(--space-3);
  font-size:var(--text-base);cursor:pointer;
  padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);
  border:1.5px solid var(--color-border);background:var(--color-surface-2);
  transition:all var(--transition-fast);
}
.radio-option:hover,.check-option:hover{border-color:var(--color-primary-light);background:var(--color-primary-subtle)}
.radio-option input,.check-option input{accent-color:var(--color-primary)}
.modal-btns{display:flex;gap:var(--space-3);justify-content:flex-end}
.btn-secondary{
  padding:var(--space-3) var(--space-6);border-radius:var(--radius-full);font-size:var(--text-sm);
  font-weight:600;font-family:var(--font-display);background:var(--color-surface-offset);
  color:var(--color-text-muted);border:1.5px solid var(--color-border);
  transition:all var(--transition-fast);
}
.btn-secondary:hover{background:var(--color-surface-2);color:var(--color-text)}
.btn-primary{
  padding:var(--space-3) var(--space-6);border-radius:var(--radius-full);font-size:var(--text-sm);
  font-weight:700;font-family:var(--font-display);background:var(--color-primary);
  color:#fff;border:none;transition:all var(--transition-fast);
  box-shadow:0 2px 8px color-mix(in srgb,var(--color-primary) 30%,transparent);
}
.btn-primary:hover{background:var(--color-primary-hover)}

    display:inline-block;background:#a855f7;color:#fff;

  }
}

     - 'kihul' (대표기출, 1) → anchor c1-k1
   ============================================================ */

const PROBLEMS = [ /* 여기에 문제 객체들을 채운다 */ ];;
</script>

<script>
(function () {
  /* ── 상태 ── */
  let currentFilter = 'all';
  let filteredList  = [];
  let currentIdx    = 0;
  const stepState   = {}; // {problemId: Set<stepNum>}
  PROBLEMS.forEach(p => { stepState[p.id] = new Set(); });

  /* ── DOM ── */
  const viewport    = document.getElementById('card-viewport');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const currentNum  = document.getElementById('current-num');
  const totalNum    = document.getElementById('total-num');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const mainArea    = document.getElementById('main-area');

  /* ══════════════════════════════════
     1. 카드 렌더링
  ══════════════════════════════════ */
  function renderCard(problem) {
    const levelColors = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = levelColors[problem.level] || levelColors.basic;

    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      const nums = ['①','②','③','④','⑤'];
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`
        ).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }

    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;

    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `
        <div class="step" data-step-num="${i+1}" style="display:none">
          <div class="step-header">
            <span class="step-tag">${step.tag}</span>
            <span class="step-title">${step.title}</span>
          </div>
          <div class="step-body">${step.body}</div>
        </div>`;
    });

    const subLabel = problem.subLabel ? `<span class="problem-sub-label">${problem.subLabel}</span>` : '';
    const probTitle = '';
    const keypointHTML = problem.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span><span>${problem.keypoint}</span></div>` : '';

    return `
<article class="problem-card" data-pid="${problem.id}" data-level="${problem.level}">
  <div class="card-inner">

    <div class="problem-section">
      <div>
        <div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">
          ${problem.levelLabel} ${problem.num}
        </div>
        ${subLabel}
      </div>
      ${probTitle}
      <div class="problem-text">
        <div class="problem-statement">${problem.question}</div>
        ${choicesHTML}
      </div>
      ${keypointHTML}
    </div>

    <div class="scratch-area" aria-label="풀이 공간" role="button" tabindex="0"
         onclick="openScratchOverlay(event)" onkeydown="if(event.key==='Enter'||event.key===' ')openScratchOverlay(event)">
      <span class="scratch-label">풀이 공간</span>
    </div>

    <div class="solution-section">
      <div class="solution-toggle-bar">
        <span class="solution-title">단계별 해설</span>
        <div class="step-buttons">${stepBtns}</div>
      </div>
      <div class="steps-container" id="steps-${problem.id}">${stepsHTML}</div>
    </div>

  </div>
</article>`;
  }

  /* ══════════════════════════════════
     2. 필터 & 이동
  ══════════════════════════════════ */
  function applyFilter(filter) {
    currentFilter = filter;
    filteredList = filter === 'all'
      ? [...PROBLEMS]
      : PROBLEMS.filter(p => p.level === filter);
    currentIdx = 0;
    showCard(0);
    updateNav();
    updateProgress();
    updateFilterUI(filter);
  }

  function showCard(idx) {
    currentIdx = Math.max(0, Math.min(idx, filteredList.length - 1));
    const problem = filteredList[currentIdx];
    viewport.innerHTML = renderCard(problem);
    renderMath(viewport);
    restoreStepState(problem.id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goTo(idx) {
    if (idx < 0 || idx >= filteredList.length) return;
    showCard(idx);
    updateNav();
    updateProgress();
    if (document.getElementById('scratch-overlay')) {
      renderScratchOverlay(false);
    }
  }

  function updateNav() {
    prevBtn.disabled = currentIdx === 0;
    nextBtn.disabled = currentIdx === filteredList.length - 1;
    currentNum.textContent = currentIdx + 1;
    totalNum.textContent   = filteredList.length;
  }

  function updateProgress() {
    const pct = Math.round(((currentIdx + 1) / filteredList.length) * 100);
    progressBar.style.width = pct + '%';
    progressLbl.textContent = (currentIdx + 1) + ' / ' + filteredList.length;
  }

  function updateFilterUI(active) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === active);
    });
  }

  /* ══════════════════════════════════
     3. STEP 공개
  ══════════════════════════════════ */
  function showSteps(pid, targetStep) {
    const container = document.getElementById('steps-' + pid);
    if (!container) return;

    if (targetStep === 0) {
      stepState[pid] = new Set();
      container.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      [document.querySelector(`.problem-card[data-pid="${pid}"] .correct-choice`),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => {
          el.classList.remove('revealed');
          ['background','border','color','font-weight'].forEach(p => el.style.removeProperty(p));
        });
      document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`)?.classList.remove('active');
      const overlayContainer = document.getElementById('overlay-steps-' + pid);
      overlayContainer?.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      updateStepBtns(pid);
      return;
    }

    const stepEl = container.querySelector(`.step[data-step-num="${targetStep}"]`);
    if (!stepEl) return;
    if (!stepState[pid]) stepState[pid] = new Set();

    const isOpen = stepEl.style.display !== 'none';
    if (isOpen) {
      stepEl.style.display = 'none';
      stepState[pid].delete(targetStep);
    } else {
      stepEl.style.display = 'block';
      stepEl.style.animation = 'none'; void stepEl.offsetWidth; stepEl.style.animation = '';
      stepState[pid].add(targetStep);
    }

    updateStepBtns(pid);
    renderMath(container);

    if (!isOpen) {
      setTimeout(() => stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
    }
  }

  function restoreStepState(pid) {
    const saved = stepState[pid];
    if (!saved || saved.size === 0) return;
    const toOpen = [...saved].sort((a,b) => a-b);
    stepState[pid] = new Set();
    toOpen.forEach(n => showSteps(pid, n));
  }

  function updateStepBtns(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    card?.querySelectorAll('.step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn') || btn.classList.contains('answer-btn')) return;
      btn.classList.toggle('active', opened.has(parseInt(btn.dataset.step)));
    });
  }

  function highlightAnswer(pid, problem) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const overlay = document.getElementById('scratch-overlay');
    const targets = [];
    if (card) targets.push(card.querySelector('.correct-choice'));
    if (overlay) targets.push(overlay.querySelector('.correct-choice'));
    targets.filter(Boolean).forEach(correct => {
      correct.classList.add('revealed');
    });
  }

  /* 정답 토글 (수동) */
  function revealAnswerOnly(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const btn = card?.querySelector('.answer-btn');
    if (!card || !btn) return;
    if (btn.classList.contains('active')) {
      [card.querySelector('.correct-choice'),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => {
          el.classList.remove('revealed');
        });
      btn.classList.remove('active');
      // 단답형: 별도 표시 제거
      const ansBoxes = card.querySelectorAll('.answer-reveal-inline');
      ansBoxes.forEach(b => b.remove());
      document.querySelectorAll('#scratch-overlay .answer-reveal-inline').forEach(b => b.remove());
    } else {
      const problem = PROBLEMS.find(p => p.id === pid);
      if (!problem) return;
      if (problem.type === 'choice') {
        highlightAnswer(pid, problem);
      } else {
        // 단답형: 정답 박스를 문제 섹션 끝에 인라인 표시
        const ansHTML = `<div class="answer-reveal answer-reveal-inline"><span class="answer-label">정답</span><span class="answer-number">${problem.answerText || ''}</span></div>`;
        const sec = card.querySelector('.problem-section');
        if (sec && !sec.querySelector('.answer-reveal-inline')) {
          sec.insertAdjacentHTML('beforeend', ansHTML);
          renderMath(sec);
        }
        const overlayProb = document.querySelector('#scratch-overlay .scratch-overlay-problem');
        if (overlayProb && !overlayProb.querySelector('.answer-reveal-inline')) {
          overlayProb.insertAdjacentHTML('beforeend', ansHTML);
          renderMath(overlayProb);
        }
      }
      btn.classList.add('active');
    }
  }

  /* ══════════════════════════════════
     4. MathJax 렌더링
  ══════════════════════════════════ */
  function renderMath(el) {
    if (window.MathJax && MathJax.typesetPromise) {
      MathJax.typesetPromise([el]).catch(() => {});
    }
  }

  /* ══════════════════════════════════
     5. 인쇄 / PDF
  ══════════════════════════════════ */
  const printModal    = document.getElementById('print-modal');
  const modalBackdrop = document.getElementById('modal-backdrop');
  const printArea     = document.getElementById('print-area');

  document.getElementById('btn-print').addEventListener('click', () => {
    printModal.setAttribute('aria-hidden', 'false');
    printModal.classList.add('open');
    modalBackdrop.classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click', closePrintModal);
  modalBackdrop.addEventListener('click', closePrintModal);

  function closePrintModal() {
    printModal.classList.remove('open');
    modalBackdrop.classList.remove('open');
    printModal.setAttribute('aria-hidden', 'true');
  }

  document.getElementById('modal-confirm').addEventListener('click', () => {
    const rangeVal = document.querySelector('input[name="print-range"]:checked').value;
    const printMode = document.querySelector('input[name="print-mode"]:checked').value;

    let targetProblems;
    if (rangeVal === 'current') targetProblems = [filteredList[currentIdx]];
    else if (rangeVal === 'filter') targetProblems = [...filteredList];
    else targetProblems = [...PROBLEMS];

    buildPrintArea(targetProblems, printMode);
    closePrintModal();
    setTimeout(() => { window.print(); }, 600);
  });

  function buildPrintArea(problems, mode) {
    printArea.innerHTML = problems.map(p => {
      const nums = ['①','②','③','④','⑤'];
      let choicesHTML = '';
      if (p.type === 'choice' && p.choices) {
        choicesHTML = `<ol class="print-choices">` +
          p.choices.map((c, i) => `<li class="${(mode === 'solution' && i === p.answer) ? 'print-correct' : ''}">${nums[i]} ${c}</li>`).join('') +
          `</ol>`;
      } else {
        choicesHTML = `<div class="print-short-label">단답형${mode === 'solution' && p.answerText ? ' — 정답: ' + p.answerText : ''}</div>`;
      }

      let extraHTML = '';
      if (mode === 'solution') {
        extraHTML = `<div class="print-solution">
          <div class="print-solution-title">해설</div>` +
          p.steps.map(s => `
            <div class="print-step">
              <span class="print-step-tag">${s.tag}</span>
              <span class="print-step-title">${s.title}</span>
              <div class="print-step-body">${s.body}</div>
            </div>`).join('') +
          (p.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span>${p.keypoint}</div>` : '') +
          `</div>`;
      }

      if (mode === 'blank') {
        return `
          <div class="print-card print-mode-blank">
            <div class="print-content-area">
              <div class="print-badge">${p.levelLabel} ${p.num}</div>
              <div class="print-question">${p.question}</div>
              ${choicesHTML}
            </div>
            <div class="print-blank-space" aria-hidden="true"></div>
          </div>`;
      }

      return `
        <div class="print-card print-mode-${mode}">
          <div class="print-badge">${p.levelLabel} ${p.num}</div>
          <div class="print-question">${p.question}</div>
          ${choicesHTML}
          ${extraHTML}
        </div>`;
    }).join('');

    renderMath(printArea);
  }

  /* ══════════════════════════════════
     6. 이벤트
  ══════════════════════════════════ */
  prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
  nextBtn.addEventListener('click', () => goTo(currentIdx + 1));

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });

  document.addEventListener('click', e => {
    const stepBtn  = e.target.closest('.step-btn');
    if (stepBtn) {
      const pid = stepBtn.dataset.pid;
      if (stepBtn.classList.contains('answer-btn')) {
        revealAnswerOnly(pid);
      } else {
        showSteps(pid, parseInt(stepBtn.dataset.step));
      }
      if (typeof window.syncOverlayStepUI === 'function') window.syncOverlayStepUI(pid);
    }
  });

  // 키보드
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentIdx + 1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); goTo(currentIdx - 1); }
    if (['1','2','3','4','5','6'].includes(e.key)) {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, parseInt(e.key)); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === '0') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, 0); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'a' || e.key === 'A') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { revealAnswerOnly(pid); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'Escape' && document.getElementById('scratch-overlay')) {
      e.preventDefault();
      closeScratchOverlay();
    }
  });

  // 스와이프
  let tx = 0, ty = 0, tt = 0, swipeActive = false;
  mainArea.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) { swipeActive = false; return; }
    swipeActive = true;
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    tt = Date.now();
  }, { passive: true });
  mainArea.addEventListener('touchmove', e => {
    if (e.touches.length > 1) swipeActive = false;
  }, { passive: true });
  mainArea.addEventListener('touchend', e => {
    if (!swipeActive) return;
    swipeActive = false;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const dt = Date.now() - tt;
    if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy) * 2 && dt < 600) {
      goTo(dx < 0 ? currentIdx + 1 : currentIdx - 1);
    }
  }, { passive: true });

  /* ══════════════════════════════════
     7. 다크모드
  ══════════════════════════════════ */
  (function () {
    const toggle = document.querySelector('[data-theme-toggle]');
    const html   = document.documentElement;
    let dark = matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    setIcon(toggle, dark);
    toggle?.addEventListener('click', () => {
      dark = !dark;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      setIcon(toggle, dark);
    });
    function setIcon(btn, isDark) {
      if (!btn) return;
      btn.innerHTML = isDark
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
  })();

  /* ══════════════════════════════════
     8. 풀이 공간 오버레이
  ══════════════════════════════════ */
  window.openScratchOverlay = function(e) {
    if (e) { e.stopPropagation(); }
    renderScratchOverlay(true);
  };

  function renderScratchOverlay(animateIn) {
    const existing = document.getElementById('scratch-overlay');
    if (existing) existing.remove();

    const problem = filteredList[currentIdx];
    if (!problem) return;

    const nums = ['①','②','③','④','⑤'];
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }

    const titleSuffix = `${problem.levelLabel} ${problem.num} · `;
    const _lvc = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = _lvc[problem.level] || _lvc.basic;
    const badgeHTML = `<div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>`;
    const problemHTML = `${badgeHTML}<div class="problem-statement">${problem.question}</div>${choicesHTML}`;

    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;

    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `
        <div class="step" data-step-num="${i+1}" style="display:none">
          <div class="step-header">
            <span class="step-tag">${step.tag}</span>
            <span class="step-title">${step.title}</span>
          </div>
          <div class="step-body">${step.body}</div>
        </div>`;
    });
    const total = filteredList.length;
    const prevDisabled = currentIdx === 0 ? 'disabled' : '';
    const nextDisabled = currentIdx === total - 1 ? 'disabled' : '';

    const overlay = document.createElement('div');
    overlay.className = 'scratch-overlay';
    overlay.id = 'scratch-overlay';
    if (!animateIn) overlay.style.animation = 'none';
    overlay.innerHTML = `
      <div class="scratch-overlay-header">
        <span class="scratch-overlay-title">${titleSuffix}풀이 공간</span>
        <div class="overlay-nav">
          <button class="overlay-nav-btn" id="overlay-prev" ${prevDisabled} aria-label="이전 문제">← 이전</button>
          <span class="overlay-nav-label">${currentIdx+1} / ${total}</span>
          <button class="overlay-nav-btn" id="overlay-next" ${nextDisabled} aria-label="다음 문제">다음 →</button>
        </div>
        <button class="scratch-overlay-close" id="scratch-overlay-close" aria-label="닫기">&times;</button>
      </div>
      <div class="scratch-overlay-body">
        <div class="scratch-overlay-problem">${problemHTML}</div>
        <div class="scratch-overlay-canvas">
          <div class="overlay-step-bar">${stepBtns}</div>
          <div class="overlay-steps-container" id="overlay-steps-${problem.id}">${stepsHTML}</div>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    renderMath(overlay);

    document.getElementById('scratch-overlay-close').addEventListener('click', closeScratchOverlay);
    document.getElementById('overlay-prev').addEventListener('click', () => {
      if (currentIdx > 0) goTo(currentIdx - 1);
    });
    document.getElementById('overlay-next').addEventListener('click', () => {
      if (currentIdx < filteredList.length - 1) goTo(currentIdx + 1);
    });

    syncOverlayStepUI(problem.id);
  }

  function closeScratchOverlay() {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    overlay.style.animation = 'overlayOut 180ms cubic-bezier(0.4,0,1,1) both';
    overlay.addEventListener('animationend', () => overlay.remove(), { once: true });
  }

  function syncOverlayStepUI(pid) {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    const container = document.getElementById('overlay-steps-' + pid);
    if (!container) return;
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    container.querySelectorAll('.step').forEach(stepEl => {
      const n = parseInt(stepEl.dataset.stepNum, 10);
      stepEl.style.display = opened.has(n) ? 'block' : 'none';
    });
    overlay.querySelectorAll('.overlay-step-bar .step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn')) return;
      const s = btn.dataset.step;
      if (s === 'answer') {
        const mainAnswerBtn = document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`);
        btn.classList.toggle('active', !!mainAnswerBtn?.classList.contains('active'));
      } else {
        btn.classList.toggle('active', opened.has(parseInt(s, 10)));
      }
    });
  }
  window.syncOverlayStepUI = syncOverlayStepUI;

  (function(){
    if(!document.getElementById('overlay-out-style')){
      const s=document.createElement('style');
      s.id='overlay-out-style';
      s.textContent='@keyframes overlayOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.97)}}';
      document.head.appendChild(s);
    }
  })();

  /* ══════════════════════════════════
     9. HTML 단일파일 다운로드
  ══════════════════════════════════ */
  (function setupDownload() {
    const dlBtn = document.getElementById('btn-download');
    if (!dlBtn) return;
    dlBtn.addEventListener('click', function () {
      const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = '수능특강_미적분I_함수의극한_해설.html';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    });
  })();

  /* ══════════════════════════════════
     10. anchor 점프 (URL hash → 해당 문제로)
  ══════════════════════════════════ */
  function jumpToAnchor() {
    const hash = (location.hash || '').replace(/^#/, '');
    if (!hash) return false;
    const idx = PROBLEMS.findIndex(p => p.id === hash);
    if (idx < 0) return false;
    // 'all' 필터로 전환 (anchor가 필터 범위 밖일 수 있으므로)
    applyFilter('all');
    // 인덱스 이동
    currentIdx = idx;
    showCard(idx);
    updateNav();
    updateProgress();
    return true;
  }
  window.addEventListener('hashchange', jumpToAnchor);

  /* ══════════════════════════════════
     11. 초기화
  ══════════════════════════════════ */
  function init() {
    applyFilter('all');
    // anchor가 있으면 해당 문제로 점프
    if (location.hash) {
      setTimeout(jumpToAnchor, 50);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
<script>
// 메인 단축키 (H/Esc → index-calc.html)
document.addEventListener('keydown', (e) => {
  if (e.isComposing) return;
  const t = e.target;
  if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
  if (e.key === 'h' || e.key === 'H') {
    e.preventDefault();
    const w = window.open('index-calc.html', 'aftermath_main_calc'); if (w) w.focus();
  }
});
</script>

<script>
/* named window 일관 처리 — 이미 열린 창 있으면 새 창 없이 focus */
document.addEventListener('click', function(e) {
  const a = e.target.closest('a[target^="aftermath_"]');
  if (!a) return;
  e.preventDefault();
  const w = window.open(a.href, a.target);
  if (w) w.focus();
});
</script>
