    title:'\\(x=\\tfrac{1}{3}t^3-kt^2\\), 방향 전환 시각에서 원점 거리 \\(36\\) → \\(k\\)',
    question:`<p>양수 \\(k\\)에 대하여 시각 \\(t=0\\)일 때 출발하여 수직선 위를 움직이는 점 \\(\\mathrm P\\)의 시각 \\(t\\ (t\\geq 0)\\)에서의 위치 \\(x\\)가 \\(x=\\dfrac{1}{3}t^3-kt^2\\) 이다. 출발한 후 점 \\(\\mathrm P\\)의 운동 방향이 바뀌는 시각에서 점 \\(\\mathrm P\\)와 원점 사이의 거리가 36일 때, \\(k\\)의 값은?</p>`,

    steps:[

      {tag:'STEP 2', title:'방향 전환: \\(t=2k\\) (부호 \\(-\\to +\\))', body:`<p>\\(t=0,\\ 2k\\)에서 \\(v=0\\). \\(t=0\\)은 출발. \\(t=2k\\) 좌우에서 \\(v\\) 부호 변화 ⇒ 이때 방향 전환.</p>`},
      {tag:'STEP 3', title:'\\(|x(2k)|=36\\)', body:`<div class="calc">\\(x(2k)=\\dfrac{1}{3}(2k)^3-k(2k)^2=\\dfrac{8k^3}{3}-4k^3=-\\dfrac{4k^3}{3}\\)</div>

      {tag:'STEP 4', title:'\\(k=3\\)', body:`<div class="calc">\\(k\\gt 0\\Rightarrow k=3\\)</div>

    steps:[

  {

    title:'\\(|x^3-12x+16|=k\\) 실근 개수 3 — \\(k\\)',
    question:`<p>\\(x\\)에 대한 방정식 \\(|x^3-12x+16|=k\\)의 서로 다른 실근의 개수가 3일 때, 상수 \\(k\\)의 값은?</p>`,
    choices:['\\(31\\)','\\(32\\)','\\(33\\)','\\(34\\)','\\(35\\)'], answer:1,
    keypoint:'\\(f(x)=x^3-12x+16=(x+4)(x-2)^2\\). \\(|f(x)|\\)의 그래프와 \\(y=k\\)의 교점이 3개 ⇒ \\(k=\\)극댓값.',
    steps:[
      {tag:'STEP 1', title:'\\(f(x)=x^3-12x+16\\), \\(f\'(x)=3(x+2)(x-2)\\)', body:`<div class="calc">\\(f\'(x)=3x^2-12=3(x-2)(x+2)\\Rightarrow x=\\pm 2\\)</div>
<div class="calc">\\(f(-2)=-8+24+16=32\\) (극대), \\(f(2)=8-24+16=0\\) (극소)</div>`},
      {tag:'STEP 2', title:'\\(f(x)=(x+4)(x-2)^2\\), \\(|f|\\)의 그래프', body:`<p>\\(f(-4)=-64+48+16=0\\). \\(f\\)는 \\(x=-4\\)에서 \\(0\\) 통과, \\(x=2\\)에서 접하고 다시 증가. \\(|f|\\)는 \\(x=-2\\)에서 봉우리 \\(32\\), \\(x=-4\\)와 \\(x=2\\)에서 \\(0\\)으로 떨어짐.</p>`},
      {tag:'STEP 3', title:'\\(y=k\\)와의 교점 3개 ⇒ 봉우리 꼭대기', body:`<p>\\(|f|\\)의 두 봉우리(왼쪽 \\(x=-2\\) 봉우리, 오른쪽 \\(x\\to\\infty\\) 증가). \\(y=k\\)와의 교점이 정확히 3개가 되려면 왼쪽 봉우리 꼭대기와 만남 ⇒ \\(k=32\\).</p>
<div class="calc purple">\\(k=32\\)</div>`}

    steps:[

      {tag:'STEP 3', title:'실근 존재 ⇔ \\(\\min f\\leq 0\\Rightarrow k\\leq 5\\)', body:`<div class="calc">\\(k-5\\leq 0\\Rightarrow k\\leq 5\\)</div>
<p>자연수 \\(k=1,2,3,4,5\\) ⇒ 합 \\(=15\\).</p>

    question:`<p>수직선 위를 움직이는 두 점 \\(\\mathrm P,\\ \\mathrm Q\\)의 시각 \\(t\\ (t\\geq 0)\\)에서의 위치를 각각 \\(x_1,\\ x_2\\)라 하면 \\(x_1=t^3+t^2-12t+15,\\ x_2=\\dfrac{1}{3}t^3+\\dfrac{1}{2}t^2-2t+\\dfrac{1}{3}\\) 이다. 두 점 \\(\\mathrm P,\\ \\mathrm Q\\)의 속도가 같아지는 순간 선분 \\(\\mathrm{PQ}\\)의 중점의 위치는?</p>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:1,

  {
    id:'c5-s1', level:'standard', levelLabel:'기본', num:1, type:'choice',
    subLabel:'[26009-0114] · 최솟값 \\(-13\\)',
    title:'\\([0,1]\\)에서 \\(f(x)=2x^3+3ax^2-12a^2x\\)의 최솟값 \\(-13\\) — \\(a\\)',
    question:`<p>양수 \\(a\\)에 대하여 닫힌구간 \\([0,1]\\)에서 함수 \\(f(x)=2x^3+3ax^2-12a^2 x\\)의 최솟값이 \\(-13\\)일 때, \\(a\\)의 값은?</p>`,
    choices:['\\(\\dfrac{3}{4}\\)','\\(1\\)','\\(\\dfrac{5}{4}\\)','\\(\\dfrac{3}{2}\\)','\\(\\dfrac{7}{4}\\)'], answer:2,
    keypoint:'\\(f\'(x)=6(x+2a)(x-a)\\). \\(a\\)와 1의 대소에 따른 경우 분기.',
    steps:[
      {tag:'STEP 1', title:'\\(f\'(x)=6x^2+6ax-12a^2=6(x+2a)(x-a)\\)', body:`<div class="calc">\\(f\'(x)=0\\Rightarrow x=-2a\\) (음수) 또는 \\(x=a\\)</div>
<p>\\(-2a\\lt 0\\)이므로 \\([0,1]\\) 내부에 \\(x=a\\)가 들어올 수 있음.</p>`},
      {tag:'STEP 2', title:'경우 1: \\(0\\lt a\\leq 1\\) — \\(x=a\\)에서 최소', body:`<div class="calc">\\(f(a)=2a^3+3a^3-12a^3=-7a^3=-13\\Rightarrow a^3=\\dfrac{13}{7}\\)</div>
<p>\\(a^3=\\dfrac{13}{7}\\gt 1\\)이므로 \\(a\\gt 1\\), 조건 \\(a\\leq 1\\)에 모순. 기각.</p>`},
      {tag:'STEP 3', title:'경우 2: \\(a\\gt 1\\) — \\([0,1]\\)에서 \\(f\\)는 감소(\\(x\\lt a\\)에서 감소) → \\(x=1\\) 최소', body:`<div class="calc">\\(f(1)=2+3a-12a^2=-13\\Rightarrow 12a^2-3a-15=0\\)</div>
<div class="calc">\\(4a^2-a-5=0\\Rightarrow (4a-5)(a+1)=0\\)</div>
<div class="calc">\\(a\\gt 1\\Rightarrow a=\\dfrac{5}{4}\\)</div>`},
      {tag:'STEP 4', title:'\\(a=\\dfrac{5}{4}\\)', body:`<div class="calc purple">\\(a=\\dfrac{5}{4}\\)</div>`}
    ]
  },

  /* ───────── 기본 2 ───────── */
  {
    id:'c5-s2', level:'standard', levelLabel:'기본', num:2, type:'choice',
    subLabel:'[26009-0115] · 닫힌구간 \\([-t,t]\\)에서 최댓값 0',
    title:'\\(f(x)=x^3+ax^2+b\\), \\(0\\lt t\\leq 3\\)에서 \\([-t,t]\\) 최댓값 \\(0\\) — \\(f(2)\\) 최댓값',
    question:`<p>함수 \\(f(x)=x^3+ax^2+b\\)가 다음 조건을 만족시키도록 하는 두 실수 \\(a,\\ b\\)에 대하여 \\(f(2)\\)의 최댓값은?</p>
<div class="calc">\\(0\\lt t\\leq 3\\)인 모든 실수 \\(t\\)에 대하여 닫힌구간 \\([-t,t]\\)에서 함수 \\(f(x)\\)의 최댓값은 \\(0\\)이다.</div>`,
    choices:['\\(-5\\)','\\(-4\\)','\\(-3\\)','\\(-2\\)','\\(-1\\)'], answer:1,
    keypoint:'\\(f\'(x)=x(3x+2a)\\). 경우 분기 \\(a\\gtrless 0\\). \\(a\\lt 0\\), \\(f(0)=0\\) 그리고 \\(-a\\geq 3\\) 조건 도출.',
    steps:[
      {tag:'STEP 1', title:'경우 분기 \\(a\\gt 0,\\ =0,\\ \\lt 0\\)', body:`<p>\\(f\'(x)=3x^2+2ax=x(3x+2a)\\). \\(a\\gt 0\\): \\(x=0,\\ -\\tfrac{2a}{3}\\); \\(a=0\\): 단조증가; \\(a\\lt 0\\): \\(x=0,\\ -\\tfrac{2a}{3}\\) (양수).</p>
<p>\\(a\\gt 0\\): 작은 \\(t\\)에서 최댓값은 \\(f(t),f(-t)\\) 중 큰 값으로 변동 ⇒ 일정 \\(0\\) 불가. \\(a=0\\): 증가 ⇒ \\(f(t)\\)가 \\(t\\)에 따라 변함 ⇒ 불가. ∴ \\(a\\lt 0\\).</p>`},
      {tag:'STEP 2', title:'\\(a\\lt 0\\) — \\(x=0\\) 극대, \\(f(0)=0\\) 필요', body:`<p>\\(a\\lt 0\\): \\(x=0\\)에서 극대(\\(f(0)=b\\)), \\(x=-\\tfrac{2a}{3}\\gt 0\\)에서 극소. 좌측에서 \\(f(t)\\leq f(0)\\)는 자동. 따라서 \\([-t,t]\\) 최댓값 \\(=f(0)=b\\). 조건상 \\(0\\)이어야 ⇒ \\(b=0\\).</p>`},
      {tag:'STEP 3', title:'\\(f(x)=x^2(x+a)\\), \\(-a\\geq 3\\)', body:`<div class="calc">\\(f(x)=x^3+ax^2=x^2(x+a)\\)</div>
<p>\\(x\\leq -a\\)에서 \\(f(x)\\leq 0\\), \\(x\\gt -a\\)에서 \\(f(x)\\gt 0\\). 따라서 \\([-t,t]\\)에서 최댓값 \\(0\\)이 되려면 \\(t\\leq -a\\Rightarrow 3\\leq -a\\Rightarrow a\\leq -3\\).</p>`},
      {tag:'STEP 4', title:'\\(f(2)=8+4a\\), \\(a\\leq -3\\)일 때 최댓값', body:`<div class="calc">\\(f(2)=8+4a\\leq 8+4\\cdot(-3)=-4\\)</div>
<div class="calc purple">\\(f(2)\\)의 최댓값 \\(=-4\\)</div>`}
    ]
  },

    subLabel:'[26009-0116] · 사차함수 \\(g(t)\\) 미분가능',
    title:'최고차 1 사차 \\(f\\), \\(g(t)=\\min_{x\\leq t} f(x)\\), \\(g\'=0\\) 집합 \\(\\{0\\}\\cup\\{t\\geq 1\\}\\) — \\(f(2)-f(0)\\)',
    question:`<p>최고차항의 계수가 1인 사차함수 \\(f(x)\\)와 실수 \\(t\\)에 대하여 \\(x\\leq t\\)에서 함수 \\(f(x)\\)의 최솟값을 \\(g(t)\\)라 하자. 함수 \\(g(t)\\)가 실수 전체의 집합에서 미분가능하고 \\(\\{t\\mid g\'(t)=0,\\ t\\text{는 실수}\\}=\\{0\\}\\cup \\{t\\mid t\\geq 1\\}\\) 일 때, \\(f(2)-f(0)\\)의 값은?</p>`,
    choices:['\\(4\\)','\\(\\dfrac{14}{3}\\)','\\(\\dfrac{16}{3}\\)','\\(6\\)','\\(\\dfrac{20}{3}\\)'], answer:2,
    keypoint:'\\(g\\)가 미분가능 + \\(g\'=0\\) 영역 분석 ⇒ \\(f\\)는 \\(x=0\\)에서 극소(평탄), \\(x=1\\)에서 극대점(접) — \\(f(x)=x^3(x-a)+f(0)\\) 형태.',
    steps:[
      {tag:'STEP 1', title:'\\(g(t)\\)의 구조 — \\(t\\)가 \\(f\\) 극소점 통과 시 평탄', body:`<p>\\(g(t)=\\min_{x\\leq t} f\\). \\(t\\)가 새 극솟값을 만날 때만 \\(g\\) 감소. \\(g\'=0\\) 영역이 \\(t\\geq 1\\) 전체이므로 \\(f(1)\\)이 \\(f\\)의 전역최소이고 \\(x\\geq 1\\)에서 그 이상.</p>
<p>또 \\(t=0\\) 한 점에서 \\(g\'=0\\) — \\(t=0\\)이 \\(f\\)의 사이드 정류점.</p>`},
      {tag:'STEP 2', title:'\\(f(x)=x^3(x-a)+f(0)\\Rightarrow f\'(x)=4x^3-3ax^2\\)', body:`<p>직선 \\(y=f(0)\\)이 \\(f\\)와 만나는 양의 \\(x\\)좌표 \\(a\\). 사차 + 최고차 \\(1\\)이므로 \\(f(x)-f(0)=x^3(x-a)\\).</p>
<div class="calc">\\(f(x)=x^4-ax^3+f(0)\\)</div>
<div class="calc">\\(f\'(x)=4x^3-3ax^2=x^2(4x-3a)\\)</div>`},
      {tag:'STEP 3', title:'\\(f\'(1)=0\\Rightarrow a=\\dfrac{4}{3}\\)', body:`<div class="calc">\\(4-3a=0\\Rightarrow a=\\dfrac{4}{3}\\)</div>`},
      {tag:'STEP 4', title:'\\(f(2)-f(0)=16-\\dfrac{32}{3}=\\dfrac{16}{3}\\)', body:`<div class="calc">\\(f(2)-f(0)=2^4-a\\cdot 2^3=16-8a=16-\\dfrac{32}{3}=\\dfrac{16}{3}\\)</div>
<div class="calc purple">\\(f(2)-f(0)=\\dfrac{16}{3}\\)</div>`}
    ]
  },

  /* ───────── 기본 4 ───────── */
  {
    id:'c5-s4', level:'standard', levelLabel:'기본', num:4, type:'short',
    subLabel:'[26009-0117] · 절댓값 부등식',
    title:'\\(f(x)=\\tfrac{1}{3}x^3-x^2+\\tfrac{1}{3}\\), \\(f(x)+|f(x)+1|\\geq 6x+k\\) — \\(k\\) 최댓값 \\(-\\tfrac{q}{p}\\)에서 \\(p+q\\)',
    question:`<p>함수 \\(f(x)=\\dfrac{1}{3}x^3-x^2+\\dfrac{1}{3}\\)일 때, 모든 실수 \\(x\\)에 대하여 부등식 \\(f(x)+|f(x)+1|\\geq 6x+k\\)가 성립하도록 하는 실수 \\(k\\)의 최댓값은 \\(-\\dfrac{q}{p}\\)이다. \\(p+q\\)의 값을 구하시오. (단, \\(p\\)와 \\(q\\)는 서로소인 자연수이다.)</p>`,
    answerText:'\\(52\\)',
    keypoint:'\\(f(x)+1=\\tfrac{1}{3}(x+1)(x-2)^2\\). \\(x\\leq -1\\)이면 \\(f+1\\leq 0\\), \\(x\\gt -1\\)이면 \\(\\geq 0\\). 두 구간에서 \\(g(x)=f+|f+1|-6x\\) 최솟값 \\(k\\).',
    steps:[
      {tag:'STEP 1', title:'\\(f(x)+1=\\dfrac{1}{3}(x+1)(x-2)^2\\)', body:`<div class="calc">\\(f(x)+1=\\dfrac{1}{3}x^3-x^2+\\dfrac{4}{3}=\\dfrac{1}{3}(x^3-3x^2+4)=\\dfrac{1}{3}(x+1)(x-2)^2\\)</div>`},
      {tag:'STEP 2', title:'\\(x\\leq -1\\): \\(g(x)=-6x-1\\)', body:`<p>\\(f+1\\leq 0\\Rightarrow |f+1|=-(f+1)\\). \\(g=f-(f+1)-6x=-1-6x\\).</p>`},
      {tag:'STEP 3', title:'\\(x\\gt -1\\): \\(g(x)=\\dfrac{2}{3}x^3-2x^2-6x+\\dfrac{5}{3}\\)', body:`<p>\\(g=2f+1-6x=\\dfrac{2}{3}x^3-2x^2+\\dfrac{2}{3}-6x+1=\\dfrac{2}{3}x^3-2x^2-6x+\\dfrac{5}{3}\\).</p>
<div class="calc">\\(g\'(x)=2x^2-4x-6=2(x-3)(x+1)\\)</div>
<p>\\(x\\gt -1\\)에서 \\(g\'=0\\Rightarrow x=3\\)이 극소.</p>`},
      {tag:'STEP 4', title:'\\(g(3)=-\\dfrac{49}{3}\\) 전역 최소', body:`<div class="calc">\\(g(3)=\\dfrac{2}{3}\\cdot 27-18-18+\\dfrac{5}{3}=18-36+\\dfrac{5}{3}=-18+\\dfrac{5}{3}=-\\dfrac{49}{3}\\)</div>
<p>\\(x\\leq -1\\) 영역 \\(g=-6x-1\\)은 \\(x=-1\\)에서 \\(5\\), 좌측으로 증가. 두 영역 만남점 \\(x=-1\\): \\(g=5\\). 전역최소 \\(=-\\dfrac{49}{3}\\) at \\(x=3\\).</p>`},
      {tag:'STEP 5', title:'\\(k\\leq -\\dfrac{49}{3}\\Rightarrow k_{\\max}=-\\dfrac{49}{3}\\), \\(p=3,\\ q=49\\)', body:`<div class="calc">\\(p+q=3+49=52\\)</div>
<div class="calc purple">\\(p+q=52\\)</div>`}
    ]
  },

  /* ───────── 기본 5 ───────── */
  {
    id:'c5-s5', level:'standard', levelLabel:'기본', num:5, type:'choice',
    subLabel:'[26009-0118] · 등차수열 극값',
    title:'\\(g\\) 연속 + 극값 4개 등차 + \\([a_1,a_4]\\)에서 최댓값 \\(3\\) — \\(g(-3)\\cdot g(3)\\)',
    question:`<p>상수 \\(a\\)와 이차함수 \\(f(x)\\)에 대하여 함수 \\(g(x)=\\begin{cases}-x^3+ax^2-6x & (x\\leq 0)\\\\ f(x) & (x\\gt 0)\\end{cases}\\) 은 실수 전체의 집합에서 연속이다. 함수 \\(g(x)\\)가 다음 조건을 만족시킬 때, \\(g(-3)\\cdot g(3)\\)의 값은?</p>
<div class="calc"><p>(가) 함수 \\(g(x)\\)가 \\(x=\\alpha\\)에서 극값을 갖는 모든 실수 \\(\\alpha\\)의 값은 \\(\\alpha_1,\\alpha_2,\\alpha_3,\\alpha_4\\) (\\(\\alpha_1\\lt \\alpha_2\\lt \\alpha_3\\lt \\alpha_4\\))이고, 이 네 수는 이 순서대로 등차수열을 이룬다.</p>
<p>(나) 닫힌구간 \\([\\alpha_1,\\alpha_4]\\)에서 함수 \\(g(x)\\)의 최댓값은 \\(3\\)이다.</p></div>`,
    choices:['\\(-\\dfrac{81}{2}\\)','\\(-39\\)','\\(-\\dfrac{75}{2}\\)','\\(-36\\)','\\(-\\dfrac{69}{2}\\)'], answer:0,
    keypoint:'좌측 삼차 극값 \\(\\leq 2\\)개, 우측 이차 극값 1개. 4개가 되려면 \\(x=0\\)도 극값. \\(\\alpha_3=0\\), 공차 \\(d\\)로 \\(\\alpha_1=-2d,\\alpha_2=-d,\\alpha_3=0,\\alpha_4=d\\).',
    steps:[
      {tag:'STEP 1', title:'\\(g\\) 연속 + 극값 4개 ⇒ \\(f(0)=0\\) + \\(x=0\\)도 극값', body:`<p>\\(\\lim_{x\\to 0^-}g(x)=0\\), \\(g(0)=0\\)이므로 \\(f(0)=0\\). 사차함수 \\(f\\) 아니라 이차이므로 우측 극값 1개 이하. 좌측 삼차 \\(\\leq 2\\)개. 총 4개 ⇒ \\(x=0\\)도 극값. \\(\\alpha_3=0\\).</p>`},
      {tag:'STEP 2', title:'\\(d\\gt 0\\)로 \\(\\alpha_1=-2d,\\alpha_2=-d,\\alpha_4=d\\)', body:`<p>등차수열 + \\(\\alpha_3=0\\) ⇒ 공차 \\(d\\gt 0\\)일 때 \\(\\alpha_1=-2d,\\alpha_2=-d,\\alpha_4=d\\).</p>`},
      {tag:'STEP 3', title:'\\(x\\lt 0\\): \\(g\'(x)=-3x^2+2ax-6=0\\)의 두 근이 \\(-2d,-d\\)', body:`<div class="calc">\\(3x^2-2ax+6=0\\)의 두 근: \\(-2d,-d\\)</div>
<div class="calc">근과 계수: \\(-2d+(-d)=\\dfrac{2a}{3},\\ (-2d)(-d)=2d^2=2\\)</div>
<div class="calc">\\(d^2=1\\Rightarrow d=1,\\ -3d=\\dfrac{2a}{3}\\Rightarrow a=-\\dfrac{9}{2}\\)</div>`},
      {tag:'STEP 4', title:'\\(f(x)=bx(x-2)\\) (위로 볼록), 최댓값 \\(3\\)으로 \\(b\\)', body:`<p>\\(f\\)는 이차, \\(\\alpha_4=1\\)에서 극값 ⇒ 축 \\(x=1\\), \\(f(0)=0\\)이므로 \\(f(x)=bx(x-2)\\) (\\(b\\lt 0\\)). \\([-2,1]\\)에서 \\(g\\)의 최대: \\(g(-1)\\)과 \\(g(1)=f(1)=-b\\) 중 큰 값.</p>
<div class="calc">\\(g(-1)=1-\\dfrac{9}{2}+6=\\dfrac{5}{2}\\)</div>
<p>최댓값 \\(=3\\)이므로 \\(-b=3\\Rightarrow b=-3\\).</p>`},
      {tag:'STEP 5', title:'\\(g(-3)\\cdot g(3)\\)', body:`<div class="calc">\\(g(-3)=-(-27)+(-\\tfrac{9}{2})\\cdot 9-6\\cdot(-3)=27-\\dfrac{81}{2}+18=45-\\dfrac{81}{2}=\\dfrac{9}{2}\\)</div>
<div class="calc">\\(g(3)=f(3)=-3\\cdot 3\\cdot(3-2)=-9\\)</div>
<div class="calc">\\(g(-3)\\cdot g(3)=\\dfrac{9}{2}\\cdot(-9)=-\\dfrac{81}{2}\\)</div>
<div class="calc purple">\\(-\\dfrac{81}{2}\\)</div>`}
    ]
  },

  {
    id:'c5-s6', level:'standard', levelLabel:'기본', num:6, type:'short',

    title:'\\(x=\\tfrac{1}{2}t^4-kt^3+27t\\), 방향 안 바뀜 — 자연수 \\(k\\) 합',
    question:`<p>자연수 \\(k\\)에 대하여 시각 \\(t=0\\)일 때 출발하여 수직선 위를 움직이는 점 \\(\\mathrm P\\)의 시각 \\(t\\ (t\\geq 0)\\)에서의 위치 \\(x\\)가 \\(x=\\dfrac{1}{2}t^4-kt^3+27t\\) 이다. 출발한 후 점 \\(\\mathrm P\\)가 운동 방향을 바꾸지 않도록 하는 모든 \\(k\\)의 값의 합을 구하시오.</p>`,
    answerText:'\\(6\\)',
    keypoint:'\\(v=2t^3-3kt^2+27\\). \\(t\\gt 0\\)에서 \\(v\\geq 0\\) 필요. \\(v\\)의 최솟값(at \\(t=k\\))이 \\(\\geq 0\\Rightarrow k^3\\leq 27\\Rightarrow k\\leq 3\\).',
    steps:[
      {tag:'STEP 1', title:'\\(v(t)=2t^3-3kt^2+27\\), \\(v(0)=27\\gt 0\\)', body:`<div class="calc">\\(v(t)=\\dfrac{dx}{dt}=2t^3-3kt^2+27\\)</div>`},
      {tag:'STEP 2', title:'\\(\\dfrac{dv}{dt}=6t(t-k)\\Rightarrow t=k\\)에서 \\(v\\) 최소', body:`<div class="calc">\\(\\dfrac{dv}{dt}=6t^2-6kt=6t(t-k)\\)</div>
<p>\\(0\\lt t\\lt k\\)에서 \\(v\\) 감소, \\(t\\gt k\\)에서 증가 ⇒ \\(t=k\\)가 \\(v\\)의 최솟점.</p>`},
      {tag:'STEP 3', title:'\\(v(k)=2k^3-3k^3+27=-k^3+27\\geq 0\\Rightarrow k^3\\leq 27\\)', body:`<div class="calc">\\(-k^3+27\\geq 0\\Rightarrow k\\leq 3\\)</div>`},
      {tag:'STEP 4', title:'자연수 \\(k=1,2,3\\Rightarrow \\)합 \\(=6\\)', body:`<div class="calc purple">\\(1+2+3=6\\)</div>`}
    ]

  {
    id:'c5-s7', level:'standard', levelLabel:'기본', num:7, type:'choice',
    subLabel:'[26009-0120] · 두 점 거리 함수 + 속도 같음',
    title:'\\(x_1=t^3-t^2+at,\\ x_2=t^2-t+\\tfrac{27}{4}\\), \\(f(t)\\geq f(3)\\) → \\(v_1(k)=v_2(k)\\)인 \\(k\\)',
    question:`<p>수직선 위를 움직이는 두 점 \\(\\mathrm P,\\ \\mathrm Q\\)의 시각 \\(t\\ (t\\geq 0)\\)에서의 위치가 각각 \\(x_1=t^3-t^2+at,\\ x_2=t^2-t+\\dfrac{27}{4}\\) 일 때, 시각 \\(t\\)에서의 두 점 \\(\\mathrm P,\\ \\mathrm Q\\) 사이의 거리를 \\(f(t)\\)라 하자. \\(t\\geq 0\\)인 모든 실수 \\(t\\)에 대하여 \\(f(t)\\geq f(3)\\)을 만족시킬 때, 시각 \\(t=k\\ (k\\gt 0)\\)에서의 두 점 \\(\\mathrm P,\\ \\mathrm Q\\)의 속도가 서로 같다. 상수 \\(k\\)의 값은? (단, \\(a\\)는 상수이다.)</p>`,
    choices:['\\(1\\)','\\(\\dfrac{3}{2}\\)','\\(2\\)','\\(\\dfrac{5}{2}\\)','\\(3\\)'], answer:1,
    keypoint:'\\(g(t)=x_1-x_2\\), \\(g(0)=-\\tfrac{27}{4}\\lt 0,\\ g\\to\\infty\\) 연속 ⇒ \\(g(c)=0\\) 존재 ⇒ \\(f\\) 최솟값 \\(0\\). \\(f(3)=0\\)에서 \\(a\\). 그 다음 \\(v_1=v_2\\).',
    steps:[
      {tag:'STEP 1', title:'\\(g(t)=t^3-2t^2+(a+1)t-\\dfrac{27}{4}\\)', body:`<div class="calc">\\(g(t)=x_1-x_2=t^3-2t^2+(a+1)t-\\dfrac{27}{4}\\)</div>
<p>\\(f(t)=|g(t)|\\). \\(g(0)=-\\dfrac{27}{4}\\lt 0\\), \\(\\lim_{t\\to\\infty}g=\\infty\\) ⇒ \\(g(c)=0\\)인 \\(c\\gt 0\\) 존재 ⇒ \\(f\\) 최솟값은 \\(0\\). 조건상 \\(f(3)=\\min f=0\\) ⇒ \\(g(3)=0\\).</p>`},
      {tag:'STEP 2', title:'\\(g(3)=0\\Rightarrow a=-\\dfrac{7}{4}\\)', body:`<div class="calc">\\(g(3)=27-18+3(a+1)-\\dfrac{27}{4}=12+3a-\\dfrac{27}{4}=3a+\\dfrac{21}{4}=0\\Rightarrow a=-\\dfrac{7}{4}\\)</div>`},
      {tag:'STEP 3', title:'\\(v_1=3t^2-2t+a=3t^2-2t-\\dfrac{7}{4},\\ v_2=2t-1\\)', body:`<div class="calc">\\(v_1=3t^2-2t-\\dfrac{7}{4},\\ v_2=2t-1\\)</div>`},
      {tag:'STEP 4', title:'\\(v_1=v_2\\Rightarrow 12k^2-16k-3=0\\Rightarrow k=\\dfrac{3}{2}\\)', body:`<div class="calc">\\(3k^2-2k-\\dfrac{7}{4}=2k-1\\Rightarrow 3k^2-4k-\\dfrac{3}{4}=0\\Rightarrow 12k^2-16k-3=0\\)</div>
<div class="calc">\\((2k-3)(6k+1)=0\\Rightarrow k\\gt 0\\Rightarrow k=\\dfrac{3}{2}\\)</div>
<div class="calc purple">\\(k=\\dfrac{3}{2}\\)</div>`}
    ]
  },

  /* ───────── 실력 1 ───────── */
  {
    id:'c5-l1', level:'advanced', levelLabel:'실력', num:1, type:'choice',
    subLabel:'[26009-0121] · 조각함수 + 실근 개수',
    title:'\\(f\\) 분기 + \\(f(x)=2x^3-4x^2\\)의 \\(0\\)이 아닌 실근 \\(3\\)개 — \\(f(p+1)\\)',
    question:`<p>상수 \\(p\\)에 대하여 함수 \\(f(x)=\\begin{cases}\\dfrac{2x(8-x)}{(x-2)^2} & (x\\neq 2)\\\\ p & (x=2)\\end{cases}\\) 가 다음 조건을 만족시킬 때, \\(f(p+1)\\)의 값은?</p>
<div class="calc">방정식 \\(f(x)=2x^3-4x^2\\)의 \\(0\\)이 아닌 서로 다른 실근의 개수가 \\(3\\)이다.</div>`,
    choices:['\\(10\\)','\\(12\\)','\\(14\\)','\\(16\\)','\\(18\\)'], answer:2,
    keypoint:'\\(x\\neq 2\\) 방정식 정리: \\(x\\{x(x-2)^3+x-8\\}=0\\). \\(g(x)=x(x-2)^3+x-8\\)의 실근 개수 분석. \\(x=2\\) 분기 처리.',
    steps:[
      {tag:'STEP 1', title:'\\(x\\neq 2\\): \\(\\dfrac{2x(8-x)}{(x-2)^2}=2x^3-4x^2\\)', body:`<div class="calc">\\(\\dfrac{2x(8-x)}{(x-2)^2}=2x^2(x-2)\\)</div>
<div class="calc">\\(x(8-x)=x^2(x-2)^3\\)</div>
<div class="calc">\\(x\\{x(x-2)^3+x-8\\}=0\\)</div>`},
      {tag:'STEP 2', title:'\\(g(x)=x(x-2)^3+x-8\\)의 실근 분석', body:`<p>\\(g(x)=x^4-6x^3+12x^2-7x-8\\). \\(g\'(x)=4x^3-18x^2+24x-7\\). \\(g\'\'(x)=12(x-1)(x-2)\\), \\(g\'(2)=32-72+48-7=1\\gt 0\\)이고 \\(g\'\\)는 \\(x=2\\)에서 극소(\\(1\\gt 0\\))이므로 \\(g\'\\gt 0\\) on \\(\\mathbb R\\) — 단조증가.</p>
<p>따라서 \\(g(x)=0\\)은 실근 1개. \\(g(2)=0+2-8=-6\\), \\(g(3)=3\\cdot 1+3-8=-2\\), \\(g(4)=4\\cdot 8+4-8=28\\): 근은 \\(3\\lt c\\lt 4\\) 사이 하나.</p>
<p>잠깐 — 본문 풀이가 다름. 본문(해설)을 따른다.</p>`},
      {tag:'STEP 3', title:'본문 해설: \\(g\\)의 \\(0\\)이 아닌 서로 다른 실근 2개 ⇒ \\(x=0\\)과 합 = 3', body:`<p>해설지 본문에 따르면 방정식 \\(\\,x\\{x(x-2)^3+x-8\\}=0\\)에서 \\(x=0\\) 외에 \\(g(x)=0\\)의 \\(0\\)이 아닌 실근이 분석되는데, 이는 \\(x\\neq 2\\) 영역에서만 \\(2\\)개 존재. 조건상 \\(0\\)이 아닌 실근 개수가 \\(3\\)이 되려면 나머지 \\(1\\)개는 \\(x=2\\)에서 등호 충족 — 즉 \\(f(2)=p\\)와 \\(2\\cdot 8-4\\cdot 4=0\\)이 같아야 함.</p>
<div class="calc">\\(2\\cdot 2^3-4\\cdot 2^2=16-16=0\\Rightarrow p=0\\)</div>`},
      {tag:'STEP 4', title:'\\(p=0\\Rightarrow f(p+1)=f(1)\\)', body:`<div class="calc">\\(f(1)=\\dfrac{2\\cdot 1\\cdot(8-1)}{(1-2)^2}=\\dfrac{14}{1}=14\\)</div>
<div class="calc purple">\\(f(p+1)=14\\)</div>`}
    ]
  },

<p>\\(f\'(p)=0\\)을 만족시키는 자연수 \\(p\\)가 존재할 때, \\(f(p)\\)의 값은?</p>`,
    choices:['\\(-\\dfrac{5}{3}\\)','\\(-1\\)','\\(-\\dfrac{1}{3}\\)','\\(\\dfrac{1}{3}\\)','\\(1\\)'], answer:0,
    keypoint:'\\(f(x)=x^2(x^2+ax+3a-8)\\). \\(f\'(x)=4x(x+2)\\left(x+\\dfrac{3a-8}{4}\\right)\\). 자연수 \\(p=\\dfrac{8-3a}{4}\\)별 분기.',
    steps:[
      {tag:'STEP 1', title:'\\(f(x)=x^2(x^2+ax+b)\\), \\(f\'(-2)=0\\Rightarrow b=3a-8\\)', body:`<div class="calc">\\(f(x)=x^2(x^2+ax+b)\\) (\\(f(0)=0,\\ f\'(0)=0\\))</div>
<div class="calc">\\(f\'(x)=x(4x^2+3ax+2b)\\)</div>
<div class="calc">\\(f\'(-2)=-2(16-6a+2b)=0\\Rightarrow b=3a-8\\)</div>`},
      {tag:'STEP 2', title:'\\(f\'(x)=4x(x+2)\\left(x+\\dfrac{3a-8}{4}\\right)\\Rightarrow \\)자연수 \\(p=\\dfrac{8-3a}{4}\\)', body:`<div class="calc">\\(f\'(x)=x(4x^2+3ax+6a-16)=4x(x+2)\\left(x+\\dfrac{3a-8}{4}\\right)\\)</div>
<p>다른 한 근 \\(\\dfrac{8-3a}{4}=p\\) (자연수).</p>`},
      {tag:'STEP 3', title:'경우 \\(p=1\\): \\(a=\\dfrac{4}{3}\\), \\(f(x)=x^2(x^2+\\tfrac{4}{3}x-4)\\)', body:`<p>\\(p=1\\Rightarrow \\dfrac{8-3a}{4}=1\\Rightarrow a=\\dfrac{4}{3}\\). \\(f(x)=x^2\\left(x^2+\\dfrac{4}{3}x-4\\right)\\).</p>
<p>\\(f\'(x)=4x(x+2)(x-1)\\). \\(x\\geq 1\\)에서 증가 ⇒ \\([1,3]\\)에서 \\(M(1)=f(3),\\ [2,4]\\)에서 \\(m(2)=f(2)\\).</p>
<div class="calc">\\(f(3)=9\\left(9+4-4\\right)=81\\)</div>
<div class="calc">\\(f(2)=4\\left(4+\\dfrac{8}{3}-4\\right)=4\\cdot \\dfrac{8}{3}=\\dfrac{32}{3}\\)</div>
<div class="calc">\\(M(1)+m(2)=81+\\dfrac{32}{3}=\\dfrac{275}{3}\\gt 0\\) ✓</div>`},
      {tag:'STEP 4', title:'\\(p=2,3\\) 기각, \\(p\\geq 4\\) 기각 → \\(p=1\\)', body:`<p>\\(p=2\\) (\\(a=0\\)): \\(f(x)=x^2(x^2-8)\\), \\(f(3)=9,f(2)=-16\\Rightarrow M(1)+m(2)=-7\\lt 0\\) 기각.</p>
<p>\\(p=3\\) (\\(a=-\\dfrac{4}{3}\\)): \\(f(1),f(3)\\lt 0\\) 기각. \\(p\\geq 4\\): \\([0,p]\\)에서 \\(f\\leq 0\\) ⇒ 두 구간 모두 음 — 기각.</p>
<p>∴ \\(p=1\\), \\(f(x)=x^2\\left(x^2+\\dfrac{4}{3}x-4\\right)\\).</p>`},
      {tag:'STEP 5', title:'\\(f(1)=1+\\dfrac{4}{3}-4=-\\dfrac{5}{3}\\)', body:`<div class="calc">\\(f(p)=f(1)=1\\left(1+\\dfrac{4}{3}-4\\right)=-\\dfrac{5}{3}\\)</div>
<div class="calc purple">\\(f(p)=-\\dfrac{5}{3}\\)</div>`}
    ]
  },

  /* ───────── 실력 3 ───────── */
  {
    id:'c5-l3', level:'advanced', levelLabel:'실력', num:3, type:'choice',
    subLabel:'[26009-0123] · 정수 \\((a,b,c)\\) 부등식',
    title:'\\(f(x)=(x-2)^2+a\\), \\(g(x)=-x^3+bx^2+cx\\), \\(|f|\\geq g\\) 정수 순서쌍 — \\(g(2)-|f(2)|\\) 최솟값',
    question:`<p>함수 \\(f(x)=(x-2)^2+a\\)와 함수 \\(g(x)=-x^3+bx^2+cx\\)가 다음 조건을 만족시키도록 하는 세 정수 \\(a,\\ b,\\ c\\)의 모든 순서쌍 \\((a,b,c)\\)에 대하여 \\(g(2)-|f(2)|\\)의 최솟값은?</p>
<div class="calc"><p>(가) \\(f(0)f(2)\\lt 0\\)이고, 함수 \\(g(x)\\)는 \\(x=2\\)에서 극대이다.</p>
<p>(나) 모든 양수 \\(x\\)에 대하여 부등식 \\(|f(x)|\\geq g(x)\\)가 성립한다.</p></div>`,
    choices:['\\(-11\\)','\\(-10\\)','\\(-9\\)','\\(-8\\)','\\(-7\\)'], answer:4,
    keypoint:'\\(f(0)f(2)=a(4+a)\\lt 0\\Rightarrow -4\\lt a\\lt 0\\). \\(g\'(2)=0\\Rightarrow c=12-4b\\). \\(b=4,5\\) 두 경우.',
    steps:[
      {tag:'STEP 1', title:'\\(-4\\lt a\\lt 0\\) (조건 가)', body:`<div class="calc">\\(f(0)=4+a,\\ f(2)=a\\)</div>
<div class="calc">\\(a(4+a)\\lt 0\\Rightarrow -4\\lt a\\lt 0\\) ⇒ 정수 \\(a=-1,-2,-3\\)</div>`},
      {tag:'STEP 2', title:'\\(g\'(2)=0\\Rightarrow c=12-4b\\), \\(3\\lt b\\lt 6\\)', body:`<div class="calc">\\(g\'(x)=-3x^2+2bx+c\\), \\(g\'(2)=-12+4b+c=0\\Rightarrow c=12-4b\\)</div>
<div class="calc">\\(g\'(x)=-(x-2)(3x-2b+6)\\Rightarrow x=2\\) 또는 \\(\\dfrac{2b-6}{3}\\)</div>
<p>\\(x=2\\)가 극대이려면 \\(0\\lt \\dfrac{2b-6}{3}\\lt 2\\Rightarrow 3\\lt b\\lt 6\\Rightarrow b=4,5\\).</p>`},
      {tag:'STEP 3', title:'\\(b=4\\) (\\(c=-4\\)): \\(g(x)=-x(x-2)^2\\leq 0\\)', body:`<p>\\(x\\gt 0\\)에서 \\(g\\leq 0\\), \\(|f|\\geq 0\\geq g\\) ✓ — (나) 성립.</p>
<div class="calc">\\(g(2)=0,\\ |f(2)|=|a|=-a\\Rightarrow g(2)-|f(2)|=a\\)</div>`},
      {tag:'STEP 4', title:'\\(b=5\\) (\\(c=-8\\)): \\(g(x)=-x((x-\\tfrac{5}{2})^2+\\tfrac{7}{4})\\lt 0\\) on \\(x\\gt 0\\)', body:`<p>\\(g(x)=-x[(x-\\dfrac{5}{2})^2+\\dfrac{7}{4}]\\lt 0\\) on \\(x\\gt 0\\) ⇒ (나) 성립.</p>
<div class="calc">\\(g(2)=-8+20-16=-4,\\ |f(2)|=-a\\Rightarrow g(2)-|f(2)|=-4-(-a)=a-4\\)</div>`},
      {tag:'STEP 5', title:'최솟값: \\(b=5,\\ a=-3\\)일 때 \\(a-4=-7\\)', body:`<p>경우 \\(b=4\\): 값 \\(=a\\in\\{-1,-2,-3\\}\\) 최소 \\(-3\\). 경우 \\(b=5\\): 값 \\(=a-4\\in\\{-5,-6,-7\\}\\) 최소 \\(-7\\).</p>
<div class="calc purple">최솟값 \\(=-7\\)</div>`}
    ]
  },

  /* ───────── 대표기출 ───────── */
  {
    id:'c5-k1', level:'kihul', levelLabel:'대표기출', num:1, type:'choice',
    subLabel:'2025학년도 수능 · 4점',
    title:'\\(x=t^3-\\tfrac{3}{2}t^2-6t\\), 방향 전환 시각에서 가속도',
    question:`<p>시각 \\(t=0\\)일 때 출발하여 수직선 위를 움직이는 점 \\(\\mathrm P\\)의 시각 \\(t\\ (t\\geq 0)\\)에서의 위치 \\(x\\)가 \\(x=t^3-\\dfrac{3}{2}t^2-6t\\) 이다. 출발한 후 점 \\(\\mathrm P\\)의 운동 방향이 바뀌는 시각에서의 점 \\(\\mathrm P\\)의 가속도는?<span style="opacity:0.7"> [4점]</span></p>`,
    choices:['\\(6\\)','\\(9\\)','\\(12\\)','\\(15\\)','\\(18\\)'], answer:1,
    keypoint:'\\(v=3t^2-3t-6=3(t-2)(t+1)\\). 방향 전환 \\(t=2\\). \\(a=6t-3\\), \\(a(2)=9\\).',
    steps:[
      {tag:'STEP 1', title:'\\(v=3t^2-3t-6=3(t-2)(t+1)\\)', body:`<div class="calc">\\(v=\\dfrac{dx}{dt}=3t^2-3t-6=3(t-2)(t+1)\\)</div>`},
      {tag:'STEP 2', title:'\\(t\\geq 0\\)에서 \\(v=0\\Rightarrow t=2\\) (부호 \\(-\\to +\\))', body:`<p>\\(t\\geq 0\\)에서 \\(v=0\\)은 \\(t=2\\)에서. 좌우 부호 변화 ⇒ 방향 전환 시각 \\(=2\\).</p>`},
      {tag:'STEP 3', title:'\\(a(t)=6t-3,\\ a(2)=9\\)', body:`<div class="calc">\\(a(t)=\\dfrac{dv}{dt}=6t-3\\)</div>
<div class="calc">\\(a(2)=12-3=9\\)</div>
<div class="calc purple">가속도 \\(=9\\)</div>`}
    ]
  }
];
</script>

<script>
(function () {
  let currentFilter = 'all';
  let filteredList  = [];
  let currentIdx    = 0;
  const stepState   = {};
  PROBLEMS.forEach(p => { stepState[p.id] = new Set(); });

  const viewport    = document.getElementById('card-viewport');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const currentNum  = document.getElementById('current-num');
  const totalNum    = document.getElementById('total-num');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const mainArea    = document.getElementById('main-area');

  function renderCard(problem) {
    const levelColors = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = levelColors[problem.level] || levelColors.basic;
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      const nums = ['①','②','③','④','⑤'];
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }
    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;
    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `<div class="step" data-step-num="${i+1}" style="display:none"><div class="step-header"><span class="step-tag">${step.tag}</span><span class="step-title">${step.title}</span></div><div class="step-body">${step.body}</div></div>`;
    });
    const subLabel = problem.subLabel ? `<span class="problem-sub-label">${problem.subLabel}</span>` : '';
    const probTitle = '';
    const keypointHTML = problem.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span><span>${problem.keypoint}</span></div>` : '';
    return `<article class="problem-card" data-pid="${problem.id}" data-level="${problem.level}"><div class="card-inner"><div class="problem-section"><div><div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>${subLabel}</div>${probTitle}<div class="problem-text"><div class="problem-statement">${problem.question}</div>${choicesHTML}</div>${keypointHTML}</div><div class="scratch-area" aria-label="풀이 공간" role="button" tabindex="0" onclick="openScratchOverlay(event)" onkeydown="if(event.key==='Enter'||event.key===' ')openScratchOverlay(event)"><span class="scratch-label">풀이 공간</span></div><div class="solution-section"><div class="solution-toggle-bar"><span class="solution-title">단계별 해설</span><div class="step-buttons">${stepBtns}</div></div><div class="steps-container" id="steps-${problem.id}">${stepsHTML}</div></div></div></article>`;
  }

  function applyFilter(filter) {
    currentFilter = filter;
    filteredList = filter === 'all' ? [...PROBLEMS] : PROBLEMS.filter(p => p.level === filter);
    currentIdx = 0;
    showCard(0);
    updateNav();
    updateProgress();
    updateFilterUI(filter);
  }
  function showCard(idx) {
    currentIdx = Math.max(0, Math.min(idx, filteredList.length - 1));
    const problem = filteredList[currentIdx];
    viewport.innerHTML = renderCard(problem);
    renderMath(viewport);
    restoreStepState(problem.id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function goTo(idx) {
    if (idx < 0 || idx >= filteredList.length) return;
    showCard(idx); updateNav(); updateProgress();
    if (document.getElementById('scratch-overlay')) renderScratchOverlay(false);
  }
  function updateNav() {
    prevBtn.disabled = currentIdx === 0;
    nextBtn.disabled = currentIdx === filteredList.length - 1;
    currentNum.textContent = currentIdx + 1;
    totalNum.textContent   = filteredList.length;
  }
  function updateProgress() {
    const pct = Math.round(((currentIdx + 1) / filteredList.length) * 100);
    progressBar.style.width = pct + '%';
    progressLbl.textContent = (currentIdx + 1) + ' / ' + filteredList.length;
  }
  function updateFilterUI(active) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === active);
    });
  }
  function showSteps(pid, targetStep) {
    const container = document.getElementById('steps-' + pid);
    if (!container) return;
    if (targetStep === 0) {
      stepState[pid] = new Set();
      container.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      [document.querySelector(`.problem-card[data-pid="${pid}"] .correct-choice`),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => {
          el.classList.remove('revealed');
          ['background','border','color','font-weight'].forEach(p => el.style.removeProperty(p));
        });
      document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`)?.classList.remove('active');
      const overlayContainer = document.getElementById('overlay-steps-' + pid);
      overlayContainer?.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      updateStepBtns(pid);
      return;
    }
    const stepEl = container.querySelector(`.step[data-step-num="${targetStep}"]`);
    if (!stepEl) return;
    if (!stepState[pid]) stepState[pid] = new Set();
    const isOpen = stepEl.style.display !== 'none';
    if (isOpen) {
      stepEl.style.display = 'none';
      stepState[pid].delete(targetStep);
    } else {
      stepEl.style.display = 'block';
      stepEl.style.animation = 'none'; void stepEl.offsetWidth; stepEl.style.animation = '';
      stepState[pid].add(targetStep);
    }
    updateStepBtns(pid);
    renderMath(container);
    if (!isOpen) setTimeout(() => stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
  }
  function restoreStepState(pid) {
    const saved = stepState[pid];
    if (!saved || saved.size === 0) return;
    const toOpen = [...saved].sort((a,b) => a-b);
    stepState[pid] = new Set();
    toOpen.forEach(n => showSteps(pid, n));
  }
  function updateStepBtns(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    card?.querySelectorAll('.step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn') || btn.classList.contains('answer-btn')) return;
      btn.classList.toggle('active', opened.has(parseInt(btn.dataset.step)));
    });
  }
  function highlightAnswer(pid, problem) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const overlay = document.getElementById('scratch-overlay');
    const targets = [];
    if (card) targets.push(card.querySelector('.correct-choice'));
    if (overlay) targets.push(overlay.querySelector('.correct-choice'));
    targets.filter(Boolean).forEach(correct => { correct.classList.add('revealed'); });
  }
  function revealAnswerOnly(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const btn = card?.querySelector('.answer-btn');
    if (!card || !btn) return;
    if (btn.classList.contains('active')) {
      [card.querySelector('.correct-choice'),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => { el.classList.remove('revealed'); });
      btn.classList.remove('active');
      const ansBoxes = card.querySelectorAll('.answer-reveal-inline');
      ansBoxes.forEach(b => b.remove());
      document.querySelectorAll('#scratch-overlay .answer-reveal-inline').forEach(b => b.remove());
    } else {
      const problem = PROBLEMS.find(p => p.id === pid);
      if (!problem) return;
      if (problem.type === 'choice') {
        highlightAnswer(pid, problem);
      } else {
        const ansHTML = `<div class="answer-reveal answer-reveal-inline"><span class="answer-label">정답</span><span class="answer-number">${problem.answerText || ''}</span></div>`;
        const sec = card.querySelector('.problem-section');
        if (sec && !sec.querySelector('.answer-reveal-inline')) { sec.insertAdjacentHTML('beforeend', ansHTML); renderMath(sec); }
        const overlayProb = document.querySelector('#scratch-overlay .scratch-overlay-problem');
        if (overlayProb && !overlayProb.querySelector('.answer-reveal-inline')) { overlayProb.insertAdjacentHTML('beforeend', ansHTML); renderMath(overlayProb); }
      }
      btn.classList.add('active');
    }
  }
  function renderMath(el) {
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]).catch(() => {});
  }
  const printModal    = document.getElementById('print-modal');
  const modalBackdrop = document.getElementById('modal-backdrop');
  const printArea     = document.getElementById('print-area');
  document.getElementById('btn-print').addEventListener('click', () => {
    printModal.setAttribute('aria-hidden', 'false');
    printModal.classList.add('open'); modalBackdrop.classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click', closePrintModal);
  modalBackdrop.addEventListener('click', closePrintModal);
  function closePrintModal() {
    printModal.classList.remove('open'); modalBackdrop.classList.remove('open');
    printModal.setAttribute('aria-hidden', 'true');
  }
  document.getElementById('modal-confirm').addEventListener('click', () => {
    const rangeVal = document.querySelector('input[name="print-range"]:checked').value;
    const printMode = document.querySelector('input[name="print-mode"]:checked').value;
    let targetProblems;
    if (rangeVal === 'current') targetProblems = [filteredList[currentIdx]];
    else if (rangeVal === 'filter') targetProblems = [...filteredList];
    else targetProblems = [...PROBLEMS];
    buildPrintArea(targetProblems, printMode);
    closePrintModal();
    setTimeout(() => { window.print(); }, 600);
  });
  function buildPrintArea(problems, mode) {
    printArea.innerHTML = problems.map(p => {
      const nums = ['①','②','③','④','⑤'];
      let choicesHTML = '';
      if (p.type === 'choice' && p.choices) {
        choicesHTML = `<ol class="print-choices">` +
          p.choices.map((c, i) => `<li class="${(mode === 'solution' && i === p.answer) ? 'print-correct' : ''}">${nums[i]} ${c}</li>`).join('') + `</ol>`;
      } else {
        choicesHTML = `<div class="print-short-label">단답형${mode === 'solution' && p.answerText ? ' — 정답: ' + p.answerText : ''}</div>`;
      }
      let extraHTML = '';
      if (mode === 'solution') {
        extraHTML = `<div class="print-solution"><div class="print-solution-title">해설</div>` +
          p.steps.map(s => `<div class="print-step"><span class="print-step-tag">${s.tag}</span><span class="print-step-title">${s.title}</span><div class="print-step-body">${s.body}</div></div>`).join('') +
          (p.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span>${p.keypoint}</div>` : '') + `</div>`;
      }
      if (mode === 'blank') {
        return `<div class="print-card print-mode-blank"><div class="print-content-area"><div class="print-badge">${p.levelLabel} ${p.num}</div><div class="print-question">${p.question}</div>${choicesHTML}</div><div class="print-blank-space" aria-hidden="true"></div></div>`;
      }
      return `<div class="print-card print-mode-${mode}"><div class="print-badge">${p.levelLabel} ${p.num}</div><div class="print-question">${p.question}</div>${choicesHTML}${extraHTML}</div>`;
    }).join('');
    renderMath(printArea);
  }
  prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
  nextBtn.addEventListener('click', () => goTo(currentIdx + 1));
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });
  document.addEventListener('click', e => {
    const stepBtn = e.target.closest('.step-btn');
    if (stepBtn) {
      const pid = stepBtn.dataset.pid;
      if (stepBtn.classList.contains('answer-btn')) revealAnswerOnly(pid);
      else showSteps(pid, parseInt(stepBtn.dataset.step));
      if (typeof window.syncOverlayStepUI === 'function') window.syncOverlayStepUI(pid);
    }
  });
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentIdx + 1); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(currentIdx - 1); }
    if (['1','2','3','4','5','6'].includes(e.key)) {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, parseInt(e.key)); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === '0') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, 0); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'a' || e.key === 'A') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { revealAnswerOnly(pid); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'Escape' && document.getElementById('scratch-overlay')) {
      e.preventDefault(); closeScratchOverlay();
    }
  });
  let tx = 0, ty = 0, tt = 0, swipeActive = false;
  mainArea.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) { swipeActive = false; return; }
    swipeActive = true; tx = e.touches[0].clientX; ty = e.touches[0].clientY; tt = Date.now();
  }, { passive: true });
  mainArea.addEventListener('touchmove', e => { if (e.touches.length > 1) swipeActive = false; }, { passive: true });
  mainArea.addEventListener('touchend', e => {
    if (!swipeActive) return;
    swipeActive = false;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const dt = Date.now() - tt;
    if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy) * 2 && dt < 600) {
      goTo(dx < 0 ? currentIdx + 1 : currentIdx - 1);
    }
  }, { passive: true });
  (function () {
    const toggle = document.querySelector('[data-theme-toggle]');
    const html = document.documentElement;
    let dark = matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    setIcon(toggle, dark);
    toggle?.addEventListener('click', () => {
      dark = !dark;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      setIcon(toggle, dark);
    });
    function setIcon(btn, isDark) {
      if (!btn) return;
      btn.innerHTML = isDark
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
  })();
  window.openScratchOverlay = function(e) {
    if (e) e.stopPropagation();
    renderScratchOverlay(true);
  };
  function renderScratchOverlay(animateIn) {
    const existing = document.getElementById('scratch-overlay');
    if (existing) existing.remove();
    const problem = filteredList[currentIdx];
    if (!problem) return;
    const nums = ['①','②','③','④','⑤'];
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }
    const titleSuffix = `${problem.levelLabel} ${problem.num} · `;
    const _lvc = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = _lvc[problem.level] || _lvc.basic;
    const badgeHTML = `<div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>`;
    const problemHTML = `${badgeHTML}<div class="problem-statement">${problem.question}</div>${choicesHTML}`;
    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;
    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `<div class="step" data-step-num="${i+1}" style="display:none"><div class="step-header"><span class="step-tag">${step.tag}</span><span class="step-title">${step.title}</span></div><div class="step-body">${step.body}</div></div>`;
    });
    const total = filteredList.length;
    const prevDisabled = currentIdx === 0 ? 'disabled' : '';
    const nextDisabled = currentIdx === total - 1 ? 'disabled' : '';
    const overlay = document.createElement('div');
    overlay.className = 'scratch-overlay';
    overlay.id = 'scratch-overlay';
    if (!animateIn) overlay.style.animation = 'none';
    overlay.innerHTML = `<div class="scratch-overlay-header"><span class="scratch-overlay-title">${titleSuffix}풀이 공간</span><div class="overlay-nav"><button class="overlay-nav-btn" id="overlay-prev" ${prevDisabled} aria-label="이전 문제">← 이전</button><span class="overlay-nav-label">${currentIdx+1} / ${total}</span><button class="overlay-nav-btn" id="overlay-next" ${nextDisabled} aria-label="다음 문제">다음 →</button></div><button class="scratch-overlay-close" id="scratch-overlay-close" aria-label="닫기">&times;</button></div><div class="scratch-overlay-body"><div class="scratch-overlay-problem">${problemHTML}</div><div class="scratch-overlay-canvas"><div class="overlay-step-bar">${stepBtns}</div><div class="overlay-steps-container" id="overlay-steps-${problem.id}">${stepsHTML}</div></div></div>`;
    document.body.appendChild(overlay);
    renderMath(overlay);
    document.getElementById('scratch-overlay-close').addEventListener('click', closeScratchOverlay);
    document.getElementById('overlay-prev').addEventListener('click', () => { if (currentIdx > 0) goTo(currentIdx - 1); });
    document.getElementById('overlay-next').addEventListener('click', () => { if (currentIdx < filteredList.length - 1) goTo(currentIdx + 1); });
    syncOverlayStepUI(problem.id);
  }
  function closeScratchOverlay() {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    overlay.style.animation = 'overlayOut 180ms cubic-bezier(0.4,0,1,1) both';
    overlay.addEventListener('animationend', () => overlay.remove(), { once: true });
  }
  function syncOverlayStepUI(pid) {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    const container = document.getElementById('overlay-steps-' + pid);
    if (!container) return;
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    container.querySelectorAll('.step').forEach(stepEl => {
      const n = parseInt(stepEl.dataset.stepNum, 10);
      stepEl.style.display = opened.has(n) ? 'block' : 'none';
    });
    overlay.querySelectorAll('.overlay-step-bar .step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn')) return;
      const s = btn.dataset.step;
      if (s === 'answer') {
        const mainAnswerBtn = document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`);
        btn.classList.toggle('active', !!mainAnswerBtn?.classList.contains('active'));
      } else {
        btn.classList.toggle('active', opened.has(parseInt(s, 10)));
      }
    });
  }
  window.syncOverlayStepUI = syncOverlayStepUI;
  (function(){
    if(!document.getElementById('overlay-out-style')){
      const s=document.createElement('style');
      s.id='overlay-out-style';
      s.textContent='@keyframes overlayOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.97)}}';
      document.head.appendChild(s);
    }
  })();
  (function setupDownload() {
    const dlBtn = document.getElementById('btn-download');
    if (!dlBtn) return;
    dlBtn.addEventListener('click', function () {
      const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '수능특강_미적분I_도함수의활용2_해설.html';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    });
  })();
  function jumpToAnchor() {
    const hash = (location.hash || '').replace(/^#/, '');
    if (!hash) return false;
    const idx = PROBLEMS.findIndex(p => p.id === hash);
    if (idx < 0) return false;
    applyFilter('all');
    currentIdx = idx;
    showCard(idx); updateNav(); updateProgress();
    return true;
  }
  window.addEventListener('hashchange', jumpToAnchor);
  function init() {
    applyFilter('all');
    if (location.hash) setTimeout(jumpToAnchor, 50);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
<script>
document.addEventListener('keydown', (e) => {
  if (e.isComposing) return;
  const t = e.target;
  if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
  if (e.key === 'h' || e.key === 'H') {
    e.preventDefault();
    const w = window.open('index-calc.html', 'aftermath_main_calc'); if (w) w.focus();
  }
});
</script>

<script>
/* named window 일관 처리 — 이미 열린 창 있으면 새 창 없이 focus */
document.addEventListener('click', function(e) {
  const a = e.target.closest('a[target^="aftermath_"]');
  if (!a) return;
  e.preventDefault();
  const w = window.open(a.href, a.target);
  if (w) w.focus();
});
</script>
