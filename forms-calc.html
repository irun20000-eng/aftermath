    const EXAMPLES = {"01": [{"type": "유형 1: 지식의 내면화 (나만의 수학적 통찰)", "text": "\"처음엔 \\(\\lim\\)이랑 함숫값이 같은 줄 알았는데, \\(f(x) = \\dfrac{x^2-1}{x-1}\\) 문제에서 \\(x=1\\)을 대입하면 \\(\\dfrac{0}{0}\\)이 나오지만 인수분해하면 답이 \\(2\\)라는 걸 보고, 극한은 '가까이 갈 때'이고 함숫값은 '도달한 값'이라는 차이를 처음 명확히 알게 됐다.\""}, {"type": "유형 2: 문제해결력 (결정적 실수와 극복)", "text": "\"\\(\\dfrac{|x|}{x}\\) 문제에서 \\(x \\to 0\\)이라는 말만 보고 그냥 \\(\\dfrac{0}{0}\\)이라고 적었다가 틀렸다. 알고 보니 좌·우극한을 따로 봐야 하는 거였고, \\(x &lt; 0\\)이면 \\(|x| = -x\\)로 분리해야 한다는 걸 알게 됐다. 다음부터 절댓값이 나오면 부호를 먼저 분기하는 습관을 들였다.\""}, {"type": "유형 3: 발전 가능성 (호기심과 확장)", "text": "\"가우스 함수 \\([x]\\)에서 정수점마다 좌·우극한이 다른 걸 보고, '모든 계단함수는 정수점에서 극한이 없겠다'고 일반화해봤다. 다음에 비슷한 문제가 나오면 정수점부터 의심해야겠다 싶었다.\""}], "02": [{"type": "유형 1: 지식의 내면화 (나만의 수학적 통찰)", "text": "\"처음엔 \\(\\lim \\dfrac{f}{g} = \\dfrac{\\lim f}{\\lim g}\\)를 무조건 쓰다가 분모가 \\(0\\)이면 못 쓴다는 걸 알게 됐다. 그래서 \\(\\lim_{x \\to 1} \\dfrac{x^2 - 1}{x - 1}\\) 같은 \\(\\dfrac{0}{0}\\) 모양은 먼저 인수분해해서 \\(x - 1\\)을 약분하고 나서야 사칙연산 성질을 쓸 수 있다는 순서를 처음으로 분명히 알았다.\""}, {"type": "유형 2: 문제해결력 (결정적 실수와 극복)", "text": "\"\\(\\lim_{x \\to 1} \\dfrac{x^2 + ax + b}{x - 1} = 3\\)에서 그냥 \\(x = 1\\)을 대입해 \\(a + b\\)를 구하려다가 막혔다. 그러다 '분모가 \\(0\\)으로 가는데 극한이 유한하다면 분자도 \\(0\\)으로 가야 한다'는 걸 깨닫고 \\(1 + a + b = 0\\)부터 잡으니 풀렸다. 이 한 줄이 모든 미정계수 문제의 첫 단추라는 걸 알게 됐다.\""}, {"type": "유형 3: 발전 가능성 (호기심과 확장)", "text": "\"샌드위치 정리에서 위·아래를 누르면 사이에 낀 함수도 같이 그 값으로 간다는 게 신기했다. 그래서 진동하는 \\(\\sin\\) 함수도 \\(-1 \\le \\sin x \\le 1\\)로 누르면 \\(\\dfrac{\\sin x}{x}\\) 같은 식도 처리할 수 있겠다 싶었다. 다음 차시의 \\(\\dfrac{\\infty}{\\infty}\\) 부정형에서도 결국 차수 비교로 위·아래를 누르는 같은 발상이 통할 것 같다.\""}], "03": [{"type": "유형 1: 지식의 내면화 (나만의 수학적 통찰)", "text": "\"처음엔 \\(\\dfrac{\\infty}{\\infty}\\)나 \\(\\infty - \\infty\\)가 '극한이 없다'는 뜻인 줄 알았는데, \\(\\dfrac{x^2 + 1}{2x^2 - 3}\\) 같은 식도 분모 최고차로 나누면 \\(\\dfrac{1}{2}\\)가 나오는 걸 보고 부정형은 '값이 없는 게 아니라 직접 대입으로 못 본다'는 뜻임을 알게 됐다. \\(\\infty - \\infty\\)는 유리화, \\(\\dfrac{\\infty}{\\infty}\\)는 최고차 분할, \\(0 \\cdot \\infty\\)는 분수 변환으로 정리해두니 머릿속이 깔끔해졌다.\""}, {"type": "유형 2: 문제해결력 (결정적 실수와 극복)", "text": "\"\\(\\lim_{x \\to -\\infty} \\dfrac{\\sqrt{x^2 + 1}}{x}\\)에서 \\(\\sqrt{x^2} = x\\)로 무심코 적었다가 답이 \\(1\\)이 나와 틀렸다. 알고 보니 \\(x &lt; 0\\)이면 \\(\\sqrt{x^2} = -x\\)라서 답은 \\(-1\\)이었다. 그 뒤로는 \\(x \\to -\\infty\\)가 보이면 식을 만지기 전에 먼저 부호를 결정하는 습관을 들였다.\""}, {"type": "유형 3: 발전 가능성 (호기심과 확장)", "text": "\"점 \\(P\\)를 매개변수 \\(t\\)로 잡고 거리의 곱이 어떤 값으로 수렴하는지 따져보다가, 극한이 단순 숫자 계산이 아니라 도형이 '어디로 가는지'를 보는 도구라는 느낌이 들었다. 다음 단원에서 \\(\\lim f(x) = f(a)\\)라는 연속의 정의를 배운다는데, 그게 결국 '함수의 도착 위치 = 정의된 값'이라는 같은 발상일 것 같아 기대된다.\""}], "04": [{"type": "유형 1: 단원 종합 통찰", "text": "\"3차시 동안 인수분해·유리화·미정계수까지 별개 기술인 줄 알았는데, 정리해보니 다 '분모 \\(\\to 0\\)인데 극한이 유한하면 분자도 \\(\\to 0\\)'이라는 한 줄에서 출발한다는 걸 알게 됐다. 이 명제 하나가 \\(\\dfrac{x^2 + ax + b}{x - 1} \\to 3\\) 같은 미정계수 문제부터 \\(\\sqrt{x + 1} - 1 \\over x\\) 유리화까지 같은 사고로 묶이는 게 신기했다.\""}, {"type": "유형 2: 가장 자주 틀린 유형의 분석", "text": "\"단원 내내 가장 많이 틀린 건 \\(x \\to -\\infty\\)에서 \\(\\sqrt{x^2}\\)를 \\(x\\)로 적은 거였다. 답을 부호만 반대로 적어 점수가 깎인 게 세 문제나 됐다. 이제는 풀기 전에 '① 극한 방향 확인 → ② 절댓값·근호 부호 처리 → ③ 식 변형 → ④ 대입' 순서를 종이 위에 미리 적어두고 시작한다.\""}, {"type": "유형 3: 다음 단원으로의 확장", "text": "\"극한값과 함숫값이 다를 수 있다는 걸 배우고 나니, 다음 단원의 연속이 \\(\\lim_{x \\to a} f(x) = f(a)\\)로 정의된다는 게 자연스럽게 이해됐다. 또 미분계수 \\(\\lim_{h \\to 0} \\dfrac{f(a+h) - f(a)}{h}\\)도 결국 분자·분모가 동시에 \\(0\\)으로 가는 \\(\\dfrac{0}{0}\\) 부정형이라, 이번 단원에서 배운 인수분해·약분 기술이 그대로 쓰일 것 같다.\""}], "05": [{"type": "유형 1: 지식의 내면화 (나만의 수학적 통찰)", "text": "\"연속이 한 줄 \\(\\lim_{x \\to a} f(x) = f(a)\\)이지만 사실 ① \\(f(a)\\) 정의, ② 극한 존재, ③ 두 값 일치 세 조건을 한꺼번에 요구한다는 걸 알게 됐다. \\(g(x) = \\dfrac{x^2 - 1}{x - 1}\\) (단, \\(g(1) = 5\\))처럼 ①, ②는 통과해도 ③이 깨지면 불연속이라는 반례를 직접 만들어보고 나서야 세 조건이 모두 필요한 이유가 납득됐다.\""}, {"type": "유형 2: 문제해결력 (결정적 실수와 극복)", "text": "\"\\(\\lim_{x \\to 2} \\dfrac{2x + a}{x - 2} = b\\) 문제에서 \\(a, b\\)를 한꺼번에 풀려고 식 두 개를 세웠다가 답이 안 나왔다. 분모가 \\(0\\)으로 가는데 극한이 실수면 분자도 \\(0\\)이어야 한다는 걸 떠올리고 \\(a = -4\\)를 먼저 확정한 뒤 \\(b\\)를 구하니 깔끔했다. '분자 \\(\\to 0\\) → \\(a\\) 결정 → \\(b\\) 계산' 순서를 노트에 적어뒀다.\""}, {"type": "유형 3: 발전 가능성 (호기심과 확장)", "text": "\"다항함수랑 유리함수가 정의역에서 연속이라는 걸 배우다 보니 '그럼 \\(f(g(x))\\)처럼 두 연속함수를 합성하면 그것도 연속일까?' 하는 궁금증이 생겼다. 그래프 위에서 끊김 없이 따라가는 걸 두 번 이어붙이는 셈이라 직관적으로는 연속일 것 같은데, 다음 차시 사잇값 정리에서 어떤 식으로 활용될지 미리 기대된다.\""}], "06": [{"type": "유형 1: 지식의 내면화 (정리의 가정 분석)", "text": "\"처음엔 '닫힌구간 + 연속'이라는 가정을 그냥 외웠는데, 직접 반례를 만들어보니 이유가 분명해졌다. \\(f(x) = x^2\\)를 열린구간 \\((-1, 2)\\)에서 보면 \\(x \\to 2\\)인데 \\(2\\)를 안 포함해서 최댓값이 없고, \\(f(x) = \\dfrac{1}{x}\\)를 \\((0, 1]\\)에서 보면 \\(0\\) 근처에서 발산해 최댓값이 없다. '닫힘'은 끝점을 잡아주고 '연속'은 발산을 막는 역할이라는 걸 알게 됐다.\""}, {"type": "유형 2: 문제해결력 (실근 존재 증명 루틴)", "text": "\"'\\(f(x) = g(x)\\)의 실근이 존재함을 보여라' 같은 서술형에서 처음에는 무얼 먼저 적어야 할지 헤맸다. 그래서 '① \\(h(x) = f(x) - g(x)\\)로 옮기기 → ② \\(h\\)가 \\([a, b]\\)에서 연속이라고 명시 → ③ \\(h(a) \\cdot h(b) &lt; 0\\) 보이기 → ④ 사잇값 정리로 마무리' 4단계 틀을 만들어뒀다. 이제는 그 틀에 숫자만 채우면 돼서 답안이 깔끔해졌다.\""}, {"type": "유형 3: 발전 가능성 (정리의 일반화)", "text": "\"같은 산을 첫째 날엔 오전 10시에 올라가고 둘째 날엔 같은 시간에 반대로 내려오는 두 사람을 가정하면, 두 사람의 위치 함수가 같아지는 시각이 반드시 존재한다는 고전 문제를 떠올렸다. 두 위치 함수의 차 \\(h(t)\\)가 양 끝에서 부호가 반대니 \\(h(c) = 0\\)인 \\(c\\)가 있다는 식으로 풀면 사잇값 정리가 일상 상황에도 그대로 쓰인다는 게 재밌었다.\""}], "07": [{"type": "유형 1: 단원 종합 통찰", "text": "\"단원을 마무리하면서 \\(\\lim_{x \\to a} f(x) = f(a)\\) 한 줄이 결국 사칙·합성·사잇값·최대최소 정리 모두의 출발점이라는 걸 알게 됐다. 흐름도를 그려보니 정리들이 다 이 정의 한 줄에서 가지처럼 뻗어 나오고, 정리들의 '연속 가정'이 사실 이 정의를 끌어다 쓰는 거였다.\""}, {"type": "유형 2: 가장 자주 틀린 유형의 분석", "text": "\"구간별로 정의된 \\(f \\cdot g\\)에서 경계점의 좌극한·우극한 식을 어느 구간 식으로 잡아야 할지 자주 헷갈렸다. 그래서 풀기 전에 '경계점 표시 → 좌극한은 어느 식 → 우극한은 어느 식 → 일치 조건'을 표로 그려놓는 습관을 들였다. 그 다음부터는 곱·합 어떤 형태가 와도 똑같이 적용돼서 실수가 줄었다.\""}, {"type": "유형 3: 다음 단원으로의 확장", "text": "\"다음 단원이 미분이라는데, 미분계수 \\(\\lim_{h \\to 0} \\dfrac{f(a+h) - f(a)}{h}\\)를 보니 결국 \\(h \\to 0\\)일 때 분자도 \\(0\\)으로 가는 \\(\\dfrac{0}{0}\\) 부정형이었다. 게다가 '미분가능하면 연속'이라는 명제도 결국 연속이 더 약한 조건이라는 얘기 같아, 이번 단원의 연속 정의가 미분의 기반 가정으로 그대로 이어진다는 가설을 세웠다.\""}], "08": [{"type": "유형 1: 단원 종합 통찰 (극한 → 연속의 흐름)", "text": "\"단원 I 전체를 정리하면서 극한과 연속이 결국 '극한값 = 함숫값'이라는 한 줄로 묶인다는 걸 알게 됐다. 이 한 줄이 사잇값 정리에서는 '부호 변화 → 실근 존재'의 전제로, 최대·최소 정리에서는 '닫힌구간 + 연속 → 극값 존재'의 전제로 쓰인다는 흐름도를 그려보니, 단원이 따로따로가 아니라 정의 한 줄을 중심으로 부채꼴처럼 펼쳐져 있다는 게 보였다.\""}, {"type": "유형 2: 실수 분석 (단원 전체에서 가장 자주 틀린 유형)", "text": "\"단원 I에서 가장 자주 틀린 건 ① \\(|x|\\) 같은 좌·우 분기 빠뜨리기, ② \\(x \\to -\\infty\\)에서 \\(\\sqrt{x^2}\\) 부호 헷갈리기 두 가지였다. 그래서 '① 좌·우 분기 확인 → ② 절댓값·근호 부호 처리 → ③ 약분 또는 유리화 → ④ 연속 조건 점검' 4단계 체크리스트를 만들어 시험지 여백에 적어두고 풀고 있다. 이렇게 하니 비슷한 실수가 거의 없어졌다.\""}, {"type": "유형 3: 다음 단원으로의 확장 (미분으로의 다리)", "text": "\"미분계수 \\(\\lim_{h \\to 0} \\dfrac{f(a+h) - f(a)}{h}\\)를 보면 \\(h \\to 0\\)일 때 분자도 \\(0\\)으로 가는 전형적인 \\(\\dfrac{0}{0}\\) 모양이라, 이번 단원에서 익힌 인수분해·약분이 그대로 쓰일 것 같다. 또 '미분가능하면 연속'이라는 명제도 결국 연속이 더 약한 조건이라는 얘기라, 단원 I의 연속 정의가 단원 II의 기반으로 들어간다는 가설을 세웠다.\""}], "09": [{"type": "유형 1: 지식의 내면화 (정의의 통합)", "text": "\"처음엔 \\(\\lim_{\\Delta x \\to 0}\\), \\(\\lim_{h \\to 0}\\), \\(\\lim_{x \\to a}\\) 세 형태가 다 다른 정의인 줄 알았는데, \\(a + h = x\\)로 치환하면 같은 식이라는 걸 알게 됐다. 문제 유형별로 \\(f(x) - f(a)\\)가 통째로 인수분해되는 건 \\(\\lim_{x \\to a}\\) 꼴이 편하고, \\(f(a + 2h)\\) 같은 변형형은 \\(\\lim_{h \\to 0}\\) 꼴이 빠르다는 걸 정리해두니 식 보자마자 형태가 골라졌다.\""}, {"type": "유형 2: 문제해결력 (결정적 실수와 극복)", "text": "\"\\(\\lim_{h \\to 0} \\dfrac{f(a + 2h) - f(a)}{h}\\)를 그냥 \\(f'(a)\\)로 적었다가 틀렸다. 분자의 변화량은 \\(2h\\)인데 분모는 \\(h\\)라 정의식 모양이 안 맞은 거였다. 분모를 \\(2h\\)로 맞추려고 분자·분모에 각각 \\(2\\)를 곱하니 \\(2 f'(a)\\)가 나왔다. 그 뒤로는 '분모를 분자 변화량에 맞추되 곱한 수는 밖으로 빼낸다'는 한 줄을 외워뒀다.\""}, {"type": "유형 3: 발전 가능성 (확장과 호기심)", "text": "\"물리 시간에 배운 '순간속도'가 사실 위치 \\(s(t)\\)의 \\(t = t_0\\)에서의 미분계수 \\(s'(t_0)\\)와 정확히 같은 정의라는 걸 알게 됐다. 평균속력 \\(\\dfrac{\\Delta s}{\\Delta t}\\)에서 시간 간격을 \\(0\\)으로 줄이면 순간속력이 되는 게, 미분계수에서 \\(\\Delta t \\to 0\\)으로 보내는 거랑 똑같다. 수학과 물리가 한 식으로 만난다는 게 흥미로웠다.\""}], "10": [{"type": "유형 1: 지식의 내면화 (공식의 정당화)", "text": "\"\\((x^n)' = n x^{n-1}\\)을 공식으로만 외웠는데, \\(\\dfrac{(x + h)^n - x^n}{h}\\)을 이항정리로 직접 전개해보니 \\(h\\)가 한 번 약분되고 \\(h \\to 0\\)에서는 \\(n x^{n-1}\\) 항만 남는다는 게 눈에 보였다. 공식이 그냥 외울 것이 아니라 정의식의 자연스러운 결과라는 걸 알고 나니 새로운 공식이 와도 정의로 돌아갈 자신감이 생겼다.\""}, {"type": "유형 2: 문제해결력 (곱의 미분 오류 분석)", "text": "\"처음엔 \\(\\{f g\\}' = f' g'\\)인 줄 알고 \\((x \\cdot x)' = 1 \\cdot 1 = 1\\)이라고 적었는데, 실제로는 \\((x^2)' = 2x\\)였다. 반례 하나가 직관을 단번에 깨줬다. 그 뒤로는 곱의 미분이 나오면 무조건 \\(f' g + f g'\\) 두 항의 합이라는 걸 떠올리고, 헷갈리면 \\(f = g = x\\) 카드를 꺼내 검산한다.\""}, {"type": "유형 3: 발전 가능성 (도함수의 활용)", "text": "\"도함수 \\(f'(x)\\)가 각 \\(x\\)에서의 접선의 기울기를 모아둔 함수라고 생각하니까, \\(f'(x) &gt; 0\\)인 구간에서는 함수가 올라가고 \\(f'(x) = 0\\)인 점은 봉우리·골짜기 후보일 것 같았다. 다음 차시들에서 접선의 방정식·증감·극값을 다룬다는데, 결국 도함수의 부호 한 줄에서 다 나올 것 같아 미리 흐름이 잡혔다.\""}], "11": [{"type": "유형 1: 단원 종합 통찰", "text": "\"중단원을 정리하면서 \\(f'(a) = \\lim_{h \\to 0} \\dfrac{f(a + h) - f(a)}{h}\\) 한 줄이 평균변화율의 극한, 접선의 기울기, 도함수, 미분가능 \\(\\Rightarrow\\) 연속, 곱의 미분까지 다 한 출발점에서 갈라져 나온다는 게 보였다. '한 점의 변화율 \\(\\to\\) 모든 점의 변화율 함수 \\(\\to\\) 미분법 공식'으로 3단계 흐름도를 그려보니 단원이 머릿속에서 한 그림으로 묶였다.\""}, {"type": "유형 2: 가장 자주 틀린 유형의 분석", "text": "\"\\(\\lim_{h \\to 0} \\dfrac{f(a + kh) - f(a)}{h}\\) 같은 변형형에서 분모가 \\(h\\)인데 분자 변화량은 \\(kh\\)인 걸 놓치고 그냥 \\(f'(a)\\)로 적었다가 여러 번 틀렸다. 이제는 '분모를 \\(kh\\)에 맞추고 \\(k\\)를 밖으로 빼낸다'는 한 줄을 시험지 여백에 적어두고, 변형형이 나오면 무조건 분자·분모 모양 매칭부터 확인한다.\""}, {"type": "유형 3: 다음 단원으로의 확장", "text": "\"'미분계수 = 접선의 기울기'라는 의미를 떠올리면, 다음 차시 접선의 방정식이 사실 공통수학에서 배운 점-기울기 형태 \\(y - f(a) = f'(a)(x - a)\\)에 정보를 채우는 일밖에 안 될 것 같다. 도함수의 부호로 증감을 보고 \\(f'(x) = 0\\)인 점이 극값 후보가 된다는 것도 자연스럽게 따라올 것 같아서, II-2 단원이 시작되기 전에 로드맵이 머릿속에 그려졌다.\""}], "12": [{"type": "유형 1: 지식의 내면화 (점-기울기 공식의 일반화)", "text": "\"공통수학 2에서 배운 점-기울기 공식 \\(y - y_1 = m(x - x_1)\\)에 점은 \\((a, f(a))\\), 기울기는 \\(f'(a)\\)를 넣으면 그게 바로 접선의 방정식이라는 걸 알게 됐다. 새 공식을 외울 게 아니라 직선 정보 두 개(점·기울기)를 곡선의 미분 정보로 바꿔 끼우는 것뿐이라는 게 보이고 나니, 접선 문제가 한 줄로 정리됐다.\""}, {"type": "유형 2: 문제해결력 (시나리오 분기 점검)", "text": "\"점 \\((0, 2)\\)에서 \\(y = -x^3 + x + 4\\)에 접선을 긋는 문제에서 \\(x = 0\\)이 곡선 위 점인 줄 알고 그냥 \\(f'(0)\\)을 기울기로 적었다가 틀렸다. \\(f(0) = 4 \\neq 2\\)니까 곡선 밖 점인데, 그러면 접점을 \\((t, f(t))\\)로 잡고 분기해야 했다. 이제는 풀기 전에 '점이 곡선 위인지 검증 → 위/밖으로 분기' 2단계를 먼저 한다.\""}, {"type": "유형 3: 발전 가능성 (접선 → 공통 접선 → 평균값 정리)", "text": "\"두 곡선의 공통 접선이 '점 공통 + 기울기 일치' 두 조건이라는 걸 정리하다 보니, 다음 차시의 평균값 정리에서 '직선 \\(\\mathrm{AB}\\)에 평행한 접선 \\(f'(c)\\)가 존재한다'는 명제도 결국 같은 발상 같다는 생각이 들었다. 도함수의 활용 단원이 '접선의 기울기'라는 한 가지 의미로 관통될 것 같아 미리 로드맵을 잡아뒀다.\""}], "13": [{"type": "유형 1: 지식의 내면화 (존재성 정리의 본질)", "text": "\"처음엔 롤의 정리·평균값 정리가 '\\(c\\)가 어디 있는지 알려주는 정리'인 줄 알았는데, 사실은 '그런 \\(c\\)가 존재한다는 사실만 보장하는 존재성 정리'라는 걸 알게 됐다. '\\((2, 2)\\)에서 접선이 \\(x\\)축과 평행이다' 같은 함정 문장에 속을 뻔했지만, 정리의 결론은 '존재'까지일 뿐 위치는 직접 풀어야 한다는 점을 노트에 굵게 적어뒀다.\""}, {"type": "유형 2: 문제해결력 (구간 단속 사례 정착)", "text": "\"구간 단속 예시가 재밌었다. \\(15\\,\\mathrm{km}\\)를 \\(10\\)분에 지났으면 평균속도가 \\(90\\,\\mathrm{km/h}\\)니까, 평균값 정리에 의해 그 사이 어느 순간 속도계가 정확히 \\(90\\,\\mathrm{km/h}\\)였던 순간이 있다는 결론. 제한속도 \\(80\\,\\mathrm{km/h}\\)를 넘었다는 게 직접 확정된다. '평균이 곧 어느 순간 실제로 일어난 값'이라는 슬로건으로 정리해두니 마라톤 평균 페이스 같은 상황에도 그대로 쓰였다.\""}, {"type": "유형 3: 발전 가능성 (\\(f' = 0 \\Rightarrow\\) 상수함수 → 부정적분의 \\(+C\\))", "text": "\"평균값 정리의 따름정리 \\(f' = g' \\Rightarrow f = g + k\\)가 신기했다. 도함수가 같으면 두 함수는 상수 차이만 난다는 얘기인데, 이게 곧 부정적분에 \\(+ C\\)가 붙는 이유라는 게 와닿았다. 다음 단원 \\(\\int f(x)\\,dx = F(x) + C\\)에서 그 \\(C\\)가 그냥 약속이 아니라 평균값 정리에서 보장되는 거라는 가설을 세워뒀다.\""}], "14": [{"type": "유형 1: 지식의 내면화 (평균값 정리 → 증감 판정)", "text": "\"'\\(f' &gt; 0\\)이면 증가'를 그냥 공식으로 외웠는데, 평균값 정리 \\(\\dfrac{f(x_2) - f(x_1)}{x_2 - x_1} = f'(c)\\)를 보니 분모는 양수라 분자 부호와 \\(f'(c)\\) 부호가 같다는 게 보였다. 증감 판정이 사실 평균값 정리의 자연스러운 따름이라는 걸 알게 된 뒤로는 단원 II-2의 정리들이 한 줄기로 이어진다는 게 느껴졌다.\""}, {"type": "유형 2: 문제해결력 (충분조건 vs 필요조건 구분)", "text": "\"'증가 \\(\\Leftrightarrow f' &gt; 0\\)'이 맞는 줄 알았다가 \\(f(x) = x^3\\) 반례에서 깨졌다. \\(x = 0\\)에서 \\(f' = 0\\)이지만 함수는 여전히 증가한다. 그래서 정확히는 '증가 \\(\\Leftrightarrow f' \\geq 0\\)이고 등호는 고립된 점에서만'이라는 걸 점검 카드로 적어뒀다. 다음 차시 '\\(f' = 0\\)이라고 다 극값은 아니다'로 자연스럽게 이어질 것 같다.\""}, {"type": "유형 3: 발전 가능성 (증감표 → 극값 → 그래프 → 방정식·부등식)", "text": "\"증감표가 단순한 표가 아니라 단원 II-2 전체(증감·극값·그래프·방정식·부등식·속도)에서 공통으로 쓰는 작업판이라는 게 보였다. '증감표 → 극값 → 그래프 개형 → 실근의 개수·부등식 증명'으로 이어지는 로드맵을 노트 첫 장에 그려두니, 다음 차시들이 새로운 도구를 배우는 게 아니라 같은 표를 다른 각도에서 읽는 일일 것 같았다.\""}], "15": [{"type": "유형 1: 지식의 내면화 (극값의 필요조건 vs 충분조건)", "text": "\"'\\(f'(a) = 0\\)이면 \\(x = a\\)에서 극값'이라고 적었다가 \\(f(x) = x^3\\) 반례에 막혔다. \\(x = 0\\)에서 \\(f' = 0\\)이지만 극값이 아니다. 필요조건('미분가능 + 극값 \\(\\Rightarrow f' = 0\\)')과 충분조건('\\(f' = 0\\) + 부호 변화 \\(\\Rightarrow\\) 극값')이 다르다는 걸 그제야 분명히 구분했다. 차시 14의 단조함수 함정도 결국 같은 '필요·충분 비대칭' 문제라는 걸 묶어 정리했다.\""}, {"type": "유형 2: 문제해결력 (극값 갖는다 vs 안 갖는다 — 판별식)", "text": "\"삼차함수가 극값을 가질 조건을 처음엔 그냥 '\\(D \\geq 0\\)'으로 적었다가 틀렸다. 도함수(이차식)의 판별식이 \\(D = 0\\)이면 중근이라 부호 변화가 없어 극값이 안 생긴다. 그래서 '극값 존재 \\(\\Leftrightarrow D &gt; 0\\)'이 맞다는 걸 알게 됐다. 등호 하나로 답이 갈리는 게 무서워서, 부등호·등호 처리는 마지막에 꼭 다시 점검하는 습관을 들였다.\""}, {"type": "유형 3: 발전 가능성 (극값 → 그래프 개형 → 방정식·부등식)", "text": "\"극댓값·극솟값이 단순한 봉우리·골짜기가 아니라 그래프 개형이랑 방정식 \\(f(x) = 0\\)의 실근 개수를 결정하는 핵심 정보라는 걸 알게 됐다. 예를 들어 삼차함수에서 '극댓값 \\(&gt; 0\\)이고 극솟값 \\(&lt; 0\\)이면 서로 다른 세 실근'이 나온다는 규칙을 미리 예측해뒀더니, 차시 16~18에서 그 규칙이 그대로 쓰이는 게 신기했다.\""}], "16": [{"type": "유형 1: 지식의 내면화 (5단계 알고리즘)", "text": "\"그래프 개형을 처음엔 감으로 그렸는데, '① 도함수 → ② \\(f' = 0\\)의 해 → ③ 증감표 → ④ 좌표축 교점 → ⑤ 개형'의 5단계 알고리즘으로 정리하니 어떤 다항함수든 같은 절차로 그려졌다. 차시 14·15에서 익힌 도구가 ①~③에 그대로 쓰이고, 차시 16에서 새로 더해진 건 '좌표축과의 교점' 하나뿐이라는 게 보였다. 단원이 새로운 게 아니라 누적된다는 게 느껴졌다.\""}, {"type": "유형 2: 문제해결력 (사차함수 극값 1개 vs 3개)", "text": "\"사차함수는 무조건 \\(W\\) 모양인 줄 알았는데, \\(y = x^4 + a x^2 + b\\)에서 \\(a\\)의 부호에 따라 극값이 \\(1\\)개(\\(\\cup\\) 모양)일 수도 있다는 걸 알게 됐다. 도함수 \\(f'(x) = 2x(2x^2 + a)\\)의 실근 개수가 \\(a\\)에 따라 \\(1\\)개 또는 \\(3\\)개로 갈리니까 극값 개수도 그렇게 분기된다. '모양 외우기'가 아니라 도함수 분석이라는 원리로 바꾸니 헷갈리지 않게 됐다.\""}, {"type": "유형 3: 발전 가능성 (개형 → 실근 개수, 차시 18 미리보기)", "text": "\"삼차함수에서 '(극댓값) \\(\\times\\) (극솟값) \\(&lt; 0\\)이면 서로 다른 세 실근'이라는 규칙을 그래프와 \\(x\\)축의 교점 개수로 직접 확인했다. 이게 다음 차시에서 '\\(f(x) = k\\)의 실근 개수'로 일반화될 텐데, 그러면 \\(x\\)축 대신 수평선 \\(y = k\\)를 그리고 교점을 세는 거랑 똑같다는 게 미리 보인다. 그래프 한 장이 방정식 문제까지 다 해결해주는 게 신기했다.\""}], "17": [{"type": "유형 1: 지식의 내면화 (극값 vs 최값)", "text": "\"극값이랑 최값이 같은 줄 알았는데, \\(f(x) = 2x^3 - 3x^2 + 2\\)를 \\([-1, 2]\\)에서 보면 극댓값은 \\(2\\)인데 끝점 \\(x = 2\\)에서의 값 \\(6\\)이 더 커서 최댓값은 \\(6\\)이라는 걸 직접 보고 확실히 구분됐다. '극값은 동네 안에서의 일등, 최값은 전체에서의 일등'이라는 걸 기억하고, 끝점도 꼭 비교 후보에 넣게 됐다. 차시 06의 최대·최소 정리가 여기서 그대로 쓰인다는 게 연결됐다.\""}, {"type": "유형 2: 문제해결력 (실생활 모델링 4단계)", "text": "\"실생활 최적화 문제(상자 부피, 도형 넓이 등)에서 처음엔 식만 세우고 미분만 했는데, 정의역을 빼먹어 답이 음수로 나온 적이 많았다. '① 변수 설정 → ② 제약식 → ③ 목적 함수 → ④ 미분 + 정의역(\\(0 &lt; x &lt; 6\\) 같은 물리적 범위 명시)' 4단계로 정리하고 나서는 길이가 음수로 나오는 어처구니 없는 실수가 사라졌다. 정의역을 명시하는 게 수학과 현실을 잇는 다리라는 걸 알게 됐다.\""}, {"type": "유형 3: 발전 가능성 (최솟값 \\(\\to\\) 부등식 증명)", "text": "\"오늘 익힌 최솟값 분석이 다음 차시 부등식 증명에서 '\\(f(x) \\geq 0\\)이 항상 성립 \\(\\Leftrightarrow f\\)의 최솟값 \\(\\geq 0\\)'로 바로 이어질 것 같다. 즉 부등식 문제도 결국 최솟값 구하는 문제로 환원되는 셈이다. 미분이 그래프 그리는 도구를 넘어 부등식 증명 도구로 진화한다는 게 단원의 큰 그림으로 보였다.\""}], "18": [{"type": "유형 1: 지식의 내면화 (실근 개수의 4가지 케이스)", "text": "\"삼차방정식 \\(f(x) = 0\\)의 실근 개수가 극댓값 \\(M\\)·극솟값 \\(m\\)의 부호 곱 \\(Mm\\)으로 결정된다는 게 핵심이었다. \\(Mm &lt; 0\\)이면 서로 다른 세 실근, \\(Mm = 0\\)이면 두 실근(중근 포함), \\(Mm &gt; 0\\)이면 한 실근. 4가지 케이스로 정리해두고 나니, 차시 16의 그래프 개형과 차시 18의 실근 분석이 결국 '극값의 부호 \\(\\to x\\)축 교차 횟수'라는 한 원리로 묶였다.\""}, {"type": "유형 2: 문제해결력 (매개변수 분리 전략)", "text": "\"매개변수가 들어간 \\(f(x) = k\\) 같은 문제에서 처음엔 \\(k\\)에 숫자를 대입하며 시행착오를 했는데, '매개변수 분리 → 고정 함수 \\(y = f(x)\\)와 수평선 \\(y = k\\)의 교점'으로 보는 전략을 익히고 나서 시간이 확 줄었다. 두 곡선의 교점 문제도 \\(h = f - g\\)를 만들면 같은 전략에 흡수된다. 매개변수가 결국 '수평선 높이'라는 시각화 하나로 단원의 매개변수 문제가 다 풀렸다.\""}, {"type": "유형 3: 발전 가능성 (부등식 \\(\\to\\) 정리·증명)", "text": "\"'\\(f(x) \\geq 0\\)이 항상 성립 \\(\\Leftrightarrow \\min f \\geq 0\\)'이라는 한 줄이 단순 계산 규칙이 아니라 부등식 증명을 위한 무기라는 게 느껴졌다. 한 점의 최솟값을 잡으면 전체 구간이 보장되는 셈인데, 이게 적분에서도 '\\(f \\geq 0\\)이면 \\(\\int_a^b f \\geq 0\\)'처럼 '국소 \\(\\to\\) 전역'으로 확장될 것 같다. 단원 전체가 이 흐름의 누적이라는 가설을 세웠다.\""}], "19": [{"type": "유형 1: 지식의 내면화 (위치-속도-가속도 사슬)", "text": "\"\\(s(t), v = s'(t), a = v'(t)\\)가 사실 미분을 두 번 하는 도함수 사슬이라는 게 보였다. 차시 14의 '\\(f' &gt; 0 \\Rightarrow\\) 증가'가 곧 '속도 \\(&gt; 0 \\Rightarrow\\) 앞으로 진행'이고, 차시 15의 '\\(f' = 0\\)에서 부호 변화 \\(\\Rightarrow\\) 극값'이 '\\(v = 0\\)에서 부호 변화 \\(\\Rightarrow\\) 방향 전환'과 일대일 대응이었다. 수학 공식이 물리의 운동을 그대로 말해주는 게 신기했다.\""}, {"type": "유형 2: 문제해결력 (변위 vs 운동 거리)", "text": "\"왕복 운동에서 '변위'와 '움직인 거리'를 같게 적었다가 틀렸다. 변위는 \\(s(\\text{끝}) - s(\\text{시작})\\)이지만 움직인 거리는 방향 전환마다 구간을 나눠 \\(|\\)변위\\(|\\)를 합쳐야 한다. 그래서 '① \\(v = 0\\) 찾기 → ② \\(v\\)의 부호 변화점 확정 → ③ 구간별 변위 \\(|\\)합산\\(|\\)' 2단계 절차를 만들어두니, 왕복이든 단순 운동이든 똑같이 풀렸다.\""}, {"type": "유형 3: 발전 가능성 (미분 \\(\\to\\) 적분, 차시 23 미리보기)", "text": "\"오늘은 방향 전환점을 일일이 손으로 잡아 구간별 거리를 더했는데, 정적분을 배우면 변위는 \\(\\int v\\,dt\\), 움직인 거리는 \\(\\int|v|\\,dt\\) 한 줄로 자동 계산될 것 같다. 미분과 적분이 '한 순간의 속도'와 '시간 누적'으로 짝을 이루는 셈인데, 다음 단원에서 미분·적분이 역연산이라는 미적분 기본정리를 배운다는데 미리 그림이 잡혔다.\""}], "20": [{"type": "유형 1: 단원 종합 통찰 (도함수의 응용 축)", "text": "\"도함수의 활용 단원을 8차시 동안 배우고 보니, 결국 '\\(f'(x)\\)의 부호 \\(\\to\\) 함수의 증감'이라는 한 줄이 극값·최대최소·실근 개수·부등식 증명 모두의 출발점이었다. 접선의 방정식·속도·가속도까지 다 도함수의 의미를 다른 각도에서 본 것이라는 게 보였고, 이 한 줄을 단원의 중심축으로 머릿속에 박아뒀다.\""}, {"type": "유형 2: 가장 자주 틀린 유형의 분석", "text": "\"사차함수에서 '극댓값을 가질 조건'을 자꾸 틀렸다. 도함수가 삼차식이라 실근이 1개일 때와 3개일 때 극값 패턴이 다른데, 그걸 안 따지고 \\(D \\geq 0\\)으로 통합해 적은 게 원인이었다. '① 도함수 인수분해 → ② 실근 개수 분기 → ③ 부호 변화 패턴 확인' 3단계로 루틴을 만든 뒤로 사차함수 문제 정답률이 확 올라갔다.\""}, {"type": "유형 3: 대단원 평가 및 다음 단원으로의 확장", "text": "\"\\(x'(t) = v(t)\\)를 거꾸로 생각하면 '속도를 알면 위치를 복원할 수 있는 연산'이 필요할 텐데, 그게 곧 다음 단원의 부정적분일 것 같다. 미분이 '쪼개기'였다면 적분은 '되돌리기 + 누적하기'라는 가설을 세웠다. 다음 단원이 미분과 짝꿍 관계라는 직관이 잡혀서, 새로운 단원이 막연하게 어렵지 않게 느껴졌다.\""}], "21": [{"type": "유형 1: 단원 종합 통찰 (미분계수 → 도함수의 활용)", "text": "\"단원 II 전체를 정리하면서 미분계수 정의식이 단원 I의 \\(\\dfrac{0}{0}\\) 부정형의 한 응용이라는 걸 확인했고, '도함수 \\(\\to\\) 부호 \\(\\to\\) 증감 \\(\\to\\) 극값·최대최소'라는 한 줄의 사고 흐름이 단원 II의 모든 응용을 관통한다는 걸 알게 됐다. 평균값 정리와 사잇값 정리가 그 흐름의 이론적 뼈대 역할을 한다는 것도 함께 보였다.\""}, {"type": "유형 2: 실수 분석 (단원 II 전체에서 가장 자주 틀린 유형)", "text": "\"단원 II에서 가장 자주 틀린 건 ① 도함수 부호표 안 그리고 머리로 풀려다 빠뜨림 ② 닫힌구간 최대·최소에서 양 끝점을 후보에서 누락 두 가지였다. 그래서 '① 도함수 인수분해 → ② \\(f' = 0\\) 영점에서 부호 변화 표 작성 → ③ 양 끝점·영점에서 함숫값 다 나열 → ④ 최대·최소 결정' 4단계 체크리스트를 만들고 모든 응용 문제에 적용했다.\""}, {"type": "유형 3: 다음 단원으로의 확장 (적분으로의 다리)", "text": "\"속도가 위치의 도함수라는 \\(x'(t) = v(t)\\)를 거꾸로 보면 '속도에서 위치를 복원하는 연산'이 필요한데, 그게 곧 부정적분일 것 같다. 또 평균값 정리의 따름정리에서 '도함수가 같으면 두 함수는 상수 차이'라는 게 적분상수 \\(+ C\\)의 진짜 이유라는 가설도 세웠다. 미분과 적분이 역연산이라는 큰 그림이 미리 보였다.\""}], "22": [{"type": "유형 1: 지식의 내면화 (역연산의 인식)", "text": "\"\\(\\int x^n\\,dx = \\dfrac{x^{n+1}}{n + 1} + C\\)를 공식으로만 외웠는데, \\((x^{n+1})' = (n + 1) x^n\\)을 거꾸로 읽으면 자연스럽게 나온다는 걸 알게 됐다. 또 평균값 정리의 따름정리에서 '도함수가 같으면 두 함수는 상수 차이'라고 보장되니 \\(+ C\\)가 빠질 수 없는 거였다. \\(C\\)가 그냥 약속이 아니라 정리의 결과라는 게 보였다.\""}, {"type": "유형 2: 문제해결력 (적분상수 결정의 루틴화)", "text": "\"\\(f'(x) = 3 x^2 + 2x\\)이고 \\(f(0) = 1\\)인 \\(f\\)를 구하는 문제에서 처음엔 \\(+ C\\)를 빠뜨려 답이 어긋났다. 그 뒤로 '① 항별로 적분 → ② 한 점 조건으로 \\(C\\) 확정 → ③ 검산 \\(F'(x) = f(x)\\)' 3단계로 카드를 만들어 놓고 풀고 있다. \\(f(0)\\)과 \\(f(1)\\) 두 조건으로 자연수 \\(n\\)을 찾는 유형도 같은 틀에 들어와서 헷갈리지 않게 됐다.\""}, {"type": "유형 3: 발전 가능성 (정적분으로의 확장)", "text": "\"부정적분은 \\(F(x) + C\\)라는 함수족인데, 정적분 \\(\\int_a^b f\\,dx\\)는 한 개의 수라는 게 잘 안 이해됐다. 그런데 \\(F(b) - F(a)\\)를 계산해보면 \\(C\\)가 서로 빼져서 사라지니까 자연스럽게 한 수가 된다는 걸 깨달았다. 다음 차시에서 \\(\\int_a^b f\\,dx = F(b) - F(a)\\)라는 미적분 기본정리를 배운다는데, 미리 그림이 잡혀 기대된다.\""}], "23": [{"type": "유형 1: 지식의 내면화 (부호 있는 면적의 정당화)", "text": "\"\\(\\int_0^2 (-x)\\,dx = -2\\)인데 도형 넓이는 \\(2\\)인 게 처음엔 모순처럼 보였다. 알고 보니 정적분은 '\\(x\\)축 위쪽은 \\(+\\), 아래쪽은 \\(-\\)'로 부호를 살리는 약속이라 음수가 나오는 게 당연했다. 도형 넓이를 진짜로 구하려면 \\(\\int |f(x)|\\,dx\\)처럼 절댓값을 씌워야 한다는 걸 알게 됐고, 다음 차시 학습 메모로 남겨뒀다.\""}, {"type": "유형 2: 문제해결력 (적분과 미분 관계의 활용)", "text": "\"\\(\\int_a^x f(t)\\,dt = g(x)\\) 같은 식이 나오면 처음엔 어찌 할 줄 몰라 멈춰 있었다. 그런데 '① 양변 미분 \\(\\Rightarrow f(x) = g'(x)\\), ② \\(x = a\\) 대입 \\(\\Rightarrow g(a) = 0\\)으로 아래끝 결정' 2단계만 하면 적분 기호가 사라지고 미분 문제로 바뀌었다. 이 두 줄 카드 덕분에 평가원 기출 패턴이 한꺼번에 정리됐다.\""}, {"type": "유형 3: 발전 가능성 (미적분의 기본정리 예측)", "text": "\"\\(S(x) = \\int_a^x f(t)\\,dt\\)를 미분하면 \\(f(x)\\)가 된다는 게 \\(S\\)도 결국 \\(f\\)의 부정적분이라는 얘기 같다. 그러면 \\(\\int_a^b f\\,dx = F(b) - F(a)\\) 한 줄로 적분 계산이 정리될 것 같다는 가설을 세웠다. 구분구적법으로 일일이 더하지 않아도 된다면, 미적분의 기본정리가 정말 강력한 도구라는 생각이 들었다.\""}], "24": [{"type": "유형 1: 지식의 내면화 (기본정리의 정당화)", "text": "\"\\(S(x) = \\int_a^x f(t)\\,dt\\)가 \\(f\\)의 부정적분이라는 걸 차시 23에서 본 뒤, \\(S(a) = 0\\)이라 \\(F(b) - F(a) = S(b) - S(a) = S(b)\\)로 직접 도출됐다. 미적분 기본정리가 부정적분과 정적분을 잇는 다리라는 게 보였고, \\(+ C\\)가 차로 인해 자동 소거된다는 점도 그제야 납득됐다.\""}, {"type": "유형 2: 문제해결력 (절댓값 정적분의 루틴화)", "text": "\"\\(\\int_0^3 |x^2 - 1|\\,dx\\) 같은 절댓값 정적분에서 통째로 \\(|f|\\) 적분 공식을 찾으려다 시간이 다 갔다. 그래서 '① 영점 \\(x = \\pm 1\\) 찾기 → ② 구간 분할 \\([0,1]\\)과 \\([1,3]\\) → ③ 부호별 적분(\\(x^2 - 1\\)이 음수인 구간은 \\(-\\) 붙이기) → ④ 합산' 4단계로 정리했다. 절댓값이 부호를 뒤집어 도형 넓이로 바꿔준다는 의미를 그림으로도 그려뒀다.\""}, {"type": "유형 3: 발전 가능성 (적분의 활용으로의 확장)", "text": "\"기본정리 덕분에 정적분 계산이 \\(F(b) - F(a)\\) 한 줄로 줄어드는 게 정말 강력했다. 다음 단원에서는 이게 곡선과 \\(x\\)축으로 둘러싸인 도형 넓이, 두 곡선 사이 넓이, 속도-거리 같은 실제 활용으로 확장될 텐데, 미분 단원의 '속도'가 적분에서 '거리'로 묶이는 짝꿍 관계도 미리 그려졌다.\""}], "25": [{"type": "유형 1: 단원 종합 통찰", "text": "\"중단원을 정리하면서 '부정적분 \\(\\to\\) 적분상수 결정 \\(\\to\\) 정적분의 정의 \\(\\to\\) 미적분 기본정리'로 이어지는 흐름을 한 장으로 그렸다. 같은 \\(\\int\\) 기호인데 양 끝점이 없으면 함수족 \\(F(x) + C\\), 있으면 한 개의 수 \\(F(b) - F(a)\\)가 된다는 비교가 단원의 핵심이라는 게 보였다.\""}, {"type": "유형 2: 가장 자주 틀린 유형의 분석", "text": "\"\\(\\int_0^1 t f(t)\\,dt = k\\)에서 \\(k\\)가 \\(x\\)와 무관한 상수라는 걸 안 보고 변수처럼 다뤘다가 틀린 적이 많았다. 그래서 '정적분의 값은 양 끝점이 상수면 그냥 한 개의 수'라는 점검 카드를 첫 단계로 두고, \\(\\int_a^x f(t)\\,dt = g(x)\\) 형태는 '① 양변 미분 → ② \\(x = a\\) 대입' 2단계로 처리하는 루틴을 만들었다.\""}, {"type": "유형 3: 다음 단원으로의 확장", "text": "\"정적분이 '부호 있는 면적'이라는 정의를 살리면, 다음 단원에서 도형 넓이는 \\(\\int |f|\\,dx\\), 두 곡선 사이 넓이는 \\(\\int |f - g|\\,dx\\)로 자연스럽게 확장될 것 같다. 또 \\(v(t)\\)를 시간에 대해 적분하면 거리가 나올 텐데, 미분 단원의 속도가 적분 단원에서 거리로 짝지어지는 큰 그림이 미리 잡혔다.\""}], "26": [{"type": "유형 1: 지식의 내면화 (정적분 vs. 넓이의 명확한 구별)", "text": "\"정적분은 부호가 있고 넓이는 항상 양수라서 \\(f \\geq 0\\)일 때만 두 값이 같다는 걸 알게 됐다. 그래서 곡선과 \\(x\\)축이 둘러싼 도형의 넓이는 \\(S = \\int_a^b |f(x)|\\,dx\\) 한 줄로 통일됐고, 절댓값이 음수 부분을 양수로 뒤집어주는 도구라는 게 그림으로도 보였다.\""}, {"type": "유형 2: 문제해결력 (4단계 절차의 루틴화)", "text": "\"\\(y = x^2 - 4x\\)와 \\(x\\)축이 둘러싼 넓이를 통째로 \\(\\int_0^4 (x^2 - 4x)\\,dx\\)로 적었다가 답이 음수로 나왔다. 알고 보니 \\([0, 4]\\)에서 \\(f &lt; 0\\)이라 부호를 따로 잡아야 했다. 그 뒤로는 '① \\(f = 0\\) 영점 → ② 구간별 부호 → ③ 음수 구간엔 \\(-\\) 붙여 적분 → ④ 합산' 4단계로 자동화했고, 단일 부호 구간이면 분할 없이 그대로 가도 된다는 판단도 빨라졌다.\""}, {"type": "유형 3: 발전 가능성 (두 곡선 사이로의 확장)", "text": "\"\\(x\\)축은 결국 \\(g(x) = 0\\)이라는 특수한 함수일 뿐이라는 게 보였다. 그러면 다음 차시 두 곡선 사이의 넓이 \\(S = \\int_a^b |f(x) - g(x)|\\,dx\\)에서 \\(g = 0\\)을 넣으면 오늘의 공식이 그대로 나오니까, 두 공식이 별개가 아니라 일반화-특수화 관계라는 가설을 세웠다.\""}], "27": [{"type": "유형 1: 지식의 내면화 (두 곡선 사이의 일반화)", "text": "\"두 곡선 사이 넓이 \\(S = \\int_a^b |f - g|\\,dx\\)에서 \\(g \\equiv 0\\)을 넣으면 차시 26 공식이 그대로 나온다는 게 보였다. 게다가 두 함수를 위쪽으로 같이 평행이동해도 차 \\(f - g\\)는 그대로니까 부호와 무관하게 공식이 통한다는 게 신기했다. '위 - 아래'의 적분만 잘 잡으면 항상 같다는 게 핵심이었다.\""}, {"type": "유형 2: 문제해결력 (4단계 절차 + 단축공식)", "text": "\"두 이차함수 사이 넓이를 한 번에 \\(\\tfrac{|a|}{6}(\\beta - \\alpha)^3\\)로 적는 단축공식이 너무 편해서 그냥 외우려다가, 곡선·접선 사이는 \\(\\tfrac{|a|}{12}(\\beta - \\alpha)^4\\)로 분모가 다른 이유를 헷갈렸다. 직접 \\(a(x - \\alpha)(x - \\beta)\\) 인수분해랑 중근 \\((x - t)^2\\) 형태로 유도해보니 분모 차이가 자연스럽게 나왔다. 공식이 어디서 왔는지 알고 나니 잘못 외울 일이 없어졌다.\""}, {"type": "유형 3: 발전 가능성 (속도·거리로의 확장)", "text": "\"\\(\\int |f - g|\\,dx\\)가 '차의 절댓값'이라는 단순한 구조라는 게 보이고 나니, 다음 차시의 변위 \\(\\int v\\,dt\\) vs. 이동 거리 \\(\\int |v|\\,dt\\)도 똑같이 '절댓값 유무가 부호 처리를 가른다'는 동일 구조라는 게 예측됐다. 단원 III-2가 결국 '절댓값 정적분' 하나로 묶일 것 같다.\""}], "28": [{"type": "유형 1: 지식의 내면화 (위치 vs. 변위 vs. 이동 거리)", "text": "\"위치 \\(x(t)\\), 변위 \\(\\int v\\,dt\\), 이동 거리 \\(\\int |v|\\,dt\\) 세 개념을 미적분 기본정리로 정리해보니, 차시 26·27에서 본 '절댓값으로 부호 뒤집기' 발상이 그대로 쓰였다. 부호 있는 변위와 항상 양수인 거리의 차이를 절댓값 하나가 메워주는 셈이라 단원 III-2 전체가 같은 도구로 묶인다는 게 보였다.\""}, {"type": "유형 2: 문제해결력 (이동 거리 4단계 절차)", "text": "\"이동 거리 \\(\\int |v|\\,dt\\)를 그냥 \\(\\int v\\,dt\\)로 적었다가 자주 틀렸다. '① 방향 전환 \\(v = 0\\) 찾기 → ② 구간별 부호 → ③ \\(v\\) 또는 \\(-v\\) 적분 → ④ 합산' 4단계로 정리하니 깔끔해졌다. 그리고 '두 점 P, Q가 만난다'는 \\(v_P = v_Q\\)가 아니라 \\(x_P = x_Q\\)라는 위치 비교라는 점도 카드 마지막에 적어두니 함정에 안 빠지게 됐다.\""}, {"type": "유형 3: 발전 가능성 (단원 III-2 통합 + 미적분 II로의 확장)", "text": "\"단원 III-2의 세 차시(곡선과 \\(x\\)축 · 두 곡선 사이 · 속도와 거리)가 다 \\(\\int |f - g|\\,dx\\) 아니면 \\(\\int |v|\\,dt\\) 형태의 '절댓값 정적분' 한 가지로 묶인다는 걸 알게 됐다. 미적분 II에서 평면 운동의 속도 벡터나 곡선의 길이로 확장된다는데, 같은 발상이 차원만 올라가는 거라는 가설로 다음 학년 로드맵까지 미리 잡아뒀다.\""}], "29": [{"type": "유형 1: 단원 종합 통찰", "text": "\"중단원을 마무리하면서 단원 III-2의 세 공식이 다 \\(\\int |\\,\\,\\,|\\,dx\\) 형태로 통일된다는 게 보였다. 곡선과 \\(x\\)축은 \\(\\int |f|\\), 두 곡선은 \\(\\int |f - g|\\), 이동 거리는 \\(\\int |v|\\). 절댓값이 부호를 뒤집어 양수로 만든다는 차시 24의 의미 하나가 세 차시 전체에 똑같이 작동한다는 게 깔끔했다.\""}, {"type": "유형 2: 가장 자주 틀린 유형의 분석", "text": "\"단원 III-2에서 가장 자주 헷갈린 게 ① '넓이를 구하라'와 '정적분을 구하라'를 같게 쓴 것, ② 두 곡선의 위·아래가 교점에서 바뀌는 걸 놓친 것, ③ 변위와 이동 거리를 혼동한 것 세 가지였다. 점검 카드 3장으로 만들어두고 풀이 첫 단계에서 '이건 부호 있는 합이야, 절댓값이야?'를 묻는 습관을 들였더니 실수가 줄었다.\""}, {"type": "유형 3: 대단원 평가로의 확장", "text": "\"III-1의 미적분 기본정리가 III-2의 도형 넓이·이동 거리 계산에 핵심 도구로 쓰인다는 게 보였다. 대단원 평가에서는 \\(\\int_a^x f(t)\\,dt = g(x)\\)로 함수를 결정한 뒤 그 함수로 넓이·거리를 계산하는 통합형이 나올 것 같다는 가설을 세워뒀다.\""}], "30": [{"type": "유형 1: 단원 종합 통찰 (부정적분 ↔ 정적분 ↔ 넓이·거리)", "text": "\"단원 III를 정리하면서 부정적분이 미분의 역연산이라는 출발점에서 시작해, 정적분이 '함수값의 누적 변화'를 측정한다는 본질로 확장된다는 게 보였다. 미적분 기본정리 \\(\\int_a^b f'(x)\\,dx = f(b) - f(a)\\)가 '도함수의 누적 = 원함수의 변화'라는 한 줄로 단원 II와 III을 잇는 다리였다. 넓이·속도-거리·\\(\\int f(t)\\,dt = g(x)\\)형 방정식이 모두 이 다리의 응용이라는 게 한 그림으로 정리됐다.\""}, {"type": "유형 2: 실수 분석 (단원 III 전체에서 가장 자주 틀린 유형)", "text": "\"단원 III에서 가장 자주 틀린 건 ① 부정적분에서 \\(+ C\\) 누락, ② 절댓값 정적분에서 구간 분할 누락, ③ 움직인 거리에서 \\(\\int v\\,dt\\)와 \\(\\int |v|\\,dt\\) 혼동 세 가지였다. 그래서 '① 부정적분이면 \\(+ C\\) 표시 → ② \\(|f|\\)면 부호 변환점에서 구간 분할 → ③ 위치 변화 vs 움직인 거리 구분' 3단계 체크리스트를 시험지 여백에 적어두고 풀고 있다.\""}, {"type": "유형 3: 학기 전체 통합 (학기말 종합으로의 다리)", "text": "\"미적분 I 전체가 '극한 \\(\\to\\) 미분 \\(\\to\\) 적분 \\(\\to\\) 그 활용'이라는 한 줄로 묶인다는 게 보였다. 단원 I의 극한 정의가 단원 II의 미분계수 \\(\\lim_{h \\to 0} \\dfrac{f(x + h) - f(x)}{h}\\)와 단원 III의 구분구적법 \\(\\int_a^b f\\,dx = \\lim_{n \\to \\infty} \\sum f(x_k) \\Delta x\\)를 동시에 받친다는 게 신기했다. 학기말 종합 평가에서 이 세 축의 연결을 의식하며 문제를 풀려고 한다.\""}], "31": [{"type": "유형 1: 학기 전체 통합 통찰 (극한 → 미분 → 적분)", "text": "\"2학기 미적분 I 전체를 정리하면서 '극한 \\(\\to\\) 미분 \\(\\to\\) 적분 \\(\\to\\) 활용'이라는 한 줄의 흐름으로 묶을 수 있다는 게 보였다. 단원 I의 극한 정의가 단원 II의 미분계수와 단원 III의 구분구적법 정적분을 동시에 떠받치는 도구였고, 미분과 적분이 \\(\\dfrac{d}{dx}\\int_a^x f(t)\\,dt = f(x)\\)와 \\(\\int_a^b f'(x)\\,dx = f(b) - f(a)\\)로 역연산 관계를 이룬다는 게 흐름도로 한눈에 잡혔다.\""}, {"type": "유형 2: 학기 전체 실수 분석 (가장 자주 틀린 유형 Top 3)", "text": "\"학기 30차시 일지를 분석해보니 가장 자주 틀린 게 ① 단원 I에서 \\(\\dfrac{0}{0}\\) 미정형이면 인수분해·유리화 안 한 채 대입한 것, ② 단원 II에서 도함수 부호표·양 끝점·극점 비교를 빠뜨린 것, ③ 단원 III에서 \\(|f|\\) 정적분에서 부호 변환점 구간 분할 빠뜨린 것 세 가지였다. '① 미정형이면 분자·분모 처리법 매칭 → ② 미분 후 부호표 + 끝점 비교 → ③ 절댓값·움직인 거리는 부호 변환점에서 분할' 3단계 체크리스트로 학기말을 대비하기로 했다.\""}, {"type": "유형 3: 학기 마무리 — 다음 학년 미적분 II로의 다리", "text": "\"미분·적분의 정의 \\(\\lim_{h \\to 0} \\dfrac{f(x + h) - f(x)}{h}\\)나 정적분이 다항함수에서만 통하는 게 아니라 보편적인 정의라는 걸 알게 됐다. 미적분 II에서 \\(e^x, \\ln x, \\sin x, \\cos x\\)로 확장돼도 같은 틀이 그대로 통할 것 같다. 학기에서 가장 인상적이었던 건 미적분의 기본정리였고, 미분과 적분이 역연산이라는 한 줄로 두 단원이 묶이는 게 깔끔하고 멋있었다. 다음 학년에도 같은 사고 흐름으로 접근하기로 다짐했다.\""}]};

            { no: "18", name: "18차시 방정식과 부등식에의 활용", short: "방정식·부등식 활용" },
            { no: "19", name: "19차시 속도와 가속도", short: "속도와 가속도" },

            { no: "21", name: "21차시 대단원 평가 II (미분)", short: "대단원 평가 II", review: true },
        ]},
        { title: "III. 적분", icon: "\u222b", lessons: [
            { no: "22", name: "22차시 부정적분", short: "부정적분" },
            { no: "23", name: "23차시 정적분의 정의", short: "정적분의 정의" },
            { no: "24", name: "24차시 정적분의 계산", short: "정적분의 계산" },
            { no: "25", name: "25차시 중단원 마무리 (III-1 부정적분과 정적분)", short: "중단원 마무리 III-1", review: true },
            { no: "26", name: "26차시 넓이 — 곡선과 x축 사이", short: "넓이 — 곡선과 x축" },

    function formUrl(name) { return FORM_BASE + encodeURIComponent(name); }
    function qrUrl(url) { return "https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=0&data=" + encodeURIComponent(url); }

    const modal = document.getElementById('exModal');
    const exTitle = document.getElementById('exTitle');
    const exBody = document.getElementById('exBody');

    function openExamples(no, label) {
        const rows = EXAMPLES[no] || [];
        exTitle.textContent = no + "차시 · " + label + " — 작성 예시";
        exBody.innerHTML = rows.map((r, i) =>
            '<div class="ex-type t' + (i+1) + '"><div class="ex-type-name">' + r.type + '</div><div class="ex-type-text">' + r.text + '</div></div>'
        ).join('');
        modal.classList.add('open');
        if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([exBody]);
    }
    function closeExamples() { modal.classList.remove('open'); }
    document.getElementById('exClose').addEventListener('click', closeExamples);
    modal.addEventListener('click', e => { if (e.target === modal) closeExamples(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeExamples(); });

    function render() {
        const container = document.getElementById('unitsContainer');
        UNITS.forEach(unit => {
            const section = document.createElement('div');
            section.className = 'unit';
            const head = document.createElement('h2');
            head.className = 'unit-head';
            head.innerHTML = '<span>' + unit.icon + '</span> ' + unit.title;
            section.appendChild(head);
            const grid = document.createElement('div');
            grid.className = 'form-grid';
            unit.lessons.forEach(les => {
                const url = formUrl(les.name);
                const card = document.createElement('div');
                card.className = 'form-card' + (les.review ? ' review' : '');
                const no = document.createElement('div');
                no.className = 'fc-no'; no.textContent = les.no; card.appendChild(no);
                const nm = document.createElement('div');
                nm.className = 'fc-name'; nm.textContent = les.short; card.appendChild(nm);
                const qr = document.createElement('div');
                qr.className = 'fc-qr';
                const img = document.createElement('img');
                img.src = qrUrl(url); img.loading = 'lazy'; img.alt = les.no + '차시 성찰지 QR';
                qr.appendChild(img); card.appendChild(qr);
                const btn = document.createElement('a');
                btn.className = 'fc-btn'; btn.href = url; btn.target = '_blank'; btn.rel = 'noopener noreferrer';
                btn.textContent = '폼 열기 \u2197'; card.appendChild(btn);
                const exBtn = document.createElement('button');
                exBtn.className = 'fc-ex-btn'; exBtn.type = 'button';
                exBtn.textContent = '\u270f\ufe0f 작성 예시';
                exBtn.addEventListener('click', () => openExamples(les.no, les.short));
                card.appendChild(exBtn);
                grid.appendChild(card);
            });
            section.appendChild(grid);
            container.appendChild(section);
        });
    }
    render();
</script>
