      {tag:'STEP 2', title:'제1사분면 ⇒ \\(t=1\\), \\(\\mathrm P(1,3)\\)', body:`<div class="calc">\\(f(1)=1-1+3=3\\Rightarrow \\mathrm P(1,3)\\)</div>`},
      {tag:'STEP 3', title:'\\(4x-y-2=0\\) 거리', body:`<div class="calc">\\(d=\\dfrac{|4\\cdot 1-3-2|}{\\sqrt{17}}=\\dfrac{1}{\\sqrt{17}}=\\dfrac{\\sqrt{17}}{17}\\)</div>
<div class="calc purple">\\(d=\\dfrac{\\sqrt{17}}{17}\\)</div>`}
    ]
  },

  /* ───────── 예제 2 ───────── */
  {
    id:'c4-e2', level:'example', levelLabel:'예제', num:2, type:'short',
    subLabel:'평균값 정리 · 조각함수 미분가능',
    title:'\\(g(x)=\\begin{cases}ax^3+x & (x\\lt 1)\\\\ f(x) & (x\\geq 1)\\end{cases}\\) 미분가능 + \\(f(1)+f\'(1)=6\\) → \\(g(4)\\) 최댓값',
    question:`<p>실수 전체의 집합에서 미분가능한 함수 \\(f(x)\\)에 대하여 함수 \\(g(x)=\\begin{cases}ax^3+x & (x\\lt 1) \\\\ f(x) & (x\\geq 1)\\end{cases}\\) 이 실수 전체의 집합에서 미분가능하다. 다음 조건을 만족시키는 모든 함수 \\(f(x)\\)에 대하여 \\(g(4)\\)의 최댓값을 구하시오. (단, \\(a\\)는 상수이다.)</p>
<div class="calc"><p>(가) \\(f(1)+f\'(1)=6\\)</p>
<p>(나) \\(1\\lt x\\lt 4\\)인 모든 실수 \\(x\\)에 대하여 \\(f\'(x)\\leq 4\\)이다.</p></div>`,
    answerText:'\\(14\\)',
    keypoint:'\\(x=1\\) 연속+미분가능으로 \\(a\\) 결정. 평균값 정리: \\(f(4)=f(1)+3f\'(c)\\). \\(f\'(c)\\leq 4\\) ⇒ 최댓값.',
    steps:[
      {tag:'STEP 1', title:'\\(x=1\\) 연속 → \\(f(1)=a+1\\)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 1-}(ax^3+x)=a+1=f(1)\\)</div>`},
      {tag:'STEP 2', title:'\\(x=1\\) 미분가능 → \\(f\'(1)=3a+1\\)', body:`<p>좌미분계수 \\(=3a+1\\), 우미분계수 \\(=f\'(1)\\). 같음:</p>
<div class="calc">\\(f\'(1)=3a+1\\)</div>`},
      {tag:'STEP 3', title:'(가) \\(\\Rightarrow a=1\\)', body:`<div class="calc">\\(f(1)+f\'(1)=(a+1)+(3a+1)=4a+2=6\\Rightarrow a=1\\)</div>
<div class="calc">\\(f(1)=2,\\ f\'(1)=4\\)</div>`},
      {tag:'STEP 4', title:'평균값 정리 — \\(f(4)=f(1)+3f\'(c)\\)', body:`<p>\\(f\\)가 \\([1,4]\\)에서 연속, \\((1,4)\\)에서 미분가능 ⇒ 평균값 정리:</p>
<div class="calc">\\(\\dfrac{f(4)-f(1)}{4-1}=f\'(c)\\quad (1\\lt c\\lt 4)\\)</div>
<div class="calc">\\(f(4)=f(1)+3f\'(c)=2+3f\'(c)\\)</div>`},
      {tag:'STEP 5', title:'\\(f\'(c)\\leq 4\\) ⇒ 최댓값 \\(14\\)', body:`<div class="calc">\\(f(4)\\leq 2+3\\cdot 4=14\\)</div>
<p>\\(f(x)=4x-2\\)일 때 등호 성립. \\(g(4)=f(4)=14\\).</p>
<div class="calc purple">\\(g(4)\\)의 최댓값 \\(=14\\)</div>`}
    ]
  },

  /* ───────── 유제 3 ───────── */
  {
    id:'c4-ex3', level:'exercise', levelLabel:'유제', num:3, type:'short',
    subLabel:'[26009-0077] · 평균값 정리 · \\(p\\) 최댓값',
    title:'(가) \\(f(x)-f(0)\\geq 2px\\), (나) \\(x\\gt 0\\)에서 \\(f\'\\) 최솟값 \\(=4\\) → \\(p\\)의 최댓값',
    question:`<p>다음 조건을 만족시키는 모든 다항함수 \\(f(x)\\)에 대하여 실수 \\(p\\)의 최댓값을 구하시오.</p>
<div class="calc"><p>(가) 모든 양의 실수 \\(x\\)에 대하여 \\(f(x)-f(0)\\geq 2px\\)이다.</p>
<p>(나) \\(x\\gt 0\\)에서 함수 \\(f\'(x)\\)의 최솟값이 \\(4\\)이다.</p></div>`,
    answerText:'\\(2\\)',
    keypoint:'평균값 정리: \\(f(x)-f(0)=xf\'(c)\\). (가)에서 \\(f\'(c)\\geq 2p\\). (나) 최솟값 \\(4\\) ⇒ \\(2p\\leq 4\\).',
    steps:[
      {tag:'STEP 1', title:'평균값 정리 적용 — \\(c\\in(0,x)\\)', body:`<div class="calc">\\(\\dfrac{f(x)-f(0)}{x-0}=f\'(c)\\Rightarrow f(x)-f(0)=xf\'(c)\\)</div>`},
      {tag:'STEP 2', title:'(가) \\(\\Rightarrow f\'(c)\\geq 2p\\)', body:`<div class="calc">\\(xf\'(c)\\geq 2px\\Rightarrow f\'(c)\\geq 2p\\)</div>
<p>임의 \\(x\\gt 0\\)에 대응되는 \\(c\\)도 \\(0\\lt c\\lt x\\). 그러므로 \\(x\\gt 0\\)에서 \\(f\'\\)의 최솟값이 \\(2p\\)보다 크거나 같아야 한다.</p>`},
      {tag:'STEP 3', title:'(나) \\(\\Rightarrow 2p\\leq 4\\)', body:`<div class="calc">\\(4\\geq 2p\\Rightarrow p\\leq 2\\)</div>
<div class="calc purple">\\(p\\)의 최댓값 \\(=2\\)</div>`}
    ]
  },

  /* ───────── 예제 3 ───────── */
  {
    id:'c4-e3', level:'example', levelLabel:'예제', num:3, type:'choice',
    subLabel:'함수의 증가와 감소 · 절댓값 분기',
    title:'\\(f(x)=2x^3+a|x|\\), 감소 구간 길이로부터 자연수 \\(a\\) 개수',
    question:`<p>함수 \\(f(x)=2x^3+a|x|\\)가 다음 조건을 만족시키도록 하는 자연수 \\(a\\)의 개수는?</p>
<div class="calc">함수 \\(f(x)\\)가 열린구간 \\((p,p+1)\\)에서 감소하도록 하는 정수 \\(p\\)의 개수는 \\(3\\)이다.</div>`,
    choices:['\\(41\\)','\\(42\\)','\\(43\\)','\\(44\\)','\\(45\\)'], answer:1,
    keypoint:'\\(x\\geq 0\\)에서는 항상 증가. \\(x\\lt 0\\)에서 \\(f\'(x)=6x^2-a\\leq 0\\) ⇒ 감소 구간 \\([-\\sqrt{a/6},0]\\). 길이 1짜리 세 구간 모두 포함 조건.',
    steps:[
      {tag:'STEP 1', title:'\\(x\\gt 0\\) — 항상 증가', body:`<div class="calc">\\(x\\gt 0:\\ f(x)=2x^3+ax\\Rightarrow f\'(x)=6x^2+a\\gt 0\\)</div>`},
      {tag:'STEP 2', title:'\\(x\\lt 0\\) — 감소 구간 \\([-\\sqrt{a/6},0]\\)', body:`<div class="calc">\\(x\\lt 0:\\ f(x)=2x^3-ax\\Rightarrow f\'(x)=6x^2-a\\)</div>
<div class="calc">\\(f\'(x)\\leq 0\\Rightarrow x^2\\leq \\dfrac{a}{6}\\Rightarrow -\\sqrt{\\dfrac{a}{6}}\\leq x\\lt 0\\)</div>`},
      {tag:'STEP 3', title:'세 정수 \\(p=-3,-2,-1\\)이 모두 들어가야 함', body:`<p>\\((p,p+1)\\) 형태로 세 구간 \\((-3,-2),(-2,-1),(-1,0)\\)이 모두 감소 구간 \\([-\\sqrt{a/6},0]\\)에 포함되어야 함:</p>
<div class="calc">\\(-4\\lt -\\sqrt{\\dfrac{a}{6}}\\leq -3\\Rightarrow 3\\leq \\sqrt{\\dfrac{a}{6}}\\lt 4\\)</div>
<div class="calc">\\(9\\leq \\dfrac{a}{6}\\lt 16\\Rightarrow 54\\leq a\\lt 96\\)</div>`},
      {tag:'STEP 4', title:'자연수 \\(a\\) 개수', body:`<div class="calc">\\(a\\in\\{54,55,\\ldots,95\\}\\Rightarrow 95-53=42\\)</div>
<div class="calc purple">자연수 \\(a\\) 개수 \\(=42\\)</div>`}
    ]
  },

  /* ───────── 유제 4 ───────── */
  {
    id:'c4-ex4', level:'exercise', levelLabel:'유제', num:4, type:'short',
    subLabel:'[26009-0078] · 역함수 존재 ⇒ 일대일 ⇒ 단조',
    title:'\\(f(x)=-\\tfrac{1}{3}x^3+3x^2-5x\\), \\((a-1,a+2)\\)에서 역함수 존재 → 자연수 \\(a\\) 개수',
    question:`<p>열린구간 \\((a-1,\\,a+2)\\)에서 정의된 함수 \\(f(x)=-\\dfrac{1}{3}x^3+3x^2-5x\\)의 역함수가 존재하도록 하는 \\(10\\) 이하의 자연수 \\(a\\)의 개수를 구하시오.</p>`,
    answerText:'\\(7\\)',
    keypoint:'\\(f\'(x)=-x^2+6x-5=-(x-1)(x-5)\\). 증가는 \\(1\\lt x\\lt 5\\), 감소는 그 외. 길이 3 구간이 단조 구간에 들어가야 함.',
    steps:[
      {tag:'STEP 1', title:'\\(f\'\\) 부호 분석 — \\(x\\in(1,5)\\) 증가', body:`<div class="calc">\\(f\'(x)=-x^2+6x-5=-(x-1)(x-5)\\)</div>
<p>\\(f\'\\gt 0\\): \\(1\\lt x\\lt 5\\) (증가), \\(f\'\\lt 0\\): \\(x\\lt 1\\) 또는 \\(x\\gt 5\\) (감소).</p>`},
      {tag:'STEP 2', title:'\\((a-1,a+2)\\subset (1,5)\\) — 증가 조건', body:`<div class="calc">\\(a-1\\geq 1\\) 그리고 \\(a+2\\leq 5\\Rightarrow 2\\leq a\\leq 3\\)</div>`},
      {tag:'STEP 3', title:'또는 \\((a-1,a+2)\\) 감소 구간 포함', body:`<div class="calc">\\(a+2\\leq 1\\Rightarrow a\\leq -1\\) 또는 \\(a-1\\geq 5\\Rightarrow a\\geq 6\\)</div>`},
      {tag:'STEP 4', title:'\\(10\\) 이하 자연수 \\(\\Rightarrow a\\in\\{2,3,6,7,8,9,10\\}\\)', body:`<div class="calc purple">개수 \\(=7\\)</div>`}
    ]
  },

  /* ───────── 유제 5 ───────── */
  {
    id:'c4-ex5', level:'exercise', levelLabel:'유제', num:5, type:'choice',
    subLabel:'[26009-0079] · 단조증가 + 판별식',
    title:'\\(f(x)=x^3-ax^2+4ax\\) 실수 전체에서 증가 → 정수 \\(a\\) 개수',
    question:`<p>함수 \\(f(x)=x^3-ax^2+4ax\\)가 다음 조건을 만족시키도록 하는 정수 \\(a\\)의 개수는?</p>
<div class="calc">\\(x_1\\lt x_2\\)인 모든 실수 \\(x_1,x_2\\)에 대하여 \\((x_1-x_2)(f(x_1)-f(x_2))\\gt 0\\)이다.</div>`,
    choices:['\\(11\\)','\\(12\\)','\\(13\\)','\\(14\\)','\\(15\\)'], answer:2,
    keypoint:'조건 \\(\\Leftrightarrow f\\)가 실수 전체에서 증가 \\(\\Leftrightarrow f\'(x)\\geq 0\\) 모든 \\(x\\) \\(\\Leftrightarrow\\) 판별식 \\(\\leq 0\\).',
    steps:[
      {tag:'STEP 1', title:'조건 해석 — \\(f\\) 증가', body:`<p>\\(x_1\\lt x_2\\Rightarrow x_1-x_2\\lt 0\\). 곱이 양수 ⇒ \\(f(x_1)-f(x_2)\\lt 0\\). 즉 \\(f\\)는 실수 전체에서 증가.</p>`},
      {tag:'STEP 2', title:'\\(f\'(x)\\geq 0\\) 모든 \\(x\\)', body:`<div class="calc">\\(f\'(x)=3x^2-2ax+4a\\geq 0\\quad (\\forall x)\\)</div>`},
      {tag:'STEP 3', title:'판별식 \\(\\leq 0\\)', body:`<div class="calc">\\(\\dfrac{D}{4}=a^2-12a\\leq 0\\Rightarrow a(a-12)\\leq 0\\Rightarrow 0\\leq a\\leq 12\\)</div>`},
      {tag:'STEP 4', title:'정수 \\(a\\) 개수', body:`<div class="calc">\\(a\\in\\{0,1,2,\\ldots,12\\}\\Rightarrow 13\\)개</div>
<div class="calc purple">개수 \\(=13\\)</div>`}
    ]
  },

    question:`<p>함수 \\(f(x)=x^3-ax^2+bx+3\\)이 \\(x=1\\)에서 극대가 되도록 하는 \\(10\\) 이하의 두 정수 \\(a,b\\)의 모든 순서쌍 \\((a,b)\\)의 개수를 구하시오.</p>`,
    answerText:'\\(3\\)',

    title:'\\(f\\) 일차, \\(g(x)=(x^2-x)f(x)\\) — \\(x=3\\)에서 극값 \\(12\\) → \\(g(-3)\\)',

    choices:['\\(142\\)','\\(144\\)','\\(146\\)','\\(148\\)','\\(150\\)'], answer:1,
    keypoint:'\\(g(3)=6f(3)=12\\Rightarrow f(3)=2\\). \\(g\'(3)=5f(3)+6f\'(3)=0\\Rightarrow f\'(3)=-\\tfrac{5}{3}\\). 일차함수 ⇒ \\(f(x)=-\\tfrac{5}{3}x+7\\).',
    steps:[

      {tag:'STEP 2', title:'\\(g\'(3)=0\\) — \\(f\'(3)\\) 결정', body:`<div class="calc">\\(g\'(x)=(2x-1)f(x)+(x^2-x)f\'(x)\\)</div>

      {tag:'STEP 4', title:'\\(g(-3)\\) 계산', body:`<div class="calc">\\(g(-3)=(9+3)f(-3)=12\\cdot (5+7)=12\\cdot 12=144\\)</div>

    title:'\\(y=ax^3+2x\\) 위 \\((1,4)\\) 접선이 \\(y=(2x^3-x)f(x)\\)와 \\((1,f(1))\\) 접점 → \\(f\'(1)\\)',
    question:`<p>다항함수 \\(f(x)\\)에 대하여 곡선 \\(y=ax^3+2x\\) 위의 점 \\((1,4)\\)에서의 접선이 곡선 \\(y=(2x^3-x)f(x)\\)와 점 \\((1,f(1))\\)에서 접할 때, \\(f\'(1)\\)의 값은? (단, \\(a\\)는 상수)</p>`,

<div class="calc">\\(g(x)=2x^3+2x,\\ g\'(x)=6x^2+2,\\ g\'(1)=8\\)</div>`},
      {tag:'STEP 2', title:'\\(f(1)=4\\) (두 접점 같음)', body:`<div class="calc">\\(f(1)=4\\)</div>`},
      {tag:'STEP 3', title:'\\(h(x)=(2x^3-x)f(x)\\) 미분', body:`<div class="calc">\\(h\'(x)=(6x^2-1)f(x)+(2x^3-x)f\'(x)\\)</div>
<div class="calc">\\(h\'(1)=5f(1)+f\'(1)=20+f\'(1)\\)</div>`},
      {tag:'STEP 4', title:'\\(g\'(1)=h\'(1)\\) ⇒ \\(f\'(1)=-12\\)', body:`<div class="calc">\\(8=20+f\'(1)\\Rightarrow f\'(1)=-12\\)</div>
<div class="calc purple">\\(f\'(1)=-12\\)</div>`}
    ]
  },

  /* ───────── 기초 3 ───────── */
  {
    id:'c4-b3', level:'basic', levelLabel:'기초', num:3, type:'choice',
    subLabel:'[26009-0083] · 곡선의 접선 개수',
    title:'\\(y=-x^4+\\tfrac{4}{3}x^3+x\\) — \\(y=x-1\\) 평행 접선 \\(a\\)개, \\(y=-15x\\) 평행 \\(b\\)개 → \\(a+b\\)',
    question:`<p>곡선 \\(y=-x^4+\\dfrac{4}{3}x^3+x\\)에 접하는 직선 중 직선 \\(y=x-1\\)에 평행한 직선의 개수를 \\(a\\)라 하고 직선 \\(y=-15x\\)에 평행한 직선의 개수를 \\(b\\)라 할 때, \\(a+b\\)의 값은?</p>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:2,
    keypoint:'기울기 \\(=1\\) ⇒ \\(f\'(x)=1\\) 풀이 → 접점 \\(2\\)개. 기울기 \\(=-15\\) ⇒ 실근 1개. 단 같은 접선인지 검사 필요.',
    steps:[
      {tag:'STEP 1', title:'\\(f\'(x)=-4x^3+4x^2+1\\) 계산', body:`<div class="calc">\\(f\'(x)=-4x^3+4x^2+1\\)</div>`},
      {tag:'STEP 2', title:'\\(f\'(x)=1\\) 풀이 → \\(x=0,1\\)', body:`<div class="calc">\\(-4x^3+4x^2+1=1\\Rightarrow x^2(x-1)=0\\Rightarrow x=0\\) 또는 \\(1\\)</div>
<p>접점: \\((0,0),(1,\\tfrac{4}{3})\\) — 접선은 각각 \\(y=x,\\ y=x+\\tfrac{1}{3}\\). 서로 다름 ⇒ \\(a=2\\).</p>`},
      {tag:'STEP 3', title:'\\(f\'(x)=-15\\) 풀이 → \\(x=2\\) 유일', body:`<div class="calc">\\(-4x^3+4x^2+1=-15\\Rightarrow x^3-x^2=4\\Rightarrow (x-2)(x^2+x+2)=0\\)</div>
<p>\\(x^2+x+2\\gt 0\\) 항상. 그러므로 \\(x=2\\)만 실근. \\(b=1\\).</p>`},
      {tag:'STEP 4', title:'\\(a+b\\)', body:`<div class="calc purple">\\(a+b=2+1=3\\)</div>`}
    ]
  },

    steps:[

      {tag:'STEP 2', title:'판별식 \\(\\leq 0\\)', body:`<div class="calc">\\(\\dfrac{D}{4}=a^2-3(2-a^2)=4a^2-6\\leq 0\\)</div>

      {tag:'STEP 3', title:'정수 \\(a\\): \\(-1,0,1\\)', body:`<p>\\(\\dfrac{\\sqrt 6}{2}\\approx 1.22\\), \\(a\\in\\{-1,0,1\\}\\).</p>

  {
    id:'c4-b5', level:'basic', levelLabel:'기초', num:5, type:'choice',
    subLabel:'[26009-0085] · 절댓값 포함 함수 증가',
    title:'\\(f(x)=x^3-|x-a|\\) 실수 전체에서 증가 → \\(a\\) 최솟값',
    question:`<p>함수 \\(f(x)=x^3-|x-a|\\)가 실수 전체의 집합에서 증가하도록 하는 실수 \\(a\\)의 최솟값은?</p>`,
    choices:['\\(\\dfrac{\\sqrt 2}{2}\\)','\\(\\dfrac{\\sqrt 3}{3}\\)','\\(\\dfrac{1}{2}\\)','\\(\\dfrac{\\sqrt 5}{5}\\)','\\(\\dfrac{\\sqrt 6}{6}\\)'], answer:1,
    keypoint:'\\(x\\gt a\\)일 때 \\(f\'=3x^2-1\\), \\(x\\lt a\\)일 때 \\(f\'=3x^2+1\\gt 0\\) 항상. \\(x\\gt a\\)에서 \\(f\'\\geq 0\\) 조건 ⇒ \\(a\\geq \\tfrac{\\sqrt 3}{3}\\).',
    steps:[
      {tag:'STEP 1', title:'\\(x\\lt a\\) 분기 — 항상 증가', body:`<div class="calc">\\(f(x)=x^3+(x-a)\\Rightarrow f\'(x)=3x^2+1\\gt 0\\)</div>`},
      {tag:'STEP 2', title:'\\(x\\gt a\\) 분기 — \\(f\'=3x^2-1\\)', body:`<div class="calc">\\(f(x)=x^3-(x-a)\\Rightarrow f\'(x)=3x^2-1\\)</div>
<div class="calc">\\(f\'(x)\\geq 0\\Leftrightarrow x\\leq -\\dfrac{\\sqrt 3}{3}\\) 또는 \\(x\\geq \\dfrac{\\sqrt 3}{3}\\)</div>`},
      {tag:'STEP 3', title:'\\(x\\gt a\\) 모두 만족 ⇒ \\(a\\geq \\tfrac{\\sqrt 3}{3}\\)', body:`<p>\\(x\\gt a\\)인 모든 \\(x\\)에서 \\(f\'\\geq 0\\) ⇒ \\(a\\geq \\dfrac{\\sqrt 3}{3}\\).</p>
<div class="calc purple">\\(a\\) 최솟값 \\(=\\dfrac{\\sqrt 3}{3}\\)</div>`}

  {
    id:'c4-b6', level:'basic', levelLabel:'기초', num:6, type:'choice',

    title:'\\(f(x)=x^4-\\tfrac{4}{3}x^3-4x^2+a\\) — \\(0\\) 극값 → 모든 \\(a\\)값 합',
    question:`<p>함수 \\(f(x)=x^4-\\dfrac{4}{3}x^3-4x^2+a\\)가 \\(0\\)을 극값으로 갖도록 하는 모든 실수 \\(a\\)의 값의 합은?</p>`,
    choices:['\\(12\\)','\\(\\dfrac{37}{3}\\)','\\(\\dfrac{38}{3}\\)','\\(13\\)','\\(\\dfrac{40}{3}\\)'], answer:1,
    keypoint:'극값들이 \\(a-\\tfrac{5}{3},\\ a,\\ a-\\tfrac{32}{3}\\). 이 중 \\(0\\)이 되는 \\(a\\)값 모두 더함.',
    steps:[
      {tag:'STEP 1', title:'\\(f\'=4x^3-4x^2-8x=4x(x+1)(x-2)\\)', body:`<div class="calc">\\(f\'(x)=4x(x+1)(x-2)\\Rightarrow x=-1,0,2\\)</div>`},
      {tag:'STEP 2', title:'극값 계산', body:`<div class="calc">\\(f(-1)=1+\\dfrac{4}{3}-4+a=a-\\dfrac{5}{3}\\)</div>
<div class="calc">\\(f(0)=a\\)</div>
<div class="calc">\\(f(2)=16-\\dfrac{32}{3}-16+a=a-\\dfrac{32}{3}\\)</div>`},
      {tag:'STEP 3', title:'극값 \\(=0\\) 조건', body:`<p>극소: \\(f(-1)=0\\Rightarrow a=\\dfrac{5}{3}\\). 극대: \\(f(0)=0\\Rightarrow a=0\\). 극소: \\(f(2)=0\\Rightarrow a=\\dfrac{32}{3}\\).</p>`},
      {tag:'STEP 4', title:'합', body:`<div class="calc">\\(\\dfrac{5}{3}+0+\\dfrac{32}{3}=\\dfrac{37}{3}\\)</div>

  /* ───────── 기초 7 ───────── */
  {
    id:'c4-b7', level:'basic', levelLabel:'기초', num:7, type:'choice',
    subLabel:'[26009-0087] · 극대·극소 + 내분점',
    title:'\\(f(x)=x^3+x^2-x+a\\) 극대 P, 극소 Q — \\(\\overline{PQ}\\) \\(3{:}1\\) 내분점이 \\(x\\)축 위 → \\(a\\)',
    question:`<p>함수 \\(f(x)=x^3+x^2-x+a\\)는 \\(x=a\\)에서 극대이고, \\(x=\\beta\\)에서 극소이다. 두 점 \\(\\mathrm P(a,f(a)),\\ \\mathrm Q(\\beta,f(\\beta))\\)에 대하여 선분 \\(\\mathrm{PQ}\\)를 \\(3:1\\)로 내분하는 점이 \\(x\\)축 위에 있도록 하는 상수 \\(a\\)의 값은?</p>`,
    choices:['\\(-\\dfrac{7}{27}\\)','\\(-\\dfrac{2}{9}\\)','\\(-\\dfrac{5}{27}\\)','\\(-\\dfrac{4}{27}\\)','\\(-\\dfrac{1}{9}\\)'], answer:4,
    keypoint:'\\(f\'(x)=3x^2+2x-1=(3x-1)(x+1)\\). 극대 \\(x=-1\\), 극소 \\(x=\\tfrac{1}{3}\\). 내분점 \\(y\\)좌표 \\(=0\\).',
    steps:[
      {tag:'STEP 1', title:'\\(f\'\\) 인수분해 — 극대 \\(x=-1\\), 극소 \\(x=\\tfrac{1}{3}\\)', body:`<div class="calc">\\(f\'(x)=3x^2+2x-1=(3x-1)(x+1)\\)</div>
<div class="calc">\\(f(-1)=-1+1+1+a=a+1\\)</div>
<div class="calc">\\(f\\!\\left(\\dfrac{1}{3}\\right)=\\dfrac{1}{27}+\\dfrac{1}{9}-\\dfrac{1}{3}+a=a-\\dfrac{5}{27}\\)</div>`},
      {tag:'STEP 2', title:'\\(3{:}1\\) 내분점 \\(y\\)좌표 \\(=0\\)', body:`<div class="calc">\\(y=\\dfrac{3\\cdot (a-\\tfrac{5}{27})+1\\cdot (a+1)}{4}=\\dfrac{4a+\\tfrac{4}{9}}{4}=a+\\dfrac{1}{9}\\)</div>
<div class="calc">\\(a+\\dfrac{1}{9}=0\\Rightarrow a=-\\dfrac{1}{9}\\)</div>
<div class="calc purple">\\(a=-\\dfrac{1}{9}\\)</div>`}
    ]
  },

  /* ───────── 기초 8 ───────── */
  {
    id:'c4-b8', level:'basic', levelLabel:'기초', num:8, type:'short',
    subLabel:'[26009-0088] · 조각함수 극값 집합',
    title:'\\(f(x)=\\begin{cases}x^3+3x^2+2 & (x\\lt 1)\\\\ -2x+a & (x\\geq 1)\\end{cases}\\) 연속 → 극값 합',
    question:`<p>실수 전체의 집합에서 연속인 함수 \\(f(x)=\\begin{cases}x^3+3x^2+2 & (x\\lt 1)\\\\ -2x+a & (x\\geq 1)\\end{cases}\\)에 대하여 집합 \\(\\{k\\mid k\\text{는 }f(x)\\text{의 극값이다.}\\}\\)의 모든 원소의 합을 구하시오. (단, \\(a\\)는 상수)</p>`,
    answerText:'\\(8\\)',
    keypoint:'\\(x=1\\) 연속 ⇒ \\(a=8\\). 좌측 \\(g(x)=x^3+3x^2+2\\)의 극값: \\(g\'(x)=3x(x+2)\\) ⇒ \\(x=-2,0\\). \\(x=1\\)도 분기점이므로 극값 후보.',
    steps:[
      {tag:'STEP 1', title:'연속 → \\(a=8\\)', body:`<div class="calc">\\(\\displaystyle \\lim_{x\\to 1-}(x^3+3x^2+2)=6=f(1)=-2+a\\Rightarrow a=8\\)</div>`},
      {tag:'STEP 2', title:'\\(x\\lt 1\\) — \\(x=-2,0\\) 극값', body:`<div class="calc">\\(g\'(x)=3x^2+6x=3x(x+2)\\Rightarrow x=-2,0\\)</div>
<p>\\(x=-2\\)에서 극대 \\(g(-2)=-8+12+2=6\\), \\(x=0\\)에서 극소 \\(g(0)=2\\).</p>`},
      {tag:'STEP 3', title:'\\(x=1\\)도 극대 — \\(f(1)=6\\)', body:`<p>\\(x=1-\\)에서 \\(f\'\\to g\'(1)=9\\gt 0\\), \\(x=1+\\)에서 \\(f\'=-2\\lt 0\\). 좌우 부호 변화 (\\(+\\to -\\)) ⇒ \\(x=1\\)에서 극대 \\(f(1)=6\\).</p>`},
      {tag:'STEP 4', title:'극값 집합 \\(\\{2,6\\}\\) — 합', body:`<p>극값들: \\(6,2,6\\). 집합이므로 \\(\\{2,6\\}\\). 합 \\(=8\\).</p>
<div class="calc purple">합 \\(=8\\)</div>`}
    ]
  },
  /* ───────── 기본 1 ───────── */
  {
    id:'c4-s1', level:'standard', levelLabel:'기본', num:1, type:'choice',
    subLabel:'[26009-0089] · 접선 + 삼각형 넓이',
    title:'\\(y=ax^3+bx+3\\) 위 \\(A(1,6)\\) 접선이 \\(B(0,2)\\) 통과 → 삼각형 \\(ABC\\) 넓이',
    question:`<p>곡선 \\(y=ax^3+bx+3\\) 위의 점 \\(A(1,6)\\)에서의 접선이 점 \\(B(0,2)\\)를 지난다. 이 곡선이 \\(x\\)축과 만나는 점을 \\(C\\)라 할 때, 삼각형 \\(ABC\\)의 넓이는? (단, \\(a,b\\)는 상수)</p>`,
    choices:['\\(1\\)','\\(\\dfrac{3}{2}\\)','\\(2\\)','\\(\\dfrac{5}{2}\\)','\\(3\\)'], answer:0,
    keypoint:'점 통과 \\(\\Rightarrow a+b=3\\). 접선 기울기 \\(=\\tfrac{6-2}{1-0}=4=f\'(1)=3a+b\\). \\(a=\\tfrac{1}{2},b=\\tfrac{5}{2}\\). 그 뒤 \\(f(x)=0\\) 풀어 \\(C\\) 좌표 찾고 넓이.',
    steps:[
      {tag:'STEP 1', title:'점 통과 + 접선 기울기', body:`<div class="calc">\\(a+b+3=6\\Rightarrow a+b=3\\)</div>
<div class="calc">기울기 \\(=\\dfrac{6-2}{1-0}=4=f\'(1)=3a+b\\)</div>`},
      {tag:'STEP 2', title:'\\(a=\\tfrac{1}{2},b=\\tfrac{5}{2}\\)', body:`<div class="calc">\\(2a=1\\Rightarrow a=\\dfrac{1}{2},\\ b=\\dfrac{5}{2}\\)</div>
<div class="calc">\\(f(x)=\\dfrac{1}{2}x^3+\\dfrac{5}{2}x+3\\)</div>`},
      {tag:'STEP 3', title:'\\(x\\)축 교점 \\(C(-1,0)\\)', body:`<div class="calc">\\(f(x)=0\\Rightarrow x^3+5x+6=0\\Rightarrow (x+1)(x^2-x+6)=0\\)</div>
<p>\\(x^2-x+6\\gt 0\\) 항상 ⇒ \\(x=-1\\)뿐. \\(C(-1,0)\\).</p>`},
      {tag:'STEP 4', title:'삼각형 넓이', body:`<p>직선 \\(AB\\): 두 점 \\((1,6),(0,2)\\) ⇒ \\(y=4x+2\\), 즉 \\(4x-y+2=0\\). \\(C(-1,0)\\)에서 \\(AB\\)까지 거리:</p>
<div class="calc">\\(d=\\dfrac{|4(-1)-0+2|}{\\sqrt{17}}=\\dfrac{2}{\\sqrt{17}}\\)</div>
<div class="calc">\\(|AB|=\\sqrt{(1)^2+(4)^2}=\\sqrt{17}\\)</div>
<div class="calc">\\(\\text{넓이}=\\dfrac{1}{2}\\cdot \\sqrt{17}\\cdot \\dfrac{2}{\\sqrt{17}}=1\\)</div>
<div class="calc purple">넓이 \\(=1\\)</div>`}
    ]
  },

    title:'\\(f(x)=x^3-ax^2+b\\), \\(f(0)f(1)f(2)\\lt 0\\) + \\(f(0)f(2)f(3)\\lt 0\\) → \\(f(1)\\)',
    question:`<p>두 자연수 \\(a,b\\)에 대하여 함수 \\(f(x)=x^3-ax^2+b\\)가 다음 조건을 만족시킬 때, \\(f(1)\\)의 값은?</p>
<div class="calc"><p>(가) \\(f(0)f(1)f(2)\\lt 0\\)</p>
<p>(나) \\(f(0)f(2)f(3)\\lt 0\\)</p></div>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:0,
    keypoint:'\\(f(0)=b\\gt 0\\)이므로 (가)·(나)에서 \\(f(1)f(2)\\lt 0\\), \\(f(2)f(3)\\lt 0\\). 사잇값정리+롤 정리로 극값 \\(x=\\tfrac{2a}{3}\\)이 \\(1\\lt \\cdot \\lt 3\\). 자연수 \\(a\\) 후보 \\(2,3,4\\), 분기.',
    steps:[
      {tag:'STEP 1', title:'\\(f(0)=b\\gt 0\\) — 부호 분석', body:`<div class="calc">\\(f(1)f(2)\\lt 0,\\ f(2)f(3)\\lt 0\\)</div>
<p>두 구간 \\((1,2),(2,3)\\) 각각 근 존재. 두 근 사이 롤 정리 ⇒ \\(f\'(c)=0\\), \\(c\\in (1,3)\\).</p>`},

<p>\\(a=3\\): \\(f(1)f(2)=(b-2)(b-4)\\lt 0\\Rightarrow 2\\lt b\\lt 4\\), \\(f(2)f(3)=b(b-4)\\lt 0\\Rightarrow 0\\lt b\\lt 4\\). 자연수 \\(b=3\\).</p>
<p>\\(a=4\\): \\(f(2)f(3)=(b-8)(b-9)\\lt 0\\Rightarrow 8\\lt b\\lt 9\\) — 자연수 없음.</p>`},

  {
    id:'c4-s3', level:'standard', levelLabel:'기본', num:3, type:'short',
    subLabel:'[26009-0091] · 곡선 밖의 점에서 접선 개수 \\(=1\\)',
    title:'점 \\((-2,1)\\)에서 \\(y=2x^3+kx^2+1\\)에 접선 1개 → 정수 \\(k\\) 개수',
    question:`<p>점 \\((-2,1)\\)에서 곡선 \\(y=2x^3+kx^2+1\\)에 그은 접선의 개수가 \\(1\\)이 되도록 하는 정수 \\(k\\)의 개수를 구하시오.</p>`,
    answerText:'\\(31\\)',
    keypoint:'접점 \\((t, 2t^3+kt^2+1)\\)에서 접선식을 \\((-2,1)\\) 대입 → \\(t\\{4t^2+(k+12)t+4k\\}=0\\). 접선 \\(1\\)개 ⇒ 이차식이 허근 (\\(t=0\\) 외 실근 없음).',
    steps:[
      {tag:'STEP 1', title:'접선 식 → \\(t\\) 방정식', body:`<div class="calc">\\(f\'(t)=6t^2+2kt\\)</div>
<div class="calc">접선: \\(y=(6t^2+2kt)(x-t)+2t^3+kt^2+1\\)</div>
<p>\\((-2,1)\\) 대입:</p>
<div class="calc">\\(1-(2t^3+kt^2+1)=(6t^2+2kt)(-2-t)\\)</div>
<div class="calc">\\(4t^3+(k+12)t^2+4kt=0\\Rightarrow t\\{4t^2+(k+12)t+4k\\}=0\\)</div>`},
      {tag:'STEP 2', title:'접선 1개 ⇒ \\(4t^2+(k+12)t+4k=0\\) 허근', body:`<p>이차식이 \\(0\\)을 중근으로 갖는 경우 \\((k+12=0)\\) 그리고 \\((4k=0)\\)이 동시 — 정수 \\(k\\) 없음.</p>
<p>그러므로 허근이어야 함:</p>
<div class="calc">\\(D=(k+12)^2-64k\\lt 0\\Rightarrow k^2-40k+144\\lt 0\\)</div>
<div class="calc">\\((k-4)(k-36)\\lt 0\\Rightarrow 4\\lt k\\lt 36\\)</div>`},
      {tag:'STEP 3', title:'정수 \\(k\\) 개수', body:`<div class="calc">\\(k\\in\\{5,6,\\ldots,35\\}\\Rightarrow 31\\)개</div>
<div class="calc purple">개수 \\(=31\\)</div>`}
    ]
  },

  {
    id:'c4-s4', level:'standard', levelLabel:'기본', num:4, type:'choice',
    subLabel:'[26009-0092] · 평균값 정리 + 집합 자연수 개수',
    title:'\\(f(x)=2x^3+ax\\), 집합 \\(A=\\{p\\mid \\cdots\\}\\) 자연수 10개 → 모든 \\(a\\) 합',
    question:`<p>함수 \\(f(x)=2x^3+ax\\)와 \\(-1\\leq x_1\\leq x_2\\leq 2\\)인 모든 두 실수 \\(x_1,x_2\\)에 대하여 다음 조건을 만족시키는 실수 \\(p\\)의 집합을 \\(A\\)라 하자.</p>
<div class="calc">\\(x_1\\lt x_2\\)일 때 \\(p=\\dfrac{f(x_2)-f(x_1)}{2(x_2-x_1)}\\)이고, \\(x_1=x_2\\)일 때 \\(p=3x_1^2+\\dfrac{a}{2}\\)이다.</div>
<p>집합 \\(A\\)의 원소 중 자연수의 개수가 \\(10\\)이 되도록 하는 모든 정수 \\(a\\)의 값의 합은?</p>`,
    choices:['\\(-7\\)','\\(-5\\)','\\(-3\\)','\\(-1\\)','\\(1\\)'], answer:0,
    keypoint:'평균값 정리: \\(\\tfrac{f(x_2)-f(x_1)}{x_2-x_1}=f\'(c)=6c^2+a\\) (\\(c\\in(x_1,x_2)\\)). \\(p=\\tfrac{f\'(c)}{2}=3c^2+\\tfrac{a}{2}\\). 결국 \\(A=[\\tfrac{a}{2},12+\\tfrac{a}{2}]\\).',
    steps:[
      {tag:'STEP 1', title:'평균값 정리 → \\(p=3c^2+\\tfrac{a}{2}\\)', body:`<div class="calc">\\(p=\\dfrac{f(x_2)-f(x_1)}{2(x_2-x_1)}=\\dfrac{f\'(c)}{2}=3c^2+\\dfrac{a}{2}\\)</div>
<p>\\(c\\in[-1,2]\\) 가능 ⇒ \\(c^2\\in[0,4]\\) ⇒ \\(p\\in [\\tfrac{a}{2},12+\\tfrac{a}{2}]\\).</p>`},
      {tag:'STEP 2', title:'자연수 개수 \\(=10\\) — \\(a\\lt 0\\) 경우', body:`<p>\\(a=-m,\\ m\\) 자연수: \\(A=[-\\tfrac{m}{2},12-\\tfrac{m}{2}]\\). 자연수는 \\(1\\) 이상 \\(12-\\tfrac{m}{2}\\) 이하.</p>
<div class="calc">\\(10\\leq 12-\\dfrac{m}{2}\\lt 11\\Rightarrow 2\\lt m\\leq 4\\)</div>
<p>\\(m\\in\\{3,4\\}\\), 즉 \\(a\\in\\{-3,-4\\}\\).</p>`},
      {tag:'STEP 3', title:'\\(a\\geq 0\\) 경우 — 조건 불만족', body:`<p>\\(a=n\\geq 0\\): \\(A=[\\tfrac{n}{2},12+\\tfrac{n}{2}]\\), 자연수 개수 \\(=12\\) 또는 \\(13\\) — 조건 불만족.</p>`},
      {tag:'STEP 4', title:'합', body:`<div class="calc">\\(-3+(-4)=-7\\)</div>
<div class="calc purple">합 \\(=-7\\)</div>`}

  {

    answerText:'\\(7\\)',
    keypoint:'\\(f(x_1)\\lt f(x_2)\\) ⇒ 증가 ⇒ \\(f\'\\geq 0\\) 모든 \\(x\\) ⇒ 판별식 \\(\\leq 0\\). \\(f(-1)\\) 조건과 결합.',
    steps:[
      {tag:'STEP 1', title:'\\(f\\) 증가 ⇒ \\(a^2-3b\\leq 0\\)', body:`<div class="calc">\\(f\'(x)=3x^2+2ax+b\\geq 0\\Rightarrow \\dfrac{D}{4}=a^2-3b\\leq 0\\)</div>`},
      {tag:'STEP 2', title:'\\(f(-1)=-\\tfrac{10}{3}\\Rightarrow b=a+\\tfrac{10}{3}\\)', body:`<div class="calc">\\(f(-1)=-1+a-b+1=a-b=-\\dfrac{10}{3}\\Rightarrow b=a+\\dfrac{10}{3}\\)</div>`},
      {tag:'STEP 3', title:'\\(a^2-3(a+\\tfrac{10}{3})\\leq 0\\)', body:`<div class="calc">\\(a^2-3a-10\\leq 0\\Rightarrow (a+2)(a-5)\\leq 0\\Rightarrow -2\\leq a\\leq 5\\)</div>`},
      {tag:'STEP 4', title:'\\(b\\) 범위 → 정수', body:`<div class="calc">\\(b=a+\\dfrac{10}{3}\\in\\left[\\dfrac{4}{3},\\ \\dfrac{25}{3}\\right]\\)</div>

  /* ───────── 기본 6 ───────── */
  {
    id:'c4-s6', level:'standard', levelLabel:'기본', num:6, type:'short',
    subLabel:'[26009-0094] · 극한 + 극값 결합',
    title:'이차 \\(f\\), 삼차 \\(g\\) — 극솟값 \\(-8\\), \\(\\lim \\tfrac{fg}{|x+1|^3}\\) 존재 → \\(f(2)+g(2)\\)',
    question:`<p>최고차항의 계수가 모두 \\(2\\)인 이차함수 \\(f(x)\\)와 삼차함수 \\(g(x)\\)가 다음 조건을 만족시킨다. 함수 \\(f(x)+g(x)\\)가 극댓값을 가질 때, \\(f(2)+g(2)\\)의 값을 구하시오.</p>
<div class="calc"><p>(가) 함수 \\(f(x)\\)는 극솟값 \\(-8\\)을 갖는다.</p>
<p>(나) \\(\\displaystyle \\lim_{x\\to -1}\\dfrac{f(x)g(x)}{|x+1|^3}\\)의 값이 존재한다.</p></div>`,
    answerText:'\\(48\\)',
    keypoint:'(가) ⇒ \\(f(x)=2(x-a)^2-8\\). (나)의 좌·우극한 일치 ⇒ \\(fg\\)가 \\((x+1)^4\\)을 인수, \\(g=2(x+1)^3\\), \\(f\\)에 \\(x+1\\)이 인수. \\(a=-3\\) 또는 \\(1\\); \\(f+g\\) 극댓값 존재 ⇒ \\(a=1\\).',
    steps:[
      {tag:'STEP 1', title:'(가) — \\(f(x)=2(x-a)^2-8\\)', body:`<div class="calc">\\(f(x)=2(x-a)^2-8\\)</div>`},
      {tag:'STEP 2', title:'(나) ⇒ \\(fg=(x+1)^4 Q(x)\\) (사차)', body:`<p>분모 \\(|x+1|^3\\) 우/좌 부호 다름. 극한 존재 ⇒ 분자가 \\((x+1)^4\\) 이상 인수. \\(f\\)가 \\((x+1)^2\\) 가질 수 없으므로 \\(f\\)는 \\((x+1)\\), \\(g=2(x+1)^3\\):</p>
<div class="calc">\\(g(x)=2(x+1)^3\\)</div>
<div class="calc">\\(f(-1)=0\\Rightarrow 2(-1-a)^2-8=0\\Rightarrow (a+1)^2=4\\Rightarrow a=-3\\) 또는 \\(1\\)</div>`},
      {tag:'STEP 3', title:'\\(f+g\\) 극댓값 존재 ⇒ \\(a=1\\)', body:`<p>\\(a=-3\\): \\(h=2(x+1)^3+2(x+3)^2-8=2x^3+8x^2+18x+12\\), \\(h\'=6x^2+16x+18\\), \\(D/4=64-108\\lt 0\\) ⇒ 극값 없음 (실수 전체 증가).</p>
<p>\\(a=1\\): \\(h=2(x+1)^3+2(x-1)^2-8=2x^3+8x^2+2x-4\\), \\(h\'=6x^2+16x+2\\), \\(D/4=64-12=52\\gt 0\\) ⇒ 극댓값 존재.</p>`},
      {tag:'STEP 4', title:'\\(f(2)+g(2)\\)', body:`<div class="calc">\\(f(2)=2(2-1)^2-8=-6,\\ g(2)=2\\cdot 27=54\\)</div>
<div class="calc">\\(f(2)+g(2)=-6+54=48\\)</div>
<div class="calc purple">합 \\(=48\\)</div>`}
    ]
  },

  /* ───────── 기본 7 ───────── */
  {
    id:'c4-s7', level:'standard', levelLabel:'기본', num:7, type:'choice',
    subLabel:'[26009-0095] · 극한 분기 + 극대극소 차',
    title:'\\(g(x)=\\begin{cases}1 & (x\\leq 1)\\\\ \\tfrac{(x-1)^2}{f(x)-1} & (x\\gt 1)\\end{cases}\\), \\(\\lim_{x\\to 1+}g=\\lim_{x\\to 1-}g+1\\) → 극댓·극솟 차',
    question:`<p>최고차항의 계수가 \\(1\\)인 삼차함수 \\(f(x)\\)에 대하여 함수 \\(g(x)=\\begin{cases}1 & (x\\leq 1)\\\\ \\dfrac{(x-1)^2}{f(x)-1} & (x\\gt 1)\\end{cases}\\) 이 \\(\\displaystyle \\lim_{x\\to 1+}g(x)=\\lim_{x\\to 1-}g(x)+1\\)을 만족시킬 때, 함수 \\(f(x)\\)의 극댓값과 극솟값의 차는?</p>`,
    choices:['\\(\\dfrac{1}{54}\\)','\\(\\dfrac{1}{27}\\)','\\(\\dfrac{1}{18}\\)','\\(\\dfrac{2}{27}\\)','\\(\\dfrac{5}{54}\\)'], answer:0,
    keypoint:'\\(\\lim_{x\\to 1+}g(x)=2\\) ⇒ 분자·분모 \\(\\to 0\\), \\(f(x)-1=(x-1)^2(x-\\alpha)\\), \\(\\alpha=\\tfrac{1}{2}\\). \\(f\'(x)=(3x-2)(x-1)\\) ⇒ 극대 \\(x=\\tfrac{2}{3}\\), 극소 \\(x=1\\). 차 \\(=\\tfrac{1}{54}\\).',
    steps:[
      {tag:'STEP 1', title:'\\(\\lim_{1+}g=2\\)', body:`<div class="calc">\\(g(1)=\\lim_{1-}g=1\\Rightarrow \\lim_{1+}g=2\\)</div>`},
      {tag:'STEP 2', title:'\\(f(1)=1\\), \\(f(x)-1=(x-1)Q(x)\\)', body:`<p>분모 \\(\\to 0\\), 분자 \\(\\to 0\\), 극한 \\(=2\\) 유한 ⇒ \\(f(1)=1\\). \\(f(x)-1=(x-1)Q(x)\\) (이차).</p>
<div class="calc">\\(\\displaystyle \\lim_{x\\to 1+}\\dfrac{(x-1)^2}{(x-1)Q(x)}=\\lim_{x\\to 1+}\\dfrac{x-1}{Q(x)}=2\\)</div>`},
      {tag:'STEP 3', title:'\\(Q(1)=0\\Rightarrow Q(x)=(x-1)(x-a)\\)', body:`<p>분자 \\(\\to 0\\), 극한 \\(=2\\)(0 아님) ⇒ \\(Q(1)=0\\). \\(Q\\)는 최고차 \\(1\\) 이차이므로 \\(Q(x)=(x-1)(x-a)\\):</p>
<div class="calc">\\(\\displaystyle \\lim_{x\\to 1+}\\dfrac{x-1}{(x-1)(x-a)}=\\dfrac{1}{1-a}=2\\Rightarrow a=\\dfrac{1}{2}\\)</div>`},
      {tag:'STEP 4', title:'\\(f(x)=(x-1)^2(x-\\tfrac{1}{2})+1\\) — 극대·극소', body:`<div class="calc">\\(f\'(x)=2(x-1)(x-\\tfrac{1}{2})+(x-1)^2=(x-1)(3x-2)\\)</div>
<p>\\(f\'=0\\Rightarrow x=\\dfrac{2}{3},1\\). \\(x=\\tfrac{2}{3}\\) 극대, \\(x=1\\) 극소.</p>
<div class="calc">\\(f(1)=1,\\ f\\!\\left(\\dfrac{2}{3}\\right)=\\left(-\\dfrac{1}{3}\\right)^2\\!\\left(\\dfrac{1}{6}\\right)+1=\\dfrac{1}{54}+1=\\dfrac{55}{54}\\)</div>
<div class="calc">차 \\(=\\dfrac{55}{54}-1=\\dfrac{1}{54}\\)</div>
<div class="calc purple">차 \\(=\\dfrac{1}{54}\\)</div>`}
    ]
  },
  /* ───────── 실력 1 ───────── */
  {
    id:'c4-l1', level:'advanced', levelLabel:'실력', num:1, type:'choice',
    subLabel:'[26009-0096] · 그래프 + 접선 + 삼각형 넓이 함수',
    title:'삼차 \\(f\\) — 직선 \\(y=-x+\\tfrac{3}{2}\\)에 접 + \\(g(t)=\\triangle ABP\\) — \\(g(\\tfrac{3}{2})\\)',
    question:`<p>그림과 같이 최고차항의 계수가 \\(1\\)인 삼차함수 \\(f(x)\\)에 대하여 \\(f(0)=1\\)이고 곡선 \\(y=f(x)\\)가 직선 \\(y=-x+\\dfrac{3}{2}\\)에 접한다. 실수 \\(t\\)에 대하여 좌표평면 위의 세 점 \\(A(-1,0),\\ B(0,-1),\\ P(t,f(t))\\)가 있다. 세 선분 \\(\\mathrm{AB,AP,BP}\\)로 둘러싸인 도형의 넓이를 \\(g(t)\\)라 할 때, 함수 \\(g(x)\\)가 다음 조건을 만족시킨다.</p>
<div class="calc"><p>(가) 곡선 \\(y=g(x)\\)가 \\(x\\)축과 만나는 점의 개수는 \\(1\\)이다.</p>
<p>(나) 양수 \\(p\\)에 대하여 곡선 \\(y=g(x)\\)는 직선 \\(y=1\\)과 점 \\((p,g(p))\\)에서 접한다.</p></div>
<p>이때 \\(g\\!\\left(\\dfrac{3}{2}\\right)\\)의 값은? (단, 점 P가 선분 AB 위의 점일 때 \\(g(t)=0\\))</p>
<p style="text-align:center"><img src="images/calc_sol_c4-l1.png" alt="실력 1 그래프" style="max-width:340px;width:100%;border:1px solid var(--color-border);border-radius:8px;background:#fff;padding:8px"></p>`,
    choices:['\\(\\dfrac{1}{2}\\)','\\(1\\)','\\(\\dfrac{3}{2}\\)','\\(2\\)','\\(\\dfrac{5}{2}\\)'], answer:1,
    keypoint:'\\(g(t)=\\tfrac{|f(t)+t+1|}{2}\\). (가) ⇒ \\(f(x)=-x-1\\)이 한 점에서만 만남. (나) ⇒ \\(C(p,f(p))\\)에서 기울기 \\(-1\\) 접선이 \\(y=-x+1\\). \\(f(x)=x(x-p)^2-x+1\\), \\(p=\\tfrac{3}{2}\\).',
    steps:[
      {tag:'STEP 1', title:'넓이 공식 — \\(g(t)=\\tfrac{|f(t)+t+1|}{2}\\)', body:`<p>\\(\\overline{AB}=\\sqrt 2\\), 직선 \\(AB\\): \\(x+y+1=0\\). 점-직선 거리 \\(d=\\dfrac{|t+f(t)+1|}{\\sqrt 2}\\).</p>
<div class="calc">\\(g(t)=\\dfrac{1}{2}\\cdot \\sqrt 2\\cdot \\dfrac{|t+f(t)+1|}{\\sqrt 2}=\\dfrac{|f(t)+t+1|}{2}\\)</div>`},
      {tag:'STEP 2', title:'(가) ⇒ \\(f(x)=-x-1\\) 한 점 — 음의 근', body:`<p>\\(g(t)=0\\Leftrightarrow f(t)+t+1=0\\Leftrightarrow f(t)=-t-1\\). 곡선과 직선 \\(y=-x-1\\) 교점이 1개 ⇒ 음수 \\(x\\)좌표 \\(q\\)에서만.</p>`},
      {tag:'STEP 3', title:'(나) ⇒ 접선 \\(l\\): \\(y=-x+1\\) (\\(D(0,1)\\))', body:`<p>\\(g(p)=1\\) ⇒ \\(\\triangle ABP=1\\), 즉 \\(\\triangle ABC\\) (\\(C(p,f(p))\\)) 넓이 \\(=1\\). 접선 \\(l\\)이 \\(y\\)축과 만나는 점 \\(D(0,k)\\)에서 \\(\\triangle ABD\\) 넓이도 \\(=1\\):</p>
<div class="calc">\\(\\dfrac{1}{2}\\cdot 1\\cdot (k+1)=1\\Rightarrow k=1\\)</div>
<p>\\(l: y=-x+1\\). \\(f\\)는 \\(C(p,-p+1)\\)에서 \\(l\\)과 접:</p>
<div class="calc">\\(f(x)-(-x+1)=(x-p)^2(x-a)\\)</div>`},
      {tag:'STEP 4', title:'\\(f(0)=1\\Rightarrow a=0\\), 그리고 \\(p=\\tfrac{3}{2}\\)', body:`<p>\\(f(0)-1=-p^2\\cdot a=1-1=0\\Rightarrow a=0\\).</p>
<div class="calc">\\(f(x)=x(x-p)^2-x+1\\)</div>
<p>곡선 \\(y=f(x)\\)와 직선 \\(y=-x+\\tfrac{3}{2}\\) 접점 ⇒ \\(f\'(x)=-1\\) 풀이:</p>
<div class="calc">\\(f\'(x)=3x^2-4px+(p^2-1)=-1\\Rightarrow 3x^2-4px+p^2=0\\Rightarrow (x-p)(3x-p)=0\\)</div>
<p>\\(x=p\\)는 \\(l\\) 접점. 따라서 \\(y=-x+\\tfrac{3}{2}\\) 접점 \\(x=\\dfrac{p}{3}\\):</p>
<div class="calc">\\(f\\!\\left(\\dfrac{p}{3}\\right)=-\\dfrac{p}{3}+\\dfrac{3}{2}\\Rightarrow \\dfrac{p}{3}\\!\\left(\\dfrac{p}{3}-p\\right)^2\\!-\\dfrac{p}{3}+1=-\\dfrac{p}{3}+\\dfrac{3}{2}\\)</div>
<div class="calc">\\(\\dfrac{p}{3}\\cdot \\dfrac{4p^2}{9}=\\dfrac{1}{2}\\Rightarrow p^3=\\dfrac{27}{8}\\Rightarrow p=\\dfrac{3}{2}\\)</div>`},
      {tag:'STEP 5', title:'\\(g(\\tfrac{3}{2})=1\\)', body:`<p>\\(p=\\tfrac{3}{2}\\)이므로 (나)에서 \\(g(p)=1\\).</p>
<div class="calc purple">\\(g\\!\\left(\\dfrac{3}{2}\\right)=1\\)</div>`}
    ]
  },

  /* ───────── 실력 2 ───────── */
  {
    id:'c4-l2', level:'advanced', levelLabel:'실력', num:2, type:'choice',
    subLabel:'[26009-0097] · 평균값 정리 + 극한',
    title:'\\(f(x)=x^3+2x^2+6x\\) 평균값 \\(c=h(t)\\) — \\(\\lim_{t\\to 0+}h(t)/t\\)',
    question:`<p>삼차함수 \\(f(x)=x^3+2x^2+6x\\)와 양의 실수 \\(t\\)에 대하여 등식 \\(f(t)-f(0)=tf\'(c)\\) 를 만족시키는 실수 \\(c\\)의 값 중 \\(0\\lt c\\lt t\\)인 것을 \\(h(t)\\)라 하자. \\(\\displaystyle \\lim_{t\\to 0+}\\dfrac{h(t)}{t}\\)의 값은?</p>`,
    choices:['\\(\\dfrac{1}{6}\\)','\\(\\dfrac{1}{3}\\)','\\(\\dfrac{1}{2}\\)','\\(\\dfrac{2}{3}\\)','\\(\\dfrac{5}{6}\\)'], answer:2,
    keypoint:'\\(f(t)-f(0)=tf\'(c)\\Rightarrow 3c^2+4c-(t^2+2t)=0\\). 양의 근 \\(c=\\tfrac{-2+\\sqrt{3t^2+6t+4}}{3}\\). 분자 유리화로 \\(t\\to 0+\\) 극한.',
    steps:[
      {tag:'STEP 1', title:'\\(c\\)에 대한 이차식', body:`<div class="calc">\\(f(t)-f(0)=t(t^2+2t+6),\\ f\'(c)=3c^2+4c+6\\)</div>
<div class="calc">\\(t(t^2+2t+6)=t(3c^2+4c+6)\\Rightarrow 3c^2+4c=t^2+2t\\)</div>
<div class="calc">\\(c=\\dfrac{-2\\pm \\sqrt{3t^2+6t+4}}{3}\\)</div>`},
      {tag:'STEP 2', title:'\\(0\\lt c\\lt t\\) ⇒ \\(+\\)부호', body:`<div class="calc">\\(h(t)=\\dfrac{-2+\\sqrt{3t^2+6t+4}}{3}\\)</div>`},
      {tag:'STEP 3', title:'\\(\\tfrac{h(t)}{t}\\) 유리화', body:`<div class="calc">\\(\\dfrac{h(t)}{t}=\\dfrac{\\sqrt{3t^2+6t+4}-2}{3t}=\\dfrac{(3t^2+6t+4)-4}{3t(\\sqrt{3t^2+6t+4}+2)}\\)</div>
<div class="calc">\\(=\\dfrac{3t+6}{3(\\sqrt{3t^2+6t+4}+2)}=\\dfrac{t+2}{\\sqrt{3t^2+6t+4}+2}\\)</div>`},
      {tag:'STEP 4', title:'\\(t\\to 0+\\) 극한', body:`<div class="calc">\\(\\to \\dfrac{2}{\\sqrt 4+2}=\\dfrac{2}{4}=\\dfrac{1}{2}\\)</div>
<div class="calc purple">\\(=\\dfrac{1}{2}\\)</div>`}
    ]
  },

  {
    id:'c4-l3', level:'advanced', levelLabel:'실력', num:3, type:'choice',
    subLabel:'[26009-0098] · 절댓값 + 다항함수 조건',
    title:'(가) \\(\\lim \\tfrac{f-3}{x}=4\\), \\(\\lim \\tfrac{g}{x^6+1}=0\\), (나) \\(x|x+1|f(x)=g\'(x)\\) → \\(f\\) 극댓·극솟 합',
    question:`<p>실수 전체의 집합에서 연속인 함수 \\(f(x)\\)와 최고차항의 계수가 양수인 다항함수 \\(g(x)\\)가 다음 조건을 만족시킬 때, 함수 \\(f(x)\\)의 극댓값과 극솟값의 합은?</p>
<div class="calc"><p>(가) \\(\\displaystyle \\lim_{x\\to 0}\\dfrac{f(x)-3}{x}=4\\)이고, \\(\\displaystyle \\lim_{x\\to \\infty}\\dfrac{g(x)}{x^6+1}=0\\)이다.</p>
<p>(나) 모든 실수 \\(x\\)에 대하여 \\(x|x+1|f(x)=g\'(x)\\)이다.</p></div>`,
    choices:['\\(-3\\)','\\(-2\\)','\\(-1\\)','\\(0\\)','\\(1\\)'], answer:4,
    keypoint:'(가) ⇒ \\(f(0)=3,\\ f\'(0)=4\\). \\(g\\) 차수 \\(\\leq 5\\) ⇒ \\(g\'\\) 차수 \\(\\leq 4\\). \\(g\'(x)=x(x+1)^2(x+3)\\). \\(x\\geq -1\\)에서 \\(f(x)=(x+1)(x+3)\\), \\(x\\lt -1\\)에서 \\(f(x)=-(x+1)(x+3)\\).',
    steps:[
      {tag:'STEP 1', title:'(가) — \\(f(0)=3,\\ f\'(0)=4\\)', body:`<p>분모 \\(\\to 0\\), 극한 존재 ⇒ 분자 \\(\\to 0\\Rightarrow f(0)=3\\). 정의로 \\(f\'(0)=4\\).</p>`},
      {tag:'STEP 2', title:'\\(g\\) 차수 \\(\\leq 5\\) ⇒ \\(g\'(x)=x(x+1)h(x)\\)', body:`<p>(나)에서 \\(g\'(0)=0,\\ g\'(-1)=0\\). \\(g\'\\)은 사차 이하. 이차 \\(h\\):</p>
<div class="calc">\\(g\'(x)=x(x+1)h(x)\\)</div>`},
      {tag:'STEP 3', title:'\\(f\\) 연속 → \\(h(-1)=0\\)', body:`<p>(나)에서 \\(f(x)=\\dfrac{g\'(x)}{x|x+1|}\\) (\\(x\\neq 0,-1\\)). 좌·우극한 \\(\\to \\pm h(-1)\\). 연속 ⇒ \\(h(-1)=0\\). \\(h(x)=(x+1)(ax+b)\\):</p>
<div class="calc">\\(g\'(x)=x(x+1)^2(ax+b)\\)</div>`},
      {tag:'STEP 4', title:'\\(f(0)=3\\Rightarrow b=3\\), \\(f\'(0)=4\\Rightarrow a=1\\)', body:`<p>\\(x\\geq -1,\\ x\\neq 0\\)에서 \\(f(x)=(x+1)(ax+b)\\). \\(f(0)=b=3,\\ f\'(x)=(2a)x+(a+b)\\), \\(f\'(0)=a+b=4\\Rightarrow a=1\\).</p>
<div class="calc">\\(x\\geq -1\\): \\(f(x)=(x+1)(x+3)\\), \\(x\\lt -1\\): \\(f(x)=-(x+1)(x+3)\\)</div>`},
      {tag:'STEP 5', title:'그래프로 극값 — 극댓값 \\(1\\), 극솟값 \\(0\\)', body:`<p>\\(x\\lt -1\\): \\(f(x)=-(x+1)(x+3)\\) 위로 볼록 — 정점 \\(x=-2\\), \\(f(-2)=-(-1)(1)=1\\) (극대).</p>
<p>\\(x\\geq -1\\): \\(f(x)=(x+1)(x+3)\\) 아래로 볼록 — 정점 \\(x=-1\\), \\(f(-1)=0\\) (극소; \\(x=-1\\)에서 좌도 \\(0\\)으로 연속).</p>
<div class="calc">극댓값 \\(1\\), 극솟값 \\(0\\)</div>
<div class="calc">합 \\(=1+0=1\\)</div>
<div class="calc purple">합 \\(=1\\)</div>`}

  },

  {

    title:'최고차 \\(1\\) 삼차 \\(f\\), \\(f(0)=0\\) — \\(\\lim \\tfrac{f-1}{x-a}=3\\), 접선 \\(y\\)절편 \\(4\\) → \\(f(1)\\)',
    question:`<p>최고차항의 계수가 \\(1\\)이고 \\(f(0)=0\\)인 삼차함수 \\(f(x)\\)가 \\(\\displaystyle \\lim_{x\\to a}\\dfrac{f(x)-1}{x-a}=3\\) 을 만족시킨다. 곡선 \\(y=f(x)\\) 위의 점 \\((a,f(a))\\)에서의 접선의 \\(y\\)절편이 \\(4\\)일 때, \\(f(1)\\)의 값은? (단, \\(a\\)는 상수)<span style="opacity:0.7"> [4점]</span></p>`,
    choices:['\\(-1\\)','\\(-2\\)','\\(-3\\)','\\(-4\\)','\\(-5\\)'], answer:4,
    keypoint:'미분계수 정의: \\(f(a)=1,\\ f\'(a)=3\\). 접선 \\(y=3(x-a)+1\\), \\(y\\)절편 \\(=-3a+1=4\\Rightarrow a=-1\\). 그리고 \\(f(-1)=1,\\ f\'(-1)=3\\)에서 \\(p=-2,\\ q=-4\\) ⇒ \\(f(1)=-5\\).',
    steps:[
      {tag:'STEP 1', title:'\\(f(a)=1,\\ f\'(a)=3\\)', body:`<p>분모 \\(\\to 0\\), 극한 유한 ⇒ 분자 \\(\\to 0\\Rightarrow f(a)=1\\). 정의로 \\(f\'(a)=3\\).</p>`},

      {tag:'STEP 3', title:'\\(f(x)=x^3+px^2+qx\\) — \\(p,q\\) 연립', body:`<p>\\(f(0)=0\\) ⇒ 상수항 \\(0\\). \\(f(-1)=-1+p-q=1\\Rightarrow p-q=2\\). \\(f\'(x)=3x^2+2px+q\\), \\(f\'(-1)=3-2p+q=3\\Rightarrow 2p-q=0\\).</p>

<script>
(function () {
  let currentFilter = 'all';
  let filteredList  = [];
  let currentIdx    = 0;
  const stepState   = {};
  PROBLEMS.forEach(p => { stepState[p.id] = new Set(); });

  const viewport    = document.getElementById('card-viewport');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const currentNum  = document.getElementById('current-num');
  const totalNum    = document.getElementById('total-num');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const mainArea    = document.getElementById('main-area');

  function renderCard(problem) {
    const levelColors = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = levelColors[problem.level] || levelColors.basic;
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      const nums = ['①','②','③','④','⑤'];
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }
    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;
    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `<div class="step" data-step-num="${i+1}" style="display:none"><div class="step-header"><span class="step-tag">${step.tag}</span><span class="step-title">${step.title}</span></div><div class="step-body">${step.body}</div></div>`;
    });
    const subLabel = problem.subLabel ? `<span class="problem-sub-label">${problem.subLabel}</span>` : '';
    const probTitle = '';
    const keypointHTML = problem.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span><span>${problem.keypoint}</span></div>` : '';
    return `<article class="problem-card" data-pid="${problem.id}" data-level="${problem.level}"><div class="card-inner"><div class="problem-section"><div><div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>${subLabel}</div>${probTitle}<div class="problem-text"><div class="problem-statement">${problem.question}</div>${choicesHTML}</div>${keypointHTML}</div><div class="scratch-area" aria-label="풀이 공간" role="button" tabindex="0" onclick="openScratchOverlay(event)" onkeydown="if(event.key==='Enter'||event.key===' ')openScratchOverlay(event)"><span class="scratch-label">풀이 공간</span></div><div class="solution-section"><div class="solution-toggle-bar"><span class="solution-title">단계별 해설</span><div class="step-buttons">${stepBtns}</div></div><div class="steps-container" id="steps-${problem.id}">${stepsHTML}</div></div></div></article>`;
  }

  function applyFilter(filter) {
    currentFilter = filter;
    filteredList = filter === 'all' ? [...PROBLEMS] : PROBLEMS.filter(p => p.level === filter);
    currentIdx = 0;
    showCard(0);
    updateNav();
    updateProgress();
    updateFilterUI(filter);
  }
  function showCard(idx) {
    currentIdx = Math.max(0, Math.min(idx, filteredList.length - 1));
    const problem = filteredList[currentIdx];
    viewport.innerHTML = renderCard(problem);
    renderMath(viewport);
    restoreStepState(problem.id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function goTo(idx) {
    if (idx < 0 || idx >= filteredList.length) return;
    showCard(idx); updateNav(); updateProgress();
    if (document.getElementById('scratch-overlay')) renderScratchOverlay(false);
  }
  function updateNav() {
    prevBtn.disabled = currentIdx === 0;
    nextBtn.disabled = currentIdx === filteredList.length - 1;
    currentNum.textContent = currentIdx + 1;
    totalNum.textContent   = filteredList.length;
  }
  function updateProgress() {
    const pct = Math.round(((currentIdx + 1) / filteredList.length) * 100);
    progressBar.style.width = pct + '%';
    progressLbl.textContent = (currentIdx + 1) + ' / ' + filteredList.length;
  }
  function updateFilterUI(active) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === active);
    });
  }
  function showSteps(pid, targetStep) {
    const container = document.getElementById('steps-' + pid);
    if (!container) return;
    if (targetStep === 0) {
      stepState[pid] = new Set();
      container.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      [document.querySelector(`.problem-card[data-pid="${pid}"] .correct-choice`),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => {
          el.classList.remove('revealed');
          ['background','border','color','font-weight'].forEach(p => el.style.removeProperty(p));
        });
      document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`)?.classList.remove('active');
      const overlayContainer = document.getElementById('overlay-steps-' + pid);
      overlayContainer?.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      updateStepBtns(pid);
      return;
    }
    const stepEl = container.querySelector(`.step[data-step-num="${targetStep}"]`);
    if (!stepEl) return;
    if (!stepState[pid]) stepState[pid] = new Set();
    const isOpen = stepEl.style.display !== 'none';
    if (isOpen) {
      stepEl.style.display = 'none';
      stepState[pid].delete(targetStep);
    } else {
      stepEl.style.display = 'block';
      stepEl.style.animation = 'none'; void stepEl.offsetWidth; stepEl.style.animation = '';
      stepState[pid].add(targetStep);
    }
    updateStepBtns(pid);
    renderMath(container);
    if (!isOpen) setTimeout(() => stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
  }
  function restoreStepState(pid) {
    const saved = stepState[pid];
    if (!saved || saved.size === 0) return;
    const toOpen = [...saved].sort((a,b) => a-b);
    stepState[pid] = new Set();
    toOpen.forEach(n => showSteps(pid, n));
  }
  function updateStepBtns(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    card?.querySelectorAll('.step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn') || btn.classList.contains('answer-btn')) return;
      btn.classList.toggle('active', opened.has(parseInt(btn.dataset.step)));
    });
  }
  function highlightAnswer(pid, problem) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const overlay = document.getElementById('scratch-overlay');
    const targets = [];
    if (card) targets.push(card.querySelector('.correct-choice'));
    if (overlay) targets.push(overlay.querySelector('.correct-choice'));
    targets.filter(Boolean).forEach(correct => { correct.classList.add('revealed'); });
  }
  function revealAnswerOnly(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const btn = card?.querySelector('.answer-btn');
    if (!card || !btn) return;
    if (btn.classList.contains('active')) {
      [card.querySelector('.correct-choice'),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => { el.classList.remove('revealed'); });
      btn.classList.remove('active');
      const ansBoxes = card.querySelectorAll('.answer-reveal-inline');
      ansBoxes.forEach(b => b.remove());
      document.querySelectorAll('#scratch-overlay .answer-reveal-inline').forEach(b => b.remove());
    } else {
      const problem = PROBLEMS.find(p => p.id === pid);
      if (!problem) return;
      if (problem.type === 'choice') {
        highlightAnswer(pid, problem);
      } else {
        const ansHTML = `<div class="answer-reveal answer-reveal-inline"><span class="answer-label">정답</span><span class="answer-number">${problem.answerText || ''}</span></div>`;
        const sec = card.querySelector('.problem-section');
        if (sec && !sec.querySelector('.answer-reveal-inline')) { sec.insertAdjacentHTML('beforeend', ansHTML); renderMath(sec); }
        const overlayProb = document.querySelector('#scratch-overlay .scratch-overlay-problem');
        if (overlayProb && !overlayProb.querySelector('.answer-reveal-inline')) { overlayProb.insertAdjacentHTML('beforeend', ansHTML); renderMath(overlayProb); }
      }
      btn.classList.add('active');
    }
  }
  function renderMath(el) {
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]).catch(() => {});
  }
  const printModal    = document.getElementById('print-modal');
  const modalBackdrop = document.getElementById('modal-backdrop');
  const printArea     = document.getElementById('print-area');
  document.getElementById('btn-print').addEventListener('click', () => {
    printModal.setAttribute('aria-hidden', 'false');
    printModal.classList.add('open'); modalBackdrop.classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click', closePrintModal);
  modalBackdrop.addEventListener('click', closePrintModal);
  function closePrintModal() {
    printModal.classList.remove('open'); modalBackdrop.classList.remove('open');
    printModal.setAttribute('aria-hidden', 'true');
  }
  document.getElementById('modal-confirm').addEventListener('click', () => {
    const rangeVal = document.querySelector('input[name="print-range"]:checked').value;
    const printMode = document.querySelector('input[name="print-mode"]:checked').value;
    let targetProblems;
    if (rangeVal === 'current') targetProblems = [filteredList[currentIdx]];
    else if (rangeVal === 'filter') targetProblems = [...filteredList];
    else targetProblems = [...PROBLEMS];
    buildPrintArea(targetProblems, printMode);
    closePrintModal();
    setTimeout(() => { window.print(); }, 600);
  });
  function buildPrintArea(problems, mode) {
    printArea.innerHTML = problems.map(p => {
      const nums = ['①','②','③','④','⑤'];
      let choicesHTML = '';
      if (p.type === 'choice' && p.choices) {
        choicesHTML = `<ol class="print-choices">` +
          p.choices.map((c, i) => `<li class="${(mode === 'solution' && i === p.answer) ? 'print-correct' : ''}">${nums[i]} ${c}</li>`).join('') + `</ol>`;
      } else {
        choicesHTML = `<div class="print-short-label">단답형${mode === 'solution' && p.answerText ? ' — 정답: ' + p.answerText : ''}</div>`;
      }
      let extraHTML = '';
      if (mode === 'solution') {
        extraHTML = `<div class="print-solution"><div class="print-solution-title">해설</div>` +
          p.steps.map(s => `<div class="print-step"><span class="print-step-tag">${s.tag}</span><span class="print-step-title">${s.title}</span><div class="print-step-body">${s.body}</div></div>`).join('') +
          (p.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span>${p.keypoint}</div>` : '') + `</div>`;
      }
      if (mode === 'blank') {
        return `<div class="print-card print-mode-blank"><div class="print-content-area"><div class="print-badge">${p.levelLabel} ${p.num}</div><div class="print-question">${p.question}</div>${choicesHTML}</div><div class="print-blank-space" aria-hidden="true"></div></div>`;
      }
      return `<div class="print-card print-mode-${mode}"><div class="print-badge">${p.levelLabel} ${p.num}</div><div class="print-question">${p.question}</div>${choicesHTML}${extraHTML}</div>`;
    }).join('');
    renderMath(printArea);
  }
  prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
  nextBtn.addEventListener('click', () => goTo(currentIdx + 1));
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });
  document.addEventListener('click', e => {
    const stepBtn = e.target.closest('.step-btn');
    if (stepBtn) {
      const pid = stepBtn.dataset.pid;
      if (stepBtn.classList.contains('answer-btn')) revealAnswerOnly(pid);
      else showSteps(pid, parseInt(stepBtn.dataset.step));
      if (typeof window.syncOverlayStepUI === 'function') window.syncOverlayStepUI(pid);
    }
  });
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentIdx + 1); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(currentIdx - 1); }
    if (['1','2','3','4','5','6'].includes(e.key)) {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, parseInt(e.key)); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === '0') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, 0); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'a' || e.key === 'A') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { revealAnswerOnly(pid); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'Escape' && document.getElementById('scratch-overlay')) {
      e.preventDefault(); closeScratchOverlay();
    }
  });
  let tx = 0, ty = 0, tt = 0, swipeActive = false;
  mainArea.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) { swipeActive = false; return; }
    swipeActive = true; tx = e.touches[0].clientX; ty = e.touches[0].clientY; tt = Date.now();
  }, { passive: true });
  mainArea.addEventListener('touchmove', e => { if (e.touches.length > 1) swipeActive = false; }, { passive: true });
  mainArea.addEventListener('touchend', e => {
    if (!swipeActive) return;
    swipeActive = false;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const dt = Date.now() - tt;
    if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy) * 2 && dt < 600) {
      goTo(dx < 0 ? currentIdx + 1 : currentIdx - 1);
    }
  }, { passive: true });
  (function () {
    const toggle = document.querySelector('[data-theme-toggle]');
    const html = document.documentElement;
    let dark = matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    setIcon(toggle, dark);
    toggle?.addEventListener('click', () => {
      dark = !dark;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      setIcon(toggle, dark);
    });
    function setIcon(btn, isDark) {
      if (!btn) return;
      btn.innerHTML = isDark
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
  })();
  window.openScratchOverlay = function(e) {
    if (e) e.stopPropagation();
    renderScratchOverlay(true);
  };
  function renderScratchOverlay(animateIn) {
    const existing = document.getElementById('scratch-overlay');
    if (existing) existing.remove();
    const problem = filteredList[currentIdx];
    if (!problem) return;
    const nums = ['①','②','③','④','⑤'];
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }
    const titleSuffix = `${problem.levelLabel} ${problem.num} · `;
    const _lvc = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = _lvc[problem.level] || _lvc.basic;
    const badgeHTML = `<div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>`;
    const problemHTML = `${badgeHTML}<div class="problem-statement">${problem.question}</div>${choicesHTML}`;
    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;
    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `<div class="step" data-step-num="${i+1}" style="display:none"><div class="step-header"><span class="step-tag">${step.tag}</span><span class="step-title">${step.title}</span></div><div class="step-body">${step.body}</div></div>`;
    });
    const total = filteredList.length;
    const prevDisabled = currentIdx === 0 ? 'disabled' : '';
    const nextDisabled = currentIdx === total - 1 ? 'disabled' : '';
    const overlay = document.createElement('div');
    overlay.className = 'scratch-overlay';
    overlay.id = 'scratch-overlay';
    if (!animateIn) overlay.style.animation = 'none';
    overlay.innerHTML = `<div class="scratch-overlay-header"><span class="scratch-overlay-title">${titleSuffix}풀이 공간</span><div class="overlay-nav"><button class="overlay-nav-btn" id="overlay-prev" ${prevDisabled} aria-label="이전 문제">← 이전</button><span class="overlay-nav-label">${currentIdx+1} / ${total}</span><button class="overlay-nav-btn" id="overlay-next" ${nextDisabled} aria-label="다음 문제">다음 →</button></div><button class="scratch-overlay-close" id="scratch-overlay-close" aria-label="닫기">&times;</button></div><div class="scratch-overlay-body"><div class="scratch-overlay-problem">${problemHTML}</div><div class="scratch-overlay-canvas"><div class="overlay-step-bar">${stepBtns}</div><div class="overlay-steps-container" id="overlay-steps-${problem.id}">${stepsHTML}</div></div></div>`;
    document.body.appendChild(overlay);
    renderMath(overlay);
    document.getElementById('scratch-overlay-close').addEventListener('click', closeScratchOverlay);
    document.getElementById('overlay-prev').addEventListener('click', () => { if (currentIdx > 0) goTo(currentIdx - 1); });
    document.getElementById('overlay-next').addEventListener('click', () => { if (currentIdx < filteredList.length - 1) goTo(currentIdx + 1); });
    syncOverlayStepUI(problem.id);
  }
  function closeScratchOverlay() {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    overlay.style.animation = 'overlayOut 180ms cubic-bezier(0.4,0,1,1) both';
    overlay.addEventListener('animationend', () => overlay.remove(), { once: true });
  }
  function syncOverlayStepUI(pid) {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    const container = document.getElementById('overlay-steps-' + pid);
    if (!container) return;
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    container.querySelectorAll('.step').forEach(stepEl => {
      const n = parseInt(stepEl.dataset.stepNum, 10);
      stepEl.style.display = opened.has(n) ? 'block' : 'none';
    });
    overlay.querySelectorAll('.overlay-step-bar .step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn')) return;
      const s = btn.dataset.step;
      if (s === 'answer') {
        const mainAnswerBtn = document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`);
        btn.classList.toggle('active', !!mainAnswerBtn?.classList.contains('active'));
      } else {
        btn.classList.toggle('active', opened.has(parseInt(s, 10)));
      }
    });
  }
  window.syncOverlayStepUI = syncOverlayStepUI;
  (function(){
    if(!document.getElementById('overlay-out-style')){
      const s=document.createElement('style');
      s.id='overlay-out-style';
      s.textContent='@keyframes overlayOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.97)}}';
      document.head.appendChild(s);
    }
  })();
  (function setupDownload() {
    const dlBtn = document.getElementById('btn-download');
    if (!dlBtn) return;
    dlBtn.addEventListener('click', function () {
      const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '수능특강_미적분I_도함수의활용1_해설.html';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    });
  })();
  function jumpToAnchor() {
    const hash = (location.hash || '').replace(/^#/, '');
    if (!hash) return false;
    const idx = PROBLEMS.findIndex(p => p.id === hash);
    if (idx < 0) return false;
    applyFilter('all');
    currentIdx = idx;
    showCard(idx); updateNav(); updateProgress();
    return true;
  }
  window.addEventListener('hashchange', jumpToAnchor);
  function init() {
    applyFilter('all');
    if (location.hash) setTimeout(jumpToAnchor, 50);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
<script>
document.addEventListener('keydown', (e) => {
  if (e.isComposing) return;
  const t = e.target;
  if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
  if (e.key === 'h' || e.key === 'H') {
    e.preventDefault();
    const w = window.open('index-calc.html', 'aftermath_main_calc'); if (w) w.focus();
  }
});
</script>

<script>
/* named window 일관 처리 — 이미 열린 창 있으면 새 창 없이 focus */
document.addEventListener('click', function(e) {
  const a = e.target.closest('a[target^="aftermath_"]');
  if (!a) return;
  e.preventDefault();
  const w = window.open(a.href, a.target);
  if (w) w.focus();
});
</script>
