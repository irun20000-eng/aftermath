  /* ───────── 기초 6 ───────── */
  {
    id:'c1-b6', level:'basic', levelLabel:'기초', num:6, type:'choice',
    subLabel:'[26009-0014] · 유리화 + 미정계수',
    title:'\\(\\displaystyle \\lim_{x\\to -1}\\dfrac{x+1}{\\sqrt{x+a}+b}=6\\)에서 \\(a+b\\)',
    question:`<p>\\(\\displaystyle \\lim_{x\\to -1}\\dfrac{x+1}{\\sqrt{x+a}+b}=6\\)일 때 \\(a+b\\)의 값은? (단, \\(a\\), \\(b\\)는 상수.)</p>`,
    choices:['\\(3\\)','\\(4\\)','\\(5\\)','\\(6\\)','\\(7\\)'], answer:4,
    keypoint:'분모 유리화 후 \\(x+1\\)이 약분돼 \\(2\\sqrt{a-1}\\) 형태가 나타나는 패턴.',
    steps:[
      {tag:'STEP 1', title:'분모가 \\(0\\)이어야 한다', body:`<p>분자 \\(\\to 0\\), 극한값 \\(6 \\neq 0\\) → 분모도 \\(\\to 0\\).</p>
<div class="calc">\\(\\sqrt{-1+a}+b=0 \\Rightarrow b = -\\sqrt{a-1}\\)</div>`},
      {tag:'STEP 2', title:'유리화로 분모에서 \\(x+1\\) 약분', body:`<div class="calc">\\(\\dfrac{x+1}{\\sqrt{x+a}-\\sqrt{a-1}}\\cdot\\dfrac{\\sqrt{x+a}+\\sqrt{a-1}}{\\sqrt{x+a}+\\sqrt{a-1}} = \\dfrac{(x+1)(\\sqrt{x+a}+\\sqrt{a-1})}{(x+a)-(a-1)} = \\sqrt{x+a}+\\sqrt{a-1}\\)</div>
<div class="calc purple">\\(\\to 2\\sqrt{a-1}=6 \\Rightarrow a-1=9 \\Rightarrow a=10,\\ b=-3\\)</div>`},
      {tag:'STEP 3', title:'합', body:`<div class="calc purple">\\(a+b=10+(-3)=7\\)</div>`}
    ]
  },

  /* ───────── 기초 7 ───────── */
  {
    id:'c1-b7', level:'basic', levelLabel:'기초', num:7, type:'choice',
    subLabel:'[26009-0015] · ∞/∞ + 0/0 동시 조건',
    title:'두 극한 조건으로 \\(f(1)\\)',
    question:`<p>다항함수 \\(f(x)\\)에 대하여 \\(\\displaystyle \\lim_{x\\to \\infty}\\dfrac{f(x)}{x^2+1}=3,\\ \\lim_{x\\to 0}\\dfrac{f(x)}{x}=7\\) 일 때, \\(f(1)\\)의 값은?</p>`,
    choices:['\\(7\\)','\\(8\\)','\\(9\\)','\\(10\\)','\\(11\\)'], answer:3,
    keypoint:'다항함수 결정의 기본 — ∞/∞로 차수·최고차, 0/0으로 상수·일차 계수 식별.',
    steps:[
      {tag:'STEP 1', title:'∞/∞ 조건 → \\(f\\)는 이차, 최고차 계수 \\(3\\)', body:`<p>분모 차수 2, 극한값 유한·0이 아님 ⇒ 분자 차수도 2, 최고차 계수 비율 = 3.</p>
<div class="calc">\\(f(x) = 3x^2 + ax + b\\)</div>`},
      {tag:'STEP 2', title:'0/0 조건 → 상수항 \\(b=0\\)', body:`<p>분모 \\(\\to 0\\), 극한 유한 → 분자 \\(\\to 0\\).</p>
<div class="calc">\\(f(0)=b=0\\)</div>
<div class="calc">\\(\\dfrac{3x^2+ax}{x} = 3x+a \\to a = 7\\)</div>`},
      {tag:'STEP 3', title:'\\(f(1)\\)', body:`<div class="calc purple">\\(f(x)=3x^2+7x \\Rightarrow f(1)=3+7=10\\)</div>`}
    ]
  },

  /* ───────── 기초 8 ───────── */
  {
    id:'c1-b8', level:'basic', levelLabel:'기초', num:8, type:'choice',
    subLabel:'[26009-0016] · 샌드위치 정리 (∞)',
    title:'\\(x(x+4)\\leq f(x)+x^2 \\leq (x+2)^2\\) → \\(\\dfrac{f(2x)}{6x+1}\\)',
    question:`<p>함수 \\(f(x)\\)가 모든 양의 실수 \\(x\\)에 대하여 \\(x(x+4)\\leq f(x)+x^2 \\leq (x+2)^2\\)을 만족할 때, \\(\\displaystyle \\lim_{x\\to \\infty}\\dfrac{f(2x)}{6x+1}\\)의 값은?</p>`,
    choices:['\\(\\dfrac{1}{3}\\)','\\(\\dfrac{2}{3}\\)','\\(1\\)','\\(\\dfrac{4}{3}\\)','\\(\\dfrac{5}{3}\\)'], answer:3,
    keypoint:'조임 정리 (∞) — 양 끝 식의 최고차 계수 비율이 답.',
    steps:[
      {tag:'STEP 1', title:'\\(x^2\\) 빼서 \\(f(x)\\) 범위 정리', body:`<p>\\((x+2)^2 = x^2+4x+4\\), \\(x(x+4)=x^2+4x\\) 이므로</p>
<div class="calc">\\(x^2+4x \\leq f(x)+x^2 \\leq x^2+4x+4\\)</div>
<div class="calc purple">\\(4x \\leq f(x) \\leq 4x+4\\)</div>`},
      {tag:'STEP 2', title:'\\(x\\to 2x\\) 대입 후 \\(6x+1\\)로 나누기', body:`<div class="calc">\\(8x \\leq f(2x) \\leq 8x+4\\)</div>
<div class="calc">\\(\\dfrac{8x}{6x+1} \\leq \\dfrac{f(2x)}{6x+1} \\leq \\dfrac{8x+4}{6x+1}\\)</div>
<div class="calc purple">양 끝 모두 \\(\\to \\dfrac{8}{6} = \\dfrac{4}{3}\\)</div>`}
    ]
  },

  /* ───────── 기본 1 ───────── */
  {
    id:'c1-s1', level:'standard', levelLabel:'기본', num:1, type:'choice',
    subLabel:'[26009-0017] · 이차함수 ∞−∞ 결정',
    title:'이차함수 \\(f\\): \\(\\sqrt{f(x)}-2x\\to 1\\), \\([f(x)-f(-x)]/x = f(0)\\)',
    question:`<p>이차함수 \\(f(x)\\)에 대하여 \\(\\displaystyle \\lim_{x\\to \\infty}(\\sqrt{f(x)}-2x)=1,\\ \\lim_{x\\to \\infty}\\dfrac{f(x)-f(-x)}{x}=f(0)\\) 일 때, \\(f(1)\\)의 값은?</p>`,
    choices:['\\(15\\)','\\(16\\)','\\(17\\)','\\(18\\)','\\(19\\)'], answer:1,
    keypoint:'\\(\\sqrt{\\ }-\\) 형태는 유리화 후 "분자 차수가 분모 차수와 같아야 유한".',
    steps:[
      {tag:'STEP 1', title:'\\(\\sqrt{f}-2x\\)의 유리화로 차수·계수 결정', body:`<p>\\(f(x)=ax^2+bx+c\\,(a\\neq 0)\\)로 놓고</p>
<div class="calc">\\(\\sqrt{f}-2x = \\dfrac{f(x)-4x^2}{\\sqrt{f}+2x} = \\dfrac{(a-4)x^2+bx+c}{\\sqrt{ax^2+bx+c}+2x}\\)</div>
<p>분모 ~ \\((\\sqrt{a}+2)x\\), 분자 차수가 \\(2\\)면 발산. 따라서 \\(a=4\\). 그러면 분자 \\(=bx+c\\), 분모 ~ \\(4x\\) →</p>
<div class="calc purple">\\(\\dfrac{b}{\\sqrt{a}+2} = \\dfrac{b}{4}=1 \\Rightarrow b=4\\)</div>`},
      {tag:'STEP 2', title:'\\([f(x)-f(-x)]/x\\) 계산', body:`<div class="calc">\\(f(x)-f(-x) = (4x^2+4x+c)-(4x^2-4x+c) = 8x\\)</div>
<div class="calc">\\(\\dfrac{8x}{x} = 8 \\to 8 = f(0) = c\\)</div>`},
      {tag:'STEP 3', title:'\\(f(1)\\)', body:`<div class="calc purple">\\(f(x)=4x^2+4x+8 \\Rightarrow f(1)=4+4+8=16\\)</div>`}
    ]
  },

  /* ───────── 기본 2 ───────── */
  {
    id:'c1-s2', level:'standard', levelLabel:'기본', num:2, type:'choice',
    subLabel:'[26009-0018] · 조각함수 + 좌극한 방정식',
    title:'\\(f(k) + \\lim_{x\\to k-} f(x) = 2a+2\\)인 \\(k\\)가 \\(2\\)개',
    question:`<p>\\(f(x)=\\begin{cases} x & (x\\lt a) \\\\ 4 & (x=a) \\\\ x-1 & (x\\gt a)\\end{cases}\\) 라 하자. \\(f(k) + \\displaystyle \\lim_{x\\to k-}f(x)=2a+2\\)를 만족시키는 모든 실수 \\(k\\)가 \\(k_1,k_2\\,(k_1\\neq k_2)\\) 일 때, \\(k_1+k_2\\)?</p>`,
    choices:['\\(3\\)','\\(4\\)','\\(5\\)','\\(6\\)','\\(7\\)'], answer:3,
    keypoint:'조각함수 함숫값 + 좌극한 문제 — "정의역의 케이스 (ⅰ),(ⅱ),(ⅲ)"로 분류해 식 따로 정리.',
    steps:[
      {tag:'STEP 1', title:'\\(k\\)의 위치별 케이스', body:`<p>(ⅰ) \\(k\\lt a\\): \\(f(k)=k,\\ \\lim_{-}=k\\). 식 → \\(2k=2a+2\\ \\Rightarrow\\ k=a+1\\). 그러나 \\(k\\lt a\\) 위반.</p>
<p>(ⅱ) \\(k=a\\): \\(f(a)=4,\\ \\lim_{x\\to a-}=a\\). 식 → \\(4+a=2a+2 \\Rightarrow a=2\\). 이때 \\(k=2\\).</p>
<p>(ⅲ) \\(k\\gt a\\): \\(f(k)=k-1,\\ \\lim_{-}=k-1\\). 식 → \\(2(k-1)=2a+2 \\Rightarrow k=a+2\\). 만족.</p>`},
      {tag:'STEP 2', title:'두 개의 \\(k\\) — \\(a=2\\) 확정, \\(k_1+k_2\\)', body:`<p>두 해가 \\(k=a=2\\)와 \\(k=a+2=4\\). 합은</p>
<div class="calc purple">\\(k_1+k_2 = 2+4=6\\)</div>`}
    ]
  },

  /* ───────── 기본 3 ───────── */
  {
    id:'c1-s3', level:'standard', levelLabel:'기본', num:3, type:'choice',
    subLabel:'[26009-0019] · 두 조각함수 차의 극한 존재',
    title:'모든 실수 \\(k\\)에 대해 \\(\\lim_{x\\to k}(f-g)\\) 존재',
    question:`<p>\\(f(x)=\\begin{cases} x+3 & (x\\leq 1) \\\\ x-3 & (x\\gt 1)\\end{cases}\\), \\(g(x)=\\begin{cases} x^2+ax & (x\\leq a)\\\\ bx & (x\\gt a)\\end{cases}\\) 일 때, 모든 실수 \\(k\\)에 대해 \\(\\displaystyle \\lim_{x\\to k}(f(x)-g(x))\\)가 존재할 때 \\(a+b\\)? (단, \\(a,b\\)는 상수)</p>`,
    choices:['\\(-3\\)','\\(-1\\)','\\(0\\)','\\(1\\)','\\(3\\)'], answer:0,
    keypoint:'차의 극한이 모든 점에서 존재 ⇔ 점프의 위치·크기가 정확히 상쇄.',
    steps:[
      {tag:'STEP 1', title:'\\(f\\)의 불연속점은 \\(x=1\\) — \\(g\\)도 \\(x=a\\)에서 끊임', body:`<p>\\(\\lim_{x\\to 1-} f = 4,\\ \\lim_{x\\to 1+} f = -2\\) 이므로 \\(\\lim_{x\\to 1} f\\) 존재 ✗.</p>
<p>\\(\\lim_{x\\to k}(f-g)\\)가 존재하려면 \\(f\\)의 끊김을 \\(g\\)도 같은 위치에서 같은 점프로 갖아야 한다. → \\(a=1\\).</p>`},
      {tag:'STEP 2', title:'\\(a=1\\) 대입 후 \\(x\\to 1\\) 좌·우극한 일치 강제', body:`<div class="calc">\\(x\\leq 1\\): \\(f-g = (x+3)-(x^2+x) = -x^2+3\\)</div>
<div class="calc">\\(x\\gt 1\\): \\(f-g = (x-3)-bx = (1-b)x-3\\)</div>
<div class="calc">\\(x\\to 1-\\): \\(-1+3=2\\), \\(x\\to 1+\\): \\((1-b)-3 = -b-2\\)</div>
<div class="calc purple">\\(2 = -b-2 \\Rightarrow b=-4\\)</div>`},
      {tag:'STEP 3', title:'합', body:`<div class="calc purple">\\(a+b=1+(-4)=-3\\)</div>`}
    ]
  },

  /* ───────── 기본 4 ───────── */
  {
    id:'c1-s4', level:'standard', levelLabel:'기본', num:4, type:'short',
    subLabel:'[26009-0020] · h(t)=교점 수 (서답형)',
    title:'\\(g(x)=\\min(f(x),4x)\\)와 직선 \\(y=t\\)의 교점 수',
    question:`<p>최고차항의 계수가 1인 이차함수 \\(f(x)\\)에 대하여 \\(g(x)=\\begin{cases} f(x) & (f(x)\\lt 4x)\\\\ 4x & (f(x)\\geq 4x)\\end{cases}\\). \\(y=t\\)와 \\(y=g(x)\\)의 교점 수를 \\(h(t)\\)라 할 때 (가) \\(\\lim_{t\\to 0+} h(t) \\gt  \\lim_{t\\to 0-} h(t)\\) (나) \\(h(-2)+h(1)+h(4)=6\\)이면 \\(f(7)\\)?</p>`,
    answerText:'\\(16\\)',
    keypoint:'\\(\\min\\)함수의 교점 수 문제 — "극값" 위치에서 좌·우극한이 달라진다.',
    steps:[
      {tag:'STEP 1', title:'\\(g\\)의 그래프 모양 분석', body:`<p>\\(g = \\min(f,4x)\\). 곡선 \\(y=f(x)\\)와 직선 \\(y=4x\\)가 두 점 \\(P(p,f(p))\\), \\(Q(q,f(q))\\, (p\\lt q)\\)에서 만남. 두 점 사이에선 \\(g=f\\), 바깥에선 \\(g=4x\\). 점 \\(P\\)가 \\(f\\)의 축 왼쪽이면 \\(g\\)는 증가→감소→증가 (그림 2).</p>`},
      {tag:'STEP 2', title:'조건 (가)·(나) 해석 — \\(t_1=0,\\ t_2=4\\)', body:`<p>\\(g\\)의 극댓값=\\(t_1\\), 극솟값=\\(t_2\\,(\\lt t_1)\\)이라 하자. 조건 (가)에서 \\(t_1=0\\) (\\(0\\)에서 우극한>좌극한이려면 직선 \\(y=0\\)이 극댓값과 같아야 함).</p>
<p>\\(h(-2)=1,\\ h(1)+h(4)=5\\). \\(h(1)=3,\\ h(4)=2\\Rightarrow t_2=4\\). 즉 \\(y=4\\)와 \\(y=4x\\)의 교점은 \\((1,4)\\) → 곡선 위의 점이므로 \\(f(1)=4\\).</p>`},
      {tag:'STEP 3', title:'\\(f\\) 결정 → \\(f(7)\\)', body:`<p>꼭짓점 \\(y\\) 좌표 \\(=0\\), \\(x\\) 좌표\\(\\gt 1\\), 계수 1 → \\(f(x)=(x-a)^2,\\ a\\gt 1\\). \\(f(1)=(1-a)^2=4 \\Rightarrow a=3\\).</p>
<div class="calc purple">\\(f(x)=(x-3)^2,\\ f(7)=4^2=16\\)</div>`}
    ]
  },

  /* ───────── 기본 5 ───────── */
  {
    id:'c1-s5', level:'standard', levelLabel:'기본', num:5, type:'short',
    subLabel:'[26009-0021] · 0/0 + 미정계수 + 불존재 조건 (서답형)',
    title:'\\(\\displaystyle \\lim_{x\\to 1}\\dfrac{f(x)+3}{(x-1)(f(x)+f(k))}\\) 불존재 \\(\\Leftrightarrow k=0,2\\)',
    question:`<p>이차함수 \\(f(x)\\)에 대해 \\(\\displaystyle \\lim_{x\\to 1}\\dfrac{f(x)+3}{(x-1)(f(x)+f(k))}\\) 의 값이 <b>존재하지 않도록</b> 하는 실수 \\(k\\)가 \\(0\\)과 \\(2\\) 뿐일 때, \\(f(4)\\)?</p>`,
    answerText:'\\(51\\)',
    keypoint:'"불존재 조건"의 핵심 — 약분 후 식이 \\(\\dfrac{0이\\ 아닌\\ 값}{0}\\) 또는 \\(\\dfrac{\\text{유한}}{0}\\) 형태가 되는 \\(k\\).',
    steps:[
      {tag:'STEP 1', title:'\\(k\\neq 0, 2\\)에서 극한 존재 ⇒ 분자 \\(\\to 0\\)', body:`<p>분모 \\(\\to 0\\), 극한 존재 ⇒ 분자도 \\(\\to 0\\) ⇒ \\(f(1)+3=0\\), 즉 \\(f(1)=-3\\).</p>
<p>\\(f(x)=ax^2+bx+c\\)라 하고 \\(a+b+c+3=0 \\Rightarrow c=-a-b-3\\).</p>
<div class="calc">\\(f(x)+3 = ax^2+bx-a-b = (x-1)(ax+a+b)\\)</div>
<div class="calc purple">전체 \\(= \\dfrac{ax+a+b}{f(x)+f(k)}\\)</div>`},
      {tag:'STEP 2', title:'\\(k=0\\)에서 "불존재" ⇒ \\(\\lim(f+f(0))=0\\)이지만 분자 분의 0이 안 됨', body:`<p>\\(f(0)=c=-a-b-3\\) 이므로 \\(\\lim_{x\\to 1}(f(x)+f(0)) = f(1)+f(0) = -3+c = -a-b-6\\). 이게 \\(0\\)이어야 함.</p>
<div class="calc">\\(a+b=-6\\) ... ㉠</div>`},
      {tag:'STEP 3', title:'\\(k=2\\)에서도 동일하게 ⇒ \\(f(2)+f(1)=0\\) → \\(3a+b=6\\) ... ㉡', body:`<p>\\(f(2)=4a+2b+c = 4a+2b-a-b-3=3a+b-3\\). \\(f(2)+f(1)=3a+b-3-3=3a+b-6=0\\).</p>
<p>㉠, ㉡ 연립 \\(\\Rightarrow a=6,\\ b=-12,\\ c=-6-(-12)-3=3\\).</p>`},
      {tag:'STEP 4', title:'\\(f(4)\\)', body:`<div class="calc purple">\\(f(x)=6x^2-12x+3 \\Rightarrow f(4)=96-48+3=51\\)</div>`}
    ]
  },

  /* ───────── 기본 6 ───────── */
  {
    id:'c1-s6', level:'standard', levelLabel:'기본', num:6, type:'choice',
    subLabel:'[26009-0022] · \\(x^n f(1/x)\\) 차수 결정',
    title:'\\(\\lim x^n f(1/x) = 4p\\), \\(\\lim\\dfrac{f(x)+2x^2-x}{x^n+x}=p\\) — \\(f(-1)\\) 합',
    question:`<p>다음 조건을 만족시키는 모든 다항함수 \\(f(x)\\)에 대하여 \\(f(-1)\\)의 값의 합은? <br>어떤 자연수 \\(n\\)과 어떤 실수 \\(p\\,(p\\neq 0)\\)에 대하여 \\(\\displaystyle \\lim_{x\\to \\infty} x^n f\\!\\left(\\dfrac{1}{x}\\right)=4p\\), \\(\\displaystyle \\lim_{x\\to \\infty}\\dfrac{f(x)+2x^2-x}{x^n+x}=p\\) 이다.</p>`,
    choices:['\\(-8\\)','\\(-\\dfrac{20}{3}\\)','\\(-\\dfrac{16}{3}\\)','\\(-4\\)','\\(-\\dfrac{8}{3}\\)'], answer:1,
    keypoint:'\\(\\lim x^n f(1/x)\\) 형태는 \\(t=1/x\\) 치환 — \\(f\\)의 최저차항 정보가 나온다.',
    steps:[
      {tag:'STEP 1', title:'\\(1/x=t\\) 치환 — 첫 조건의 의미', body:`<p>\\(\\displaystyle \\lim_{t\\to 0+}\\dfrac{f(t)}{t^n}=4p\\). \\(f\\)의 모든 항 차수 \\(\\geq n\\), \\(x^n\\) 계수 \\(=4p\\).</p>`},
      {tag:'STEP 2', title:'\\(n=1\\) 케이스', body:`<p>두 번째 식 \\(=\\dfrac{f(x)+2x^2-x}{2x}=p\\). 분자 \\(=2px+q\\) ⇒ \\(f(x)=-2x^2+(2p+1)x+q\\). STEP 1 조건 \\(2p+1=4p\\), \\(q=0\\) ⇒ \\(p=\\dfrac{1}{2}\\).</p>
<div class="calc purple">\\(f(x)=-2x^2+2x,\\ f(-1)=-4\\)</div>`},
      {tag:'STEP 3', title:'\\(n=2\\) 케이스', body:`<p>두 번째 식 \\(=\\dfrac{f+2x^2-x}{x^2+x}=p\\) ⇒ \\(f(x)=(p-2)x^2+(r+1)x+s\\). STEP 1: \\(p-2=4p,\\ r+1=0,\\ s=0\\) ⇒ \\(p=-\\dfrac{2}{3}\\).</p>
<div class="calc purple">\\(f(x)=-\\dfrac{8}{3}x^2,\\ f(-1)=-\\dfrac{8}{3}\\)</div>`},
      {tag:'STEP 4', title:'\\(n\\geq 3\\) — \\(p=4p\\) ⇒ \\(p=0\\) 위반, 합 계산', body:`<div class="calc purple">\\(-4 + \\left(-\\dfrac{8}{3}\\right) = -\\dfrac{20}{3}\\)</div>`}
    ]
  },

  /* ───────── 기본 7 ───────── */
  {
    id:'c1-s7', level:'standard', levelLabel:'기본', num:7, type:'choice',
    subLabel:'[26009-0023] · 도형 + ∞ 극한',
    title:'\\(y=\\sqrt{x}\\) 위 점 \\(P(t^2,t)\\)에서 \\(\\overline{PH}-\\overline{QH}\\)',
    question:`<p>그림과 같이 \\(t\\gt 1\\)인 실수 \\(t\\)에 대하여 곡선 \\(y=\\sqrt{x}\\) 위의 점 \\(P(t^2,t)\\)를 지나고 기울기가 \\(-1\\)인 직선이 \\(x\\)축과 만나는 점을 \\(Q\\), 점 \\(Q\\)에서 직선 \\(OP\\)에 내린 수선의 발을 \\(H\\)라 하자. \\(\\displaystyle \\lim_{t\\to \\infty}(\\overline{PH}-\\overline{QH})\\)의 값은? (단, \\(O\\)는 원점.)</p>
<!-- 2027 수능특강 수학 II P.15 기본 7 [26009-0023] 원본 그림 — PyMuPDF cropping -->
<div class="graph-box">
  <img src="images/calc_sol_c1-s7.png" alt="기본 7 그림 — 곡선 y=√x 위의 점 P, x축과 만나는 점 Q, OP에 내린 수선의 발 H 도형" style="max-width:100%;height:auto;" />
</div>`,
    choices:['\\(-\\dfrac{5}{2}\\)','\\(-2\\)','\\(-\\dfrac{3}{2}\\)','\\(-1\\)','\\(-\\dfrac{1}{2}\\)'], answer:1,
    keypoint:'도형 극한 — 길이를 \\(t\\)의 함수로 정확히 정리한 뒤, 분모·분자 차수 비교.',
    steps:[
      {tag:'STEP 1', title:'점 \\(Q\\)의 좌표 구하기 (45도 직선)', body:`<p>\\(P(t^2,t)\\)에서 기울기 \\(-1\\)인 직선은 \\(y\\)를 \\(0\\)으로 만들기 위해 \\(x\\)를 \\(t\\)만큼 더해야 함 → \\(Q(t^2+t,\\,0)\\). \\(\\overline{PQ}=\\sqrt{2}\\,t\\).</p>`},
      {tag:'STEP 2', title:'\\(\\overline{QH}\\) — 점에서 직선까지 거리', body:`<p>직선 \\(OP\\): \\(x-ty=0\\). 거리:</p>
<div class="calc">\\(\\overline{QH}=\\dfrac{|t^2+t|}{\\sqrt{1+t^2}} = \\dfrac{t^2+t}{\\sqrt{1+t^2}}\\)</div>`},
      {tag:'STEP 3', title:'\\(\\overline{PH}\\) — 피타고라스', body:`<div class="calc">\\(\\overline{PH}^2 = \\overline{PQ}^2-\\overline{QH}^2 = 2t^2 - \\dfrac{(t^2+t)^2}{1+t^2}\\)</div>
<p>정리하면 \\(\\overline{PH}=\\dfrac{t^2-t}{\\sqrt{1+t^2}}\\) (\\(t\\gt 1\\)).</p>`},
      {tag:'STEP 4', title:'차의 극한', body:`<div class="calc">\\(\\overline{PH}-\\overline{QH} = \\dfrac{(t^2-t)-(t^2+t)}{\\sqrt{1+t^2}} = \\dfrac{-2t}{\\sqrt{1+t^2}}\\)</div>
<div class="calc purple">\\(\\to \\dfrac{-2}{\\sqrt{1/t^2+1}} \\to -2\\)</div>`}
    ]
  },

  /* ───────── 실력 1 ───────── */
  {
    id:'c1-l1', level:'advanced', levelLabel:'실력', num:1, type:'choice',
    subLabel:'[26009-0024] · |f(x)|−f(x) 극한 + 이차함수 결정',
    title:'조건 (가)·(나)로 이차함수 \\(f\\) 결정 → \\(f(5)\\)',
    question:`<p>이차함수 \\(f(x)\\)가 다음을 만족할 때, \\(f(5)\\)? <br>(가) \\(\\displaystyle \\lim_{x\\to a}\\dfrac{|f(x)|-f(x)}{x-a}\\)의 값이 존재하는 실수 \\(a\\)는 \\(3\\)뿐이다. <br>(나) 모든 실수 \\(b\\)에 대하여 \\(\\displaystyle \\lim_{x\\to b}\\dfrac{f(x-2)f(x+2)}{f(x)+2}\\)의 값이 존재한다.</p>`,
    choices:['\\(-\\dfrac{5}{2}\\)','\\(-2\\)','\\(-\\dfrac{3}{2}\\)','\\(-1\\)','\\(-\\dfrac{1}{2}\\)'], answer:1,
    keypoint:'절댓값 극한 + 이차함수 결정 — "모든 \\(x\\)에서 부호"와 "0인 점"을 동시 추적.',
    steps:[
      {tag:'STEP 1', title:'\\(f(x)\\geq 0\\)인 곳에서 분자가 \\(0\\) → 극한 존재 \\(\\forall a\\) (모순)', body:`<p>\\(|f|-f = \\begin{cases} 0 & f\\geq 0 \\\\ -2f & f\\lt 0 \\end{cases}\\). 어디서든 \\(f\\gt 0\\)이면 모든 \\(a\\)에서 극한 \\(=0\\) → 조건(가) 위반. ⇒ 모든 실수 \\(x\\)에서 \\(f(x)\\leq 0\\).</p>`},
      {tag:'STEP 2', title:'\\(f(x)\\lt 0\\) (모든 \\(x\\))이면 (가) 위반', body:`<p>그 경우 분자=\\(-2f\\not\\to 0\\), 분모\\(\\to 0\\) → 극한 없음. ⇒ \\(f(x)=0\\)인 \\(x\\)가 정확히 존재.</p>
<p>이차함수가 음 이하이고 0이 되는 점이 하나 ⇒ <b>중근형</b> \\(f(x)=k(x-m)^2,\\ k\\lt 0\\).</p>`},
      {tag:'STEP 3', title:'중근점 \\(m=3\\) 결정 — 조건(가)에서 \\(a=3\\)이 유일하게 존재', body:`<p>\\(a=m\\)에서만 분자=\\(-2k(x-m)^2\\)가 \\(x-a\\)로 나뉘어 극한 존재. 그 외에서는 분자\\(\\not\\to 0\\). ⇒ \\(m=3\\).</p>
<div class="calc">\\(f(x)=k(x-3)^2\\)</div>`},
      {tag:'STEP 4', title:'조건(나) — \\(f(x)+2\\)의 두 영점 \\(=1,5\\) → \\(f(1)=f(5)=-2\\)', body:`<p>분모 \\(f(x)+2=k(x-\\alpha)(x-\\beta)\\). \\(\\alpha,\\beta\\)에서 분자 \\(f(x-2)f(x+2)\\)도 \\(0\\)이어야 → \\(\\alpha-2,\\alpha+2\\in\\{3\\}\\) ⇒ \\(\\alpha\\in\\{1,5\\}\\). 두 점 \\(1,5\\)이어야 일관.</p>
<p>\\(f(1)=k\\cdot 4=-2 \\Rightarrow k=-\\dfrac{1}{2}\\).</p>
<div class="calc purple">\\(f(x)=-\\dfrac{1}{2}(x-3)^2,\\ f(5)=-\\dfrac{1}{2}\\cdot 4=-2\\)</div>`}
    ]
  },

  /* ───────── 실력 2 ───────── */
  {
    id:'c1-l2', level:'advanced', levelLabel:'실력', num:2, type:'short',
    subLabel:'[26009-0025] · 삼차함수 + 미분 활용',
    title:'\\(\\{a\\,|\\,\\lim_{x\\to a}\\dfrac{f(x)+2x+1}{f(x)+x}=\\dfrac{3}{2}\\}=\\{-1,0\\}\\)',
    question:`<p>최고차항의 계수가 \\(1\\)인 삼차함수 \\(f(x)\\)에 대하여 \\(\\{a\\,|\\,\\displaystyle \\lim_{x\\to a}\\dfrac{f(x)+2x+1}{f(x)+x}=\\dfrac{3}{2},\\ a\\in\\mathbb{R}\\}=\\{-1,0\\}\\) 일 때, \\(f(1)\\)?</p>`,
    answerText:'\\(7\\)',
    keypoint:'집합형 조건은 "각 \\(a\\)에서 동일한 비율 방정식"을 세워 미정계수를 모두 잡는다.',
    steps:[
      {tag:'STEP 1', title:'\\(a=-1\\)에서 식 분석 → \\(\\lim(f+x)=0\\)', body:`<p>분모가 \\(0\\)이 아니면 비율의 극한 = (분자/분모) 의 극한 = \\(\\dfrac{f(a)-1}{f(a)-1}=1 \\neq \\dfrac{3}{2}\\). 따라서 \\(\\lim_{x\\to -1}(f(x)+x)=0\\).</p>`},
      {tag:'STEP 2', title:'\\(f(x)+x = (x+1)g(x)\\) (\\(g\\)는 최고차 1인 이차)', body:`<p>약분 후 \\(\\dfrac{g(x)+1}{g(x)}=\\dfrac{3}{2}\\) (\\(x\\to -1\\)) ⇒ \\(\\lim_{x\\to -1}g(x)=2\\).</p>
<p>\\(g(x)=x^2+px+q\\)라 하면 \\(1-p+q=2 \\Rightarrow q=p+1\\).</p>`},
      {tag:'STEP 3', title:'\\(a=0\\)에서 같은 비율 \\(\\dfrac{3}{2}\\) → \\(p=1\\)', body:`<div class="calc">\\(\\dfrac{g(0)+1}{g(0)} = \\dfrac{q+1}{q} = \\dfrac{p+2}{p+1} = \\dfrac{3}{2}\\Rightarrow 2p+4=3p+3 \\Rightarrow p=1\\)</div>
<div class="calc purple">\\(g(x)=x^2+x+2\\)</div>`},
      {tag:'STEP 4', title:'\\(f(x)\\) 복원 후 \\(f(1)\\)', body:`<p>\\(f(x)+x = (x+1)(x^2+x+2)\\) ⇒ \\(f(x) = (x+1)(x^2+x+2)-x\\).</p>
<div class="calc purple">\\(f(1) = 2 \\cdot 4 - 1 = 7\\)</div>`}
    ]
  },

  /* ───────── 실력 3 ───────── */
  {
    id:'c1-l3', level:'advanced', levelLabel:'실력', num:3, type:'choice',
    subLabel:'[26009-0026] · 조각함수 합성 g(t) — 보기 정오',
    title:'\\(g(t)=\\lim_{x\\to t+}f(x)+\\lim_{x\\to t-}f(x+2)\\)',
    question:`<p>실수 \\(p\\)에 대해 \\(f(x)=\\begin{cases} x & (x\\leq 1) \\\\ x+p & (x\\gt 1)\\end{cases}\\), \\(g(t)=\\displaystyle \\lim_{x\\to t+}f(x)+\\lim_{x\\to t-}f(x+2)\\) 일 때, 보기에서 옳은 것만을 있는 대로 고른 것은? <br>ㄱ. \\(g(-1)=0\\) <br>ㄴ. \\(p\\gt 0\\)일 때 \\(t\\) 증가 ⇒ \\(g(t)\\)도 증가 <br>ㄷ. \\(g(m)\\gt g(m+1)\\gt g(m+2)\\)인 정수 \\(m\\)이 존재하도록 하는 정수 \\(p\\)의 최댓값은 \\(-4\\).</p>`,
    choices:['ㄱ','ㄱ, ㄴ','ㄱ, ㄷ','ㄴ, ㄷ','ㄱ, ㄴ, ㄷ'], answer:1,
    keypoint:'조각함수 합성 \\(g(t)\\) — 경계점 좌·우극한의 "점프 부호"가 단조성·정수해 존재 조건을 결정.',
    steps:[
      {tag:'STEP 1', title:'\\(g(t)\\)를 구간별로 정리', body:`<p>\\(\\lim_{x\\to t+}f(x)= t\\,(t\\lt 1),\\ t+p\\,(t\\geq 1)\\). \\(\\lim_{x\\to t-}f(x+2)\\)는 \\(s=x+2\\) 치환 → \\(s\\to(t+2)-\\): 같은 케이스로 \\(t+2\\,(t\\leq -1),\\ t+2+p\\,(t\\gt -1)\\).</p>
<div class="calc">\\(g(t)=\\begin{cases} 2t+2 & (t\\leq -1)\\\\ 2t+2+p & (-1\\lt t\\lt 1)\\\\ 2t+2+2p & (t\\geq 1)\\end{cases}\\)</div>`},
      {tag:'STEP 2', title:'ㄱ — \\(g(-1) = 2(-1)+2 = 0\\) (참)', body:`<div class="calc purple">참</div>`},
      {tag:'STEP 3', title:'ㄴ — \\(p\\gt 0\\)이면 점프가 \\(+\\) 방향, 전 구간 증가 (참)', body:`<p>각 구간에서 기울기 \\(2\\gt 0\\). 경계 \\(t=-1, 1\\)에서 우극한이 좌극한보다 크다 (\\(+p\\gt 0\\)). ⇒ 증가. (참)</p>`},
      {tag:'STEP 4', title:'ㄷ — \\(g(m)\\gt g(m+1)\\gt g(m+2)\\) 가능한 정수 \\(p\\) 최댓값', body:`<p>\\(g\\)는 각 구간에서 증가하므로 감소가 일어나려면 두 경계 \\(t=-1, 1\\)를 모두 지나야 함. 즉 \\(m=-1\\) (그래야 \\(m,m+1,m+2=-1,0,1\\)).</p>
<p>\\(g(-1)=0,\\ g(0)=2+p,\\ g(1)=4+2p\\). \\(0\\gt 2+p\\gt 4+2p\\) 풀면 \\(p\\lt -2\\). 정수 \\(p\\)의 <b>최댓값</b>은 \\(-3\\). (제시문의 '\\(-4\\)'는 거짓)</p>`},
      {tag:'STEP 5', title:'결론', body:`<div class="calc purple">옳은 것 : ㄱ, ㄴ</div>`}
    ]
  },

  /* ───────── 대표기출 ───────── */
  {
    id:'c1-k1', level:'kihul', levelLabel:'대표기출', num:1, type:'short',
    subLabel:'[4점] · 삼차함수 \\(f(2x+1)/f(x)\\) · 2025 수능',
    title:'모든 실수 \\(a\\)에서 \\(\\lim_{x\\to a}\\dfrac{f(2x+1)}{f(x)}\\) 존재 — \\(f(1)\\) 최댓값',
    question:`<p>함수 \\(f(x)=x^3+ax^2+bx+4\\)가 다음을 만족하도록 하는 정수 \\(a,b\\)에 대해 \\(f(1)\\)의 최댓값을 구하시오. <br>모든 실수 \\(a^\\ast\\)에 대해 \\(\\displaystyle \\lim_{x\\to a^\\ast}\\dfrac{f(2x+1)}{f(x)}\\)의 값이 존재한다.</p>`,
    answerText:'\\(16\\)',
    keypoint:'삼차함수 영점의 "자기 복제" 패턴 — 영점이 유한해야 한다는 조건이 \\(\\beta\\)를 강하게 묶는다.',
    steps:[
      {tag:'STEP 1', title:'\\(f(\\beta)=0\\)인 \\(\\beta\\)가 존재 → 분자도 \\(\\to 0\\)', body:`<p>삼차방정식이 실근을 가짐 → \\(f(\\beta)=0\\) 존재. \\(a^\\ast=\\beta\\)에서 분모 \\(\\to 0\\), 극한 존재 ⇒ 분자 \\(\\to 0\\) ⇒ \\(f(2\\beta+1)=0\\).</p>`},
      {tag:'STEP 2', title:'반복 적용 → \\(f(2\\beta+1)=0,\\ f(4\\beta+3)=0, ...\\)', body:`<p>같은 논리로 \\(f(2(2\\beta+1)+1)=f(4\\beta+3)=0\\), \\(f(8\\beta+7)=0\\). 삼차함수의 영점은 최대 \\(3\\)개이므로 \\(\\beta,2\\beta+1\\)이 같아야 함. 즉 \\(\\beta=-1\\).</p>`},
      {tag:'STEP 3', title:'\\(f(-1)=0\\) → \\(b=a+3\\), 인수분해', body:`<div class="calc">\\(-1+a-b+4=0 \\Rightarrow b=a+3\\)</div>
<div class="calc">\\(f(x)=(x+1)(x^2+(a-1)x+4)\\)</div>`},
      {tag:'STEP 4', title:'실근이 \\(-1\\)뿐 → 이차의 판별식 \\(\\lt 0\\)', body:`<p>이차 \\(x^2+(a-1)x+4\\)이 \\(x=-1\\)을 중근으로 갖지 않음 (대입 시 모순) ⇒ 실근 없음.</p>
<div class="calc">\\(D=(a-1)^2-16\\lt 0 \\Rightarrow (a+3)(a-5)\\lt 0 \\Rightarrow -3\\lt a\\lt 5\\)</div>
<p>정수 \\(a \\in \\{-2,-1,0,1,2,3,4\\}\\).</p>`},
      {tag:'STEP 5', title:'\\(f(1)\\) 최댓값', body:`<div class="calc">\\(f(1)=1+a+b+4 = 5+a+(a+3) = 2a+8\\)</div>
<div class="calc purple">최댓값: \\(a=4\\) ⇒ \\(2\\cdot 4+8 = 16\\)</div>`}
    ]
  }
];
</script>

<script>
(function () {
  /* ── 상태 ── */
  let currentFilter = 'all';
  let filteredList  = [];
  let currentIdx    = 0;
  const stepState   = {}; // {problemId: Set<stepNum>}
  PROBLEMS.forEach(p => { stepState[p.id] = new Set(); });

  /* ── DOM ── */
  const viewport    = document.getElementById('card-viewport');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const currentNum  = document.getElementById('current-num');
  const totalNum    = document.getElementById('total-num');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const mainArea    = document.getElementById('main-area');

  /* ══════════════════════════════════
     1. 카드 렌더링
  ══════════════════════════════════ */
  function renderCard(problem) {
    const levelColors = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = levelColors[problem.level] || levelColors.basic;

    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      const nums = ['①','②','③','④','⑤'];
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`
        ).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }

    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;

    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `
        <div class="step" data-step-num="${i+1}" style="display:none">
          <div class="step-header">
            <span class="step-tag">${step.tag}</span>
            <span class="step-title">${step.title}</span>
          </div>
          <div class="step-body">${step.body}</div>
        </div>`;
    });

    const subLabel = problem.subLabel ? `<span class="problem-sub-label">${problem.subLabel}</span>` : '';
    const probTitle = '';
    const keypointHTML = problem.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span><span>${problem.keypoint}</span></div>` : '';

    return `
<article class="problem-card" data-pid="${problem.id}" data-level="${problem.level}">
  <div class="card-inner">

    <div class="problem-section">
      <div>
        <div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">
          ${problem.levelLabel} ${problem.num}
        </div>
        ${subLabel}
      </div>
      ${probTitle}
      <div class="problem-text">
        <div class="problem-statement">${problem.question}</div>
        ${choicesHTML}
      </div>
      ${keypointHTML}
    </div>

    <div class="scratch-area" aria-label="풀이 공간" role="button" tabindex="0"
         onclick="openScratchOverlay(event)" onkeydown="if(event.key==='Enter'||event.key===' ')openScratchOverlay(event)">
      <span class="scratch-label">풀이 공간</span>
    </div>

    <div class="solution-section">
      <div class="solution-toggle-bar">
        <span class="solution-title">단계별 해설</span>
        <div class="step-buttons">${stepBtns}</div>
      </div>
      <div class="steps-container" id="steps-${problem.id}">${stepsHTML}</div>
    </div>

  </div>
</article>`;
  }

  /* ══════════════════════════════════
     2. 필터 & 이동
  ══════════════════════════════════ */
  function applyFilter(filter) {
    currentFilter = filter;
    filteredList = filter === 'all'
      ? [...PROBLEMS]
      : PROBLEMS.filter(p => p.level === filter);
    currentIdx = 0;
    showCard(0);
    updateNav();
    updateProgress();
    updateFilterUI(filter);
  }

  function showCard(idx) {
    currentIdx = Math.max(0, Math.min(idx, filteredList.length - 1));
    const problem = filteredList[currentIdx];
    viewport.innerHTML = renderCard(problem);
    renderMath(viewport);
    restoreStepState(problem.id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goTo(idx) {
    if (idx < 0 || idx >= filteredList.length) return;
    showCard(idx);
    updateNav();
    updateProgress();
    if (document.getElementById('scratch-overlay')) {
      renderScratchOverlay(false);
    }
  }

  function updateNav() {
    prevBtn.disabled = currentIdx === 0;
    nextBtn.disabled = currentIdx === filteredList.length - 1;
    currentNum.textContent = currentIdx + 1;
    totalNum.textContent   = filteredList.length;
  }

  function updateProgress() {
    const pct = Math.round(((currentIdx + 1) / filteredList.length) * 100);
    progressBar.style.width = pct + '%';
    progressLbl.textContent = (currentIdx + 1) + ' / ' + filteredList.length;
  }

  function updateFilterUI(active) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === active);
    });
  }

  /* ══════════════════════════════════
     3. STEP 공개
  ══════════════════════════════════ */
  function showSteps(pid, targetStep) {
    const container = document.getElementById('steps-' + pid);
    if (!container) return;

    if (targetStep === 0) {
      stepState[pid] = new Set();
      container.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      [document.querySelector(`.problem-card[data-pid="${pid}"] .correct-choice`),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => {
          el.classList.remove('revealed');
          ['background','border','color','font-weight'].forEach(p => el.style.removeProperty(p));
        });
      document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`)?.classList.remove('active');
      const overlayContainer = document.getElementById('overlay-steps-' + pid);
      overlayContainer?.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      updateStepBtns(pid);
      return;
    }

    const stepEl = container.querySelector(`.step[data-step-num="${targetStep}"]`);
    if (!stepEl) return;
    if (!stepState[pid]) stepState[pid] = new Set();

    const isOpen = stepEl.style.display !== 'none';
    if (isOpen) {
      stepEl.style.display = 'none';
      stepState[pid].delete(targetStep);
    } else {
      stepEl.style.display = 'block';
      stepEl.style.animation = 'none'; void stepEl.offsetWidth; stepEl.style.animation = '';
      stepState[pid].add(targetStep);
    }

    updateStepBtns(pid);
    renderMath(container);

    if (!isOpen) {
      setTimeout(() => stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
    }
  }

  function restoreStepState(pid) {
    const saved = stepState[pid];
    if (!saved || saved.size === 0) return;
    const toOpen = [...saved].sort((a,b) => a-b);
    stepState[pid] = new Set();
    toOpen.forEach(n => showSteps(pid, n));
  }

  function updateStepBtns(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    card?.querySelectorAll('.step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn') || btn.classList.contains('answer-btn')) return;
      btn.classList.toggle('active', opened.has(parseInt(btn.dataset.step)));
    });
  }

  function highlightAnswer(pid, problem) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const overlay = document.getElementById('scratch-overlay');
    const targets = [];
    if (card) targets.push(card.querySelector('.correct-choice'));
    if (overlay) targets.push(overlay.querySelector('.correct-choice'));
    targets.filter(Boolean).forEach(correct => {
      correct.classList.add('revealed');
    });
  }

  /* 정답 토글 (수동) */
  function revealAnswerOnly(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const btn = card?.querySelector('.answer-btn');
    if (!card || !btn) return;
    if (btn.classList.contains('active')) {
      [card.querySelector('.correct-choice'),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => {
          el.classList.remove('revealed');
        });
      btn.classList.remove('active');
      // 단답형: 별도 표시 제거
      const ansBoxes = card.querySelectorAll('.answer-reveal-inline');
      ansBoxes.forEach(b => b.remove());
      document.querySelectorAll('#scratch-overlay .answer-reveal-inline').forEach(b => b.remove());
    } else {
      const problem = PROBLEMS.find(p => p.id === pid);
      if (!problem) return;
      if (problem.type === 'choice') {
        highlightAnswer(pid, problem);
      } else {
        // 단답형: 정답 박스를 문제 섹션 끝에 인라인 표시
        const ansHTML = `<div class="answer-reveal answer-reveal-inline"><span class="answer-label">정답</span><span class="answer-number">${problem.answerText || ''}</span></div>`;
        const sec = card.querySelector('.problem-section');
        if (sec && !sec.querySelector('.answer-reveal-inline')) {
          sec.insertAdjacentHTML('beforeend', ansHTML);
          renderMath(sec);
        }
        const overlayProb = document.querySelector('#scratch-overlay .scratch-overlay-problem');
        if (overlayProb && !overlayProb.querySelector('.answer-reveal-inline')) {
          overlayProb.insertAdjacentHTML('beforeend', ansHTML);
          renderMath(overlayProb);
        }
      }
      btn.classList.add('active');
    }
  }

  /* ══════════════════════════════════
     4. MathJax 렌더링
  ══════════════════════════════════ */
  function renderMath(el) {
    if (window.MathJax && MathJax.typesetPromise) {
      MathJax.typesetPromise([el]).catch(() => {});
    }
  }

  /* ══════════════════════════════════
     5. 인쇄 / PDF
  ══════════════════════════════════ */
  const printModal    = document.getElementById('print-modal');
  const modalBackdrop = document.getElementById('modal-backdrop');
  const printArea     = document.getElementById('print-area');

  document.getElementById('btn-print').addEventListener('click', () => {
    printModal.setAttribute('aria-hidden', 'false');
    printModal.classList.add('open');
    modalBackdrop.classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click', closePrintModal);
  modalBackdrop.addEventListener('click', closePrintModal);

  function closePrintModal() {
    printModal.classList.remove('open');
    modalBackdrop.classList.remove('open');
    printModal.setAttribute('aria-hidden', 'true');
  }

  document.getElementById('modal-confirm').addEventListener('click', () => {
    const rangeVal = document.querySelector('input[name="print-range"]:checked').value;
    const printMode = document.querySelector('input[name="print-mode"]:checked').value;

    let targetProblems;
    if (rangeVal === 'current') targetProblems = [filteredList[currentIdx]];
    else if (rangeVal === 'filter') targetProblems = [...filteredList];
    else targetProblems = [...PROBLEMS];

    buildPrintArea(targetProblems, printMode);
    closePrintModal();
    setTimeout(() => { window.print(); }, 600);
  });

  function buildPrintArea(problems, mode) {
    printArea.innerHTML = problems.map(p => {
      const nums = ['①','②','③','④','⑤'];
      let choicesHTML = '';
      if (p.type === 'choice' && p.choices) {
        choicesHTML = `<ol class="print-choices">` +
          p.choices.map((c, i) => `<li class="${(mode === 'solution' && i === p.answer) ? 'print-correct' : ''}">${nums[i]} ${c}</li>`).join('') +
          `</ol>`;
      } else {
        choicesHTML = `<div class="print-short-label">단답형${mode === 'solution' && p.answerText ? ' — 정답: ' + p.answerText : ''}</div>`;
      }

      let extraHTML = '';
      if (mode === 'solution') {
        extraHTML = `<div class="print-solution">
          <div class="print-solution-title">해설</div>` +
          p.steps.map(s => `
            <div class="print-step">
              <span class="print-step-tag">${s.tag}</span>
              <span class="print-step-title">${s.title}</span>
              <div class="print-step-body">${s.body}</div>
            </div>`).join('') +
          (p.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span>${p.keypoint}</div>` : '') +
          `</div>`;
      }

      if (mode === 'blank') {
        return `
          <div class="print-card print-mode-blank">
            <div class="print-content-area">
              <div class="print-badge">${p.levelLabel} ${p.num}</div>
              <div class="print-question">${p.question}</div>
              ${choicesHTML}
            </div>
            <div class="print-blank-space" aria-hidden="true"></div>
          </div>`;
      }

      return `
        <div class="print-card print-mode-${mode}">
          <div class="print-badge">${p.levelLabel} ${p.num}</div>
          <div class="print-question">${p.question}</div>
          ${choicesHTML}
          ${extraHTML}
        </div>`;
    }).join('');

    renderMath(printArea);
  }

  /* ══════════════════════════════════
     6. 이벤트
  ══════════════════════════════════ */
  prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
  nextBtn.addEventListener('click', () => goTo(currentIdx + 1));

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });

  document.addEventListener('click', e => {
    const stepBtn  = e.target.closest('.step-btn');
    if (stepBtn) {
      const pid = stepBtn.dataset.pid;
      if (stepBtn.classList.contains('answer-btn')) {
        revealAnswerOnly(pid);
      } else {
        showSteps(pid, parseInt(stepBtn.dataset.step));
      }
      if (typeof window.syncOverlayStepUI === 'function') window.syncOverlayStepUI(pid);
    }
  });

  // 키보드
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentIdx + 1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); goTo(currentIdx - 1); }
    if (['1','2','3','4','5','6'].includes(e.key)) {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, parseInt(e.key)); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === '0') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, 0); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'a' || e.key === 'A') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { revealAnswerOnly(pid); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'Escape' && document.getElementById('scratch-overlay')) {
      e.preventDefault();
      closeScratchOverlay();
    }
  });

  // 스와이프
  let tx = 0, ty = 0, tt = 0, swipeActive = false;
  mainArea.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) { swipeActive = false; return; }
    swipeActive = true;
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    tt = Date.now();
  }, { passive: true });
  mainArea.addEventListener('touchmove', e => {
    if (e.touches.length > 1) swipeActive = false;
  }, { passive: true });
  mainArea.addEventListener('touchend', e => {
    if (!swipeActive) return;
    swipeActive = false;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const dt = Date.now() - tt;
    if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy) * 2 && dt < 600) {
      goTo(dx < 0 ? currentIdx + 1 : currentIdx - 1);
    }
  }, { passive: true });

  /* ══════════════════════════════════
     7. 다크모드
  ══════════════════════════════════ */
  (function () {
    const toggle = document.querySelector('[data-theme-toggle]');
    const html   = document.documentElement;
    let dark = matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    setIcon(toggle, dark);
    toggle?.addEventListener('click', () => {
      dark = !dark;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      setIcon(toggle, dark);
    });
    function setIcon(btn, isDark) {
      if (!btn) return;
      btn.innerHTML = isDark
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
  })();

  /* ══════════════════════════════════
     8. 풀이 공간 오버레이
  ══════════════════════════════════ */
  window.openScratchOverlay = function(e) {
    if (e) { e.stopPropagation(); }
    renderScratchOverlay(true);
  };

  function renderScratchOverlay(animateIn) {
    const existing = document.getElementById('scratch-overlay');
    if (existing) existing.remove();

    const problem = filteredList[currentIdx];
    if (!problem) return;

    const nums = ['①','②','③','④','⑤'];
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }

    const titleSuffix = `${problem.levelLabel} ${problem.num} · `;
    const _lvc = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = _lvc[problem.level] || _lvc.basic;
    const badgeHTML = `<div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>`;
    const problemHTML = `${badgeHTML}<div class="problem-statement">${problem.question}</div>${choicesHTML}`;

    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;

    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `
        <div class="step" data-step-num="${i+1}" style="display:none">
          <div class="step-header">
            <span class="step-tag">${step.tag}</span>
            <span class="step-title">${step.title}</span>
          </div>
          <div class="step-body">${step.body}</div>
        </div>`;
    });
    const total = filteredList.length;
    const prevDisabled = currentIdx === 0 ? 'disabled' : '';
    const nextDisabled = currentIdx === total - 1 ? 'disabled' : '';

    const overlay = document.createElement('div');
    overlay.className = 'scratch-overlay';
    overlay.id = 'scratch-overlay';
    if (!animateIn) overlay.style.animation = 'none';
    overlay.innerHTML = `
      <div class="scratch-overlay-header">
        <span class="scratch-overlay-title">${titleSuffix}풀이 공간</span>
        <div class="overlay-nav">
          <button class="overlay-nav-btn" id="overlay-prev" ${prevDisabled} aria-label="이전 문제">← 이전</button>
          <span class="overlay-nav-label">${currentIdx+1} / ${total}</span>
          <button class="overlay-nav-btn" id="overlay-next" ${nextDisabled} aria-label="다음 문제">다음 →</button>
        </div>
        <button class="scratch-overlay-close" id="scratch-overlay-close" aria-label="닫기">&times;</button>
      </div>
      <div class="scratch-overlay-body">
        <div class="scratch-overlay-problem">${problemHTML}</div>
        <div class="scratch-overlay-canvas">
          <div class="overlay-step-bar">${stepBtns}</div>
          <div class="overlay-steps-container" id="overlay-steps-${problem.id}">${stepsHTML}</div>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    renderMath(overlay);

    document.getElementById('scratch-overlay-close').addEventListener('click', closeScratchOverlay);
    document.getElementById('overlay-prev').addEventListener('click', () => {
      if (currentIdx > 0) goTo(currentIdx - 1);
    });
    document.getElementById('overlay-next').addEventListener('click', () => {
      if (currentIdx < filteredList.length - 1) goTo(currentIdx + 1);
    });

    syncOverlayStepUI(problem.id);
  }

  function closeScratchOverlay() {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    overlay.style.animation = 'overlayOut 180ms cubic-bezier(0.4,0,1,1) both';
    overlay.addEventListener('animationend', () => overlay.remove(), { once: true });
  }

  function syncOverlayStepUI(pid) {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    const container = document.getElementById('overlay-steps-' + pid);
    if (!container) return;
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    container.querySelectorAll('.step').forEach(stepEl => {
      const n = parseInt(stepEl.dataset.stepNum, 10);
      stepEl.style.display = opened.has(n) ? 'block' : 'none';
    });
    overlay.querySelectorAll('.overlay-step-bar .step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn')) return;
      const s = btn.dataset.step;
      if (s === 'answer') {
        const mainAnswerBtn = document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`);
        btn.classList.toggle('active', !!mainAnswerBtn?.classList.contains('active'));
      } else {
        btn.classList.toggle('active', opened.has(parseInt(s, 10)));
      }
    });
  }
  window.syncOverlayStepUI = syncOverlayStepUI;

  (function(){
    if(!document.getElementById('overlay-out-style')){
      const s=document.createElement('style');
      s.id='overlay-out-style';
      s.textContent='@keyframes overlayOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.97)}}';
      document.head.appendChild(s);
    }
  })();

  /* ══════════════════════════════════
     9. HTML 단일파일 다운로드
  ══════════════════════════════════ */
  (function setupDownload() {
    const dlBtn = document.getElementById('btn-download');
    if (!dlBtn) return;
    dlBtn.addEventListener('click', function () {
      const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = '교사용_수능특강_미적분I_함수의극한_해설.html';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    });
  })();

  /* ══════════════════════════════════
     10. anchor 점프 (URL hash → 해당 문제로)
  ══════════════════════════════════ */
  function jumpToAnchor() {
    const hash = (location.hash || '').replace(/^#/, '');
    if (!hash) return false;
    const idx = PROBLEMS.findIndex(p => p.id === hash);
    if (idx < 0) return false;
    // 'all' 필터로 전환 (anchor가 필터 범위 밖일 수 있으므로)
    applyFilter('all');
    // 인덱스 이동
    currentIdx = idx;
    showCard(idx);
    updateNav();
    updateProgress();
    return true;
  }
  window.addEventListener('hashchange', jumpToAnchor);

  /* ══════════════════════════════════
     11. 초기화
  ══════════════════════════════════ */
  function init() {
    applyFilter('all');
    // anchor가 있으면 해당 문제로 점프
    if (location.hash) {
      setTimeout(jumpToAnchor, 50);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
<script>
// 메인 단축키 (H/Esc → 교사용_Nav_All_index_미적분I.html)
document.addEventListener('keydown', (e) => {
  if (e.isComposing) return;
  const t = e.target;
  if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
  if (e.key === 'h' || e.key === 'H') {
    e.preventDefault();
    const w = window.open('교사용_Nav_All_index_미적분I.html', 'aftermath_main_calc'); if (w) w.focus();
  }
});
</script>

<script>
/* named window 일관 처리 — 이미 열린 창 있으면 새 창 없이 focus */
document.addEventListener('click', function(e) {
  const a = e.target.closest('a[target^="aftermath_"]');
  if (!a) return;
  e.preventDefault();
  const w = window.open(a.href, a.target);
  if (w) w.focus();
});
</script>
