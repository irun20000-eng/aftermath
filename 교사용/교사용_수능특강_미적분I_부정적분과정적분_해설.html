    keypoint:'\\(f\\)를 적분 후 \\(f\'(x)=2x^2(3-2x)=0\\Rightarrow x=0,\\ \\dfrac{3}{2}\\). \\(x=\\dfrac{3}{2}\\)에서 부호 변화 ⇒ 극대.',
    steps:[
      {tag:'STEP 1', title:'\\(f(x)=2x^3-x^4+C,\\ f(0)=1\\Rightarrow C=1\\)', body:`<div class="calc">\\(f(x)=\\displaystyle\\int (6x^2-4x^3)dx=2x^3-x^4+C\\)</div>
<div class="calc">\\(f(0)=C=1\\Rightarrow f(x)=2x^3-x^4+1\\)</div>`},
      {tag:'STEP 2', title:'\\(f\'(x)=2x^2(3-2x)=0\\Rightarrow x=0,\\ \\dfrac{3}{2}\\)', body:`<div class="calc">\\(f\'(x)=6x^2-4x^3=2x^2(3-2x)\\)</div>
<p>\\(x\\lt 0\\): \\(f\'\\gt 0\\); \\(0\\lt x\\lt \\dfrac{3}{2}\\): \\(f\'\\gt 0\\); \\(x\\gt \\dfrac{3}{2}\\): \\(f\'\\lt 0\\). \\(x=0\\)에서 \\(f\'=0\\)이지만 부호 안 바뀜 ⇒ 극값 아님. \\(x=\\dfrac{3}{2}\\)에서 극대.</p>`},
      {tag:'STEP 3', title:'극댓값 \\(f(\\tfrac{3}{2})\\)', body:`<div class="calc">\\(f\\!\\left(\\dfrac{3}{2}\\right)=2\\cdot \\dfrac{27}{8}-\\dfrac{81}{16}+1=\\dfrac{54}{8}-\\dfrac{81}{16}+1\\)</div>
<div class="calc">\\(=\\dfrac{108}{16}-\\dfrac{81}{16}+\\dfrac{16}{16}=\\dfrac{43}{16}\\)</div>
<div class="calc purple">극댓값 \\(=\\dfrac{43}{16}\\)</div>`}
    ]
  },

    question:`<p>다항함수 \\(f(x)\\)가 모든 실수 \\(x\\)에 대하여 \\(x\\displaystyle\\int_{1}^{x} f(t)\\,dt=\\displaystyle\\int_{1}^{x} tf(t)\\,dt+ax^4+bx^2+1\\) 을 만족시킬 때, \\(f(a-b)\\)의 값은? (단, \\(a,\\ b\\)는 상수이다.)</p>`,

    steps:[

      {tag:'STEP 2', title:'양변 \\(x\\)에 대해 미분 → \\(xf(x)\\) 약분', body:`<div class="calc">\\(\\dfrac{d}{dx}\\left[x\\!\\int_1^x f(t)dt\\right]=\\!\\int_1^x f(t)dt+xf(x)\\)</div>
<div class="calc">\\(\\dfrac{d}{dx}\\left[\\!\\int_1^x tf(t)dt+ax^4+bx^2+1\\right]=xf(x)+4ax^3+2bx\\)</div>

  {
    id:'c6-ex5', level:'exercise', levelLabel:'유제', num:5, type:'choice',
    subLabel:'[26009-0128] · 절댓값 정적분',
    title:'\\(\\int_0^3 |x^2-2x|dx+\\int_0^2 (x^2-2x)dx\\)',
    question:`<p>\\(\\displaystyle\\int_{0}^{3} |x^2-2x|\\,dx+\\displaystyle\\int_{0}^{2} (x^2-2x)\\,dx\\) 의 값은?</p>`,
    choices:['\\(\\dfrac{1}{3}\\)','\\(\\dfrac{2}{3}\\)','\\(1\\)','\\(\\dfrac{4}{3}\\)','\\(\\dfrac{5}{3}\\)'], answer:3,
    keypoint:'\\(0\\leq x\\leq 2\\): \\(x^2-2x\\leq 0\\), \\(2\\leq x\\leq 3\\): \\(\\geq 0\\). 절댓값 풀고 두 \\([0,2]\\) 정적분이 상쇄.',
    steps:[
      {tag:'STEP 1', title:'부호 분석', body:`<p>\\(x^2-2x=x(x-2)\\). \\(0\\leq x\\leq 2\\)에서 \\(\\leq 0\\), \\(2\\leq x\\leq 3\\)에서 \\(\\geq 0\\).</p>`},
      {tag:'STEP 2', title:'\\(|x^2-2x|\\) 분리', body:`<div class="calc">\\(\\!\\int_0^3 |x^2-2x|dx=\\!\\int_0^2 -(x^2-2x)dx+\\!\\int_2^3 (x^2-2x)dx\\)</div>`},
      {tag:'STEP 3', title:'두 \\([0,2]\\) 적분 상쇄', body:`<div class="calc">\\(\\!\\int_0^3 |x^2-2x|dx+\\!\\int_0^2 (x^2-2x)dx\\)</div>
<div class="calc">\\(=-\\!\\int_0^2 (x^2-2x)dx+\\!\\int_2^3 (x^2-2x)dx+\\!\\int_0^2 (x^2-2x)dx\\)</div>
<div class="calc">\\(=\\!\\int_2^3 (x^2-2x)dx\\)</div>`},
      {tag:'STEP 4', title:'\\(\\int_2^3 (x^2-2x)dx=\\dfrac{4}{3}\\)', body:`<div class="calc">\\(\\!\\int_2^3 (x^2-2x)dx=\\left[\\dfrac{x^3}{3}-x^2\\right]_2^3=(9-9)-\\left(\\dfrac{8}{3}-4\\right)=\\dfrac{4}{3}\\)</div>
<div class="calc purple">값 \\(=\\dfrac{4}{3}\\)</div>`}
    ]
  },

  /* ───────── 유제 6 ───────── */
  {
    id:'c6-ex6', level:'exercise', levelLabel:'유제', num:6, type:'choice',
    subLabel:'[26009-0129] · 조각 도함수에서 정적분',
    title:'\\(f\'(x)\\) 조각함수, \\(f(3)=1\\) — \\(\\int_{-1}^1 f(x)dx\\)',
    question:`<p>실수 전체의 집합에서 연속인 함수 \\(f(x)\\)에 대하여 \\(f\'(x)=\\begin{cases} x+1 &amp; (x\\lt 0)\\\\ x^2-2x &amp; (x\\gt 0)\\end{cases}\\) 이다. \\(f(3)=1\\)일 때, \\(\\displaystyle\\int_{-1}^{1} f(x)\\,dx\\)의 값은?</p>`,
    choices:['\\(\\dfrac{11}{12}\\)','\\(\\dfrac{13}{12}\\)','\\(\\dfrac{5}{4}\\)','\\(\\dfrac{17}{12}\\)','\\(\\dfrac{19}{12}\\)'], answer:3,
    keypoint:'\\(f\\)도 \\(x=0\\)에서 연속 ⇒ 좌우 적분상수가 \\(f(0)\\)에서 일치. \\(f(3)=1\\)로 양수쪽 결정.',
    steps:[
      {tag:'STEP 1', title:'\\(f(x)\\) 조각별 부정적분', body:`<div class="calc">\\(x\\lt 0\\): \\(f(x)=\\dfrac{1}{2}x^2+x+C_1\\)</div>
<div class="calc">\\(x\\geq 0\\): \\(f(x)=\\dfrac{1}{3}x^3-x^2+C_2\\)</div>`},
      {tag:'STEP 2', title:'\\(f(3)=1\\Rightarrow C_2=1\\), 연속성 \\(C_1=C_2=1\\)', body:`<div class="calc">\\(f(3)=9-9+C_2=C_2=1\\)</div>
<p>\\(x=0\\)에서 연속: \\(\\lim_{x\\to 0^-} f(x)=C_1=\\lim_{x\\to 0^+} f(x)=C_2=1\\Rightarrow C_1=1\\).</p>`},
      {tag:'STEP 3', title:'\\(\\!\\int_{-1}^0 f+\\!\\int_0^1 f\\) 계산', body:`<div class="calc">\\(\\!\\int_{-1}^0\\!\\left(\\dfrac{1}{2}x^2+x+1\\right)dx=\\left[\\dfrac{x^3}{6}+\\dfrac{x^2}{2}+x\\right]_{-1}^0=0-\\!\\left(-\\dfrac{1}{6}+\\dfrac{1}{2}-1\\right)=\\dfrac{2}{3}\\)</div>
<div class="calc">\\(\\!\\int_0^1\\!\\left(\\dfrac{1}{3}x^3-x^2+1\\right)dx=\\left[\\dfrac{x^4}{12}-\\dfrac{x^3}{3}+x\\right]_0^1=\\dfrac{1}{12}-\\dfrac{1}{3}+1=\\dfrac{3}{4}\\)</div>`},
      {tag:'STEP 4', title:'합 \\(\\dfrac{2}{3}+\\dfrac{3}{4}=\\dfrac{17}{12}\\)', body:`<div class="calc">\\(\\dfrac{2}{3}+\\dfrac{3}{4}=\\dfrac{8+9}{12}=\\dfrac{17}{12}\\)</div>
<div class="calc purple">값 \\(=\\dfrac{17}{12}\\)</div>`}
    ]
  },

      {tag:'STEP 4', title:'\\(\\!\\int_{-2}^0 g^2 dx=\\!\\int_0^2 g^2 dx=2\\)', body:`<p>\\(g^2\\)이 우함수이므로 \\(\\!\\int_{-2}^0 g^2=\\!\\int_0^2 g^2=2\\).</p>

    question:`<p>최고차항의 계수가 \\(1\\)인 삼차함수 \\(f(x)\\)에 대하여 \\(f\'(1)=f\'(4)=0\\)이고, 함수 \\(f(x)\\)의 극댓값이 \\(\\dfrac{13}{2}\\)이다. 함수 \\(f(x)\\)의 극솟값은?</p>`,
    choices:['\\(-1\\)','\\(-3\\)','\\(-5\\)','\\(-7\\)','\\(-9\\)'], answer:3,
    keypoint:'\\(f\'(x)=3(x-1)(x-4)\\). 부정적분 후 극대점 \\(x=1\\)에서 \\(f(1)=\\dfrac{13}{2}\\)로 적분상수 결정.',
    steps:[
      {tag:'STEP 1', title:'\\(f\'(x)=3(x-1)(x-4)=3x^2-15x+12\\)', body:`<p>최고차 \\(1\\)인 삼차의 도함수는 최고차 \\(3\\)인 이차. \\(f\'(1)=f\'(4)=0\\)이므로 \\(f\'(x)=3(x-1)(x-4)\\).</p>`},
      {tag:'STEP 2', title:'\\(f(x)=x^3-\\dfrac{15}{2}x^2+12x+C\\)', body:`<div class="calc">\\(f(x)=\\!\\int (3x^2-15x+12)dx=x^3-\\dfrac{15}{2}x^2+12x+C\\)</div>`},
      {tag:'STEP 3', title:'극대 \\(x=1,\\ f(1)=\\dfrac{13}{2}\\Rightarrow C=1\\)', body:`<p>증감표: \\(x=1\\) 극대(\\(f\'\\) \\(+\\to-\\)), \\(x=4\\) 극소(\\(f\'\\) \\(-\\to +\\)).</p>
<div class="calc">\\(f(1)=1-\\dfrac{15}{2}+12+C=\\dfrac{11}{2}+C=\\dfrac{13}{2}\\Rightarrow C=1\\)</div>`},
      {tag:'STEP 4', title:'극솟값 \\(f(4)=-7\\)', body:`<div class="calc">\\(f(4)=64-120+48+1=-7\\)</div>
<div class="calc purple">극솟값 \\(=-7\\)</div>`}
    ]
  },

    steps:[
      {tag:'STEP 1', title:'\\(F(x)=x^4+\\dfrac{a}{3}x^3+5x+C\\)', body:`<div class="calc">\\(F(x)=\\!\\int (4x^3+ax^2+5)dx=x^4+\\dfrac{a}{3}x^3+5x+C\\)</div>`},

    choices:['\\(36\\)','\\(38\\)','\\(40\\)','\\(42\\)','\\(44\\)'], answer:4,

      {tag:'STEP 1', title:'\\(x=-1\\) 대입: \\(0=-3+a+5\\Rightarrow a=-2\\)', body:`<div class="calc">\\(\\!\\int_{-1}^{-1} f(t)dt=0=3(-1)^3+a(-1)^2+5=-3+a+5\\)</div>

    question:`<p>실수 전체의 집합에서 미분가능한 함수 \\(F(x)\\)의 도함수 \\(f(x)\\)가 \\(f(x)=3x^2+kx-2\\) 이다. \\(F(5)-F(2)=174\\)일 때, 상수 \\(k\\)의 값은?</p>`,
    choices:['\\(2\\)','\\(4\\)','\\(6\\)','\\(8\\)','\\(10\\)'], answer:2,

    steps:[
      {tag:'STEP 1', title:'\\(F(5)-F(2)=\\!\\int_2^5 (3x^2+kx-2)dx\\)', body:`<div class="calc">\\(\\!\\int_2^5 (3x^2+kx-2)dx=\\left[x^3+\\dfrac{k}{2}x^2-2x\\right]_2^5\\)</div>`},

    question:`<p>함수 \\(f(x)=3x^2-6x\\)에 대하여 \\(\\displaystyle\\int_{1}^{2} f(x)dx-\\displaystyle\\int_{a}^{2} f(x)dx=0\\) 을 만족시키는 \\(1\\)이 아닌 모든 실수 \\(a\\)의 값의 합은?</p>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:1,

    steps:[
      {tag:'STEP 1', title:'\\(\\!\\int_1^2 f-\\!\\int_a^2 f=\\!\\int_1^a f\\)', body:`<div class="calc">\\(\\!\\int_1^2 f+\\!\\int_2^a f=\\!\\int_1^a f\\)</div>`},
      {tag:'STEP 2', title:'\\(\\!\\int_1^a (3x^2-6x)dx=[x^3-3x^2]_1^a=a^3-3a^2+2\\)', body:`<div class="calc">\\(a^3-3a^2-(1-3)=a^3-3a^2+2=0\\)</div>`},
      {tag:'STEP 3', title:'인수분해 \\((a-1)(a^2-2a-2)=0\\)', body:`<div class="calc">\\(a^3-3a^2+2=(a-1)(a^2-2a-2)=0\\)</div>
<p>\\(a\\neq 1\\)이므로 \\(a^2-2a-2=0\\). 두 실근의 합 \\(=2\\) (근과 계수 관계).</p>`},

    title:'\\(\\int_{-2}^2 |x^2-2x-3|dx\\)',
    question:`<p>\\(\\displaystyle\\int_{-2}^{2} |x^2-2x-3|\\,dx\\) 의 값은?</p>`,
    choices:['\\(\\dfrac{32}{3}\\)','\\(\\dfrac{34}{3}\\)','\\(12\\)','\\(\\dfrac{38}{3}\\)','\\(\\dfrac{40}{3}\\)'], answer:1,
    keypoint:'\\(x^2-2x-3=(x+1)(x-3)\\). \\(-2\\leq x\\leq -1\\)에서 \\(\\geq 0\\), \\(-1\\leq x\\leq 2\\)에서 \\(\\leq 0\\).',
    steps:[
      {tag:'STEP 1', title:'부호 분석', body:`<div class="calc">\\(x^2-2x-3=(x+1)(x-3)\\)</div>
<p>\\(-2\\leq x\\leq -1\\): \\(\\geq 0\\), \\(-1\\leq x\\leq 2\\): \\(\\leq 0\\).</p>`},
      {tag:'STEP 2', title:'두 구간 분리', body:`<div class="calc">\\(\\!\\int_{-2}^{-1}(x^2-2x-3)dx+\\!\\int_{-1}^{2}(-x^2+2x+3)dx\\)</div>`},
      {tag:'STEP 3', title:'계산', body:`<div class="calc">\\(\\!\\int_{-2}^{-1}(x^2-2x-3)dx=\\left[\\dfrac{x^3}{3}-x^2-3x\\right]_{-2}^{-1}=\\left(-\\dfrac{1}{3}-1+3\\right)-\\left(-\\dfrac{8}{3}-4+6\\right)=\\dfrac{5}{3}-\\!\\left(-\\dfrac{2}{3}\\right)=\\dfrac{7}{3}\\)</div>
<div class="calc">\\(\\!\\int_{-1}^{2}(-x^2+2x+3)dx=\\left[-\\dfrac{x^3}{3}+x^2+3x\\right]_{-1}^{2}=\\!\\left(-\\dfrac{8}{3}+4+6\\right)-\\!\\left(\\dfrac{1}{3}+1-3\\right)=\\dfrac{22}{3}-\\!\\left(-\\dfrac{5}{3}\\right)=9\\)</div>`},
      {tag:'STEP 4', title:'합 \\(\\dfrac{7}{3}+9=\\dfrac{34}{3}\\)', body:`<div class="calc">\\(\\dfrac{7}{3}+9=\\dfrac{7+27}{3}=\\dfrac{34}{3}\\)</div>
<div class="calc purple">값 \\(=\\dfrac{34}{3}\\)</div>`}

  },

  /* ───────── 기본 2 ───────── */
  {
    id:'c6-s2', level:'standard', levelLabel:'기본', num:2, type:'choice',
    subLabel:'[26009-0140] · 차수 분석 + 계수 비교',
    title:'\\(F(x)=(f(x))^2-36x^4+26x^3+7x^2-5x\\) — \\(F(2)\\)',
    question:`<p>최고차항의 계수가 양수인 다항함수 \\(f(x)\\)의 한 부정적분을 \\(F(x)\\)라 할 때, 모든 실수 \\(x\\)에 대하여 \\(F(x)=(f(x))^2-36x^4+26x^3+7x^2-5x\\) 가 성립한다. \\(F(2)\\)의 값은?</p>`,
    choices:['\\(11\\)','\\(12\\)','\\(13\\)','\\(14\\)','\\(15\\)'], answer:0,
    keypoint:'\\(F\\)의 차수 \\(n\\), \\(f=F\'\\)의 차수 \\(n-1\\). 우변 \\((f)^2\\)는 \\(2(n-1)\\)차. \\(n=2(n-1)\\) 또는 \\(n\\leq 4\\) 분석.',
    steps:[
      {tag:'STEP 1', title:'차수 분석 → \\(n=3\\)', body:`<p>\\(F\\)의 차수 \\(n\\). \\(n\\leq 2\\)면 \\(f\\)는 \\(\\leq 1\\)차, 우변 차수 \\(\\geq 4\\) ⇒ 모순. \\(n\\geq 4\\)면 \\((f)^2\\)의 차수 \\(2(n-1)\\geq 6\\)이 \\(n\\)과 같아야 ⇒ \\(n=2(n-1)\\Rightarrow n=2\\), 모순. ∴ \\(n=3\\).</p>`},
      {tag:'STEP 2', title:'\\(F(x)=ax^3+bx^2+cx+d\\) (\\(a\\gt 0\\)), \\(f=3ax^2+2bx+c\\)', body:`<div class="calc">\\((3ax^2+2bx+c)^2-36x^4+26x^3+7x^2-5x=ax^3+bx^2+cx+d\\)</div>`},
      {tag:'STEP 3', title:'계수 비교: \\(a=2,\\ b=-1,\\ c=-1,\\ d=1\\)', body:`<div class="calc">\\(x^4\\): \\(9a^2-36=0\\Rightarrow a=2\\) (\\(\\gt 0\\))</div>
<div class="calc">\\(x^3\\): \\(12ab+26=a=2\\Rightarrow 24b=-24\\Rightarrow b=-1\\)</div>
<div class="calc">\\(x^2\\): \\(4b^2+6ac+7=b=-1\\Rightarrow 4+12c+7=-1\\Rightarrow 12c=-12\\Rightarrow c=-1\\)</div>
<div class="calc">\\(x^0\\): \\(c^2=d\\Rightarrow d=1\\)</div>`},
      {tag:'STEP 4', title:'\\(F(2)=16-4-2+1=11\\)', body:`<div class="calc">\\(F(x)=2x^3-x^2-x+1\\)</div>
<div class="calc">\\(F(2)=16-4-2+1=11\\)</div>
<div class="calc purple">\\(F(2)=11\\)</div>`}
    ]
  },

  {
    id:'c6-s4', level:'standard', levelLabel:'기본', num:4, type:'choice',
    subLabel:'[26009-0142] · 극값 조건 합성',
    title:'\\(g(x)=\\int_1^x (f(x)-f(t))(f(t))^2 dt\\), \\(g\\) 극값 \\(x=a\\) — \\(f(a)\\)',
    question:`<p>함수 \\(f(x)=x^3-6x^2+9x+2\\)에 대하여 함수 \\(g(x)=\\displaystyle\\int_{1}^{x} (f(x)-f(t))(f(t))^2\\,dt\\) 가 \\(x=a\\)에서 극값을 갖는다. \\(f(a)\\)의 값은?</p>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:1,
    keypoint:'\\(g(x)=f(x)\\int_1^x f^2 dt-\\int_1^x f^3 dt\\), \\(g\'(x)=f\'(x)\\int_1^x f^2 dt\\). 0 되는 \\(x\\) 분석.',
    steps:[
      {tag:'STEP 1', title:'\\(g\'(x)=f\'(x)\\!\\int_1^x f^2 dt\\)', body:`<div class="calc">\\(g(x)=f(x)\\!\\int_1^x (f(t))^2 dt-\\!\\int_1^x (f(t))^3 dt\\)</div>
<div class="calc">\\(g\'(x)=f\'(x)\\!\\int_1^x f^2 dt+f(x)\\cdot f(x)^2-f(x)^3=f\'(x)\\!\\int_1^x f^2 dt\\)</div>`},
      {tag:'STEP 2', title:'\\(f\'(x)=3(x-1)(x-3)=0\\Rightarrow x=1,3\\)', body:`<div class="calc">\\(f\'(x)=3x^2-12x+9=3(x-1)(x-3)\\)</div>`},
      {tag:'STEP 3', title:'\\(h(x)=\\!\\int_1^x f^2 dt\\): \\(h\'=f^2\\geq 0\\), 증가; \\(h(1)=0\\)', body:`<p>\\(h\\)는 단조증가, \\(h(1)=0\\). \\(x\\lt 1\\): \\(h\\lt 0\\); \\(x\\gt 1\\): \\(h\\gt 0\\).</p>`},
      {tag:'STEP 4', title:'증감표 분석 ⇒ \\(x=3\\)에서 극소 (극값)', body:`<p>증감표:</p>
<div class="calc">\\(x\\): \\(\\cdots\\) \\(1\\) \\(\\cdots\\) \\(3\\) \\(\\cdots\\); \\(f\'\\): \\(+\\) \\(0\\) \\(-\\) \\(0\\) \\(+\\); \\(h\\): \\(-\\) \\(0\\) \\(+\\) \\(+\\) \\(+\\); \\(g\'\\): \\(-\\) \\(0\\) \\(-\\) \\(0\\) \\(+\\)</div>
<p>\\(x=1\\)에서 \\(g\'\\) 부호 안 바뀜, \\(x=3\\)에서 \\(-\\to+\\) ⇒ 극소. ∴ \\(a=3\\).</p>
<div class="calc">\\(f(3)=27-54+27+2=2\\)</div>
<div class="calc purple">\\(f(a)=2\\)</div>`}
    ]
  },

  {

    question:`<p>최고차항의 계수가 \\(1\\)인 삼차함수 \\(f(x)\\)가 \\(\\displaystyle\\int_{-2}^{0} f\'(x)dx=\\displaystyle\\int_{0}^{3} f\'(x)dx=0\\) 을 만족시킨다. \\(f(0)=1\\)일 때, \\(f(4)\\)의 값은?</p>`,

    keypoint:'\\(\\int f\'=[f]\\) ⇒ \\(f(0)=f(-2)=f(3)=1\\). \\(g(x)=f(x)-1\\)이 \\(0,-2,3\\)을 근, 최고차 \\(1\\) 삼차.',
    steps:[
      {tag:'STEP 1', title:'\\(f(0)-f(-2)=0,\\ f(3)-f(0)=0\\Rightarrow f(-2)=f(0)=f(3)=1\\)', body:`<div class="calc">\\(\\!\\int_{-2}^0 f\'=f(0)-f(-2)=0\\Rightarrow f(-2)=1\\)</div>

      {tag:'STEP 3', title:'\\(f(x)=x(x+2)(x-3)+1\\)', body:`<div class="calc">\\(f(x)=x(x+2)(x-3)+1\\)</div>`},
      {tag:'STEP 4', title:'\\(f(4)=4\\cdot 6\\cdot 1+1=25\\)', body:`<div class="calc">\\(f(4)=4\\cdot 6\\cdot 1+1=24+1=25\\)</div>

  {
    id:'c6-s6', level:'standard', levelLabel:'기본', num:6, type:'choice',
    subLabel:'[26009-0144] · 이차함수 정적분 + 우/기 항',
    title:'이차 \\(f\\), \\(\\int_0^3 f=54+\\int_0^{-3} f,\\ f(1)+f(-1)=2\\) — \\(f(2)+f(-2)\\)',
    question:`<p>이차함수 \\(f(x)\\)가 \\(\\displaystyle\\int_{0}^{3} f(x)\\,dx=54+\\displaystyle\\int_{0}^{-3} f(x)\\,dx\\) 를 만족시킨다. \\(f(1)+f(-1)=2\\)일 때, \\(f(2)+f(-2)\\)의 값은?</p>`,
    choices:['\\(22\\)','\\(24\\)','\\(26\\)','\\(28\\)','\\(30\\)'], answer:2,
    keypoint:'\\(\\int_0^3-\\int_0^{-3}=\\int_0^3+\\int_{-3}^0=\\int_{-3}^3 f=54\\). 이차 \\(f=ax^2+bx+c\\)의 우함수항만 살아남.',
    steps:[
      {tag:'STEP 1', title:'\\(\\!\\int_{-3}^3 f(x)dx=54\\)', body:`<div class="calc">\\(\\!\\int_0^3 f-\\!\\int_0^{-3} f=\\!\\int_0^3 f+\\!\\int_{-3}^0 f=\\!\\int_{-3}^3 f=54\\)</div>`},
      {tag:'STEP 2', title:'\\(f(x)=ax^2+bx+c\\)에서 \\(\\!\\int_{-3}^3 bx\\,dx=0\\)', body:`<div class="calc">\\(\\!\\int_{-3}^3 (ax^2+c)dx=2\\!\\int_0^3 (ax^2+c)dx=2[ \\tfrac{a}{3}x^3+cx]_0^3=2(9a+3c)=54\\)</div>
<div class="calc">\\(\\Rightarrow 3a+c=9\\) (㉠)</div>`},
      {tag:'STEP 3', title:'\\(f(1)+f(-1)=2(a+c)=2\\Rightarrow a+c=1\\) (㉡)', body:`<div class="calc">\\(a+c=1\\) (㉡)</div>
<p>㉠-㉡: \\(2a=8\\Rightarrow a=4,\\ c=-3\\).</p>`},
      {tag:'STEP 4', title:'\\(f(2)+f(-2)=2(4a+c)=2(16-3)=26\\)', body:`<div class="calc">\\(f(2)+f(-2)=(4a+2b+c)+(4a-2b+c)=2(4a+c)=2\\cdot 13=26\\)</div>
<div class="calc purple">값 \\(=26\\)</div>`}
    ]
  },

  /* ───────── 기본 7 ───────── */
  {
    id:'c6-s7', level:'standard', levelLabel:'기본', num:7, type:'choice',
    subLabel:'[26009-0145] · 무한 극한 + 정적분',
    title:'\\(\\lim \\dfrac{f(x)-x^3}{x}=-2,\\ \\int_{-2}^2 (x+1)f(x)dx=4\\) — \\(f(0)\\)',
    question:`<p>다항함수 \\(f(x)\\)에 대하여 \\(\\displaystyle\\lim_{x\\to\\infty}\\dfrac{f(x)-x^3}{x}=-2,\\ \\displaystyle\\int_{-2}^{2}(x+1)f(x)\\,dx=4\\) 일 때, \\(f(0)\\)의 값은?</p>`,
    choices:['\\(\\dfrac{11}{30}\\)','\\(\\dfrac{2}{5}\\)','\\(\\dfrac{13}{30}\\)','\\(\\dfrac{7}{15}\\)','\\(\\dfrac{1}{2}\\)'], answer:3,
    keypoint:'\\(f(x)-x^3\\)의 차수 \\(=1\\), 계수 \\(-2\\) ⇒ \\(f(x)=x^3-2x+k\\). 정적분 후 \\(k\\) 결정.',
    steps:[
      {tag:'STEP 1', title:'\\(f(x)=x^3-2x+k\\)', body:`<p>\\(\\dfrac{f(x)-x^3}{x}\\to -2\\)이므로 \\(f(x)-x^3\\)은 일차이고 \\(x\\) 계수 \\(-2\\). 상수항을 \\(k\\)라 하면</p>
<div class="calc">\\(f(x)=x^3-2x+k\\)</div>`},
      {tag:'STEP 2', title:'\\((x+1)f(x)\\) 전개', body:`<div class="calc">\\((x+1)(x^3-2x+k)=x^4+x^3-2x^2+(k-2)x+k\\)</div>`},
      {tag:'STEP 3', title:'\\(\\!\\int_{-2}^2 (x+1)f\\,dx=2\\!\\int_0^2 (x^4-2x^2+k)dx\\)', body:`<p>기함수항 \\(x^3,\\ (k-2)x\\)는 적분 \\(0\\). 우함수항만:</p>
<div class="calc">\\(2\\!\\int_0^2 (x^4-2x^2+k)dx=2\\!\\left[\\dfrac{x^5}{5}-\\dfrac{2x^3}{3}+kx\\right]_0^2\\)</div>
<div class="calc">\\(=2\\!\\left(\\dfrac{32}{5}-\\dfrac{16}{3}+2k\\right)=\\dfrac{32}{15}+4k=4\\)</div>`},
      {tag:'STEP 4', title:'\\(k=\\dfrac{7}{15}\\Rightarrow f(0)=k=\\dfrac{7}{15}\\)', body:`<div class="calc">\\(4k=4-\\dfrac{32}{15}=\\dfrac{28}{15}\\Rightarrow k=\\dfrac{7}{15}\\)</div>
<div class="calc purple">\\(f(0)=\\dfrac{7}{15}\\)</div>`}
    ]

    title:'\\(\\lim \\dfrac{1}{x^2-9}\\!\\int_3^x (4x-t)(t^2+at)dt=18\\) — \\(a\\)',
    question:`<p>\\(\\displaystyle\\lim_{x\\to 3}\\dfrac{1}{x^2-9}\\displaystyle\\int_{3}^{x}(4x-t)(t^2+at)\\,dt=18\\) 일 때, 상수 \\(a\\)의 값은?</p>`,

    keypoint:'\\((4x-t)(t^2+at)=4x(t^2+at)-(t^3+at^2)\\). \\(4x\\)를 적분 밖으로 꺼냄. 분모 \\(x^2-9=(x+3)(x-3)\\).',
    steps:[
      {tag:'STEP 1', title:'적분 분리', body:`<div class="calc">\\(\\!\\int_3^x (4x-t)(t^2+at)dt=4x\\!\\int_3^x (t^2+at)dt-\\!\\int_3^x (t^3+at^2)dt\\)</div>`},
      {tag:'STEP 2', title:'두 극한 분리', body:`<div class="calc">\\(\\dfrac{1}{x^2-9}=\\dfrac{1}{x+3}\\cdot \\dfrac{1}{x-3}\\)</div>
<div class="calc">\\(\\lim_{x\\to 3}\\dfrac{4x}{x+3}\\cdot \\dfrac{1}{x-3}\\!\\int_3^x (t^2+at)dt-\\lim_{x\\to 3}\\dfrac{1}{x+3}\\cdot \\dfrac{1}{x-3}\\!\\int_3^x (t^3+at^2)dt\\)</div>`},
      {tag:'STEP 3', title:'\\(\\lim \\dfrac{1}{x-3}\\!\\int_3^x h(t)dt=h(3)\\) 활용', body:`<div class="calc">\\(=\\dfrac{12}{6}(9+3a)-\\dfrac{1}{6}(27+9a)=2(9+3a)-\\dfrac{1}{6}(27+9a)\\)</div>
<div class="calc">\\(=18+6a-\\dfrac{9}{2}-\\dfrac{3a}{2}=\\dfrac{27}{2}+\\dfrac{9a}{2}\\)</div>`},
      {tag:'STEP 4', title:'\\(\\dfrac{9a+27}{2}=18\\Rightarrow a=1\\)', body:`<div class="calc">\\(9a+27=36\\Rightarrow a=1\\)</div>

  {
    id:'c6-l1', level:'advanced', levelLabel:'실력', num:1, type:'choice',
    subLabel:'[26009-0147] · 조건에서 삼차함수 결정',
    title:'최고차 양수 삼차 \\(f\\), \\(f=0\\) 실근 \\(\\{0,2\\}\\), \\(\\int_0^2 f\\gt 0\\), \\(g(x)=\\int_1^x f(t)dt\\) 극솟값 \\(-11\\) — \\(g(2)\\)',
    question:`<p>최고차항의 계수가 양수인 삼차함수 \\(f(x)\\)가 다음 조건을 만족시킨다.</p>
<div class="calc"><p>(가) 방정식 \\(f(x)=0\\)의 실근은 \\(0,\\ 2\\)뿐이다.</p>
<p>(나) \\(\\displaystyle\\int_{0}^{2} f(x)\\,dx\\gt 0\\)</p></div>
<p>함수 \\(g(x)=\\displaystyle\\int_{1}^{x} f(t)\\,dt\\)의 극솟값이 \\(-11\\)일 때, \\(g(2)\\)의 값은?</p>`,
    choices:['\\(1\\)','\\(2\\)','\\(3\\)','\\(4\\)','\\(5\\)'], answer:4,
    keypoint:'\\(f\\)는 \\(ax^2(x-2)\\) 또는 \\(ax(x-2)^2\\) 중 하나. (나)로부터 \\(f=ax(x-2)^2\\). \\(g\'=f\\), \\(g\\) 극소는 \\(x=0\\)에서.',
    steps:[
      {tag:'STEP 1', title:'(가) ⇒ \\(f(x)=ax^2(x-2)\\) 또는 \\(ax(x-2)^2\\)', body:`<p>실근이 \\(0,2\\)뿐이고 \\(a\\gt 0\\)인 삼차함수.</p>`},
      {tag:'STEP 2', title:'(나)로 \\(f(x)=ax(x-2)^2\\) 결정', body:`<p>\\(f(x)=ax^2(x-2)\\): \\(0\\leq x\\leq 2\\)에서 \\(f\\leq 0\\) ⇒ \\(\\int_0^2 f\\lt 0\\). (나) 모순.</p>
<p>\\(f(x)=ax(x-2)^2\\): \\(0\\leq x\\leq 2\\)에서 \\(f\\geq 0\\) ⇒ \\(\\int_0^2 f\\gt 0\\). (나) 성립.</p>`},
      {tag:'STEP 3', title:'\\(g\'(x)=f(x)\\), 극소 \\(x=0\\)에서', body:`<p>\\(g\'=f=ax(x-2)^2\\). \\(g\'\\) 부호: \\(x\\lt 0\\) \\(-\\), \\(0\\lt x\\lt 2\\) \\(+\\), \\(x\\gt 2\\) \\(+\\). \\(x=0\\)에서 \\(-\\to +\\) ⇒ 극소.</p>
<div class="calc">\\(g(0)=\\!\\int_1^0 a(t^3-4t^2+4t)dt=-\\!\\int_0^1 a(t^3-4t^2+4t)dt=-a\\!\\left[\\dfrac{t^4}{4}-\\dfrac{4t^3}{3}+2t^2\\right]_0^1\\)</div>
<div class="calc">\\(=-a\\!\\left(\\dfrac{1}{4}-\\dfrac{4}{3}+2\\right)=-a\\cdot \\dfrac{11}{12}=-11\\Rightarrow a=12\\)</div>`},
      {tag:'STEP 4', title:'\\(g(2)=\\!\\int_1^2 f(t)dt=5\\)', body:`<div class="calc">\\(g(2)=\\!\\int_1^2 12t(t-2)^2 dt=\\!\\int_1^2 (12t^3-48t^2+48t)dt\\)</div>
<div class="calc">\\(=[3t^4-16t^3+24t^2]_1^2=(48-128+96)-(3-16+24)=16-11=5\\)</div>
<div class="calc purple">\\(g(2)=5\\)</div>`}
    ]
  },

  /* ───────── 실력 2 ───────── */
  {
    id:'c6-l2', level:'advanced', levelLabel:'실력', num:2, type:'choice',
    subLabel:'[26009-0148] · 사차함수 극값 조건',
    title:'최고차 \\(1\\) 사차 \\(f\\), 3조건 만족 — \\(f(-1)\\)',
    question:`<p>최고차항의 계수가 \\(1\\)인 사차함수 \\(f(x)\\)가 다음 조건을 만족시킨다.</p>
<div class="calc"><p>(가) 방정식 \\(\\displaystyle\\int_{3}^{x} f\'(t)\\,dt=0\\)의 서로 다른 실근의 개수는 \\(1\\)이다.</p>
<p>(나) 함수 \\(f(x)\\)는 \\(x=0,\\ x=m,\\ x=n\\)(\\(m,n\\)은 \\(0\\)이 아닌 서로 다른 정수)에서 극값을 갖고, 극댓값은 \\(0\\)이다.</p>
<p>(다) 곡선 \\(y=f(x)\\)는 원점을 지나지 않는다.</p></div>
<p>\\(f(-1)\\)의 값은?</p>`,
    choices:['\\(\\dfrac{29}{3}\\)','\\(10\\)','\\(\\dfrac{31}{3}\\)','\\(\\dfrac{32}{3}\\)','\\(11\\)'], answer:3,
    keypoint:'\\(\\int_3^x f\'=f(x)-f(3)\\). 실근 1개 ⇔ 직선 \\(y=f(3)\\)이 \\(y=f\\)와 1점에서만 만남. \\(x=3\\) 극소 + 다른 극소보다 작아야. 극대 \\(0\\), 극소 \\(x=3,x=0\\) 중 양수 극소가 \\(x=3\\).',
    steps:[
      {tag:'STEP 1', title:'(가) 분석: \\(y=f(3)\\)과 1점 교차', body:`<p>\\(\\!\\int_3^x f\'(t)dt=f(x)-f(3)=0\\) ⇔ \\(y=f(x)\\)와 \\(y=f(3)\\)의 교점이 1개.</p>
<p>최고차 \\(1\\) 사차이므로 \\(y=f(3)\\)과 1점에서만 만나려면 \\(x=3\\)에서 극소이며, 다른 극솟값보다 작아야.</p>`},
      {tag:'STEP 2', title:'(나)·(다): \\(x=0\\) 극소(\\(f(0)\\neq 0\\)), 극댓값 \\(0\\), \\(0\\lt m\\lt 3\\)', body:`<p>\\(f\\)가 \\(x=0,m,n\\)에서 극값, 극댓값 \\(0\\). (다)에서 \\(f(0)\\neq 0\\)이므로 \\(x=0\\)은 극솟값. 극대점이 \\(m\\)이라 두자(\\(0\\lt m\\lt 3\\)). 극값에 \\(f=0\\)인 곳이 극댓값 ⇒ \\(f(m)=0\\). \\(n=3\\).</p>
<p>(나) \\(m\\)이 정수 \\(\\Rightarrow m=1\\) 또는 \\(2\\).</p>`},
      {tag:'STEP 3', title:'\\(m=1\\): \\(f\'(x)=4x(x-1)(x-3)\\) → \\(f(3)\\lt f(0)\\) 검증', body:`<div class="calc">\\(f\'(x)=4x(x-1)(x-3)=4x^3-16x^2+12x\\)</div>
<div class="calc">\\(f(3)-f(0)=\\!\\int_0^3 f\'(x)dx=[x^4-\\tfrac{16}{3}x^3+6x^2]_0^3=81-144+54=-9\\lt 0\\) ✓</div>
<p>\\(m=2\\): \\(f\'(x)=4x(x-2)(x-3)\\), \\(f(3)-f(0)=9\\gt 0\\) ⇒ 조건 위배.</p>`},
      {tag:'STEP 4', title:'\\(f(x)=x^4-\\dfrac{16}{3}x^3+6x^2-\\dfrac{5}{3}\\); \\(f(-1)=\\dfrac{32}{3}\\)', body:`<div class="calc">\\(f(x)=x^4-\\dfrac{16}{3}x^3+6x^2+C\\)</div>
<div class="calc">\\(f(1)=1-\\dfrac{16}{3}+6+C=\\dfrac{5}{3}+C=0\\) (극댓값 \\(f(m)=f(1)=0\\)) \\(\\Rightarrow C=-\\dfrac{5}{3}\\)</div>
<div class="calc">\\(f(-1)=1+\\dfrac{16}{3}+6-\\dfrac{5}{3}=7+\\dfrac{11}{3}=\\dfrac{32}{3}\\)</div>
<div class="calc purple">\\(f(-1)=\\dfrac{32}{3}\\)</div>`}
    ]
  },

  /* ───────── 실력 3 ───────── */
  {
    id:'c6-l3', level:'advanced', levelLabel:'실력', num:3, type:'short',
    subLabel:'[26009-0149] · 절댓값 분기 함수 + 정적분 조건',
    title:'최고차 \\(1\\) 삼차 \\(f\\), \\(g(x)=\\{-f\\ (f\\lt 0),\\ 0\\ (f\\geq 0)\\}\\), 3조건 — \\(f(8)\\)',
    question:`<p>최고차항의 계수가 \\(1\\)인 삼차함수 \\(f(x)\\)에 대하여 \\(g(x)=\\begin{cases} -f(x) &amp; (f(x)\\lt 0)\\\\ 0 &amp; (f(x)\\geq 0)\\end{cases}\\) 이라 하자. 두 함수 \\(f(x),\\ g(x)\\)가 다음 조건을 만족시킬 때, \\(f(8)\\)의 값을 구하시오.</p>
<div class="calc"><p>(가) 함수 \\(f(x)\\)는 \\(x=1\\)에서 극대이다.</p>
<p>(나) \\(\\displaystyle\\int_{1}^{x} g(t)\\,dt\\leq 0\\)을 만족시키는 실수 \\(x\\)의 최댓값은 \\(3\\)이다.</p>
<p>(다) 모든 실수 \\(x\\)에 대하여 \\(\\displaystyle\\int_{1}^{x} g(t)\\,dt\\leq \\displaystyle\\int_{1}^{a} g(t)\\,dt\\)를 만족시키는 실수 \\(a\\)의 최솟값은 \\(4\\)이다.</p></div>`,
    answerText:'\\(164\\)',
    keypoint:'\\(g\\geq 0\\)이므로 \\(\\int g\\)는 단조증가. (나)에서 \\(\\int_1^x g\\leq 0\\)이고 등호 영역 후 처음 \\(0\\) 끊는 점이 \\(x=3\\). (다)에서 \\(a\\) 최솟값 \\(4\\). 삼차 \\(f\\)는 세 점에서 \\(0\\), \\(f\'(1)=0\\) 이용.',
    steps:[
      {tag:'STEP 1', title:'\\(g\\geq 0\\), \\(\\!\\int_1^x g\\)는 단조증가; (나)의 영역 분석', body:`<p>\\(g\\geq 0\\)이고 \\(\\int_1^x g\\leq 0\\)이려면 \\(x\\leq 1\\)이거나, \\(\\int_1^x g=0\\)일 때 \\(g\\equiv 0\\) (구간에서 \\(f\\geq 0\\))이 \\(x\\geq 1\\) 일부에서 성립.</p>
<p>가능한 그래프 5가지(분석은 그림 5종 — \\(y=g(x)\\) 형태). \\(\\int_1^x g\\leq 0\\) 만족 \\(x\\)의 최댓값 \\(3\\) ⇒ \\(x\\gt 3\\)부터 \\(\\int g\\gt 0\\) ⇒ 삼차 \\(f\\)가 \\(x\\gt 3\\)에서 음수(즉 \\(g\\gt 0\\)) 영역 시작.</p>`},
      {tag:'STEP 2', title:'\\(f\\)의 부호 패턴 결정', body:`<p>\\(f\\)의 근 \\(a\\lt 1\\lt b\\lt c\\)라 하고 \\(b=3\\), \\(c=4\\). \\((1\\lt x\\lt b)\\)에서 \\(f\\geq 0\\) ⇒ \\(g=0\\) ⇒ \\(\\int_1^x g=0\\); \\(b\\lt x\\lt c\\)에서 \\(f\\lt 0\\) ⇒ \\(g\\gt 0\\) ⇒ \\(\\int_1^x g\\) 증가.</p>
<p>(다): \\(\\int_1^x g\\leq \\int_1^a g\\) 만족 \\(a\\) 최솟값 \\(4\\) ⇒ \\(c=4\\) (그 이후 \\(g=0\\)이라 적분 일정).</p>`},
      {tag:'STEP 3', title:'\\(f(x)=(x-a)(x-3)(x-4)\\), \\(f\'(1)=0\\)', body:`<div class="calc">\\(f(x)=(x-a)(x-3)(x-4)=(x-a)(x^2-7x+12)\\)</div>
<div class="calc">\\(f\'(x)=(x^2-7x+12)+(x-a)(2x-7)\\)</div>
<div class="calc">\\(f\'(1)=(1-7+12)+(1-a)(2-7)=6-5(1-a)=0\\)</div>
<div class="calc">\\(\\Rightarrow 6=5(1-a)\\Rightarrow 1-a=\\dfrac{6}{5}\\Rightarrow a=-\\dfrac{1}{5}\\)</div>`},
      {tag:'STEP 4', title:'\\(f(8)=\\!\\left(8+\\dfrac{1}{5}\\right)\\cdot 5\\cdot 4=\\dfrac{41}{5}\\cdot 20=164\\)', body:`<div class="calc">\\(f(8)=(8-a)(8-3)(8-4)=\\dfrac{41}{5}\\cdot 5\\cdot 4=164\\)</div>
<div class="calc purple">\\(f(8)=164\\)</div>`}
    ]
  },

  /* ───────── 대표기출 ───────── */
  {
    id:'c6-k1', level:'kihul', levelLabel:'대표기출', num:1, type:'choice',
    subLabel:'2025학년도 수능 9월 모의평가 · 4점',
    title:'두 다항함수 \\(f,g\\): \\(\\int_1^x tf+\\int_{-1}^x tg=3x^4+8x^3-3x^2,\\ f=xg\'\\) — \\(\\int_0^3 g\\)',
    question:`<p>두 다항함수 \\(f(x),\\ g(x)\\)는 모두 실수 \\(x\\)에 대하여 다음 조건을 만족시킨다.</p>
<div class="calc"><p>(가) \\(\\displaystyle\\int_{1}^{x} tf(t)\\,dt+\\displaystyle\\int_{-1}^{x} tg(t)\\,dt=3x^4+8x^3-3x^2\\)</p>
<p>(나) \\(f(x)=xg\'(x)\\)</p></div>
<p>\\(\\displaystyle\\int_{0}^{3} g(x)\\,dx\\)의 값은? <span style="opacity:0.7">[4점]</span></p>`,
    choices:['\\(72\\)','\\(76\\)','\\(80\\)','\\(84\\)','\\(88\\)'], answer:0,
    keypoint:'(가) 미분 → \\(xf(x)+xg(x)=12x^3+24x^2-6x\\) ⇒ \\(f+g=12x^2+24x-6\\). (나)로 \\(f=xg\'\\) 대입 → \\((xg)\'=12x^2+24x-6\\). 적분 후 \\(x=0\\)으로 \\(C=0\\).',
    steps:[
      {tag:'STEP 1', title:'(가) 양변 미분: \\(xf(x)+xg(x)=12x^3+24x^2-6x\\)', body:`<div class="calc">\\(\\dfrac{d}{dx}\\!\\int_1^x tf(t)dt=xf(x),\\ \\dfrac{d}{dx}\\!\\int_{-1}^x tg(t)dt=xg(x)\\)</div>
<div class="calc">\\(\\Rightarrow xf(x)+xg(x)=12x^3+24x^2-6x\\)</div>
<p>\\(f,g\\)가 다항함수이므로 \\(x\\)로 나누면</p>
<div class="calc">\\(f(x)+g(x)=12x^2+24x-6\\) (㉠)</div>`},
      {tag:'STEP 2', title:'(나) \\(f=xg\'\\) 대입: \\((xg(x))\'=12x^2+24x-6\\)', body:`<div class="calc">\\(xg\'(x)+g(x)=12x^2+24x-6\\)</div>
<div class="calc">\\((xg(x))\'=g(x)+xg\'(x)=12x^2+24x-6\\)</div>`},
      {tag:'STEP 3', title:'양변 적분 + \\(x=0\\)으로 \\(C=0\\) ⇒ \\(g(x)=4x^2+12x-6\\)', body:`<div class="calc">\\(xg(x)=\\!\\int (12x^2+24x-6)dx=4x^3+12x^2-6x+C\\)</div>
<div class="calc">\\(x=0\\Rightarrow C=0\\)</div>
<div class="calc">\\(xg(x)=x(4x^2+12x-6)\\Rightarrow g(x)=4x^2+12x-6\\) (다항)</div>`},
      {tag:'STEP 4', title:'\\(\\!\\int_0^3 g(x)dx=72\\)', body:`<div class="calc">\\(\\!\\int_0^3 (4x^2+12x-6)dx=\\left[\\dfrac{4}{3}x^3+6x^2-6x\\right]_0^3=36+54-18=72\\)</div>
<div class="calc purple">\\(\\!\\int_0^3 g(x)dx=72\\)</div>`}
    ]
  }
];
</script>

<script>
(function () {
  let currentFilter = 'all';
  let filteredList  = [];
  let currentIdx    = 0;
  const stepState   = {};
  PROBLEMS.forEach(p => { stepState[p.id] = new Set(); });

  const viewport    = document.getElementById('card-viewport');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const currentNum  = document.getElementById('current-num');
  const totalNum    = document.getElementById('total-num');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const mainArea    = document.getElementById('main-area');

  function renderCard(problem) {
    const levelColors = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = levelColors[problem.level] || levelColors.basic;
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      const nums = ['①','②','③','④','⑤'];
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }
    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;
    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `<div class="step" data-step-num="${i+1}" style="display:none"><div class="step-header"><span class="step-tag">${step.tag}</span><span class="step-title">${step.title}</span></div><div class="step-body">${step.body}</div></div>`;
    });
    const subLabel = problem.subLabel ? `<span class="problem-sub-label">${problem.subLabel}</span>` : '';
    const probTitle = '';
    const keypointHTML = problem.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span><span>${problem.keypoint}</span></div>` : '';
    return `<article class="problem-card" data-pid="${problem.id}" data-level="${problem.level}"><div class="card-inner"><div class="problem-section"><div><div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>${subLabel}</div>${probTitle}<div class="problem-text"><div class="problem-statement">${problem.question}</div>${choicesHTML}</div>${keypointHTML}</div><div class="scratch-area" aria-label="풀이 공간" role="button" tabindex="0" onclick="openScratchOverlay(event)" onkeydown="if(event.key==='Enter'||event.key===' ')openScratchOverlay(event)"><span class="scratch-label">풀이 공간</span></div><div class="solution-section"><div class="solution-toggle-bar"><span class="solution-title">단계별 해설</span><div class="step-buttons">${stepBtns}</div></div><div class="steps-container" id="steps-${problem.id}">${stepsHTML}</div></div></div></article>`;
  }

  function applyFilter(filter) {
    currentFilter = filter;
    filteredList = filter === 'all' ? [...PROBLEMS] : PROBLEMS.filter(p => p.level === filter);
    currentIdx = 0;
    showCard(0);
    updateNav();
    updateProgress();
    updateFilterUI(filter);
  }
  function showCard(idx) {
    currentIdx = Math.max(0, Math.min(idx, filteredList.length - 1));
    const problem = filteredList[currentIdx];
    viewport.innerHTML = renderCard(problem);
    renderMath(viewport);
    restoreStepState(problem.id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function goTo(idx) {
    if (idx < 0 || idx >= filteredList.length) return;
    showCard(idx); updateNav(); updateProgress();
    if (document.getElementById('scratch-overlay')) renderScratchOverlay(false);
  }
  function updateNav() {
    prevBtn.disabled = currentIdx === 0;
    nextBtn.disabled = currentIdx === filteredList.length - 1;
    currentNum.textContent = currentIdx + 1;
    totalNum.textContent   = filteredList.length;
  }
  function updateProgress() {
    const pct = Math.round(((currentIdx + 1) / filteredList.length) * 100);
    progressBar.style.width = pct + '%';
    progressLbl.textContent = (currentIdx + 1) + ' / ' + filteredList.length;
  }
  function updateFilterUI(active) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === active);
    });
  }
  function showSteps(pid, targetStep) {
    const container = document.getElementById('steps-' + pid);
    if (!container) return;
    if (targetStep === 0) {
      stepState[pid] = new Set();
      container.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      [document.querySelector(`.problem-card[data-pid="${pid}"] .correct-choice`),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => {
          el.classList.remove('revealed');
          ['background','border','color','font-weight'].forEach(p => el.style.removeProperty(p));
        });
      document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`)?.classList.remove('active');
      const overlayContainer = document.getElementById('overlay-steps-' + pid);
      overlayContainer?.querySelectorAll('.step').forEach(el => { el.style.display = 'none'; });
      updateStepBtns(pid);
      return;
    }
    const stepEl = container.querySelector(`.step[data-step-num="${targetStep}"]`);
    if (!stepEl) return;
    if (!stepState[pid]) stepState[pid] = new Set();
    const isOpen = stepEl.style.display !== 'none';
    if (isOpen) {
      stepEl.style.display = 'none';
      stepState[pid].delete(targetStep);
    } else {
      stepEl.style.display = 'block';
      stepEl.style.animation = 'none'; void stepEl.offsetWidth; stepEl.style.animation = '';
      stepState[pid].add(targetStep);
    }
    updateStepBtns(pid);
    renderMath(container);
    if (!isOpen) setTimeout(() => stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
  }
  function restoreStepState(pid) {
    const saved = stepState[pid];
    if (!saved || saved.size === 0) return;
    const toOpen = [...saved].sort((a,b) => a-b);
    stepState[pid] = new Set();
    toOpen.forEach(n => showSteps(pid, n));
  }
  function updateStepBtns(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    card?.querySelectorAll('.step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn') || btn.classList.contains('answer-btn')) return;
      btn.classList.toggle('active', opened.has(parseInt(btn.dataset.step)));
    });
  }
  function highlightAnswer(pid, problem) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const overlay = document.getElementById('scratch-overlay');
    const targets = [];
    if (card) targets.push(card.querySelector('.correct-choice'));
    if (overlay) targets.push(overlay.querySelector('.correct-choice'));
    targets.filter(Boolean).forEach(correct => { correct.classList.add('revealed'); });
  }
  function revealAnswerOnly(pid) {
    const card = document.querySelector(`.problem-card[data-pid="${pid}"]`);
    const btn = card?.querySelector('.answer-btn');
    if (!card || !btn) return;
    if (btn.classList.contains('active')) {
      [card.querySelector('.correct-choice'),
       document.querySelector('#scratch-overlay .correct-choice')]
        .filter(Boolean).forEach(el => { el.classList.remove('revealed'); });
      btn.classList.remove('active');
      const ansBoxes = card.querySelectorAll('.answer-reveal-inline');
      ansBoxes.forEach(b => b.remove());
      document.querySelectorAll('#scratch-overlay .answer-reveal-inline').forEach(b => b.remove());
    } else {
      const problem = PROBLEMS.find(p => p.id === pid);
      if (!problem) return;
      if (problem.type === 'choice') {
        highlightAnswer(pid, problem);
      } else {
        const ansHTML = `<div class="answer-reveal answer-reveal-inline"><span class="answer-label">정답</span><span class="answer-number">${problem.answerText || ''}</span></div>`;
        const sec = card.querySelector('.problem-section');
        if (sec && !sec.querySelector('.answer-reveal-inline')) { sec.insertAdjacentHTML('beforeend', ansHTML); renderMath(sec); }
        const overlayProb = document.querySelector('#scratch-overlay .scratch-overlay-problem');
        if (overlayProb && !overlayProb.querySelector('.answer-reveal-inline')) { overlayProb.insertAdjacentHTML('beforeend', ansHTML); renderMath(overlayProb); }
      }
      btn.classList.add('active');
    }
  }
  function renderMath(el) {
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]).catch(() => {});
  }
  const printModal    = document.getElementById('print-modal');
  const modalBackdrop = document.getElementById('modal-backdrop');
  const printArea     = document.getElementById('print-area');
  document.getElementById('btn-print').addEventListener('click', () => {
    printModal.setAttribute('aria-hidden', 'false');
    printModal.classList.add('open'); modalBackdrop.classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click', closePrintModal);
  modalBackdrop.addEventListener('click', closePrintModal);
  function closePrintModal() {
    printModal.classList.remove('open'); modalBackdrop.classList.remove('open');
    printModal.setAttribute('aria-hidden', 'true');
  }
  document.getElementById('modal-confirm').addEventListener('click', () => {
    const rangeVal = document.querySelector('input[name="print-range"]:checked').value;
    const printMode = document.querySelector('input[name="print-mode"]:checked').value;
    let targetProblems;
    if (rangeVal === 'current') targetProblems = [filteredList[currentIdx]];
    else if (rangeVal === 'filter') targetProblems = [...filteredList];
    else targetProblems = [...PROBLEMS];
    buildPrintArea(targetProblems, printMode);
    closePrintModal();
    setTimeout(() => { window.print(); }, 600);
  });
  function buildPrintArea(problems, mode) {
    printArea.innerHTML = problems.map(p => {
      const nums = ['①','②','③','④','⑤'];
      let choicesHTML = '';
      if (p.type === 'choice' && p.choices) {
        choicesHTML = `<ol class="print-choices">` +
          p.choices.map((c, i) => `<li class="${(mode === 'solution' && i === p.answer) ? 'print-correct' : ''}">${nums[i]} ${c}</li>`).join('') + `</ol>`;
      } else {
        choicesHTML = `<div class="print-short-label">단답형${mode === 'solution' && p.answerText ? ' — 정답: ' + p.answerText : ''}</div>`;
      }
      let extraHTML = '';
      if (mode === 'solution') {
        extraHTML = `<div class="print-solution"><div class="print-solution-title">해설</div>` +
          p.steps.map(s => `<div class="print-step"><span class="print-step-tag">${s.tag}</span><span class="print-step-title">${s.title}</span><div class="print-step-body">${s.body}</div></div>`).join('') +
          (p.keypoint ? `<div class="key-concept"><span class="concept-label">핵심</span>${p.keypoint}</div>` : '') + `</div>`;
      }
      if (mode === 'blank') {
        return `<div class="print-card print-mode-blank"><div class="print-content-area"><div class="print-badge">${p.levelLabel} ${p.num}</div><div class="print-question">${p.question}</div>${choicesHTML}</div><div class="print-blank-space" aria-hidden="true"></div></div>`;
      }
      return `<div class="print-card print-mode-${mode}"><div class="print-badge">${p.levelLabel} ${p.num}</div><div class="print-question">${p.question}</div>${choicesHTML}${extraHTML}</div>`;
    }).join('');
    renderMath(printArea);
  }
  prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
  nextBtn.addEventListener('click', () => goTo(currentIdx + 1));
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });
  document.addEventListener('click', e => {
    const stepBtn = e.target.closest('.step-btn');
    if (stepBtn) {
      const pid = stepBtn.dataset.pid;
      if (stepBtn.classList.contains('answer-btn')) revealAnswerOnly(pid);
      else showSteps(pid, parseInt(stepBtn.dataset.step));
      if (typeof window.syncOverlayStepUI === 'function') window.syncOverlayStepUI(pid);
    }
  });
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentIdx + 1); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(currentIdx - 1); }
    if (['1','2','3','4','5','6'].includes(e.key)) {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, parseInt(e.key)); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === '0') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { showSteps(pid, 0); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'a' || e.key === 'A') {
      const pid = filteredList[currentIdx]?.id;
      if (pid) { revealAnswerOnly(pid); window.syncOverlayStepUI?.(pid); }
    }
    if (e.key === 'Escape' && document.getElementById('scratch-overlay')) {
      e.preventDefault(); closeScratchOverlay();
    }
  });
  let tx = 0, ty = 0, tt = 0, swipeActive = false;
  mainArea.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) { swipeActive = false; return; }
    swipeActive = true; tx = e.touches[0].clientX; ty = e.touches[0].clientY; tt = Date.now();
  }, { passive: true });
  mainArea.addEventListener('touchmove', e => { if (e.touches.length > 1) swipeActive = false; }, { passive: true });
  mainArea.addEventListener('touchend', e => {
    if (!swipeActive) return;
    swipeActive = false;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const dt = Date.now() - tt;
    if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy) * 2 && dt < 600) {
      goTo(dx < 0 ? currentIdx + 1 : currentIdx - 1);
    }
  }, { passive: true });
  (function () {
    const toggle = document.querySelector('[data-theme-toggle]');
    const html = document.documentElement;
    let dark = matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    setIcon(toggle, dark);
    toggle?.addEventListener('click', () => {
      dark = !dark;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      setIcon(toggle, dark);
    });
    function setIcon(btn, isDark) {
      if (!btn) return;
      btn.innerHTML = isDark
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
  })();
  window.openScratchOverlay = function(e) {
    if (e) e.stopPropagation();
    renderScratchOverlay(true);
  };
  function renderScratchOverlay(animateIn) {
    const existing = document.getElementById('scratch-overlay');
    if (existing) existing.remove();
    const problem = filteredList[currentIdx];
    if (!problem) return;
    const nums = ['①','②','③','④','⑤'];
    let choicesHTML = '';
    if (problem.type === 'choice' && problem.choices) {
      choicesHTML = `<ol class="choices" role="list">` +
        problem.choices.map((c, i) =>
          `<li class="${i === problem.answer ? 'correct-choice' : ''}">${nums[i]} ${c}</li>`).join('') +
        `</ol>`;
    } else {
      choicesHTML = `<div class="short-answer-label">단답형 (서술)</div>`;
    }
    const titleSuffix = `${problem.levelLabel} ${problem.num} · `;
    const _lvc = {
      basic:    { bg:'var(--level-basic-bg)',    text:'var(--level-basic-text)',    border:'var(--level-basic-border)' },
      example:  { bg:'var(--level-example-bg)',  text:'var(--level-example-text)',  border:'var(--level-example-border)' },
      exercise: { bg:'var(--level-exercise-bg)', text:'var(--level-exercise-text)', border:'var(--level-exercise-border)' },
      standard: { bg:'var(--level-standard-bg)', text:'var(--level-standard-text)', border:'var(--level-standard-border)' },
      advanced: { bg:'var(--level-advanced-bg)', text:'var(--level-advanced-text)', border:'var(--level-advanced-border)' },
      kihul:    { bg:'var(--level-kihul-bg)',    text:'var(--level-kihul-text)',    border:'var(--level-kihul-border)' },
    };
    const lc = _lvc[problem.level] || _lvc.basic;
    const badgeHTML = `<div class="problem-badge" style="background:${lc.bg};color:${lc.text};border-color:${lc.border}">${problem.levelLabel} ${problem.num}</div>`;
    const problemHTML = `${badgeHTML}<div class="problem-statement">${problem.question}</div>${choicesHTML}`;
    const maxStep = problem.steps.length;
    let stepBtns = '';
    for (let s = 1; s <= maxStep; s++) {
      stepBtns += `<button class="step-btn" data-pid="${problem.id}" data-step="${s}">STEP ${s}</button>`;
    }
    stepBtns += `<button class="step-btn answer-btn" data-pid="${problem.id}" data-step="answer">정답</button>`;
    stepBtns += `<button class="step-btn reset-btn" data-pid="${problem.id}" data-step="0">초기화</button>`;
    let stepsHTML = '';
    problem.steps.forEach((step, i) => {
      stepsHTML += `<div class="step" data-step-num="${i+1}" style="display:none"><div class="step-header"><span class="step-tag">${step.tag}</span><span class="step-title">${step.title}</span></div><div class="step-body">${step.body}</div></div>`;
    });
    const total = filteredList.length;
    const prevDisabled = currentIdx === 0 ? 'disabled' : '';
    const nextDisabled = currentIdx === total - 1 ? 'disabled' : '';
    const overlay = document.createElement('div');
    overlay.className = 'scratch-overlay';
    overlay.id = 'scratch-overlay';
    if (!animateIn) overlay.style.animation = 'none';
    overlay.innerHTML = `<div class="scratch-overlay-header"><span class="scratch-overlay-title">${titleSuffix}풀이 공간</span><div class="overlay-nav"><button class="overlay-nav-btn" id="overlay-prev" ${prevDisabled} aria-label="이전 문제">← 이전</button><span class="overlay-nav-label">${currentIdx+1} / ${total}</span><button class="overlay-nav-btn" id="overlay-next" ${nextDisabled} aria-label="다음 문제">다음 →</button></div><button class="scratch-overlay-close" id="scratch-overlay-close" aria-label="닫기">&times;</button></div><div class="scratch-overlay-body"><div class="scratch-overlay-problem">${problemHTML}</div><div class="scratch-overlay-canvas"><div class="overlay-step-bar">${stepBtns}</div><div class="overlay-steps-container" id="overlay-steps-${problem.id}">${stepsHTML}</div></div></div>`;
    document.body.appendChild(overlay);
    renderMath(overlay);
    document.getElementById('scratch-overlay-close').addEventListener('click', closeScratchOverlay);
    document.getElementById('overlay-prev').addEventListener('click', () => { if (currentIdx > 0) goTo(currentIdx - 1); });
    document.getElementById('overlay-next').addEventListener('click', () => { if (currentIdx < filteredList.length - 1) goTo(currentIdx + 1); });
    syncOverlayStepUI(problem.id);
  }
  function closeScratchOverlay() {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    overlay.style.animation = 'overlayOut 180ms cubic-bezier(0.4,0,1,1) both';
    overlay.addEventListener('animationend', () => overlay.remove(), { once: true });
  }
  function syncOverlayStepUI(pid) {
    const overlay = document.getElementById('scratch-overlay');
    if (!overlay) return;
    const container = document.getElementById('overlay-steps-' + pid);
    if (!container) return;
    const opened = stepState[pid] instanceof Set ? stepState[pid] : new Set();
    container.querySelectorAll('.step').forEach(stepEl => {
      const n = parseInt(stepEl.dataset.stepNum, 10);
      stepEl.style.display = opened.has(n) ? 'block' : 'none';
    });
    overlay.querySelectorAll('.overlay-step-bar .step-btn').forEach(btn => {
      if (btn.classList.contains('reset-btn')) return;
      const s = btn.dataset.step;
      if (s === 'answer') {
        const mainAnswerBtn = document.querySelector(`.problem-card[data-pid="${pid}"] .answer-btn`);
        btn.classList.toggle('active', !!mainAnswerBtn?.classList.contains('active'));
      } else {
        btn.classList.toggle('active', opened.has(parseInt(s, 10)));
      }
    });
  }
  window.syncOverlayStepUI = syncOverlayStepUI;
  (function(){
    if(!document.getElementById('overlay-out-style')){
      const s=document.createElement('style');
      s.id='overlay-out-style';
      s.textContent='@keyframes overlayOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.97)}}';
      document.head.appendChild(s);
    }
  })();
  (function setupDownload() {
    const dlBtn = document.getElementById('btn-download');
    if (!dlBtn) return;
    dlBtn.addEventListener('click', function () {
      const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '교사용_수능특강_미적분I_부정적분과정적분_해설.html';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    });
  })();
  function jumpToAnchor() {
    const hash = (location.hash || '').replace(/^#/, '');
    if (!hash) return false;
    const idx = PROBLEMS.findIndex(p => p.id === hash);
    if (idx < 0) return false;
    applyFilter('all');
    currentIdx = idx;
    showCard(idx); updateNav(); updateProgress();
    return true;
  }
  window.addEventListener('hashchange', jumpToAnchor);
  function init() {
    applyFilter('all');
    if (location.hash) setTimeout(jumpToAnchor, 50);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
<script>
document.addEventListener('keydown', (e) => {
  if (e.isComposing) return;
  const t = e.target;
  if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
  if (e.key === 'h' || e.key === 'H') {
    e.preventDefault();
    const w = window.open('교사용_Nav_All_index_미적분I.html', 'aftermath_main_calc'); if (w) w.focus();
  }
});
</script>

<script>
/* named window 일관 처리 — 이미 열린 창 있으면 새 창 없이 focus */
document.addEventListener('click', function(e) {
  const a = e.target.closest('a[target^="aftermath_"]');
  if (!a) return;
  e.preventDefault();
  const w = window.open(a.href, a.target);
  if (w) w.focus();
});
</script>
